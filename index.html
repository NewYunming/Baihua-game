<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="白桦大冒险：支持近战、弓枪、精英敌人与无尽模式的像素风横版肉鸽游戏。">
    <meta name="theme-color" content="#07111f">
    <link rel="icon" href="data:,">
    <title>白桦大冒险：余烬远征</title>
    <style>
        :root {
            --touch-btn-size: 116px;
            --touch-attack-size: 134px;
            --touch-gap: 26px;
            --touch-move-gap: 24px;
            --touch-offset: 40px;
            --touch-bottom: 36px;
            --touch-move-bottom: 64px;
            --touch-font-size: 28px;
            --touch-action-width: 320px;
            --touch-action-height: 240px;
            --touch-arc-near: 162px;
            --touch-arc-far: 178px;
            --touch-arc-top: 108px;
            --touch-arc-mid: 38px;
            --touch-reload-right: 78px;
            --touch-reload-bottom: 126px;
            --touch-icon-scale: 1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background:
                radial-gradient(circle at 50% 20%, rgba(73, 104, 146, 0.28), transparent 34%),
                linear-gradient(145deg, #050912 0%, #0b1728 48%, #160d25 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            overscroll-behavior: none;
            color-scheme: dark;
        }
        #gameContainer {
            position: relative;
            border: 3px solid #58708f;
            border-radius: 4px;
            box-shadow:
                0 0 0 1px rgba(190, 225, 255, 0.16),
                0 26px 90px rgba(0,0,0,0.72),
                0 0 42px rgba(70, 135, 190, 0.2);
            isolation: isolate;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            background: #07111f;
            cursor: crosshair;
            touch-action: none;
        }
        #instructions {
            position: absolute;
            bottom: -44px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #a9bad0;
            font-size: 13px;
            white-space: nowrap;
            padding: 7px 14px;
            border: 1px solid rgba(142, 180, 218, 0.22);
            border-radius: 999px;
            background: rgba(5, 10, 20, 0.72);
            letter-spacing: 0.02em;
        }

        #gameContainer.touch-mode {
            position: fixed;
            inset: 0;
            z-index: 100;
            border: none;
            box-shadow: none;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #07111f;
        }

        #touchControls {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: none;
            z-index: 5;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        #touchControls .touch-left,
        #touchControls .touch-right {
            position: absolute;
            z-index: 6;
        }

        #touchControls .touch-left {
            left: calc(var(--touch-offset) + env(safe-area-inset-left, 0px));
            bottom: calc(var(--touch-move-bottom) + env(safe-area-inset-bottom, 0px));
            display: flex;
            gap: var(--touch-move-gap);
            pointer-events: auto;
        }

        #touchControls .touch-right {
            right: calc(var(--touch-offset) + env(safe-area-inset-right, 0px));
            bottom: calc(var(--touch-bottom) + env(safe-area-inset-bottom, 0px));
            width: var(--touch-action-width);
            height: var(--touch-action-height);
            pointer-events: none;
        }

        .touch-btn {
            width: var(--touch-btn-size);
            height: var(--touch-btn-size);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            border: 3px solid #DCEBFF;
            background:
                linear-gradient(135deg, rgba(112, 155, 205, 0.24) 25%, transparent 25%) 0 0 / 8px 8px,
                rgba(7, 17, 31, 0.78);
            color: #fff;
            font-size: var(--touch-font-size);
            font-family: 'Courier New', monospace;
            box-shadow:
                0 0 0 3px rgba(3, 8, 16, 0.82),
                inset 0 0 0 3px rgba(155, 198, 244, 0.14),
                4px 5px 0 rgba(0, 0, 0, 0.42);
            backdrop-filter: none;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            appearance: none;
            -webkit-appearance: none;
        }

        .touch-btn[hidden] {
            display: none !important;
        }

        #touchControls .touch-right .touch-btn {
            position: absolute;
            pointer-events: auto;
            border-radius: 50%;
        }

        .touch-btn.attack-btn {
            width: var(--touch-attack-size);
            height: var(--touch-attack-size);
            right: 0;
            bottom: 0;
            border-width: 4px;
            border-color: #FFE082;
            background:
                linear-gradient(135deg, rgba(255, 213, 79, 0.25) 25%, transparent 25%) 0 0 / 10px 10px,
                rgba(38, 22, 11, 0.88);
            box-shadow:
                0 0 0 4px rgba(5, 8, 15, 0.9),
                inset 0 0 0 4px rgba(255, 236, 179, 0.16),
                5px 7px 0 rgba(0, 0, 0, 0.48);
        }

        .touch-btn.jump-btn {
            right: var(--touch-arc-near);
            bottom: var(--touch-arc-top);
            border-color: #90CAF9;
        }

        .touch-btn.heal-btn {
            right: var(--touch-arc-far);
            bottom: var(--touch-arc-mid);
            border-color: #EF9A9A;
        }

        .touch-btn:active {
            transform: translate(2px, 2px);
            filter: brightness(1.35);
            box-shadow:
                0 0 0 3px rgba(3, 8, 16, 0.82),
                inset 0 0 0 3px rgba(255, 255, 255, 0.2);
        }

        .touch-btn.reload-btn {
            right: var(--touch-reload-right);
            bottom: var(--touch-reload-bottom);
            border-color: #80CBC4;
            color: #B2DFDB;
        }

        .pixel-icon {
            position: relative;
            display: block;
            width: 32px;
            height: 32px;
            flex: 0 0 32px;
            transform: scale(var(--touch-icon-scale));
            transform-origin: center;
            image-rendering: pixelated;
        }

        .pixel-arrow::before {
            content: '';
            position: absolute;
            left: 14px;
            top: 6px;
            width: 4px;
            height: 4px;
            background: #EAF4FF;
            box-shadow:
                -4px 4px #EAF4FF, 0 4px #EAF4FF,
                -8px 8px #EAF4FF, -4px 8px #EAF4FF, 0 8px #EAF4FF, 4px 8px #EAF4FF, 8px 8px #EAF4FF,
                -4px 12px #EAF4FF, 0 12px #EAF4FF,
                0 16px #EAF4FF;
        }

        .pixel-arrow-right {
            transform: scale(var(--touch-icon-scale)) scaleX(-1);
        }

        .pixel-boot::before {
            content: '';
            position: absolute;
            left: 7px;
            top: 4px;
            width: 9px;
            height: 16px;
            background: #90CAF9;
            box-shadow: inset -4px 0 #4D86B7;
        }

        .pixel-boot::after {
            content: '';
            position: absolute;
            left: 7px;
            top: 18px;
            width: 20px;
            height: 7px;
            background: #EAF4FF;
            box-shadow: 0 5px 0 #4D86B7;
        }

        .pixel-magazine::before {
            content: '';
            position: absolute;
            left: 10px;
            top: 9px;
            width: 13px;
            height: 20px;
            background: #B2DFDB;
            box-shadow:
                inset -4px 0 #4F8A83,
                inset 0 -4px #315C58;
        }

        .pixel-magazine::after {
            content: '';
            position: absolute;
            left: 4px;
            top: 2px;
            width: 4px;
            height: 4px;
            background: #FFF59D;
            box-shadow:
                4px 0 #FFF59D, 8px 0 #FFF59D,
                4px 4px #FFF59D,
                4px 8px #FFF59D;
        }

        .pixel-heart::before {
            content: '';
            position: absolute;
            left: 4px;
            top: 6px;
            width: 4px;
            height: 4px;
            background: #FF8A80;
            box-shadow:
                4px 0 #FF8A80, 12px 0 #FF8A80, 16px 0 #FF8A80,
                0 4px #FF8A80, 4px 4px #FF5252, 8px 4px #FF8A80, 12px 4px #FF8A80, 16px 4px #FF5252, 20px 4px #FF8A80,
                0 8px #FF8A80, 4px 8px #FF5252, 8px 8px #FF5252, 12px 8px #FF5252, 16px 8px #FF5252, 20px 8px #FF8A80,
                4px 12px #FF5252, 8px 12px #FF5252, 12px 12px #FF5252, 16px 12px #FF5252,
                8px 16px #FF5252, 12px 16px #FF5252,
                12px 20px #C62828;
        }

        .pixel-sword-shape {
            position: absolute;
            left: 7px;
            top: 1px;
            width: 18px;
            height: 30px;
        }

        .pixel-sword-shape .blade {
            position: absolute;
            left: 6px;
            top: 0;
            width: 7px;
            height: 19px;
            background: #F5FAFF;
            box-shadow: inset -3px 0 #8FB5DE, 0 -3px 0 -1px #F5FAFF;
        }

        .pixel-sword-shape .guard {
            position: absolute;
            left: 0;
            top: 18px;
            width: 19px;
            height: 5px;
            background: #FFD54F;
            box-shadow: inset 0 -2px #B77713;
        }

        .pixel-sword-shape .grip {
            position: absolute;
            left: 7px;
            top: 23px;
            width: 5px;
            height: 8px;
            background: #A8683A;
            box-shadow: 0 7px 0 #FFD54F;
        }

        #touchPauseButton {
            position: absolute;
            top: calc(10px + env(safe-area-inset-top, 0px));
            left: 50%;
            transform: translateX(-50%);
            z-index: 13;
            width: 48px;
            height: 38px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #DCEBFF;
            border-radius: 6px;
            background: rgba(7, 17, 31, 0.88);
            box-shadow: 3px 4px 0 rgba(0, 0, 0, 0.5), inset 0 0 0 2px rgba(144, 202, 249, 0.18);
            pointer-events: auto;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        #touchPauseButton .pixel-icon {
            transform: none;
        }

        .pixel-pause-icon::before {
            content: '';
            position: absolute;
            left: 5px;
            top: 2px;
            width: 5px;
            height: 18px;
            background: #EAF4FF;
            box-shadow: 10px 0 #EAF4FF;
        }

        #touchPauseButton.is-paused .pixel-pause-icon::before {
            left: 7px;
            top: 4px;
            width: 5px;
            height: 5px;
            box-shadow:
                0 5px #EAF4FF, 5px 5px #EAF4FF,
                0 10px #EAF4FF, 5px 10px #EAF4FF, 10px 10px #EAF4FF,
                0 15px #EAF4FF, 5px 15px #EAF4FF;
        }

        #touchControls.paused .touch-left,
        #touchControls.paused .touch-right,
        #touchControls.paused #fullscreenButton {
            display: none !important;
        }

        #touchControls.paused {
            z-index: 31;
        }

        #fullscreenButton {
            position: absolute;
            top: calc(10px + env(safe-area-inset-top, 0px));
            left: calc(50% + 34px);
            right: auto;
            z-index: 12;
            min-width: 64px;
            height: 38px;
            padding: 0 12px;
            border: 1px solid rgba(255, 255, 255, 0.68);
            border-radius: 10px;
            background: rgba(3, 10, 20, 0.72);
            color: #FFF;
            font: bold 14px 'Courier New', monospace;
            pointer-events: auto;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        #pauseMenu {
            position: absolute;
            inset: 0;
            z-index: 30;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(2, 7, 14, 0.78);
            pointer-events: auto;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        #pauseMenu[aria-hidden="false"] {
            display: flex;
        }

        .pause-panel {
            width: min(420px, calc(100% - 24px));
            max-height: calc(100% - 16px);
            overflow-y: auto;
            overscroll-behavior: contain;
            padding: 24px;
            border: 4px solid #B7D7F5;
            border-radius: 4px;
            background:
                linear-gradient(135deg, rgba(81, 128, 176, 0.14) 25%, transparent 25%) 0 0 / 10px 10px,
                #091525;
            box-shadow: 0 0 0 5px #02070E, 10px 12px 0 rgba(0, 0, 0, 0.48);
            color: #EAF4FF;
        }

        .pause-panel h2 {
            margin: 0 0 20px;
            color: #FFF59D;
            font-size: 30px;
            text-align: center;
            letter-spacing: 0.12em;
            text-shadow: 3px 3px 0 #533B12;
        }

        .pause-setting {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px 14px;
            margin: 16px 0;
            align-items: center;
        }

        .pause-setting[hidden] {
            display: none !important;
        }

        .pause-setting label {
            font-weight: bold;
            color: #C8E6FF;
        }

        .pause-setting output {
            min-width: 46px;
            color: #FFF59D;
            text-align: right;
        }

        .pause-setting input[type="range"] {
            grid-column: 1 / -1;
            width: 100%;
            height: 22px;
            margin: 0;
            appearance: none;
            -webkit-appearance: none;
            background: transparent;
            touch-action: pan-x;
        }

        .pause-setting input[type="range"]::-webkit-slider-runnable-track {
            height: 10px;
            border: 2px solid #02070E;
            background: #29445E;
            box-shadow: inset 0 0 0 2px #416987;
        }

        .pause-setting input[type="range"]::-webkit-slider-thumb {
            width: 22px;
            height: 22px;
            margin-top: -8px;
            border: 3px solid #02070E;
            border-radius: 2px;
            background: #FFF59D;
            appearance: none;
            -webkit-appearance: none;
        }

        .pause-setting input[type="range"]::-moz-range-track {
            height: 8px;
            border: 2px solid #02070E;
            background: #29445E;
        }

        .pause-setting input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border: 3px solid #02070E;
            border-radius: 2px;
            background: #FFF59D;
        }

        .pause-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-top: 22px;
        }

        .pause-menu-btn {
            min-height: 48px;
            border: 3px solid #B7D7F5;
            border-radius: 3px;
            background: #13283D;
            color: #FFF;
            font: bold 16px 'Courier New', monospace;
            box-shadow: 4px 5px 0 #02070E;
            cursor: pointer;
        }

        .pause-menu-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 3px 0 #02070E;
        }

        #pauseRestartButton {
            border-color: #FFAB91;
            color: #FFCCBC;
        }

        @media (max-height: 480px) {
            #pauseMenu {
                padding: 8px;
            }

            .pause-panel {
                padding: 12px 18px;
            }

            .pause-panel h2 {
                margin-bottom: 8px;
                font-size: 22px;
            }

            .pause-setting {
                gap: 4px 12px;
                margin: 7px 0;
            }

            .pause-setting input[type="range"] {
                height: 18px;
            }

            .pause-actions {
                margin-top: 10px;
            }

            .pause-menu-btn {
                min-height: 40px;
            }
        }

        #rotateHint {
            position: absolute;
            inset: 0;
            z-index: 20;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
            color: #FFF;
            background: rgba(3, 8, 16, 0.94);
            text-align: center;
            font-weight: bold;
            letter-spacing: 0.04em;
        }

        #rotateHint small {
            color: #90CAF9;
            font-weight: normal;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" tabindex="0" role="application" aria-label="白桦大冒险游戏画布"></canvas>
        <div id="instructions">A/D 移动 · 空格跳跃 · J/左键攻击 · R 装填 · U 求饶回血 · Esc 暂停 · 奖励 1/2/3 · 商店 1-6 · F 刷新 / S 放弃或返回</div>
        <div id="touchControls" aria-hidden="true">
            <button id="fullscreenButton" type="button" aria-label="进入全屏">⛶ 全屏</button>
            <button id="touchPauseButton" type="button" aria-label="暂停游戏" aria-pressed="false">
                <span class="pixel-icon pixel-pause-icon" aria-hidden="true"></span>
            </button>
            <div class="touch-left">
                <button type="button" class="touch-btn" data-action="left" aria-label="向左移动">
                    <span class="pixel-icon pixel-arrow" aria-hidden="true"></span>
                </button>
                <button type="button" class="touch-btn" data-action="right" aria-label="向右移动">
                    <span class="pixel-icon pixel-arrow pixel-arrow-right" aria-hidden="true"></span>
                </button>
            </div>
            <div class="touch-right">
                <button type="button" class="touch-btn jump-btn" data-action="jump" aria-label="跳跃">
                    <span class="pixel-icon pixel-boot" aria-hidden="true"></span>
                </button>
                <button id="reloadButton" type="button" class="touch-btn reload-btn" data-action="reload" aria-label="手动换弹" aria-hidden="true" hidden disabled>
                    <span class="pixel-icon pixel-magazine" aria-hidden="true"></span>
                </button>
                <button type="button" class="touch-btn attack-btn" data-action="attack" aria-label="攻击">
                    <span class="pixel-icon pixel-sword" aria-hidden="true">
                        <span class="pixel-sword-shape">
                            <span class="blade"></span>
                            <span class="guard"></span>
                            <span class="grip"></span>
                        </span>
                    </span>
                </button>
                <button type="button" class="touch-btn heal-btn" data-action="heal" aria-label="求饶回血">
                    <span class="pixel-icon pixel-heart" aria-hidden="true"></span>
                </button>
            </div>
        </div>
        <div id="pauseMenu" role="dialog" aria-modal="true" aria-labelledby="pauseTitle" aria-hidden="true">
            <div class="pause-panel">
                <h2 id="pauseTitle">暂停</h2>
                <div class="pause-setting">
                    <label for="volumeSlider">音量</label>
                    <output id="volumeValue" for="volumeSlider">100%</output>
                    <input id="volumeSlider" type="range" min="0" max="100" value="100" step="1" aria-label="游戏音量">
                </div>
                <div id="pauseTouchSizeRow" class="pause-setting" hidden>
                    <label for="touchSizeSlider">按键大小</label>
                    <output id="touchSizeValue" for="touchSizeSlider">100%</output>
                    <input id="touchSizeSlider" type="range" min="75" max="135" value="100" step="1" aria-label="触屏按键大小" disabled>
                </div>
                <div class="pause-actions">
                    <button id="pauseContinueButton" class="pause-menu-btn" type="button">继续游戏</button>
                    <button id="pauseRestartButton" class="pause-menu-btn" type="button">重新开始</button>
                </div>
            </div>
        </div>
        <div id="rotateHint" role="status">请将设备旋转至横屏<small>横屏可避免操作区重叠</small></div>
        <div id="liveStatus" class="sr-only" aria-live="polite"></div>
    </div>

    <script>
        // ============ 游戏配置 ============
        const CONFIG = {
            CANVAS_WIDTH: 960,
            CANVAS_HEIGHT: 540,
            TILE_SIZE: 32,
            GRAVITY: 0.6,
            PLAYER_SPEED: 5,
            JUMP_FORCE: 12,
            ATTACK_DURATION: 15,
            ATTACK_COOLDOWN: 25,
            ENEMY_SPEED: 1.2,
            KNOCKBACK_FORCE: 8,
            PLAYER_MAX_HP: 100,
            ENEMY_DAMAGE: 10,
            SWORD_DAMAGE: 25,
            BASE_ENEMIES_PER_WAVE: 5,
            // 前十波保留主线强度；进入无尽后改用缓慢多项式成长，避免后期变成血量海绵。
            ENEMY_HP_SCALING: 1.15,
            ENEMY_DAMAGE_SCALING: 1.1,
            BIOME_LIST: ['plains', 'snow', 'rain', 'nether', 'end', 'night'],
            BOSS_WAVE: 10,
            MAX_ENEMIES_PER_WAVE: 20,
            BOW_RELOAD_FRAMES: 60,
            RANGED_DAMAGE_MULTIPLIER: 0.5,
            AUTOMATIC_DAMAGE_MULTIPLIER: 0.35,
            BOW_DAMAGE_MULTIPLIER: 2,
            RANGED_FRAGMENT_EFFICIENCY: 0.66,
            LASER_CHARGE_FRAMES: 72,
            LASER_FIRE_FRAMES: 14
        };

        // ============ 生物群系定义（每波随机主题） ============
        const BIOMES = {
            plains: {
                name: '草地白天',
                musicKey: 'plains',
                sky: ['#87CEEB', '#B0E0E6', '#E0F7FA'],
                sun: true,
                moon: false,
                top: '#4CAF50',
                topAccent: '#66BB6A',
                dirt: '#8B5A2B',
                dirtAccent: '#7A4A1B',
                stone: '#6D4C41',
                cloud: '#FFF',
                weather: null
            },
            snow: {
                name: '积雪',
                musicKey: 'snow',
                sky: ['#B3E5FC', '#E1F5FE', '#FFFFFF'],
                sun: true,
                moon: false,
                top: '#E0F2F1',
                topAccent: '#B2DFDB',
                dirt: '#8D6E63',
                dirtAccent: '#6D4C41',
                stone: '#5D4037',
                cloud: '#F5F5F5',
                weather: 'snow'

        // ============ 武器类 ============
        class Weapon {
            constructor(data, rarity) {
                this.name = data.name;
                this.model = data.model || 'sword';
                this.category = data.category || 'melee';
                this.isRanged = this.category === 'ranged';
                this.balanceProfile = data.balanceProfile || (this.isRanged ? null : 'melee');
                const balance = WEAPON_BALANCE_PROFILES[this.balanceProfile];
                if (!balance) throw new Error(`未知武器平衡类型: ${this.balanceProfile}`);
                this.damage = Math.max(1, data.baseDamage * balance.damageMultiplier);
                this.rarity = rarity;
                this.color = RARITY[rarity].color;
                this.glowColor = RARITY[rarity].glowColor;

                this.projectileSpeed = data.projectileSpeed || 0;
                this.projectileGravity = data.projectileGravity || 0;

                this.muzzleOffset = data.muzzleOffset || getWeaponMuzzleOffset(this.model, this.visualVariant);
                this.attackStyle = data.attackStyle || MODEL_ATTACK_STYLES[this.model] || 'slash';
                this.attackProfile = ATTACK_PROFILES[this.attackStyle] || ATTACK_PROFILES.slash;
                this.hasParticles = data.hasParticles ?? (rarity === 'LEGENDARY');
                this.particleColor = data.particleColor || this.color;
                this.rarityName = RARITY[rarity].name;
                const hpProfile = WEAPON_HP_BONUS_BY_RARITY[rarity] || WEAPON_HP_BONUS_BY_RARITY.COMMON;
                this.hpBonus = Math.min(hpProfile[this.isRanged ? 'ranged' : 'melee'], 100);
            }

            getAttackRange(rangeUpgrade = 0) {
                return 40 + this.rangeBonus + rangeUpgrade;
            }

            getKnockback() {
                return CONFIG.KNOCKBACK_FORCE + this.knockbackBonus;
            }

            getProjectileKnockback() {
                return Math.max(0, this.getKnockback() * WEAPON_BALANCE_PROFILES[this.balanceProfile].knockbackMultiplier);
            }

            getProjectileKnockbackFrames() {
                return WEAPON_BALANCE_PROFILES[this.balanceProfile].knockbackFrames;
            }

            getFragmentEfficiency() {
                return WEAPON_BALANCE_PROFILES[this.balanceProfile].fragmentEfficiency;
            }

            getMagazineSize(ammoUpgrade = 0) {
                if (!this.isRanged) return 0;
                if (this.fixedMagazine) return Math.max(1, this.baseMagazine);
                return Math.max(1, this.baseMagazine + ammoUpgrade);
            }

            getReloadFrames(reloadSpeedUpgrade = 0) {
                const multiplier = Math.max(0.45, 1 - reloadSpeedUpgrade);
                return Math.max(18, Math.round(this.reloadFrames * multiplier));
            }
        }

        // ============ 武器生成器 ============
        const RARITY_ORDER = ['COMMON', 'RARE', 'EPIC', 'LEGENDARY'];

        function generateRandomWeapon(minRarity = 'COMMON', excludedNames = []) {
            const minIndex = RARITY_ORDER.indexOf(minRarity);
            const excluded = excludedNames instanceof Set ? excludedNames : new Set(excludedNames);
            const available = RARITY_ORDER.filter((rarity, idx) =>
                idx >= minIndex && WEAPON_DATABASE[rarity].some(weapon => !excluded.has(weapon.name))
            );
            if (available.length === 0) return null;
            const totalProb = available.reduce((sum, r) => sum + (RARITY[r].probability || 0), 0);
            let roll = Math.random() * totalProb;
            let rarity = available[0];

            for (const r of available) {
                roll -= RARITY[r].probability;
                if (roll <= 0) {
                    rarity = r;
                    break;
                }
            }

            const weaponList = WEAPON_DATABASE[rarity].filter(weapon => !excluded.has(weapon.name));
            const weaponData = weaponList[Math.floor(Math.random() * weaponList.length)];
            return new Weapon(weaponData, rarity);
        }

        function generateWeaponChoices(count = 3, minRarity = 'COMMON', excludedNames = []) {
            const choices = [];
            const excluded = new Set(excludedNames);
            while (choices.length < count) {
                const choice = generateRandomWeapon(minRarity, excluded);
                if (!choice) break;
                choices.push(choice);
                excluded.add(choice.name);
            }
            return choices;
        }

        const PASSIVE_BY_ID = Object.fromEntries(PASSIVE_LIBRARY.map(passive => [passive.id, passive]));

        function getPassiveValue(id, level = 0) {
            const def = PASSIVE_BY_ID[id];
            if (!def?.values || level <= 0) return 0;
            return def.values[Math.min(level, def.values.length) - 1] || 0;
        }

        function getPassiveChoiceDescription(def, owner = player) {
            const existing = owner?.getPassiveEntry?.(def.id);
            const nextLevel = existing && def.mode === 'stack' ? Math.min(def.maxLevel, existing.level + 1) : 1;
            return def.descriptions[Math.min(nextLevel, def.descriptions.length) - 1];
        }

        function generatePassiveChoices(tier, count = 3, excludedIds = []) {
            const excluded = new Set(excludedIds);
            const eligible = PASSIVE_LIBRARY.filter(def => {
                if (def.tier !== tier) return false;
                const existing = player?.getPassiveEntry?.(def.id);
                if (!existing) return true;
                return def.mode === 'stack' && existing.level < def.maxLevel;
            });
            const shuffle = list => {
                for (let i = list.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [list[i], list[j]] = [list[j], list[i]];
                }
                return list;
            };
            // 刷新优先给出全新选项；候选池不足时再用仍然有效的旧选项补足三张卡。
            const fresh = shuffle(eligible.filter(def => !excluded.has(def.id)));
            const fallback = shuffle(eligible.filter(def => excluded.has(def.id)));
            return [...fresh, ...fallback].slice(0, count);
        }

        const PRISMATIC_COLORS = ['#FF5BD8', '#A867FF', '#42DFFF', '#FFF176', '#FF7AC8'];

        function createPrismaticGradient(rect, now = performance.now()) {
            const phase = reducedMotion ? 0 : Math.floor(now / 420) % PRISMATIC_COLORS.length;
            const gradient = ctx.createLinearGradient(rect.x, rect.y, rect.x + rect.w, rect.y + rect.h);
            for (let index = 0; index < PRISMATIC_COLORS.length; index++) {
                gradient.addColorStop(index / (PRISMATIC_COLORS.length - 1), PRISMATIC_COLORS[(index + phase) % PRISMATIC_COLORS.length]);
            }
            return gradient;
        }

        function drawTierFrame(rect, tierKey, now = performance.now(), lineWidth = 2) {
            const tier = PASSIVE_TIERS[tierKey];
            ctx.save();
            ctx.lineWidth = lineWidth;
            if (tierKey === 'PRISMATIC') {
                ctx.strokeStyle = createPrismaticGradient(rect, now);
                ctx.shadowColor = PRISMATIC_COLORS[Math.floor(now / 300) % PRISMATIC_COLORS.length];
                ctx.shadowBlur = reducedMotion ? 7 : 10 + Math.sin(now / 170) * 3;
                if (!reducedMotion) {
                    ctx.setLineDash([14, 7]);
                    ctx.lineDashOffset = -now / 35;
                }
            } else {
                ctx.strokeStyle = tier?.color || 'rgba(130,150,175,0.4)';
                ctx.shadowColor = tier?.glow || 'transparent';
                ctx.shadowBlur = tierKey ? 4 : 0;
            }
            ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);
            ctx.restore();
        }

        function getPassiveTierPaint(def, rect, now = performance.now()) {
            return def?.tier === 'PRISMATIC' ? createPrismaticGradient(rect, now) : PASSIVE_TIERS[def?.tier]?.color || '#78909C';
        }

        function hashPassiveIcon(value) {
            let hash = 2166136261;
            for (const char of String(value || 'passive')) {
                hash ^= char.charCodeAt(0);
                hash = Math.imul(hash, 16777619);
            }
            return hash >>> 0;
        }

        function drawPassiveLogo(targetCtx, def, centerX, centerY, size = 36, now = performance.now()) {
            if (!def) return;
            const rect = { x: centerX - size / 2, y: centerY - size / 2, w: size, h: size };
            const cell = Math.max(2, Math.floor(size / 8));
            let seed = hashPassiveIcon(def.icon || def.id);
            targetCtx.save();
            targetCtx.fillStyle = 'rgba(3,9,18,0.92)';
            targetCtx.fillRect(rect.x, rect.y, rect.w, rect.h);
            drawTierFrame(rect, def.tier, now, 2);
            targetCtx.fillStyle = getPassiveTierPaint(def, rect, now);
            // 每个唯一 icon id 生成固定、镜像的像素徽记，不依赖系统 Emoji 字体。
            for (let row = 0; row < 5; row++) {
                for (let column = 0; column < 3; column++) {
                    seed = (Math.imul(seed, 1664525) + 1013904223) >>> 0;
                    if ((seed & 3) === 0) continue;
                    const px = rect.x + cell + column * cell;
                    const py = rect.y + cell + row * cell;
                    targetCtx.fillRect(px, py, cell - 1, cell - 1);
                    targetCtx.fillRect(rect.x + rect.w - cell - (column + 1) * cell, py, cell - 1, cell - 1);
                }
            }
            targetCtx.fillStyle = '#F7FBFF';
            targetCtx.fillRect(centerX - 1, rect.y + cell, 2, rect.h - cell * 2);
            targetCtx.restore();
        }

        // ============ 粒子系统 ============
        const particles = [];

        class Particle {
            constructor(x, y, color, vx, vy, life, options = {}) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = vx;
                this.vy = vy;
                this.life = life;
                this.maxLife = life;
                this.size = options.size || 3 + Math.random() * 3;
                this.gravity = options.gravity ?? 0.1;
                this.drag = options.drag ?? 0.98;
                this.glow = options.glow || 0;
                this.shape = options.shape || 'square';
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= this.drag;
                this.vy *= this.drag;
                this.vy += this.gravity;
                this.life--;
                return this.life > 0;
            }

            draw(ctx) {
                const alpha = this.life / this.maxLife;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = this.color;
                if (this.glow) {
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = this.glow;
                }
                if (this.shape === 'circle') {
                    ctx.beginPath();
                    ctx.arc(this.x - camera.x, this.y - camera.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.fillRect(this.x - camera.x, this.y - camera.y, this.size, this.size);
                }
                ctx.restore();
            }
        }

        function spawnAttackParticles(x, y, color, count = 8) {
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
                const speed = 2 + Math.random() * 3;
                particles.push(new Particle(
                    x, y, color,
                    Math.cos(angle) * speed,
                    Math.sin(angle) * speed - 2,
                    20 + Math.random() * 15
                ));
            }
        }

        function spawnImpactParticles(x, y, color, count = 10, power = 1) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = (1.2 + Math.random() * 3.8) * power;
                particles.push(new Particle(
                    x, y, color,
                    Math.cos(angle) * speed,
                    Math.sin(angle) * speed,
                    16 + Math.random() * 18,
                    { size: 1.5 + Math.random() * 2.8, gravity: 0.04, drag: 0.94, glow: 5 }
                ));
            }
        }

        const floatingTexts = [];
        class FloatingText {
            constructor(x, y, text, color = '#FFF', size = 14) {
                this.x = x;
                this.y = y;
                this.text = text;
                this.color = color;
                this.size = size;
                this.life = 42;
                this.maxLife = 42;
            }

            update() {
                this.y -= 0.65;
                this.life--;
                return this.life > 0;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = Math.min(1, this.life / 12);
                const screenX = this.x - camera.x;
                const screenY = this.y - camera.y;
                if (this.color === 'prismatic') {
                    ctx.fillStyle = createPrismaticGradient({ x: screenX - 60, y: screenY - this.size, w: 120, h: this.size * 2 }, performance.now());
                    ctx.shadowColor = PRISMATIC_COLORS[Math.floor(performance.now() / 260) % PRISMATIC_COLORS.length];
                    ctx.shadowBlur = reducedMotion ? 5 : 9;
                } else {
                    ctx.fillStyle = this.color;
                }
                ctx.strokeStyle = 'rgba(0,0,0,0.85)';
                ctx.lineWidth = 3;
                ctx.font = `bold ${this.size}px "Courier New", monospace`;
                ctx.textAlign = 'center';
                ctx.strokeText(this.text, screenX, screenY);
                ctx.fillText(this.text, screenX, screenY);
                ctx.restore();
            }
        }

        class Projectile {
            constructor(x, y, vx, vy, dmg, color, owner = 'enemy', options = {}) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.dmg = dmg;
                this.color = color;
                this.owner = owner;
                this.size = options.size || (owner === 'player' ? 5 : 6);
                this.life = options.life || 240;
                this.gravity = options.gravity ?? (owner === 'enemy' ? 0.05 : 0);
                this.pierce = options.pierce || 0;
                this.knockback = options.knockback ?? 4;
                this.knockbackFrames = options.knockbackFrames ?? 6;
                this.model = options.model || 'orb';
                this.damageSource = options.damageSource || (owner === 'player' ? 'weapon' : 'enemy');
                this.passiveDamage = Boolean(options.passiveDamage);
                this.canCrit = options.canCrit !== false;
                this.noTrigger = Boolean(options.noTrigger);
                this.token = `projectile-${nextProjectileId++}`;
                this.trail = [];
                this.hitTargets = new Set();
            }

            update() {
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 5) this.trail.shift();
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
                this.vy += this.gravity;
                const worldWidth = MAP_WIDTH * CONFIG.TILE_SIZE;
                if (this.x < 0) {
                    this.x += worldWidth;
                    this.trail.length = 0;
                } else if (this.x >= worldWidth) {
                    this.x -= worldWidth;
                    this.trail.length = 0;
                }
                return this.life > 0 && this.y > -240 && this.y < MAP_HEIGHT * CONFIG.TILE_SIZE + 200;
            }

            draw(ctx) {
                ctx.save();
                this.trail.forEach((point, index) => {
                    ctx.globalAlpha = (index + 1) / (this.trail.length + 1) * 0.32;
                    ctx.fillStyle = this.color;
                    ctx.fillRect(point.x - camera.x, point.y - camera.y, Math.max(1, this.size - 2), Math.max(1, this.size - 2));
                });
                ctx.globalAlpha = 1;
                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = this.owner === 'player' ? 9 : 5;
                if (this.model === 'bow' || this.model === 'crossbow') {
                    ctx.translate(this.x - camera.x, this.y - camera.y);
                    ctx.rotate(Math.atan2(this.vy, this.vx));
                    const boltLength = this.model === 'crossbow' ? 13 : 16;
                    ctx.fillRect(-boltLength / 2, -1, boltLength, 2);
                    ctx.beginPath();
                    ctx.moveTo(boltLength / 2 + 2, 0);
                    ctx.lineTo(boltLength / 2 - 4, -4);
                    ctx.lineTo(boltLength / 2 - 4, 4);
                    ctx.closePath();
                    ctx.fill();
                } else if (this.model === 'staff' || this.model === 'launcher') {
                    ctx.translate(this.x - camera.x, this.y - camera.y);
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#FFF';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size + 2, 0, Math.PI * 2);
                    ctx.stroke();
                } else {
                    ctx.translate(this.x - camera.x, this.y - camera.y);
                    ctx.rotate(Math.atan2(this.vy, this.vx));
                    ctx.fillRect(-this.size, -this.size / 2, this.size * 2, this.size);
                }
                ctx.restore();
            }
        }

        const BASE_MUSIC_GAIN = 0.12;

        function applyMasterVolume() {
            const volume = Math.max(0, Math.min(1, Number(masterVolume) || 0));
            if (musicGain) musicGain.gain.value = BASE_MUSIC_GAIN * volume;
            if (sfxGain) sfxGain.gain.value = BASE_SFX_GAIN * volume;
        }

        function initAudio() {
            if (audioCtx) {
                applyMasterVolume();
                if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
                return;
            }
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            musicGain = audioCtx.createGain();
            sfxGain = audioCtx.createGain();
            applyMasterVolume();
            musicGain.connect(audioCtx.destination);
            sfxGain.connect(audioCtx.destination);

        function startMusic(musicKey = currentBiome?.musicKey || 'plains') {
            if (!audioCtx || bossMusicPlaying) return;
            const theme = BIOME_MUSIC[musicKey] || BIOME_MUSIC.plains;
            if (musicPlaying && currentMusicKey === musicKey) return;
            if (musicPlaying || currentMusicKey) stopMusic();
            musicPlaying = true;
            currentMusicKey = musicKey;
            const generation = ++musicGeneration;
            const beat = 60 / theme.bpm;
            const now = audioCtx.currentTime + 0.05;
            theme.pattern.forEach((freq, i) => {
                if (freq === 0) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = theme.wave;
                osc.frequency.value = freq;
                const noteAt = now + i * beat * theme.step;
                gain.gain.setValueAtTime(0.001, noteAt);
                gain.gain.linearRampToValueAtTime(theme.gain, noteAt + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, noteAt + theme.noteLength);
                osc.connect(gain).connect(musicGain);
                musicSources.add(osc);
                osc.onended = () => musicSources.delete(osc);
                osc.start(noteAt);
                osc.stop(noteAt + theme.noteLength + 0.05);
            });
            musicLoopTimer = setTimeout(() => {
                if (generation !== musicGeneration || bossMusicPlaying) return;
                musicPlaying = false;
                musicLoopTimer = null;
                startMusic(musicKey);
            }, theme.pattern.length * beat * theme.step * 1000);
        }

        function stopMusic() {
            if (musicLoopTimer) {
                clearTimeout(musicLoopTimer);
                musicLoopTimer = null;
            }
            musicSources.forEach(source => {
                try { source.stop(); } catch (error) { /* 已结束的音源无需处理 */ }
            });
            musicSources.clear();
            musicPlaying = false;
            currentMusicKey = null;
            musicGeneration++;
        }

        function startBossMusic() {
            if (!audioCtx || bossMusicPlaying) return;
            bossMusicPlaying = true;
            stopMusic();
            const generation = ++bossMusicGeneration;
            const bpm = 138;
            const beat = 60 / bpm;
            const pattern = [110, 0, 220, 0, 330, 0, 196, 0, 392, 0, 220, 0, 440, 0, 262, 0, 523, 0, 330, 0, 392, 0, 0, 0];
            const now = audioCtx.currentTime + 0.04;
            pattern.forEach((freq, i) => {
                if (freq === 0) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = i % 4 === 0 ? 'sawtooth' : 'square';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.0001, now + i * beat * 0.4);
                gain.gain.linearRampToValueAtTime(0.35, now + i * beat * 0.4 + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, now + i * beat * 0.4 + 0.5);
                osc.connect(gain).connect(musicGain);
                bossMusicSources.add(osc);
                osc.onended = () => bossMusicSources.delete(osc);
                osc.start(now + i * beat * 0.4);
                osc.stop(now + i * beat * 0.4 + 0.55);
            });
            bossMusicTimer = setTimeout(() => {
                if (generation !== bossMusicGeneration) return;
                bossMusicPlaying = false;
                bossMusicTimer = null;
                startBossMusic();
            }, pattern.length * beat * 400);
        }

        function stopBossMusic() {
            if (bossMusicTimer) {
                clearTimeout(bossMusicTimer);
                bossMusicTimer = null;

            bossMusicSources.forEach(source => {

            });
            bossMusicSources.clear();
            bossMusicPlaying = false;
            bossMusicGeneration++;

        function announce(message) {
            liveStatusEl.textContent = '';
            window.setTimeout(() => { liveStatusEl.textContent = message; }, 20);

        function getCanvasCoords(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        const BASE_CANVAS_WIDTH = CONFIG.CANVAS_WIDTH;
        const BASE_CANVAS_HEIGHT = CONFIG.CANVAS_HEIGHT;

        function syncTouchWeaponControls(weapon) {
            if (!reloadButtonEl) return;

        const TOUCH_MOVE_GAP = 24;
        const TOUCH_CLUSTER_GAP = 12;
        const TOUCH_EDGE_GAP = 4;

        function calculateTouchControlMetrics(baseSize) {
            // 默认方向键明显放大，并仅比主攻击键小一圈，避免触屏移动误触与够不到。
            const attackSize = Math.max(52, Math.min(190, baseSize * 1.18));
            const gap = Math.max(8, Math.min(28, baseSize * 0.18));
            const offset = Math.max(12, baseSize * 0.22);
            const bottom = Math.max(12, baseSize * 0.2);
            const moveBottom = bottom + Math.max(18, Math.min(34, baseSize * 0.26));
            const arcNear = attackSize + gap;
            const arcFar = arcNear + baseSize * 0.55;
            const arcTop = attackSize * 0.82;
            const arcMid = Math.max(0, (attackSize - baseSize) / 2);

            // 换弹键取攻击键与跳跃键安全圆的右上交点，使其落在标注空位且不随缩放重叠。
            const clearance = Math.max(4, baseSize * 0.05);
            const attackCenterX = attackSize / 2;
            const attackCenterY = attackSize / 2;
            const jumpCenterX = arcNear + baseSize / 2;
            const jumpCenterY = arcTop + baseSize / 2;
            const jumpDeltaX = jumpCenterX - attackCenterX;
            const jumpDeltaY = jumpCenterY - attackCenterY;
            const centerDistance = Math.max(0.001, Math.hypot(jumpDeltaX, jumpDeltaY));
            const attackRadius = (attackSize + baseSize) / 2 + clearance;
            const jumpRadius = baseSize + clearance;
            const along = (
                attackRadius * attackRadius
                - jumpRadius * jumpRadius
                + centerDistance * centerDistance
            ) / (2 * centerDistance);
            const perpendicular = Math.sqrt(Math.max(0, attackRadius * attackRadius - along * along));
            const unitX = jumpDeltaX / centerDistance;
            const unitY = jumpDeltaY / centerDistance;
            const reloadCenterX = attackCenterX + along * unitX - perpendicular * unitY;
            const reloadCenterY = attackCenterY + along * unitY + perpendicular * unitX;
            const reloadRight = reloadCenterX - baseSize / 2;
            const reloadBottom = reloadCenterY - baseSize / 2;

            const actionWidth = Math.max(
                attackSize,
                arcNear + baseSize,
                arcFar + baseSize,
                reloadRight + baseSize
            );
            const actionHeight = Math.max(
                attackSize,
                arcTop + baseSize,
                arcMid + baseSize,
                reloadBottom + baseSize
            );

            return {
                attackSize,
                gap,
                offset,
                bottom,
                moveBottom,
                arcNear,
                arcFar,
                arcTop,
                arcMid,
                reloadRight,
                reloadBottom,
                actionWidth,
                actionHeight,
                totalWidth: baseSize * 2 + TOUCH_MOVE_GAP + actionWidth + offset * 2 + TOUCH_CLUSTER_GAP,
                totalHeight: Math.max(actionHeight + bottom, baseSize + moveBottom) + TOUCH_EDGE_GAP
            };
        }

        function updateTouchControlsLayout() {
            const vw = window.visualViewport?.width || window.innerWidth || BASE_CANVAS_WIDTH;
            const vh = window.visualViewport?.height || window.innerHeight || BASE_CANVAS_HEIGHT;
            const shortSide = Math.min(vw, vh);
            const compactWidth = Math.min(vw, vh * (BASE_CANVAS_WIDTH / BASE_CANVAS_HEIGHT));
            const rawBaseSize = Math.max(62, Math.min(132, Math.min(shortSide * 0.145, compactWidth * 0.115)));
            const requestedBaseSize = Math.max(44, Math.min(150, rawBaseSize * touchControlScale));
            const passiveHudCssWidth = compactWidth * ((PASSIVE_HUD_LAYOUT.w * 4 + PASSIVE_HUD_LAYOUT.gap * 3) / BASE_CANVAS_WIDTH);
            const fitsViewport = metrics => metrics.totalWidth + passiveHudCssWidth + TOUCH_CLUSTER_GAP <= vw && metrics.totalHeight <= vh;
            let baseSize = requestedBaseSize;
            let metrics = calculateTouchControlMetrics(baseSize);

            if (!fitsViewport(metrics)) {
                const minimumMetrics = calculateTouchControlMetrics(44);
                if (fitsViewport(minimumMetrics)) {
                    let low = 44;
                    let high = baseSize;
                    for (let index = 0; index < 14; index++) {
                        const middle = (low + high) / 2;
                        if (fitsViewport(calculateTouchControlMetrics(middle))) low = middle;
                        else high = middle;
                    }
                    baseSize = low;
                    metrics = calculateTouchControlMetrics(baseSize);
                } else {
                    baseSize = 44;
                    metrics = minimumMetrics;
                }
            }

            const fontSize = Math.max(18, baseSize * 0.24);
            const iconScale = baseSize >= 96 ? 2 : 1;
            const root = document.documentElement.style;
            root.setProperty('--touch-btn-size', `${baseSize}px`);
            root.setProperty('--touch-attack-size', `${metrics.attackSize}px`);
            root.setProperty('--touch-gap', `${metrics.gap}px`);
            root.setProperty('--touch-move-gap', `${TOUCH_MOVE_GAP}px`);
            root.setProperty('--touch-offset', `${metrics.offset}px`);
            root.setProperty('--touch-bottom', `${metrics.bottom}px`);
            root.setProperty('--touch-move-bottom', `${metrics.moveBottom}px`);
            root.setProperty('--touch-font-size', `${fontSize}px`);
            root.setProperty('--touch-action-width', `${metrics.actionWidth}px`);
            root.setProperty('--touch-action-height', `${metrics.actionHeight}px`);
            root.setProperty('--touch-arc-near', `${metrics.arcNear}px`);
            root.setProperty('--touch-arc-far', `${metrics.arcFar}px`);
            root.setProperty('--touch-arc-top', `${metrics.arcTop}px`);
            root.setProperty('--touch-arc-mid', `${metrics.arcMid}px`);
            root.setProperty('--touch-reload-right', `${metrics.reloadRight}px`);
            root.setProperty('--touch-reload-bottom', `${metrics.reloadBottom}px`);
            root.setProperty('--touch-icon-scale', `${iconScale}`);
        }

        function updateCanvasScale() {
            const viewportWidth = Math.round(window.visualViewport?.width || window.innerWidth || BASE_CANVAS_WIDTH);
            const viewportHeight = Math.round(window.visualViewport?.height || window.innerHeight || BASE_CANVAS_HEIGHT);
            const aspect = BASE_CANVAS_WIDTH / BASE_CANVAS_HEIGHT;
            const availableHeight = touchMode ? viewportHeight : Math.max(180, viewportHeight - 96);

            let displayWidth = viewportWidth;
            let displayHeight = Math.round(displayWidth / aspect);
            if (displayHeight > availableHeight) {
                displayHeight = availableHeight;
                displayWidth = Math.round(displayHeight * aspect);
            }

            canvas.style.width = `${displayWidth}px`;
            canvas.style.height = `${displayHeight}px`;
            if (touchMode) {
                gameContainer.style.width = `${viewportWidth}px`;
                gameContainer.style.height = `${viewportHeight}px`;
            } else {
                gameContainer.style.width = `${displayWidth + 6}px`;
                gameContainer.style.height = `${displayHeight + 6}px`;
            }

            rotateHintEl.style.display = touchMode && viewportHeight > viewportWidth ? 'flex' : 'none';

            updateTouchControlsLayout();
        }

        function isFullscreen() {
            return Boolean(document.fullscreenElement
                || document.webkitFullscreenElement
                || document.msFullscreenElement
                || document.webkitIsFullScreen);
        }

        function getFullscreenRequest() {
            // 顶层策略明确禁止全屏时，任何元素上的请求都会失败。
            if (document.fullscreenEnabled === false) return null;
            const candidates = [document.documentElement, gameContainer, canvas];
            for (const target of candidates) {
                if (!target) continue;
                if (typeof target.requestFullscreen === 'function') {
                    return { target, request: target.requestFullscreen, standard: true };
                }
                const webkitRequest = target.webkitRequestFullscreen || target.webkitRequestFullScreen;
                if (document.webkitFullscreenEnabled !== false && typeof webkitRequest === 'function') {
                    return { target, request: webkitRequest, standard: false };
                }
                if (document.msFullscreenEnabled !== false && typeof target.msRequestFullscreen === 'function') {
                    return { target, request: target.msRequestFullscreen, standard: false };
                }
            }
            return null;
        }

        function syncFullscreenButton() {
            if (!fullscreenButtonEl) return;
            const canRequestFullscreen = Boolean(getFullscreenRequest());
            fullscreenButtonEl.style.display = touchMode
                && gameState === 'playing'
                && !pagePaused
                && !isFullscreen()
                && canRequestFullscreen
                ? 'block'
                : 'none';
        }

        function syncTouchControlsVisibility() {
            const visible = touchMode && gameState === 'playing';
            touchControlsEl.style.display = visible ? 'block' : 'none';
            touchControlsEl.setAttribute('aria-hidden', visible ? 'false' : 'true');
            syncPauseInterface();
            syncFullscreenButton();
        }

        function lockTouchOrientation() {
            const orientation = window.screen?.orientation;
            if (!isFullscreen() || !orientation || typeof orientation.lock !== 'function') return;
            try {
                const result = orientation.lock('landscape');
                if (result && typeof result.catch === 'function') result.catch(() => {});
            } catch (error) {
                // 浏览器可拒绝锁定方向，不影响全屏和游戏输入。
            }
        }

        function requestFullscreenIfPossible() {
            if (isFullscreen()) return true;
            const entry = getFullscreenRequest();
            if (!entry) {
                syncFullscreenButton();
                return false;
            }

            try {
                const ret = entry.standard
                    ? entry.request.call(entry.target, { navigationUI: 'hide' })
                    : entry.request.call(entry.target);
                if (ret && typeof ret.catch === 'function') {
                    ret.catch(() => { syncFullscreenButton(); });
                }
                return true;
            } catch (error) {
                // 旧版 WebView 可能同步拒绝全屏；触屏模式仍应继续启动。
                syncFullscreenButton();
                return false;
            }
        }

        function enableTouchMode(requestFullscreen = true) {
            touchMode = true;
            gameContainer.classList.add('touch-mode');
            instructionsEl.style.display = 'none';
            if (requestFullscreen) requestFullscreenIfPossible();
            syncTouchControlsVisibility();
            updateCanvasScale();
        }

        function disableTouchMode() {
            const wasTouchMode = touchMode;
            touchMode = false;
            gameContainer.classList.remove('touch-mode');
            rotateHintEl.style.display = 'none';
            instructionsEl.style.display = 'block';
            syncTouchControlsVisibility();
            clearInputState();
            updateCanvasScale();
            if (wasTouchMode && isFullscreen()) {
                const exit = document.exitFullscreen
                    || document.webkitExitFullscreen
                    || document.webkitCancelFullScreen
                    || document.msExitFullscreen;
                if (exit) {
                    const result = exit.call(document);
                    if (result && typeof result.catch === 'function') result.catch(() => {});
                }
            }
        }

        window.addEventListener('resize', updateCanvasScale);
        window.addEventListener('orientationchange', updateCanvasScale);
        if (window.visualViewport) window.visualViewport.addEventListener('resize', updateCanvasScale);
        const handleFullscreenChange = () => {
            syncFullscreenButton();
            updateCanvasScale();
            lockTouchOrientation();
        };
        document.addEventListener('fullscreenchange', handleFullscreenChange);
        document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
        updateCanvasScale();

        // ============ 游戏状态 ============
        const keys = {};
        let mousePressed = false;
        let camera = { x: 0, y: 0 };
        let touchActive = { left: false, right: false, jump: false, reload: false, attack: false, heal: false };
        const touchAttackPointerIds = new Set();
        const canvasAttackPointerIds = new Set();

        function getInputPointerIds(event) {
            if (event?.pointerId !== undefined) return [`pointer:${event.pointerId}`];
            const changedTouches = event?.changedTouches;
            if (changedTouches?.length) {
                return Array.from(changedTouches, touch => `touch:${touch.identifier}`);
            }
            return ['legacy-pointer'];
        }

        function syncPointerAttackState() {
            touchActive.attack = touchAttackPointerIds.size > 0;
            mousePressed = touchAttackPointerIds.size > 0 || canvasAttackPointerIds.size > 0;
        }

        function setAttackPointers(pointerSet, event, state) {
            for (const pointerId of getInputPointerIds(event)) {
                if (state) pointerSet.add(pointerId);
                else pointerSet.delete(pointerId);
            }
            syncPointerAttackState();
        }

        // ============ 地图生成 ============
        const MAP_WIDTH = 100; // 地图宽度（方块数）
        const MAP_HEIGHT = 17; // 地图高度（方块数）
        const tiles = [];
        let currentBiome = BIOMES.plains;

        function pickBiomeForWave(wave) {
            if (isBossWave(wave)) return BIOMES.end;
            const list = CONFIG.BIOME_LIST;
            const key = list[Math.floor(Math.random() * list.length)];
            return BIOMES[key] || BIOMES.plains;
        }

        function isBossWave(wave) {
            return wave === CONFIG.BOSS_WAVE || (gameMode === 'endless' && wave > CONFIG.BOSS_WAVE && wave % 10 === 0);
        }

        function getEnemyScalingForWave(wave) {
            const progressed = Math.max(0, wave - 1);
            const storyWaves = Math.min(9, progressed);
            const endlessWaves = Math.max(0, wave - CONFIG.BOSS_WAVE);
            const storyHp = Math.pow(CONFIG.ENEMY_HP_SCALING, storyWaves);
            const storyDamage = Math.pow(CONFIG.ENEMY_DAMAGE_SCALING, storyWaves);
            return {
                hp: storyHp + Math.pow(endlessWaves, 0.82) * 0.07,
                damage: storyDamage + Math.pow(endlessWaves, 0.72) * 0.06
            };
        }

        function getWrappedDeltaX(fromX, toX) {
            const worldWidth = MAP_WIDTH * CONFIG.TILE_SIZE;
            let delta = toX - fromX;
            if (delta > worldWidth / 2) delta -= worldWidth;
            else if (delta < -worldWidth / 2) delta += worldWidth;
            return delta;
        }

        function generateMap(biome = currentBiome) {
            currentBiome = biome;
            // 初始化空地图
            for (let y = 0; y < MAP_HEIGHT; y++) {
                tiles[y] = [];
                for (let x = 0; x < MAP_WIDTH; x++) {
                    tiles[y][x] = 0; // 0 = 空气
                }
            }

            // 先生成连续地表，再填充方块。相邻列最多相差一格，中央出生区保持平坦。
            const groundLevels = [];
            let groundLevel = 12;
            const centerTile = Math.floor(MAP_WIDTH / 2);
            for (let x = 0; x < MAP_WIDTH; x++) {
                if (Math.abs(x - centerTile) <= 4) {
                    groundLevel += Math.sign(12 - groundLevel);
                } else if (Math.random() < 0.1) {
                    groundLevel += Math.random() < 0.5 ? 1 : -1;
                }
                groundLevel = Math.max(10, Math.min(14, groundLevel));
                groundLevels.push(groundLevel);
            }

            for (let x = 0; x < MAP_WIDTH; x++) {
                groundLevel = groundLevels[x];

                // 填充地面
                for (let y = groundLevel; y < MAP_HEIGHT; y++) {
                    if (y === groundLevel) {
                        tiles[y][x] = 1; // 1 = 草方块
                    } else {
                        tiles[y][x] = 2; // 2 = 泥土
                    }
                }

                // 随机生成平台
                if (Math.abs(x - centerTile) > 5 && x > 5 && x < MAP_WIDTH - 5 && Math.random() < 0.05) {
                    const platformY = groundLevel - 4 - Math.floor(Math.random() * 3);
                    const platformLength = 3 + Math.floor(Math.random() * 4);
                    for (let px = 0; px < platformLength && x + px < MAP_WIDTH; px++) {
                        if (tiles[platformY]) {
                            tiles[platformY][x + px] = 1;
                        }
                    }
                }
            }
        }

        // ============ 云朵系统 ============
        const clouds = [];
        function generateClouds() {
            clouds.length = 0;
            for (let i = 0; i < 15; i++) {
                clouds.push({
                    x: Math.random() * MAP_WIDTH * CONFIG.TILE_SIZE,
                    y: 30 + Math.random() * 100,
                    width: 60 + Math.random() * 80,
                    speed: 0.2 + Math.random() * 0.3
                });
            }
        }

        // ============ 天气粒子 ============
        const weatherParticles = [];
        function spawnWeatherParticles(type) {
            weatherParticles.length = 0;
            const count = 80;
            for (let i = 0; i < count; i++) {
                const px = Math.random() * CONFIG.CANVAS_WIDTH;
                const py = Math.random() * CONFIG.CANVAS_HEIGHT;
                weatherParticles.push(createWeatherParticle(type, px, py));
            }
        }

        function createWeatherParticle(type, x, y) {
            if (type === 'snow') {
                return { x, y, vx: -0.5 + Math.random(), vy: 1 + Math.random(), size: 3 + Math.random() * 2, color: '#FFF' };
            }
            if (type === 'rain') {
                return { x, y, vx: -1 + Math.random() * 0.5, vy: 6 + Math.random() * 2, size: 2, color: '#90CAF9' };
            }
            if (type === 'ash') {
                return { x, y, vx: -0.3 + Math.random() * 0.6, vy: 1.5 + Math.random(), size: 3, color: '#FF7043' };
            }
            if (type === 'void') {
                return { x, y, vx: -0.2 + Math.random() * 0.4, vy: 1 + Math.random(), size: 2 + Math.random() * 2, color: '#B39DDB' };
            }
            return { x, y, vx: 0, vy: 0, size: 0, color: '#FFF' };
        }

        function updateWeatherParticles(type) {
            if (!type) return;
            for (let p of weatherParticles) {
                p.x += p.vx;
                p.y += p.vy;
                if (p.y > CONFIG.CANVAS_HEIGHT) {
                    p.y = -10;
                    p.x = Math.random() * CONFIG.CANVAS_WIDTH;
                }
                if (p.x < -20) p.x = CONFIG.CANVAS_WIDTH + 10;
                if (p.x > CONFIG.CANVAS_WIDTH + 20) p.x = -10;
            }
        }

        function drawWeatherParticles(type) {
            if (!type) return;
            ctx.save();
            for (let p of weatherParticles) {
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size * (type === 'rain' ? 4 : 1));
            }
            ctx.restore();
        }

        // ============ 玩家类 ============
        class Player {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 24;
                this.height = 32;
                this.vx = 0;
                this.vy = 0;
                this.onGround = false;
                this.facing = 1; // 1 = 右, -1 = 左
                this.baseMaxHp = CONFIG.PLAYER_MAX_HP;
                this.maxHp = this.baseMaxHp;
                this.hp = this.maxHp;
                this.attacking = false;
                this.attackTimer = 0;
                this.attackDuration = CONFIG.ATTACK_DURATION;
                this.attackCooldown = 0;
                this.invincible = 0;
                this.walkFrame = 0;
                this.walkTimer = 0;
                this.slowRatio = 0;
                this.slowTimer = 0;
                this.attackHit = false; // 防止一次攻击多次命中同一敌人
                this.healAccumulator = 0;
                this.attackSequence = 0;
                this.attackEffectTriggered = false;
                this.upgrades = { damage: 0, hp: 0, range: 0, ammo: 0, reloadSpeed: 0 };
                this.passives = [];
                this.distanceTravelled = 0;
                this.safeFrames = 0;
                this.passiveHealAccumulator = 0;
                this.passiveHitCount = 0;
                this.passiveAttackCount = 0;
                this.echoReady = false;
                this.missileCooldown = 0;
                this.pressureTimer = 0;
                this.pressureSequence = 0;
                this.lastStandActive = false;
                this.phoenixAvailable = false;
                this.patientIdleFrames = 120;
                this.patientStrikeArmed = false;
                this.rhythmTimer = 0;
                this.meleeRhythmCount = 0;
                this.counterWindow = 0;
                this.counterCooldown = 0;
                this.flawlessActive = false;
                this.mapHpDamageTaken = 0;
                this.arsenalModels = new Set();
                this.gravityTimer = 270;
                this.tempShield = 0;
                this.colossusCooldown = 0;
                this.syndicateTimer = 90;
                this.worldWalkerCooldown = 0;
                this.ammo = 0;
                this.reloadTimer = 0;
                this.reloadMax = 0;
                
                // 初始武器 - 木剑
                this.weapon = null;
                this.setWeapon(new Weapon(WEAPON_DATABASE.COMMON[0], 'COMMON'));
            }

            update() {
                if (gameState !== 'playing') return;
                const previousX = this.x;
                const wasOnGround = this.onGround;
                const moveSpeed = this.getMoveSpeed();
                
                // 移动输入
                if (keys['KeyA'] || keys['ArrowLeft']) {
                    this.vx = -moveSpeed;
                    this.facing = -1;
                } else if (keys['KeyD'] || keys['ArrowRight']) {
                    this.vx = moveSpeed;
                    this.facing = 1;
                } else {
                    this.vx = 0;
                }

                // 跳跃
                if ((keys['Space'] || keys['KeyW'] || keys['ArrowUp']) && this.onGround) {
                    const spring = getPassiveValue('spring_boots', this.getPassiveLevel('spring_boots'));
                    this.vy = -CONFIG.JUMP_FORCE * (1 + spring);
                    this.onGround = false;
                }

                // 求饶回血（随时可用）
                if (keys['KeyU']) {
                    this.vx *= 0.4; // 移动减速
                    this.attackCooldown = Math.max(this.attackCooldown, 12); // 暂停攻击
                    const healPerFrame = 7 / 60;
                    this.healAccumulator += healPerFrame;
                    const healInt = Math.floor(this.healAccumulator);
                    if (healInt > 0) {
                        this.heal(healInt);
                        this.healAccumulator -= healInt;
                    }
                } else {
                    this.healAccumulator = 0;
                }

                // 远程武器可手动装填；空弹匣会自动装填
                if (keys['KeyR'] && this.weapon.isRanged && this.ammo < this.getMagazineSize()) {
                    this.startReload();
                }

                // 攻击
                if ((keys['KeyJ'] || mousePressed) && this.attackCooldown <= 0) {
                    this.tryAttack();
                }

                // 重力
                this.vy += CONFIG.GRAVITY;
                if (this.vy > 15) this.vy = 15;

                // 应用速度
                this.x += this.vx;
                this.y += this.vy;

                // 掉出地图则从上方回落
                if (this.y > MAP_HEIGHT * CONFIG.TILE_SIZE + 200) {
                    this.y = -80;
                    this.vy = 6;
                    const spring = getPassiveValue('spring_boots', this.getPassiveLevel('spring_boots'));
                    this.takeDamage(Math.max(5, Math.round(this.maxHp * 0.08 * (1 - spring))), 'fall');
                }

                // 碰撞检测
                this.handleCollision();

                // 更新攻击状态
                if (this.attackTimer > 0) this.attackTimer--;
                if (this.attacking && !this.weapon.isRanged && this.weapon.hasParticles &&
                    !this.attackEffectTriggered && this.isAttackActive()) {
                    const pose = this.getWeaponPose();
                    const effectX = this.x + this.width / 2 + this.facing * (18 + pose.offsetX);
                    const effectY = this.y + this.height / 2 + pose.offsetY;
                    spawnAttackParticles(effectX, effectY, this.weapon.particleColor, 12);
                    this.attackEffectTriggered = true;
                }
                if (this.attackTimer <= 0) this.attacking = false;
                if (this.attackCooldown > 0) this.attackCooldown--;
                if (this.invincible > 0) this.invincible--;
                if (this.reloadTimer > 0) {
                    this.reloadTimer--;
                    if (this.reloadTimer <= 0) {
                        this.ammo = this.getMagazineSize();
                        if (this.hasPassive('combat_rhythm')) this.rhythmTimer = 240;
                        playSfx('reload_done');
                    }
                }

                // 走路动画
                if (this.vx !== 0) {
                    this.walkTimer++;
                    if (this.walkTimer > 8) {
                        this.walkTimer = 0;
                        this.walkFrame = (this.walkFrame + 1) % 4;
                    }
                } else {
                    this.walkFrame = 0;
                }

                // 地图左右边缘相连：跨出一侧后从另一侧无缝进入。
                const worldWidth = MAP_WIDTH * CONFIG.TILE_SIZE;
                let wrappedAtEdge = false;
                if (this.x < 0) {
                    this.x = worldWidth - this.width;
                    wrappedAtEdge = true;
                } else if (this.x > worldWidth - this.width) {
                    this.x = 0;
                    wrappedAtEdge = true;
                }
                if (wrappedAtEdge) {
                    const destinationGroundY = findGroundYAt(this.x + this.width / 2, this.height) - 2;
                    const embeddedAtDestination = this.y > destinationGroundY;
                    if (embeddedAtDestination || (wasOnGround && this.vy >= 0)) {
                        this.y = destinationGroundY;
                        this.vy = 0;
                        this.onGround = true;
                    }
                    this.triggerWorldWalker();
                }
                const moved = Math.abs(this.x - previousX);
                if (moved > 0 && moved < moveSpeed * 2.5) {
                    this.distanceTravelled += moved;
                    this.advancePassiveQuest('wayfarer', moved);
                }
                this.updatePassiveEffects();
            }

            getPassiveEntry(id) {
                return this.passives.find(entry => entry.id === id) || null;
            }

            getPassiveLevel(id) {
                return this.getPassiveEntry(id)?.level || 0;
            }

            getPassiveStage(id) {
                return this.getPassiveEntry(id)?.stage || 0;
            }

            hasPassive(id) {
                return Boolean(this.getPassiveEntry(id));
            }

            getMoveSpeed() {
                const stage = this.getPassiveStage('wayfarer');
                const bonus = PASSIVE_BY_ID.wayfarer.questBonuses[stage - 1] || 0;
                const flawless = this.flawlessActive
                    ? (PASSIVE_BY_ID.flawless_route.questBonuses[this.getPassiveStage('flawless_route') - 1] || 0)
                    : 0;
                const colossusPenalty = this.hasPassive('colossus_core') ? 0.10 : 0;
                return CONFIG.PLAYER_SPEED * (1 + bonus + flawless - colossusPenalty);
            }

            getPassiveDamageMultiplier(target = null) {
                let multiplier = 1;
                const hunterStage = this.getPassiveStage('hunter_ledger');
                multiplier *= 1 + (PASSIVE_BY_ID.hunter_ledger.questBonuses[hunterStage - 1] || 0);
                const raidStage = this.getPassiveStage('raid_boss');
                multiplier *= 1 + [0, 0.06, 0.12, 0.20][raidStage];
                if (target?.elite || target instanceof BirchCorruptBoss) {
                    const eliteStage = this.getPassiveStage('elite_contract');
                    multiplier *= 1 + (PASSIVE_BY_ID.elite_contract.questBonuses[eliteStage - 1] || 0);
                }
                if (this.lastStandActive && this.hasPassive('last_stand')) multiplier *= 1.25;
                const titanStage = this.getPassiveStage('titan_resolve');
                multiplier *= 1 + (PASSIVE_BY_ID.titan_resolve.questBonuses[titanStage - 1] || 0);
                const longshotStage = this.getPassiveStage('longshot_calibration');
                if (target && Math.abs(getWrappedDeltaX(this.x + this.width / 2, target.x + target.width / 2)) >= 220) {
                    multiplier *= 1 + (PASSIVE_BY_ID.longshot_calibration.questBonuses[longshotStage - 1] || 0);
                }
                if (this.rhythmTimer > 0 && this.hasPassive('combat_rhythm')) multiplier *= 1.2;
                if (this.flawlessActive) {
                    const flawlessStage = this.getPassiveStage('flawless_route');
                    multiplier *= 1 + (PASSIVE_BY_ID.flawless_route.questBonuses[flawlessStage - 1] || 0);
                }
                if (this.hasPassive('glass_crown')) multiplier *= 1.65;
                return multiplier;
            }

            resolveOutgoingDamage(baseDamage, target, options = {}) {
                let damage = Math.max(0, baseDamage) * (options.preResolved ? 1 : this.getPassiveDamageMultiplier(target));
                if (this.hasPassive('dual_wield') && options.source === 'weapon') damage *= 0.65;
                if (this.hasPassive('patient_strike') && this.patientStrikeArmed && options.source === 'weapon') {
                    damage *= 1.3;
                    this.patientStrikeArmed = false;
                }
                const critLevel = this.getPassiveLevel('keen_edge');
                let critChance = Math.min(0.5, getPassiveValue('keen_edge', critLevel));
                let canCrit = options.canCrit !== false && options.source === 'weapon';
                if (!canCrit && this.hasPassive('jeweled_arms') && options.passiveDamage) {
                    critChance *= 0.5;
                    canCrit = true;
                }
                const critical = canCrit && critChance > 0 && Math.random() < critChance;
