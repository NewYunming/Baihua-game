<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="白桦大冒险：支持近战、弓枪、精英敌人与无尽模式的像素风横版肉鸽游戏。">
    <meta name="theme-color" content="#07111f">
    <link rel="icon" href="data:,">
    <title>白桦大冒险：余烬远征</title>
    <style>
        :root {
            --touch-btn-size: 116px;
            --touch-attack-size: 134px;
            --touch-gap: 26px;
            --touch-offset: 40px;
            --touch-bottom: 36px;
            --touch-font-size: 28px;
            --touch-action-width: 320px;
            --touch-action-height: 240px;
            --touch-arc-near: 162px;
            --touch-arc-far: 178px;
            --touch-arc-top: 108px;
            --touch-arc-mid: 38px;
            --touch-icon-scale: 1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background:
                radial-gradient(circle at 50% 20%, rgba(73, 104, 146, 0.28), transparent 34%),
                linear-gradient(145deg, #050912 0%, #0b1728 48%, #160d25 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            overscroll-behavior: none;
            color-scheme: dark;
        }
        #gameContainer {
            position: relative;
            border: 3px solid #58708f;
            border-radius: 4px;
            box-shadow:
                0 0 0 1px rgba(190, 225, 255, 0.16),
                0 26px 90px rgba(0,0,0,0.72),
                0 0 42px rgba(70, 135, 190, 0.2);
            isolation: isolate;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            background: #07111f;
            cursor: crosshair;
            touch-action: none;
        }
        #instructions {
            position: absolute;
            bottom: -44px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #a9bad0;
            font-size: 13px;
            white-space: nowrap;
            padding: 7px 14px;
            border: 1px solid rgba(142, 180, 218, 0.22);
            border-radius: 999px;
            background: rgba(5, 10, 20, 0.72);
            letter-spacing: 0.02em;
        }

        #gameContainer.touch-mode {
            position: fixed;
            inset: 0;
            z-index: 100;
            border: none;
            box-shadow: none;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #07111f;
        }

        #touchControls {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: none;
            z-index: 5;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        #touchControls .touch-left,
        #touchControls .touch-right {
            position: absolute;
            bottom: calc(var(--touch-bottom) + env(safe-area-inset-bottom, 0px));
            z-index: 6;
        }

        #touchControls .touch-left {
            left: calc(var(--touch-offset) + env(safe-area-inset-left, 0px));
            display: flex;
            gap: var(--touch-gap);
            pointer-events: auto;
        }

        #touchControls .touch-right {
            right: calc(var(--touch-offset) + env(safe-area-inset-right, 0px));
            width: var(--touch-action-width);
            height: var(--touch-action-height);
            pointer-events: none;
        }

        .touch-btn {
            width: var(--touch-btn-size);
            height: var(--touch-btn-size);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            border: 3px solid #DCEBFF;
            background:
                linear-gradient(135deg, rgba(112, 155, 205, 0.24) 25%, transparent 25%) 0 0 / 8px 8px,
                rgba(7, 17, 31, 0.78);
            color: #fff;
            font-size: var(--touch-font-size);
            font-family: 'Courier New', monospace;
            box-shadow:
                0 0 0 3px rgba(3, 8, 16, 0.82),
                inset 0 0 0 3px rgba(155, 198, 244, 0.14),
                4px 5px 0 rgba(0, 0, 0, 0.42);
            backdrop-filter: none;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            appearance: none;
            -webkit-appearance: none;
        }

        .touch-btn[hidden] {
            display: none !important;
        }

        #touchControls .touch-right .touch-btn {
            position: absolute;
            pointer-events: auto;
            border-radius: 50%;
        }

        .touch-btn.attack-btn {
            width: var(--touch-attack-size);
            height: var(--touch-attack-size);
            right: 0;
            bottom: 0;
            border-width: 4px;
            border-color: #FFE082;
            background:
                linear-gradient(135deg, rgba(255, 213, 79, 0.25) 25%, transparent 25%) 0 0 / 10px 10px,
                rgba(38, 22, 11, 0.88);
            box-shadow:
                0 0 0 4px rgba(5, 8, 15, 0.9),
                inset 0 0 0 4px rgba(255, 236, 179, 0.16),
                5px 7px 0 rgba(0, 0, 0, 0.48);
        }

        .touch-btn.jump-btn {
            right: var(--touch-arc-near);
            bottom: var(--touch-arc-top);
            border-color: #90CAF9;
        }

        .touch-btn.heal-btn {
            right: var(--touch-arc-far);
            bottom: var(--touch-arc-mid);
            border-color: #EF9A9A;
        }

        .touch-btn:active {
            transform: translate(2px, 2px);
            filter: brightness(1.35);
            box-shadow:
                0 0 0 3px rgba(3, 8, 16, 0.82),
                inset 0 0 0 3px rgba(255, 255, 255, 0.2);
        }

        .touch-btn.reload-btn {
            right: var(--touch-arc-near);
            bottom: 0;
            border-color: #80CBC4;
            color: #B2DFDB;
        }

        .pixel-icon {
            position: relative;
            display: block;
            width: 32px;
            height: 32px;
            flex: 0 0 32px;
            transform: scale(var(--touch-icon-scale));
            transform-origin: center;
            image-rendering: pixelated;
        }

        .pixel-arrow::before {
            content: '';
            position: absolute;
            left: 14px;
            top: 6px;
            width: 4px;
            height: 4px;
            background: #EAF4FF;
            box-shadow:
                -4px 4px #EAF4FF, 0 4px #EAF4FF,
                -8px 8px #EAF4FF, -4px 8px #EAF4FF, 0 8px #EAF4FF, 4px 8px #EAF4FF, 8px 8px #EAF4FF,
                -4px 12px #EAF4FF, 0 12px #EAF4FF,
                0 16px #EAF4FF;
        }

        .pixel-arrow-right {
            transform: scale(var(--touch-icon-scale)) scaleX(-1);
        }

        .pixel-boot::before {
            content: '';
            position: absolute;
            left: 7px;
            top: 4px;
            width: 9px;
            height: 16px;
            background: #90CAF9;
            box-shadow: inset -4px 0 #4D86B7;
        }

        .pixel-boot::after {
            content: '';
            position: absolute;
            left: 7px;
            top: 18px;
            width: 20px;
            height: 7px;
            background: #EAF4FF;
            box-shadow: 0 5px 0 #4D86B7;
        }

        .pixel-magazine::before {
            content: '';
            position: absolute;
            left: 10px;
            top: 9px;
            width: 13px;
            height: 20px;
            background: #B2DFDB;
            box-shadow:
                inset -4px 0 #4F8A83,
                inset 0 -4px #315C58;
        }

        .pixel-magazine::after {
            content: '';
            position: absolute;
            left: 4px;
            top: 2px;
            width: 4px;
            height: 4px;
            background: #FFF59D;
            box-shadow:
                4px 0 #FFF59D, 8px 0 #FFF59D,
                4px 4px #FFF59D,
                4px 8px #FFF59D;
        }

        .pixel-heart::before {
            content: '';
            position: absolute;
            left: 4px;
            top: 6px;
            width: 4px;
            height: 4px;
            background: #FF8A80;
            box-shadow:
                4px 0 #FF8A80, 12px 0 #FF8A80, 16px 0 #FF8A80,
                0 4px #FF8A80, 4px 4px #FF5252, 8px 4px #FF8A80, 12px 4px #FF8A80, 16px 4px #FF5252, 20px 4px #FF8A80,
                0 8px #FF8A80, 4px 8px #FF5252, 8px 8px #FF5252, 12px 8px #FF5252, 16px 8px #FF5252, 20px 8px #FF8A80,
                4px 12px #FF5252, 8px 12px #FF5252, 12px 12px #FF5252, 16px 12px #FF5252,
                8px 16px #FF5252, 12px 16px #FF5252,
                12px 20px #C62828;
        }

        .pixel-sword-shape {
            position: absolute;
            left: 7px;
            top: 1px;
            width: 18px;
            height: 30px;
        }

        .pixel-sword-shape .blade {
            position: absolute;
            left: 6px;
            top: 0;
            width: 7px;
            height: 19px;
            background: #F5FAFF;
            box-shadow: inset -3px 0 #8FB5DE, 0 -3px 0 -1px #F5FAFF;
        }

        .pixel-sword-shape .guard {
            position: absolute;
            left: 0;
            top: 18px;
            width: 19px;
            height: 5px;
            background: #FFD54F;
            box-shadow: inset 0 -2px #B77713;
        }

        .pixel-sword-shape .grip {
            position: absolute;
            left: 7px;
            top: 23px;
            width: 5px;
            height: 8px;
            background: #A8683A;
            box-shadow: 0 7px 0 #FFD54F;
        }

        #touchPauseButton {
            position: absolute;
            top: calc(10px + env(safe-area-inset-top, 0px));
            left: 50%;
            transform: translateX(-50%);
            z-index: 13;
            width: 48px;
            height: 38px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #DCEBFF;
            border-radius: 6px;
            background: rgba(7, 17, 31, 0.88);
            box-shadow: 3px 4px 0 rgba(0, 0, 0, 0.5), inset 0 0 0 2px rgba(144, 202, 249, 0.18);
            pointer-events: auto;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        #touchPauseButton .pixel-icon {
            transform: none;
        }

        .pixel-pause-icon::before {
            content: '';
            position: absolute;
            left: 5px;
            top: 2px;
            width: 5px;
            height: 18px;
            background: #EAF4FF;
            box-shadow: 10px 0 #EAF4FF;
        }

        #touchPauseButton.is-paused .pixel-pause-icon::before {
            left: 7px;
            top: 4px;
            width: 5px;
            height: 5px;
            box-shadow:
                0 5px #EAF4FF, 5px 5px #EAF4FF,
                0 10px #EAF4FF, 5px 10px #EAF4FF, 10px 10px #EAF4FF,
                0 15px #EAF4FF, 5px 15px #EAF4FF;
        }

        #touchControls.paused .touch-left,
        #touchControls.paused .touch-right,
        #touchControls.paused #fullscreenButton {
            display: none !important;
        }

        #touchControls.paused {
            z-index: 31;
        }

        #fullscreenButton {
            position: absolute;
            top: calc(10px + env(safe-area-inset-top, 0px));
            right: calc(12px + env(safe-area-inset-right, 0px));
            z-index: 12;
            min-width: 64px;
            height: 38px;
            padding: 0 12px;
            border: 1px solid rgba(255, 255, 255, 0.68);
            border-radius: 10px;
            background: rgba(3, 10, 20, 0.72);
            color: #FFF;
            font: bold 14px 'Courier New', monospace;
            pointer-events: auto;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        #pauseMenu {
            position: absolute;
            inset: 0;
            z-index: 30;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(2, 7, 14, 0.78);
            pointer-events: auto;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        #pauseMenu[aria-hidden="false"] {
            display: flex;
        }

        .pause-panel {
            width: min(420px, calc(100% - 24px));
            max-height: calc(100% - 16px);
            overflow-y: auto;
            overscroll-behavior: contain;
            padding: 24px;
            border: 4px solid #B7D7F5;
            border-radius: 4px;
            background:
                linear-gradient(135deg, rgba(81, 128, 176, 0.14) 25%, transparent 25%) 0 0 / 10px 10px,
                #091525;
            box-shadow: 0 0 0 5px #02070E, 10px 12px 0 rgba(0, 0, 0, 0.48);
            color: #EAF4FF;
        }

        .pause-panel h2 {
            margin: 0 0 20px;
            color: #FFF59D;
            font-size: 30px;
            text-align: center;
            letter-spacing: 0.12em;
            text-shadow: 3px 3px 0 #533B12;
        }

        .pause-setting {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px 14px;
            margin: 16px 0;
            align-items: center;
        }

        .pause-setting[hidden] {
            display: none !important;
        }

        .pause-setting label {
            font-weight: bold;
            color: #C8E6FF;
        }

        .pause-setting output {
            min-width: 46px;
            color: #FFF59D;
            text-align: right;
        }

        .pause-setting input[type="range"] {
            grid-column: 1 / -1;
            width: 100%;
            height: 22px;
            margin: 0;
            appearance: none;
            -webkit-appearance: none;
            background: transparent;
            touch-action: pan-x;
        }

        .pause-setting input[type="range"]::-webkit-slider-runnable-track {
            height: 10px;
            border: 2px solid #02070E;
            background: #29445E;
            box-shadow: inset 0 0 0 2px #416987;
        }

        .pause-setting input[type="range"]::-webkit-slider-thumb {
            width: 22px;
            height: 22px;
            margin-top: -8px;
            border: 3px solid #02070E;
            border-radius: 2px;
            background: #FFF59D;
            appearance: none;
            -webkit-appearance: none;
        }

        .pause-setting input[type="range"]::-moz-range-track {
            height: 8px;
            border: 2px solid #02070E;
            background: #29445E;
        }

        .pause-setting input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border: 3px solid #02070E;
            border-radius: 2px;
            background: #FFF59D;
        }

        .pause-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-top: 22px;
        }

        .pause-menu-btn {
            min-height: 48px;
            border: 3px solid #B7D7F5;
            border-radius: 3px;
            background: #13283D;
            color: #FFF;
            font: bold 16px 'Courier New', monospace;
            box-shadow: 4px 5px 0 #02070E;
            cursor: pointer;
        }

        .pause-menu-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 3px 0 #02070E;
        }

        #pauseRestartButton {
            border-color: #FFAB91;
            color: #FFCCBC;
        }

        @media (max-height: 480px) {
            #pauseMenu {
                padding: 8px;
            }

            .pause-panel {
                padding: 12px 18px;
            }

            .pause-panel h2 {
                margin-bottom: 8px;
                font-size: 22px;
            }

            .pause-setting {
                gap: 4px 12px;
                margin: 7px 0;
            }

            .pause-setting input[type="range"] {
                height: 18px;
            }

            .pause-actions {
                margin-top: 10px;
            }

            .pause-menu-btn {
                min-height: 40px;
            }
        }

        #rotateHint {
            position: absolute;
            inset: 0;
            z-index: 20;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
            color: #FFF;
            background: rgba(3, 8, 16, 0.94);
            text-align: center;
            font-weight: bold;
            letter-spacing: 0.04em;
        }

        #rotateHint small {
            color: #90CAF9;
            font-weight: normal;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" tabindex="0" role="application" aria-label="白桦大冒险游戏画布"></canvas>
        <div id="instructions">A/D 移动 · 空格跳跃 · J/左键攻击 · R 装填 · U 求饶回血 · Esc 暂停 · 奖励按 1/2/3，武器页 F 刷新一次 / S 跳过</div>
        <div id="touchControls" aria-hidden="true">
            <button id="fullscreenButton" type="button" aria-label="进入全屏">⛶ 全屏</button>
            <button id="touchPauseButton" type="button" aria-label="暂停游戏" aria-pressed="false">
                <span class="pixel-icon pixel-pause-icon" aria-hidden="true"></span>
            </button>
            <div class="touch-left">
                <button type="button" class="touch-btn" data-action="left" aria-label="向左移动">
                    <span class="pixel-icon pixel-arrow" aria-hidden="true"></span>
                </button>
                <button type="button" class="touch-btn" data-action="right" aria-label="向右移动">
                    <span class="pixel-icon pixel-arrow pixel-arrow-right" aria-hidden="true"></span>
                </button>
            </div>
            <div class="touch-right">
                <button type="button" class="touch-btn jump-btn" data-action="jump" aria-label="跳跃">
                    <span class="pixel-icon pixel-boot" aria-hidden="true"></span>
                </button>
                <button id="reloadButton" type="button" class="touch-btn reload-btn" data-action="reload" aria-label="手动换弹" aria-hidden="true" hidden disabled>
                    <span class="pixel-icon pixel-magazine" aria-hidden="true"></span>
                </button>
                <button type="button" class="touch-btn attack-btn" data-action="attack" aria-label="攻击">
                    <span class="pixel-icon pixel-sword" aria-hidden="true">
                        <span class="pixel-sword-shape">
                            <span class="blade"></span>
                            <span class="guard"></span>
                            <span class="grip"></span>
                        </span>
                    </span>
                </button>
                <button type="button" class="touch-btn heal-btn" data-action="heal" aria-label="求饶回血">
                    <span class="pixel-icon pixel-heart" aria-hidden="true"></span>
                </button>
            </div>
        </div>
        <div id="pauseMenu" role="dialog" aria-modal="true" aria-labelledby="pauseTitle" aria-hidden="true">
            <div class="pause-panel">
                <h2 id="pauseTitle">暂停</h2>
                <div class="pause-setting">
                    <label for="volumeSlider">音量</label>
                    <output id="volumeValue" for="volumeSlider">100%</output>
                    <input id="volumeSlider" type="range" min="0" max="100" value="100" step="1" aria-label="游戏音量">
                </div>
                <div id="pauseTouchSizeRow" class="pause-setting" hidden>
                    <label for="touchSizeSlider">按键大小</label>
                    <output id="touchSizeValue" for="touchSizeSlider">100%</output>
                    <input id="touchSizeSlider" type="range" min="75" max="135" value="100" step="1" aria-label="触屏按键大小" disabled>
                </div>
                <div class="pause-actions">
                    <button id="pauseContinueButton" class="pause-menu-btn" type="button">继续游戏</button>
                    <button id="pauseRestartButton" class="pause-menu-btn" type="button">重新开始</button>
                </div>
            </div>
        </div>
        <div id="rotateHint" role="status">请将设备旋转至横屏<small>横屏可避免操作区重叠</small></div>
        <div id="liveStatus" class="sr-only" aria-live="polite"></div>
    </div>

    <script>
        // ============ 游戏配置 ============
        const CONFIG = {
            CANVAS_WIDTH: 960,
            CANVAS_HEIGHT: 540,
            TILE_SIZE: 32,
            GRAVITY: 0.6,
            PLAYER_SPEED: 5,
            JUMP_FORCE: 12,
            ATTACK_DURATION: 15,
            ATTACK_COOLDOWN: 25,
            ENEMY_SPEED: 1.2,
            KNOCKBACK_FORCE: 8,
            PLAYER_MAX_HP: 100,
            ENEMY_DAMAGE: 10,
            SWORD_DAMAGE: 25,
            BASE_ENEMIES_PER_WAVE: 5,
            ENEMY_HP_SCALING: 1.15,
            ENEMY_DAMAGE_SCALING: 1.1,
            BIOME_LIST: ['plains', 'snow', 'rain', 'nether', 'end', 'night'],
            BOSS_WAVE: 10,
            MAX_ENEMIES_PER_WAVE: 30,
            BOW_RELOAD_FRAMES: 60,
            RANGED_DAMAGE_MULTIPLIER: 0.5,
            AUTOMATIC_DAMAGE_MULTIPLIER: 0.35,
            BOW_DAMAGE_MULTIPLIER: 2,
            RANGED_FRAGMENT_EFFICIENCY: 0.33,
            LASER_CHARGE_FRAMES: 72,
            LASER_FIRE_FRAMES: 14
        };

        // ============ 生物群系定义（每波随机主题） ============
        const BIOMES = {
            plains: {
                name: '草地白天',
                musicKey: 'plains',
                sky: ['#87CEEB', '#B0E0E6', '#E0F7FA'],
                sun: true,
                moon: false,
                top: '#4CAF50',
                topAccent: '#66BB6A',
                dirt: '#8B5A2B',
                dirtAccent: '#7A4A1B',
                stone: '#6D4C41',
                cloud: '#FFF',
                weather: null
            },
            snow: {
                name: '积雪',
                musicKey: 'snow',
                sky: ['#B3E5FC', '#E1F5FE', '#FFFFFF'],
                sun: true,
                moon: false,
                top: '#E0F2F1',
                topAccent: '#B2DFDB',
                dirt: '#8D6E63',
                dirtAccent: '#6D4C41',
                stone: '#5D4037',
                cloud: '#F5F5F5',
                weather: 'snow'
            },
            rain: {
                name: '雨天',
                musicKey: 'rain',
                sky: ['#7EA5C9', '#90A4AE', '#B0BEC5'],
                sun: false,
                moon: false,
                top: '#558B2F',
                topAccent: '#7CB342',
                dirt: '#6D4C41',
                dirtAccent: '#5D4037',
                stone: '#4E342E',
                cloud: '#CFD8DC',
                weather: 'rain'

        class Weapon {
            constructor(data, rarity) {
                this.name = data.name;
                this.model = data.model || 'sword';
                this.category = data.category || 'melee';
                this.isRanged = this.category === 'ranged';

                this.hasParticles = data.hasParticles ?? (rarity === 'LEGENDARY');
                this.particleColor = data.particleColor || this.color;

                const hpProfile = WEAPON_HP_BONUS_BY_RARITY[rarity] || WEAPON_HP_BONUS_BY_RARITY.COMMON;
                this.hpBonus = Math.min(hpProfile[this.isRanged ? 'ranged' : 'melee'], 100);

            getAttackRange(rangeUpgrade = 0) {
                return 40 + this.rangeBonus + rangeUpgrade;
            }

            getKnockback() {
                return CONFIG.KNOCKBACK_FORCE + this.knockbackBonus;
            }

            getProjectileKnockback() {
                return Math.max(0, this.getKnockback() * WEAPON_BALANCE_PROFILES[this.balanceProfile].knockbackMultiplier);
            }

            getProjectileKnockbackFrames() {
                return WEAPON_BALANCE_PROFILES[this.balanceProfile].knockbackFrames;
            }

            getFragmentEfficiency() {
                return WEAPON_BALANCE_PROFILES[this.balanceProfile].fragmentEfficiency;
            }

            getMagazineSize(ammoUpgrade = 0) {
                if (!this.isRanged) return 0;
                if (this.fixedMagazine) return Math.max(1, this.baseMagazine);
                return Math.max(1, this.baseMagazine + ammoUpgrade);
            }

            getReloadFrames(reloadSpeedUpgrade = 0) {
                const multiplier = Math.max(0.45, 1 - reloadSpeedUpgrade);
                return Math.max(18, Math.round(this.reloadFrames * multiplier));
            }
        }

        // ============ 武器生成器 ============
        const RARITY_ORDER = ['COMMON', 'RARE', 'EPIC', 'LEGENDARY'];

        function generateRandomWeapon(minRarity = 'COMMON', excludedNames = []) {
            const minIndex = RARITY_ORDER.indexOf(minRarity);
            const excluded = excludedNames instanceof Set ? excludedNames : new Set(excludedNames);
            const available = RARITY_ORDER.filter((rarity, idx) =>
                idx >= minIndex && WEAPON_DATABASE[rarity].some(weapon => !excluded.has(weapon.name))
            );
            if (available.length === 0) return null;
            const totalProb = available.reduce((sum, r) => sum + (RARITY[r].probability || 0), 0);
            let roll = Math.random() * totalProb;
            let rarity = available[0];

            for (const r of available) {
                roll -= RARITY[r].probability;
                if (roll <= 0) {
                    rarity = r;
                    break;
                }
            }

            const weaponList = WEAPON_DATABASE[rarity].filter(weapon => !excluded.has(weapon.name));
            const weaponData = weaponList[Math.floor(Math.random() * weaponList.length)];
            return new Weapon(weaponData, rarity);
        }

        function generateWeaponChoices(count = 3, minRarity = 'COMMON', excludedNames = []) {
            const choices = [];
            const excluded = new Set(excludedNames);
            while (choices.length < count) {
                const choice = generateRandomWeapon(minRarity, excluded);
                if (!choice) break;
                choices.push(choice);
                excluded.add(choice.name);
            }
            return choices;
        }

        function generateEnchantChoices(count = 3, weapon = player?.weapon) {
            const weaponClass = weapon?.isRanged ? 'ranged' : 'melee';

                if (weapon?.fixedMagazine && fragment.ammoBonus) return false;

                return fragment.class === weaponClass;

            const shuffled = [...pool].sort(() => Math.random() - 0.5);
            return shuffled.slice(0, count).map(fragment => ({ ...fragment }));

        // ============ 粒子系统 ============
        const particles = [];

        class Particle {
            constructor(x, y, color, vx, vy, life, options = {}) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = vx;
                this.vy = vy;
                this.life = life;
                this.maxLife = life;
                this.size = options.size || 3 + Math.random() * 3;
                this.gravity = options.gravity ?? 0.1;
                this.drag = options.drag ?? 0.98;
                this.glow = options.glow || 0;
                this.shape = options.shape || 'square';
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= this.drag;
                this.vy *= this.drag;
                this.vy += this.gravity;
                this.life--;
                return this.life > 0;
            }

            draw(ctx) {
                const alpha = this.life / this.maxLife;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = this.color;
                if (this.glow) {
                    ctx.shadowColor = this.color;
                    ctx.shadowBlur = this.glow;
                }
                if (this.shape === 'circle') {
                    ctx.beginPath();
                    ctx.arc(this.x - camera.x, this.y - camera.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.fillRect(this.x - camera.x, this.y - camera.y, this.size, this.size);
                }

        function createSeededRandom(seed) {
            let state = seed >>> 0;
            return () => {
                state = (state + 0x6D2B79F5) >>> 0;
                let value = state;
                value = Math.imul(value ^ (value >>> 15), value | 1);
                value ^= value + Math.imul(value ^ (value >>> 7), value | 61);
                return ((value ^ (value >>> 14)) >>> 0) / 4294967296;
            };
        }

        function clampChaosValue(value, min, max) {
            return Math.max(min, Math.min(max, value));
        }

        function createChaosSeed(wave, spawnIndex = 0) {
            const entropy = Math.floor(Math.random() * 0x100000000) >>> 0;
            return (entropy ^ Math.imul(wave + 1, 0x9E3779B1) ^ Math.imul(spawnIndex + 1, 0x85EBCA6B)) >>> 0;
        }

        function createChaosProfile(wave = CHAOS_SPAWN_RULES.startWave, seed = createChaosSeed(wave)) {
            const random = createSeededRandom(seed);
            const baseType = CHAOS_BASE_TYPES[Math.floor(random() * CHAOS_BASE_TYPES.length)];
            const base = ENEMY_TYPES[baseType];
            const trait = CHAOS_TRAITS[Math.floor(random() * CHAOS_TRAITS.length)];
            const mutation = CHAOS_MUTATIONS[Math.floor(random() * CHAOS_MUTATIONS.length)];
            const statJitter = 0.9 + random() * 0.2;
            const sizeScale = clampChaosValue((mutation.size || 1) * (0.92 + random() * 0.16), 0.72, 1.36);
            const baseHp = Math.max(18, Math.round(base.baseHp * trait.hp * mutation.hp * statJitter));
            const baseDmg = Math.max(5, Math.round(base.baseDmg * trait.damage * mutation.damage * (0.94 + random() * 0.12)));
            const speed = clampChaosValue(base.speed * trait.speed * mutation.speed * (0.94 + random() * 0.12), 0.55, 3.2);
            const knockResist = clampChaosValue(base.knockResist * trait.knock * mutation.knock, 0.55, 2.15);
            const ranged = Boolean(base.ranged || trait.ranged);
            const leaper = !ranged && Boolean(base.leaper || trait.leaper);
            const shieldRatio = Math.max(trait.shieldRatio || 0, mutation.shieldRatio || 0);
            const hue = Math.floor(random() * 360);
            const accentHue = (hue + 105 + Math.floor(random() * 120)) % 360;
            const prefix = CHAOS_NAME_PREFIXES[Math.floor(random() * CHAOS_NAME_PREFIXES.length)];
            const suffix = CHAOS_NAME_SUFFIXES[Math.floor(random() * CHAOS_NAME_SUFFIXES.length)];

            return {
                seed: seed >>> 0,
                name: `${prefix}${mutation.name}${trait.name}${suffix}`,
                baseType,
                traitId: trait.id,
                mutationId: mutation.id,
                baseHp,
                baseDmg,
                speed,
                color: `hsl(${hue}, 72%, 48%)`,
                accent: `hsl(${accentHue}, 88%, 68%)`,
                eyeColor: `hsl(${(accentHue + 160) % 360}, 100%, 78%)`,
                width: Math.round(clampChaosValue(base.width * sizeScale, 18, 44)),
                height: Math.round(clampChaosValue(base.height * sizeScale, 23, 52)),
                knockResist,
                ranged,
                leaper,
                shield: Math.round(baseHp * shieldRatio),
                shootInterval: Math.round(82 + random() * 70),
                shape: Math.floor(random() * 4),
                pattern: Math.floor(random() * 4),
                eyeCount: 1 + Math.floor(random() * 3),
                hornCount: Math.floor(random() * 3),
                wave
            };
        }

        function getChaosSpawnChance(wave) {
            if (wave < CHAOS_SPAWN_RULES.startWave) return 0;
            return Math.min(

                CHAOS_SPAWN_RULES.baseChance + (wave - CHAOS_SPAWN_RULES.startWave) * CHAOS_SPAWN_RULES.chancePerWave
            );

        function getChaosSpawnCap(wave) {
            if (wave < CHAOS_SPAWN_RULES.startWave) return 0;
            return Math.min(
                CHAOS_SPAWN_RULES.maxPerWave,
                1 + Math.floor((wave - CHAOS_SPAWN_RULES.startWave) / CHAOS_SPAWN_RULES.capEveryWaves)
            );

            update() {
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 5) this.trail.shift();
                this.x += this.vx;
                this.y += this.vy;

                ctx.save();

                    ctx.globalAlpha = (index + 1) / (this.trail.length + 1) * 0.32;
                    ctx.fillStyle = this.color;
                    ctx.fillRect(point.x - camera.x, point.y - camera.y, Math.max(1, this.size - 2), Math.max(1, this.size - 2));
                });
                ctx.globalAlpha = 1;
                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = this.owner === 'player' ? 9 : 5;
                if (this.model === 'bow' || this.model === 'crossbow') {
                    ctx.translate(this.x - camera.x, this.y - camera.y);
                    ctx.rotate(Math.atan2(this.vy, this.vx));
                    const boltLength = this.model === 'crossbow' ? 13 : 16;
                    ctx.fillRect(-boltLength / 2, -1, boltLength, 2);
                    ctx.beginPath();
                    ctx.moveTo(boltLength / 2 + 2, 0);
                    ctx.lineTo(boltLength / 2 - 4, -4);
                    ctx.lineTo(boltLength / 2 - 4, 4);
                    ctx.closePath();
                    ctx.fill();
                } else if (this.model === 'staff' || this.model === 'launcher') {
                    ctx.translate(this.x - camera.x, this.y - camera.y);
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size, 0, Math.PI * 2);

                    ctx.strokeStyle = '#FFF';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size + 2, 0, Math.PI * 2);

                    ctx.rotate(Math.atan2(this.vy, this.vx));
                    ctx.fillRect(-this.size, -this.size / 2, this.size * 2, this.size);
                }
                ctx.restore();

        let bossMusicTimer = null;
        let bossMusicGeneration = 0;
        const musicSources = new Set();
        const bossMusicSources = new Set();
        const BASE_MUSIC_GAIN = 0.12;
        const BASE_SFX_GAIN = 0.3;

        function applyMasterVolume() {
            const volume = Math.max(0, Math.min(1, Number(masterVolume) || 0));
            if (musicGain) musicGain.gain.value = BASE_MUSIC_GAIN * volume;
            if (sfxGain) sfxGain.gain.value = BASE_SFX_GAIN * volume;
        }

        function initAudio() {
            if (audioCtx) {
                applyMasterVolume();
                if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
                return;
            }
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            musicGain = audioCtx.createGain();
            sfxGain = audioCtx.createGain();
            applyMasterVolume();
            musicGain.connect(audioCtx.destination);
            sfxGain.connect(audioCtx.destination);
        }

        function startMusic(musicKey = currentBiome?.musicKey || 'plains') {
            if (!audioCtx || bossMusicPlaying) return;
            const theme = BIOME_MUSIC[musicKey] || BIOME_MUSIC.plains;
            if (musicPlaying && currentMusicKey === musicKey) return;
            if (musicPlaying || currentMusicKey) stopMusic();
            musicPlaying = true;
            currentMusicKey = musicKey;
            const generation = ++musicGeneration;
            const beat = 60 / theme.bpm;
            const now = audioCtx.currentTime + 0.05;
            theme.pattern.forEach((freq, i) => {
                if (freq === 0) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = theme.wave;
                osc.frequency.value = freq;
                const noteAt = now + i * beat * theme.step;
                gain.gain.setValueAtTime(0.001, noteAt);
                gain.gain.linearRampToValueAtTime(theme.gain, noteAt + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, noteAt + theme.noteLength);
                osc.connect(gain).connect(musicGain);
                musicSources.add(osc);
                osc.onended = () => musicSources.delete(osc);
                osc.start(noteAt);
                osc.stop(noteAt + theme.noteLength + 0.05);
            });
            musicLoopTimer = setTimeout(() => {
                if (generation !== musicGeneration || bossMusicPlaying) return;
                musicPlaying = false;
                musicLoopTimer = null;
                startMusic(musicKey);
            }, theme.pattern.length * beat * theme.step * 1000);
        }

        function stopMusic() {
            if (musicLoopTimer) {
                clearTimeout(musicLoopTimer);
                musicLoopTimer = null;
            }
            musicSources.forEach(source => {
                try { source.stop(); } catch (error) { /* 已结束的音源无需处理 */ }
            });
            musicSources.clear();
            musicPlaying = false;
            currentMusicKey = null;
            musicGeneration++;
        }

        function startBossMusic() {
            if (!audioCtx || bossMusicPlaying) return;
            bossMusicPlaying = true;
            stopMusic();
            const generation = ++bossMusicGeneration;
            const bpm = 138;
            const beat = 60 / bpm;
            const pattern = [110, 0, 220, 0, 330, 0, 196, 0, 392, 0, 220, 0, 440, 0, 262, 0, 523, 0, 330, 0, 392, 0, 0, 0];
            const now = audioCtx.currentTime + 0.04;
            pattern.forEach((freq, i) => {
                if (freq === 0) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = i % 4 === 0 ? 'sawtooth' : 'square';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.0001, now + i * beat * 0.4);
                gain.gain.linearRampToValueAtTime(0.35, now + i * beat * 0.4 + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, now + i * beat * 0.4 + 0.5);
                osc.connect(gain).connect(musicGain);
                bossMusicSources.add(osc);
                osc.onended = () => bossMusicSources.delete(osc);
                osc.start(now + i * beat * 0.4);
                osc.stop(now + i * beat * 0.4 + 0.55);
            });
            bossMusicTimer = setTimeout(() => {
                if (generation !== bossMusicGeneration) return;
                bossMusicPlaying = false;
                bossMusicTimer = null;
                startBossMusic();
            }, pattern.length * beat * 400);
        }

        function stopBossMusic() {
            if (bossMusicTimer) {
                clearTimeout(bossMusicTimer);
                bossMusicTimer = null;
            }
            bossMusicSources.forEach(source => {
                try { source.stop(); } catch (error) { /* 已结束的音源无需处理 */ }
            });
            bossMusicSources.clear();
            bossMusicPlaying = false;
            bossMusicGeneration++;
        }

        function updateTouchControlsLayout() {
            const vw = window.visualViewport?.width || window.innerWidth || BASE_CANVAS_WIDTH;
            const vh = window.visualViewport?.height || window.innerHeight || BASE_CANVAS_HEIGHT;
            const shortSide = Math.min(vw, vh);
            const compactWidth = Math.min(vw, vh * (BASE_CANVAS_WIDTH / BASE_CANVAS_HEIGHT));
            const rawBaseSize = Math.max(54, Math.min(118, Math.min(shortSide * 0.12, compactWidth * 0.105)));
            const requestedBaseSize = rawBaseSize * touchControlScale;
            const widthLimitedBaseSize = (vw - 24) / 5.9;
            const baseSize = Math.max(44, Math.min(150, requestedBaseSize, widthLimitedBaseSize));
            const attackSize = Math.max(64, Math.min(190, baseSize * 1.48));
            const gap = Math.max(8, Math.min(28, baseSize * 0.18));
            const offset = Math.max(12, baseSize * 0.22);
            const bottom = Math.max(12, baseSize * 0.2);
            const fontSize = Math.max(18, baseSize * 0.24);
            const arcNear = attackSize + gap;
            const arcFar = arcNear + baseSize * 0.55;
            const arcTop = attackSize * 0.82;
            const arcMid = Math.max(0, (attackSize - baseSize) / 2);
            const actionWidth = arcFar + baseSize;
            const actionHeight = Math.max(attackSize, arcTop + baseSize);
            const iconScale = baseSize >= 96 ? 2 : 1;

            const root = document.documentElement.style;
            root.setProperty('--touch-btn-size', `${baseSize}px`);
            root.setProperty('--touch-attack-size', `${attackSize}px`);
            root.setProperty('--touch-gap', `${gap}px`);
            root.setProperty('--touch-offset', `${offset}px`);
            root.setProperty('--touch-bottom', `${bottom}px`);
            root.setProperty('--touch-font-size', `${fontSize}px`);
            root.setProperty('--touch-action-width', `${actionWidth}px`);
            root.setProperty('--touch-action-height', `${actionHeight}px`);
            root.setProperty('--touch-arc-near', `${arcNear}px`);
            root.setProperty('--touch-arc-far', `${arcFar}px`);
            root.setProperty('--touch-arc-top', `${arcTop}px`);
            root.setProperty('--touch-arc-mid', `${arcMid}px`);
            root.setProperty('--touch-icon-scale', `${iconScale}`);
        }

        function updateCanvasScale() {
            const viewportWidth = Math.round(window.visualViewport?.width || window.innerWidth || BASE_CANVAS_WIDTH);
            const viewportHeight = Math.round(window.visualViewport?.height || window.innerHeight || BASE_CANVAS_HEIGHT);
            const aspect = BASE_CANVAS_WIDTH / BASE_CANVAS_HEIGHT;
            const availableHeight = touchMode ? viewportHeight : Math.max(180, viewportHeight - 96);

            let displayWidth = viewportWidth;
            let displayHeight = Math.round(displayWidth / aspect);
            if (displayHeight > availableHeight) {
                displayHeight = availableHeight;
                displayWidth = Math.round(displayHeight * aspect);
            }

            canvas.style.width = `${displayWidth}px`;
            canvas.style.height = `${displayHeight}px`;
            if (touchMode) {
                gameContainer.style.width = `${viewportWidth}px`;
                gameContainer.style.height = `${viewportHeight}px`;
            } else {
                gameContainer.style.width = `${displayWidth + 6}px`;
                gameContainer.style.height = `${displayHeight + 6}px`;
            }

            rotateHintEl.style.display = touchMode && viewportHeight > viewportWidth ? 'flex' : 'none';

        function isFullscreen() {
            return Boolean(document.fullscreenElement
                || document.webkitFullscreenElement
                || document.msFullscreenElement
                || document.webkitIsFullScreen);
        }

        function getFullscreenRequest() {
            // 顶层策略明确禁止全屏时，任何元素上的请求都会失败。
            if (document.fullscreenEnabled === false) return null;
            const candidates = [document.documentElement, gameContainer, canvas];
            for (const target of candidates) {
                if (!target) continue;
                if (typeof target.requestFullscreen === 'function') {
                    return { target, request: target.requestFullscreen, standard: true };
                }
                const webkitRequest = target.webkitRequestFullscreen || target.webkitRequestFullScreen;
                if (document.webkitFullscreenEnabled !== false && typeof webkitRequest === 'function') {
                    return { target, request: webkitRequest, standard: false };
                }
                if (document.msFullscreenEnabled !== false && typeof target.msRequestFullscreen === 'function') {
                    return { target, request: target.msRequestFullscreen, standard: false };
                }
            }
            return null;
        }

        function syncFullscreenButton() {
            if (!fullscreenButtonEl) return;
            const canRequestFullscreen = Boolean(getFullscreenRequest());
            fullscreenButtonEl.style.display = touchMode
                && gameState === 'playing'
                && !pagePaused
                && !isFullscreen()
                && canRequestFullscreen
                ? 'block'
                : 'none';

        function syncTouchControlsVisibility() {
            const visible = touchMode && gameState === 'playing';

            touchControlsEl.setAttribute('aria-hidden', visible ? 'false' : 'true');
            syncPauseInterface();
            syncFullscreenButton();

        function lockTouchOrientation() {
            const orientation = window.screen?.orientation;
            if (!isFullscreen() || !orientation || typeof orientation.lock !== 'function') return;
            try {
                const result = orientation.lock('landscape');
                if (result && typeof result.catch === 'function') result.catch(() => {});
            } catch (error) {
                // 浏览器可拒绝锁定方向，不影响全屏和游戏输入。
            }
        }

        function requestFullscreenIfPossible() {
            if (isFullscreen()) return true;
            const entry = getFullscreenRequest();
            if (!entry) {
                syncFullscreenButton();
                return false;
            }

            try {
                const ret = entry.standard
                    ? entry.request.call(entry.target, { navigationUI: 'hide' })
                    : entry.request.call(entry.target);
                if (ret && typeof ret.catch === 'function') {
                    ret.catch(() => { syncFullscreenButton(); });
                }
                return true;
            } catch (error) {
                // 旧版 WebView 可能同步拒绝全屏；触屏模式仍应继续启动。

        // ============ 游戏状态 ============

        function pickBiomeForWave(wave) {
            if (isBossWave(wave)) return BIOMES.end;

            return BIOMES[key] || BIOMES.plains;

        function isBossWave(wave) {
            return wave === CONFIG.BOSS_WAVE || (gameMode === 'endless' && wave > CONFIG.BOSS_WAVE && wave % 10 === 0);
        }

        function generateMap(biome = currentBiome) {
            currentBiome = biome;
            // 初始化空地图
            for (let y = 0; y < MAP_HEIGHT; y++) {
                tiles[y] = [];
                for (let x = 0; x < MAP_WIDTH; x++) {
                    tiles[y][x] = 0; // 0 = 空气
                }
            }

            // 生成地形
            let groundLevel = 12;
            for (let x = 0; x < MAP_WIDTH; x++) {
                // 随机地形起伏
                if (Math.random() < 0.1) {
                    groundLevel += Math.random() < 0.5 ? 1 : -1;
                    groundLevel = Math.max(10, Math.min(14, groundLevel));
                }

                // 填充地面
                for (let y = groundLevel; y < MAP_HEIGHT; y++) {
                    if (y === groundLevel) {
                        tiles[y][x] = 1; // 1 = 草方块
                    } else {
                        tiles[y][x] = 2; // 2 = 泥土
                    }
                }

                // 随机生成平台
                if (x > 5 && x < MAP_WIDTH - 5 && Math.random() < 0.05) {
                    const platformY = groundLevel - 4 - Math.floor(Math.random() * 3);
                    const platformLength = 3 + Math.floor(Math.random() * 4);
                    for (let px = 0; px < platformLength && x + px < MAP_WIDTH; px++) {
                        if (tiles[platformY]) {
                            tiles[platformY][x + px] = 1;
                        }
                    }
                }
            }
        }

        // ============ 云朵系统 ============
        const clouds = [];
        function generateClouds() {
            clouds.length = 0;
            for (let i = 0; i < 15; i++) {
                clouds.push({
                    x: Math.random() * MAP_WIDTH * CONFIG.TILE_SIZE,
                    y: 30 + Math.random() * 100,
                    width: 60 + Math.random() * 80,

                });

        // ============ 天气粒子 ============
        const weatherParticles = [];
        function spawnWeatherParticles(type) {
            weatherParticles.length = 0;
            const count = 80;
            for (let i = 0; i < count; i++) {
                const px = Math.random() * CONFIG.CANVAS_WIDTH;
                const py = Math.random() * CONFIG.CANVAS_HEIGHT;
                weatherParticles.push(createWeatherParticle(type, px, py));
            }
        }

        function createWeatherParticle(type, x, y) {
            if (type === 'snow') {
                return { x, y, vx: -0.5 + Math.random(), vy: 1 + Math.random(), size: 3 + Math.random() * 2, color: '#FFF' };
            }
            if (type === 'rain') {
                return { x, y, vx: -1 + Math.random() * 0.5, vy: 6 + Math.random() * 2, size: 2, color: '#90CAF9' };
            }
            if (type === 'ash') {
                return { x, y, vx: -0.3 + Math.random() * 0.6, vy: 1.5 + Math.random(), size: 3, color: '#FF7043' };
            }
            if (type === 'void') {
                return { x, y, vx: -0.2 + Math.random() * 0.4, vy: 1 + Math.random(), size: 2 + Math.random() * 2, color: '#B39DDB' };
            }
            return { x, y, vx: 0, vy: 0, size: 0, color: '#FFF' };
        }

        function updateWeatherParticles(type) {
            if (!type) return;
            for (let p of weatherParticles) {
                p.x += p.vx;
                p.y += p.vy;
                if (p.y > CONFIG.CANVAS_HEIGHT) {
                    p.y = -10;
                    p.x = Math.random() * CONFIG.CANVAS_WIDTH;
                }
                if (p.x < -20) p.x = CONFIG.CANVAS_WIDTH + 10;
                if (p.x > CONFIG.CANVAS_WIDTH + 20) p.x = -10;
            }
        }

        function drawWeatherParticles(type) {
            if (!type) return;
            ctx.save();
            for (let p of weatherParticles) {
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size * (type === 'rain' ? 4 : 1));
            }
            ctx.restore();
        }

        // ============ 玩家类 ============
        class Player {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 24;
                this.height = 32;
                this.vx = 0;
                this.vy = 0;
                this.onGround = false;
                this.facing = 1; // 1 = 右, -1 = 左
                this.baseMaxHp = CONFIG.PLAYER_MAX_HP;
                this.maxHp = this.baseMaxHp;
                this.hp = this.maxHp;
                this.attacking = false;
                this.attackTimer = 0;
                this.attackDuration = CONFIG.ATTACK_DURATION;
                this.attackCooldown = 0;
                this.invincible = 0;
                this.walkFrame = 0;
                this.walkTimer = 0;
                this.attackHit = false; // 防止一次攻击多次命中同一敌人
                this.healAccumulator = 0;
                this.attackSequence = 0;
                this.attackEffectTriggered = false;
                this.upgrades = { damage: 0, hp: 0, range: 0, ammo: 0, reloadSpeed: 0 };
                this.ammo = 0;
                this.reloadTimer = 0;
                this.reloadMax = 0;
                
                // 初始武器 - 木剑
                this.weapon = null;
                this.setWeapon(new Weapon(WEAPON_DATABASE.COMMON[0], 'COMMON'));
            }

            update() {
                if (gameState !== 'playing') return;
                
                // 移动输入
                if (keys['KeyA'] || keys['ArrowLeft']) {
                    this.vx = -CONFIG.PLAYER_SPEED;
                    this.facing = -1;
                } else if (keys['KeyD'] || keys['ArrowRight']) {
                    this.vx = CONFIG.PLAYER_SPEED;
                    this.facing = 1;
                } else {
                    this.vx = 0;
                }

                // 跳跃
                if ((keys['Space'] || keys['KeyW'] || keys['ArrowUp']) && this.onGround) {
                    this.vy = -CONFIG.JUMP_FORCE;
                    this.onGround = false;
                }

                // 求饶回血（随时可用）
                if (keys['KeyU']) {
                    this.vx *= 0.4; // 移动减速
                    this.attackCooldown = Math.max(this.attackCooldown, 12); // 暂停攻击
                    const healPerFrame = 7 / 60;
                    this.healAccumulator += healPerFrame;
                    const healInt = Math.floor(this.healAccumulator);
                    if (healInt > 0) {
                        this.hp = Math.min(this.maxHp, this.hp + healInt);
                        this.healAccumulator -= healInt;
                    }
                } else {
                    this.healAccumulator = 0;
                }

                // 远程武器可手动装填；空弹匣会自动装填
                if (keys['KeyR'] && this.weapon.isRanged && this.ammo < this.getMagazineSize()) {
                    this.startReload();
                }

                // 攻击
                if ((keys['KeyJ'] || mousePressed) && this.attackCooldown <= 0) {
                    this.tryAttack();
                }

                // 重力
                this.vy += CONFIG.GRAVITY;
                if (this.vy > 15) this.vy = 15;

                // 应用速度
                this.x += this.vx;
                this.y += this.vy;

                // 掉出地图则从上方回落
                if (this.y > MAP_HEIGHT * CONFIG.TILE_SIZE + 200) {
                    this.y = -80;
                    this.vy = 6;
                    this.takeDamage(Math.max(8, Math.round(this.maxHp * 0.08)), 'fall');
                }

                // 碰撞检测
                this.handleCollision();

                // 更新攻击状态
                if (this.attackTimer > 0) this.attackTimer--;
                if (this.attacking && !this.weapon.isRanged && this.weapon.hasParticles &&
                    !this.attackEffectTriggered && this.isAttackActive()) {
                    const pose = this.getWeaponPose();
                    const effectX = this.x + this.width / 2 + this.facing * (18 + pose.offsetX);
                    const effectY = this.y + this.height / 2 + pose.offsetY;
                    spawnAttackParticles(effectX, effectY, this.weapon.particleColor, 12);
                    this.attackEffectTriggered = true;
                }
                if (this.attackTimer <= 0) this.attacking = false;
                if (this.attackCooldown > 0) this.attackCooldown--;
                if (this.invincible > 0) this.invincible--;
                if (this.reloadTimer > 0) {
                    this.reloadTimer--;
                    if (this.reloadTimer <= 0) {
                        this.ammo = this.getMagazineSize();
                        playSfx('reload_done');
                    }
                }

                // 走路动画
                if (this.vx !== 0) {
                    this.walkTimer++;
                    if (this.walkTimer > 8) {
                        this.walkTimer = 0;
                        this.walkFrame = (this.walkFrame + 1) % 4;
                    }
                } else {
                    this.walkFrame = 0;
                }

                // 边界限制
                if (this.x < 0) this.x = 0;
                if (this.x > MAP_WIDTH * CONFIG.TILE_SIZE - this.width) {
                    this.x = MAP_WIDTH * CONFIG.TILE_SIZE - this.width;
                }
            }

            getEffectiveDamageBonus(pelletCount = this.weapon?.pellets || 1) {
                if (!this.weapon) return 0;
                const effective = this.upgrades.damage * this.weapon.getFragmentEfficiency();
                return this.weapon.isRanged ? effective / Math.max(1, pelletCount) : effective;
            }

            getAttackDamage(pelletCount = this.weapon?.pellets || 1) {
                return this.weapon.damage + this.getEffectiveDamageBonus(pelletCount);
            }

            getMagazineSize() {
                if (!this.weapon?.isRanged) return 0;
                // 弓始终一箭一装，严格保持 1 秒装填节奏。
                if (this.weapon.model === 'bow') return 1;
                return this.weapon.getMagazineSize(this.upgrades.ammo);
            }

            startReload() {
                if (!this.weapon?.isRanged || this.reloadTimer > 0 || this.ammo >= this.getMagazineSize()) return;
                this.reloadMax = this.weapon.model === 'bow'
                    ? CONFIG.BOW_RELOAD_FRAMES
                    : this.weapon.getReloadFrames(this.upgrades.reloadSpeed);
                this.reloadTimer = this.reloadMax;
                playSfx('reload');
            }

            tryAttack() {
                if (!this.weapon) return;
                if (keys['KeyU']) return;

                if (this.weapon.isRanged) {
                    if (this.reloadTimer > 0) return;
                    if (this.ammo <= 0) {
                        this.startReload();
                        return;
                    }
                    this.fireRangedWeapon();
                    return;
                }

                this.attacking = true;
                this.attackDuration = this.weapon.attackProfile.duration;
                this.attackTimer = this.attackDuration;
                this.attackCooldown = this.weapon.attackProfile.cooldown;
                this.attackSequence++;
                this.attackEffectTriggered = false;
                runStats.meleeAttacks++;
                if (gameMode === 'endless') runStats.endlessMeleeAttacks++;
                playSfx(`swing_${this.weapon.model || 'sword'}`);
            }

            fireRangedWeapon() {
                const weapon = this.weapon;
                this.attacking = true;
                this.attackDuration = Math.min(10, weapon.fireCooldown);
                this.attackTimer = this.attackDuration;
                this.attackCooldown = weapon.fireCooldown;
                this.attackSequence++;
                this.ammo--;

                const pellets = weapon.pellets || 1;
                const gripX = this.x + this.width / 2 + this.facing * 6;
                const muzzleX = gripX + this.facing * weapon.muzzleOffset;
                const muzzleY = this.y + 16;
                runStats.rangedAttacks++;
                runStats.projectilesFired += pellets;
                if (gameMode === 'endless') {
                    runStats.endlessRangedAttacks++;
                    runStats.endlessProjectilesFired += pellets;
                }
                for (let i = 0; i < pellets; i++) {
                    const centered = pellets === 1 ? 0 : i / (pellets - 1) - 0.5;
                    const randomSpread = (Math.random() - 0.5) * weapon.spread;
                    const angle = (this.facing === 1 ? 0 : Math.PI) + centered * weapon.spread * 2 + randomSpread;
                    projectiles.push(new Projectile(
                        muzzleX,
                        muzzleY,
                        Math.cos(angle) * weapon.projectileSpeed,
                        Math.sin(angle) * weapon.projectileSpeed,
                        this.getAttackDamage(pellets),
                        weapon.particleColor,
                        'player',
                        {
                            gravity: weapon.projectileGravity,
                            pierce: weapon.pierce,
                            knockback: weapon.getProjectileKnockback(),
                            knockbackFrames: weapon.getProjectileKnockbackFrames(),
                            model: weapon.model,
                            size: weapon.projectileSize,
                            life: 190
                        }
                    ));
                }

                const shotSound = weapon.model === 'bow' || weapon.model === 'crossbow'
                    ? 'shoot_bow'
                    : weapon.model === 'shotgun' || weapon.model === 'launcher'
                        ? 'shoot_shotgun'
                        : 'shoot_gun';
                playSfx(shotSound);
                spawnImpactParticles(muzzleX, muzzleY, weapon.particleColor, ['shotgun', 'launcher'].includes(weapon.model) ? 12 : 6, 0.55);
                screenShake = Math.max(screenShake, weapon.model === 'launcher' ? 8 : weapon.model === 'shotgun' ? 6 : 2.5);
                if (this.ammo <= 0) this.startReload();
            }

            handleCollision() {
                this.onGround = false;

                // 获取玩家周围的方块
                const left = Math.floor(this.x / CONFIG.TILE_SIZE);
                const right = Math.floor((this.x + this.width) / CONFIG.TILE_SIZE);
                const top = Math.floor(this.y / CONFIG.TILE_SIZE);
                const bottom = Math.floor((this.y + this.height) / CONFIG.TILE_SIZE);

                // 垂直碰撞
                for (let ty = top; ty <= bottom; ty++) {
                    for (let tx = left; tx <= right; tx++) {
                        if (tiles[ty] && tiles[ty][tx] > 0) {
                            const tileX = tx * CONFIG.TILE_SIZE;
                            const tileY = ty * CONFIG.TILE_SIZE;

                            if (this.intersects(tileX, tileY, CONFIG.TILE_SIZE, CONFIG.TILE_SIZE)) {
                                // 从上方落下
                                if (this.vy > 0 && this.y + this.height - this.vy <= tileY) {
                                    this.y = tileY - this.height;
                                    this.vy = 0;
                                    this.onGround = true;
                                }
                                // 从下方撞上
                                else if (this.vy < 0 && this.y - this.vy >= tileY + CONFIG.TILE_SIZE) {
                                    this.y = tileY + CONFIG.TILE_SIZE;
                                    this.vy = 0;
                                }
                                // 水平碰撞
                                else if (this.vx > 0) {
                                    this.x = tileX - this.width;
                                } else if (this.vx < 0) {
                                    this.x = tileX + CONFIG.TILE_SIZE;
                                }
                            }
                        }
                    }
                }
            }

            intersects(x, y, w, h) {
                return this.x < x + w && this.x + this.width > x &&
                       this.y < y + h && this.y + this.height > y;
            }

            getAttackProgress() {
                if (!this.attacking || this.attackDuration <= 0) return 0;
                return Math.max(0, Math.min(1, 1 - this.attackTimer / this.attackDuration));
            }

            isAttackActive() {
                if (!this.attacking || this.weapon.isRanged) return false;
                const progress = this.getAttackProgress();
                const profile = this.weapon.attackProfile;
                return progress >= profile.activeStart && progress <= profile.activeEnd;
            }

            getWeaponPose(progress = this.getAttackProgress()) {
                if (this.weapon.isRanged) return { angle: 0, offsetX: 0, offsetY: 0, layer: 'front' };
                if (!this.attacking) {
                    if (this.weapon.model === 'twinblade') return { angle: -Math.PI / 2, offsetX: -2, offsetY: 4, layer: 'back' };
                    return { angle: -0.78, offsetX: 0, offsetY: 0, layer: 'front' };
                }
                const p = Math.max(0, Math.min(1, progress));
                const ease = p * p * (3 - 2 * p);
                let angle = -0.9;
                let offsetX = 0;
                let offsetY = 0;
                switch (this.weapon.attackStyle) {
                    case 'thrust': {
                        const thrust = p < 0.48 ? p / 0.48 : Math.max(0, (1 - p) / 0.52);
                        angle = -0.08;
                        offsetX = thrust * 18;
                        break;
                    }
                    case 'chop':
                        angle = -1.72 + ease * 2.92;
                        offsetY = -4 + ease * 5;
                        break;
                    case 'slam':
                        angle = -1.92 + ease * 3.25;
                        offsetY = -6 + ease * 9;
                        break;
                    case 'heavySlash':
                        angle = -1.48 + ease * 2.65;
                        offsetX = -4 + ease * 7;
                        break;
                    case 'reap':
                        angle = 1.16 - ease * 2.86;
                        offsetY = 5 - ease * 8;
                        break;
                    case 'spin':
                        angle = -0.7 + p * Math.PI * 2.5;
                        break;
                    case 'whip':
                        angle = -1.02 + ease * 2.08;
                        offsetX = ease * 5;
                        break;
                    default:
                        angle = -1.14 + ease * 2.28;
                        break;
                }
                const layer = this.weapon.attackStyle === 'spin' && Math.sin(angle) < 0 ? 'back' : 'front';
                return { angle, offsetX, offsetY, layer };
            }

            getAttackReach() {
                const range = this.weapon.getAttackRange(this.upgrades.range);
                const shape = this.weapon.attackProfile.hitShape;
                return range + (shape === 'whip' ? 20 : shape === 'wide' ? 10 : 0);
            }

            getAttackBox() {
                if (!this.isAttackActive()) return null;
                const range = this.weapon.getAttackRange(this.upgrades.range);
                const shape = this.weapon.attackProfile.hitShape;
                if (shape === 'radial') {
                    return {
                        x: this.x + this.width / 2 - range,
                        y: this.y + this.height / 2 - range * 0.58,
                        width: range * 2,
                        height: range * 1.16
                    };
                }
                const extraReach = shape === 'thrust' ? 16 : shape === 'whip' ? 20 : shape === 'wide' ? 10 : 0;
                const attackWidth = range + extraReach;
                const attackHeight = shape === 'thrust' ? 18 : shape === 'whip' ? 24 : shape === 'heavy' ? 48 : shape === 'wide' ? 42 : 34;
                return {
                    x: this.facing === 1 ? this.x + this.width - 8 : this.x - attackWidth + 8,
                    y: this.y + this.height / 2 - attackHeight / 2,
                    width: attackWidth,
                    height: attackHeight
                };
            }

            attackIntersects(target) {
                const attackBox = this.getAttackBox();
                if (!attackBox || !target) return false;
                if (this.weapon.attackProfile.hitShape !== 'radial') {
                    return target.intersects(attackBox.x, attackBox.y, attackBox.width, attackBox.height);
                }
                const centerX = this.x + this.width / 2;
                const centerY = this.y + this.height / 2;
                const nearestX = Math.max(target.x, Math.min(centerX, target.x + target.width));
                const nearestY = Math.max(target.y, Math.min(centerY, target.y + target.height));
                const dx = nearestX - centerX;
                const dy = nearestY - centerY;
                const radius = this.getAttackReach();
                return dx * dx + dy * dy <= radius * radius;
            }

            setWeapon(weapon) {
                const prevMax = this.maxHp || this.baseMaxHp;
                const prevHp = this.hp;
                const bonus = (weapon.hpBonus || 0) + this.upgrades.hp;
                const newMax = this.baseMaxHp + bonus;
                const ratio = prevMax > 0 ? prevHp / prevMax : 1;
                this.weapon = weapon;
                this.maxHp = newMax;
                this.hp = Math.min(newMax, Math.max(prevHp, Math.round(newMax * ratio)));
                this.ammo = this.getMagazineSize();
                this.reloadTimer = 0;
                this.reloadMax = 0;
                syncTouchWeaponControls(this.weapon);
            }

            applyEnchant(enchant) {
                if (!this.weapon) return;
                this.upgrades.damage += enchant.damageBonus || 0;
                this.upgrades.range += enchant.rangeBonus || 0;
                this.upgrades.hp += enchant.hpBonus || 0;
                this.upgrades.ammo += enchant.ammoBonus || 0;
                this.upgrades.reloadSpeed = Math.min(0.55, this.upgrades.reloadSpeed + (enchant.reloadSpeedBonus || 0));
                this.setWeapon(this.weapon);
                if (this.weapon.isRanged) {
                    this.ammo = Math.max(this.ammo, this.getMagazineSize());
                }
            }

            resetProgression() {
                this.upgrades = { damage: 0, hp: 0, range: 0, ammo: 0, reloadSpeed: 0 };
                this.setWeapon(new Weapon(WEAPON_DATABASE.COMMON[0], 'COMMON'));
            }

            takeDamage(amount, cause = 'unknown') {
                if (gameState !== 'playing' || this.invincible > 0) return;
                const actualDamage = Math.min(this.hp, amount);
                this.hp -= amount;
                recordDamageTaken(actualDamage);
                this.invincible = 60;
                screenShake = Math.max(screenShake, 8);
                damageFlash = Math.max(damageFlash, 10);
                spawnImpactParticles(this.x + this.width / 2, this.y + this.height / 2, '#FF5252', 12, 0.85);
                floatingTexts.push(new FloatingText(this.x + this.width / 2, this.y - 8, `-${Math.round(amount)}`, '#FF8A80', 16));
                if (this.hp <= 0) {
                    this.hp = 0;
                    enterGameOver(cause);
                }
            }

            draw(ctx) {
                ctx.save();
                const screenX = this.x - camera.x;
                const screenY = this.y - camera.y;

                // 无敌闪烁效果
                if (this.invincible > 0 && (reducedMotion || Math.floor(this.invincible / 6) % 2 === 0)) {
                    ctx.globalAlpha = reducedMotion ? 0.72 : 0.56;
                }

                // 接地阴影让角色与地面关系更清晰
                ctx.save();
                ctx.globalAlpha *= 0.28;
                ctx.fillStyle = '#02060b';
                ctx.beginPath();
                ctx.ellipse(screenX + this.width / 2, screenY + this.height + 2, 15, 4, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                const weaponPose = this.getWeaponPose();
                const weaponBehind = !this.weapon.isRanged && weaponPose.layer === 'back';
                if (weaponBehind) this.drawWeapon(ctx, screenX, screenY, weaponPose);

                // 绘制像素小人
                this.drawPixelPlayer(ctx, screenX, screenY, weaponPose);

                // 旋转武器可根据姿势切换到角色前后层。
                if (!weaponBehind) this.drawWeapon(ctx, screenX, screenY, weaponPose);

                // 绘制攻击效果
                if (this.attacking && !this.weapon.isRanged) {
                    this.drawAttackEffect(ctx);
                }

                if (this.weapon.isRanged && this.reloadTimer > 0) {
                    const progress = 1 - this.reloadTimer / Math.max(1, this.reloadMax);
                    ctx.fillStyle = 'rgba(1,8,16,0.8)';
                    ctx.fillRect(screenX - 4, screenY - 12, this.width + 8, 5);
                    ctx.fillStyle = '#80CBC4';
                    ctx.fillRect(screenX - 3, screenY - 11, (this.width + 6) * progress, 3);
                }

                ctx.restore();
            }

            drawPixelPlayer(ctx, x, y, weaponPose = this.getWeaponPose()) {
                const f = this.facing;
                const offsetX = f === -1 ? this.width : 0;
                ctx.save();
                if (f === -1) {
                    ctx.translate(x + this.width, y);
                    ctx.scale(-1, 1);
                    x = 0;
                    y = 0;
                }

                // 头发 (棕色)
                ctx.fillStyle = '#5D4037';
                ctx.fillRect(x + 6, y, 12, 4);
                ctx.fillRect(x + 4, y + 2, 4, 6);

                // 头部/脸 (肤色)
                ctx.fillStyle = '#FFCC99';
                ctx.fillRect(x + 6, y + 4, 12, 10);

                // 眼睛
                ctx.fillStyle = '#333';
                ctx.fillRect(x + 14, y + 6, 2, 3);

                // 身体 (蓝色衬衫)
                ctx.fillStyle = '#263F66';
                ctx.fillRect(x + 5, y + 13, 14, 12);
                ctx.fillStyle = '#4FC3F7';
                ctx.fillRect(x + 6, y + 14, 12, 10);

                // 围巾与胸甲高光
                ctx.fillStyle = '#FF7043';
                ctx.fillRect(x + 5, y + 13, 14, 3);
                ctx.fillRect(x + 3, y + 15, 4, 3);
                ctx.fillStyle = '#B3E5FC';
                ctx.fillRect(x + 8, y + 17, 3, 5);

                // 手臂 (肤色)
                ctx.fillStyle = '#FFCC99';
                const armOffset = this.attacking ? -4 : (this.walkFrame % 2 === 0 ? 0 : 2);
                ctx.fillRect(x + 2, y + 14 + armOffset, 4, 8);
                if (this.attacking && !this.weapon.isRanged) {
                    const handX = x + 18 + weaponPose.offsetX;
                    const handY = y + 16 + weaponPose.offsetY;
                    ctx.strokeStyle = '#FFCC99';
                    ctx.lineWidth = 4;
                    ctx.lineCap = 'square';
                    ctx.beginPath();
                    ctx.moveTo(x + 18, y + 17);
                    ctx.lineTo(handX, handY);
                    ctx.stroke();
                    ctx.fillRect(handX - 2, handY - 2, 4, 5);
                } else {
                    ctx.fillRect(x + 18, y + 14 - armOffset, 4, 8);
                }

                // 腿 (深蓝色裤子)
                ctx.fillStyle = '#1565C0';
                const legOffset = this.walkFrame % 2 === 0 ? 0 : 2;
                ctx.fillRect(x + 6, y + 24, 5, 8 + legOffset);
                ctx.fillRect(x + 13, y + 24, 5, 8 - legOffset);

                ctx.restore();
            }

            drawWeapon(ctx, x, y, pose = this.getWeaponPose()) {
                ctx.save();
                const gripX = x + this.width / 2 + this.facing * 6;
                const gripY = y + 16;
                ctx.translate(gripX, gripY);
                ctx.scale(this.facing, 1);

                if (this.weapon.isRanged) {
                    const recoil = this.attacking ? Math.min(4, 4 * this.attackTimer / Math.max(1, this.attackDuration)) : 0;
                    ctx.translate(-recoil, 0);
                    drawWeaponModel(ctx, this.weapon, {
                        scale: 1,
                        detail: true,
                        loaded: this.ammo > 0 && this.reloadTimer <= 0
                    });
                    if (this.attacking && !['bow', 'crossbow'].includes(this.weapon.model) && this.attackTimer >= Math.max(1, this.attackDuration - 4)) {
                        drawMuzzleFlash(ctx, this.weapon.muzzleOffset, this.weapon);
                    }
                    if (this.attacking && ['bow', 'crossbow'].includes(this.weapon.model)) {
                        ctx.globalAlpha = 0.72;
                        ctx.fillStyle = '#FFF59D';
                        ctx.fillRect(Math.max(17, this.weapon.muzzleOffset - 12), -1, 10, 2);
                    }
                } else {
                    ctx.translate(pose.offsetX, pose.offsetY);
                    ctx.rotate(pose.angle);
                    drawWeaponModel(ctx, this.weapon, {
                        scale: 1,
                        detail: true,
                        hideFlexible: this.weapon.model === 'whip' && this.attacking
                    });
                }
                ctx.restore();
            }

            drawAttackEffect(ctx) {
                if (this.weapon.isRanged) return;
                ctx.save();
                const progress = this.getAttackProgress();
                const active = this.isAttackActive();
                const centerX = this.x + this.width / 2 + this.facing * 6 - camera.x;
                const centerY = this.y + this.height / 2 - camera.y;
                const baseRadius = this.weapon.getAttackRange(this.upgrades.range);
                const radius = this.getAttackReach();
                ctx.translate(centerX, centerY);
                ctx.scale(this.facing, 1);
                ctx.globalAlpha = active ? 0.78 : 0.28;
                ctx.strokeStyle = this.weapon.color;
                ctx.shadowColor = this.weapon.particleColor;
                ctx.shadowBlur = active ? 10 : 4;
                ctx.lineWidth = active ? 4 : 2;

                if (this.weapon.attackStyle === 'thrust') {
                    const reach = 16 + baseRadius * Math.sin(Math.min(1, progress) * Math.PI);
                    for (let offset = -5; offset <= 5; offset += 5) {
                        ctx.beginPath();
                        ctx.moveTo(10, offset);
                        ctx.lineTo(reach, offset * 0.35);
                        ctx.stroke();
                    }
                } else if (this.weapon.attackStyle === 'spin') {
                    ctx.setLineDash([10, 6]);
                    ctx.beginPath();
