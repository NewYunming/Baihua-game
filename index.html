        // ============ 绘制武器图标 ============
        function inferWeaponVisualVariant(name, model) {
            if (name.includes('左轮')) return 'revolver';
            if (name.includes('冲锋')) return 'smg';
            if (name.includes('磁轨')) return 'railgun';
            if (name.includes('机炮')) return 'minigun';
            if (name.includes('狙击')) return 'sniper';
            return model;
        }

        function getWeaponMuzzleOffset(model, variant) {
            if (model === 'bow') return 32;
            if (model === 'crossbow') return 44;
            if (model === 'pistol') return 30;
            if (model === 'shotgun') return 50;
            if (model === 'carbine') return 40;
            if (model === 'staff') return 46;
            if (model === 'launcher') return 50;
            if (variant === 'smg') return 40;
            if (variant === 'sniper') return 56;
            if (variant === 'minigun') return 52;
            return 48;
        }

        function getWeaponPalette(weapon) {
            const name = weapon.name;
            let metal = '#B0BEC5';
            let edge = '#ECEFF1';
            let handle = '#6D4C41';
            if (name.includes('木') || name.includes('朽木')) {
                metal = '#9A6A3A'; edge = '#C49A6C'; handle = '#5D3A1A';
            } else if (name.includes('石')) {
                metal = '#78909C'; edge = '#B0BEC5';
            } else if (name.includes('生锈') || name.includes('铁管')) {
                metal = '#8D6E63'; edge = '#BCAAA4';
            } else if (name.includes('寒冰') || name.includes('蓝晶')) {
                metal = '#81D4FA'; edge = '#E1F5FE';
            } else if (name.includes('暗影') || name.includes('虚空') || name.includes('深渊') || name.includes('日蚀')) {
                metal = '#5E35B1'; edge = '#D1C4E9';
            } else if (name.includes('炎') || name.includes('龙') || name.includes('星火')) {
                metal = '#E64A19'; edge = '#FFCC80';
            } else if (name.includes('雷神')) {
                metal = '#FBC02D'; edge = '#FFF9C4';
            } else if (name.includes('圣光') || name.includes('天穹')) {
                metal = '#ECEFF1'; edge = '#80DEEA';
            }
            return { metal, edge, handle, accent: weapon.color, dark: '#263238' };
        }

        function drawMuzzleFlash(ctx, muzzleX, weapon) {
            ctx.save();
            ctx.translate(muzzleX, 0);
            ctx.fillStyle = weapon.model === 'staff' ? weapon.particleColor : '#FFF59D';
            ctx.shadowColor = weapon.particleColor || '#FFB300';
            ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(9, -5);
            ctx.lineTo(6, 0);
            ctx.lineTo(11, 4);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        function drawWeaponModel(ctx, weapon, options = {}) {
            const scale = options.scale || 1;
            const detail = options.detail !== false;
            const p = getWeaponPalette(weapon);
            const model = weapon.model;
            const variant = weapon.visualVariant;
            ctx.save();
            ctx.scale(scale, scale);
            ctx.imageSmoothingEnabled = false;
            ctx.shadowColor = '#080A0F';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;
            if (weapon.rarity !== 'COMMON') {
                ctx.shadowColor = weapon.glowColor;
                ctx.shadowBlur = weapon.rarity === 'LEGENDARY' ? 10 : 5;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;
            }

            if (model === 'sword' || model === 'dagger' || model === 'greatsword') {
                const length = model === 'dagger' ? 22 : model === 'greatsword' ? 46 : 34;
                const half = model === 'greatsword' ? 6 : model === 'dagger' ? 3 : 4;
                ctx.fillStyle = p.handle;
                ctx.fillRect(-13, -3, 13, 6);
                ctx.fillStyle = p.accent;
                ctx.fillRect(-2, -8, 4, 16);
                ctx.fillStyle = p.metal;
                ctx.beginPath();
                ctx.moveTo(1, -half);
                ctx.lineTo(length - 8, -half + 1);
                ctx.lineTo(length, 0);
                ctx.lineTo(length - 8, half - 1);
                ctx.lineTo(1, half);
                ctx.closePath();
                ctx.fill();
                if (detail) {
                    ctx.strokeStyle = p.edge;
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(4, -1);
                    ctx.lineTo(length - 8, -1);
                    ctx.stroke();
                    ctx.fillStyle = p.dark;
                    ctx.fillRect(-12, -1, 7, 2);
                }
            } else if (model === 'axe') {
                ctx.fillStyle = p.handle;
                ctx.fillRect(-12, -2, 43, 5);
                ctx.fillStyle = p.metal;
                ctx.beginPath();
                ctx.moveTo(25, -4); ctx.lineTo(31, -14); ctx.lineTo(44, -11);
                ctx.lineTo(40, 0); ctx.lineTo(44, 11); ctx.lineTo(31, 14); ctx.lineTo(25, 4);
                ctx.closePath(); ctx.fill();
                ctx.fillStyle = p.edge;
                ctx.fillRect(39, -8, 2, 16);
                ctx.fillStyle = p.accent;
                ctx.fillRect(25, -3, 7, 6);
            } else if (model === 'hammer') {
                ctx.fillStyle = p.handle;
                ctx.fillRect(-12, -3, 43, 6);
                ctx.fillStyle = p.dark;
                ctx.fillRect(25, -11, 18, 22);
                ctx.fillStyle = p.metal;
                ctx.fillRect(28, -13, 18, 9);
                ctx.fillRect(28, 4, 18, 9);
                ctx.fillStyle = p.edge;
                ctx.fillRect(31, -10, 9, 2);
                ctx.fillStyle = p.accent;
                ctx.fillRect(29, -2, 12, 4);
            } else if (model === 'scythe') {
                ctx.fillStyle = p.handle;
                ctx.fillRect(-13, -2, 48, 5);
                ctx.strokeStyle = p.metal;
                ctx.lineWidth = 7;
                ctx.beginPath();
                ctx.moveTo(32, 0);
                ctx.quadraticCurveTo(47, -18, 60, -9);
                ctx.stroke();
                ctx.strokeStyle = p.edge;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(34, -2);
                ctx.quadraticCurveTo(48, -14, 58, -9);
                ctx.stroke();
                ctx.fillStyle = p.accent;
                ctx.fillRect(29, -5, 7, 10);
            } else if (model === 'spear') {
                ctx.fillStyle = p.handle;
                ctx.fillRect(-15, -2, 58, 4);
                ctx.fillStyle = p.accent;
                ctx.beginPath();
                ctx.moveTo(32, 2); ctx.lineTo(39, 10); ctx.lineTo(43, 2); ctx.closePath(); ctx.fill();
                ctx.fillStyle = p.metal;
                ctx.beginPath();
                ctx.moveTo(42, -5); ctx.lineTo(56, 0); ctx.lineTo(42, 5); ctx.lineTo(37, 0); ctx.closePath(); ctx.fill();
                ctx.strokeStyle = p.edge;
                ctx.beginPath(); ctx.moveTo(41, 0); ctx.lineTo(52, 0); ctx.stroke();
            } else if (model === 'twinblade') {
                ctx.fillStyle = p.handle;
                ctx.fillRect(-7, -4, 14, 8);
                ctx.fillStyle = p.accent;
                ctx.fillRect(-10, -7, 3, 14);
                ctx.fillRect(7, -7, 3, 14);
                ctx.fillStyle = p.metal;
                ctx.beginPath();
                ctx.moveTo(10, -4); ctx.lineTo(29, -3); ctx.lineTo(36, 0); ctx.lineTo(29, 4); ctx.lineTo(10, 4);
                ctx.lineTo(-10, 4); ctx.lineTo(-29, 4); ctx.lineTo(-36, 0); ctx.lineTo(-29, -3); ctx.lineTo(-10, -4);
                ctx.closePath(); ctx.fill();
                ctx.strokeStyle = p.edge;
                ctx.beginPath(); ctx.moveTo(-30, 0); ctx.lineTo(30, 0); ctx.stroke();
            } else if (model === 'whip') {
                ctx.fillStyle = p.handle;
                ctx.fillRect(-13, -4, 17, 8);
                if (!options.hideFlexible) {
                    ctx.strokeStyle = p.metal;
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(4, 0); ctx.quadraticCurveTo(22, -15, 34, 2); ctx.quadraticCurveTo(44, 17, 54, 3); ctx.stroke();
                    ctx.fillStyle = p.accent;
                    [10, 20, 31, 42, 52].forEach((x, index) => {
                        ctx.beginPath(); ctx.arc(x, index % 2 ? -3 : 2, 2.3, 0, Math.PI * 2); ctx.fill();
                    });
                }
            } else if (model === 'bow') {
                const loaded = options.loaded !== false;
                ctx.strokeStyle = p.metal;
                ctx.lineWidth = 4;
                ctx.beginPath(); ctx.arc(5, 0, 18, -1.18, 1.18); ctx.stroke();
                ctx.strokeStyle = '#ECEFF1';
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(12, -17); ctx.lineTo(loaded ? 1 : 12, 0); ctx.lineTo(12, 17); ctx.stroke();
                ctx.fillStyle = p.handle;
                ctx.fillRect(-4, -2, 14, 4);
                if (loaded) {
                    ctx.fillStyle = p.edge;
                    ctx.fillRect(1, -1, 30, 2);
                    ctx.beginPath(); ctx.moveTo(31, 0); ctx.lineTo(25, -4); ctx.lineTo(25, 4); ctx.closePath(); ctx.fill();
                }
            } else if (model === 'crossbow') {
                const loaded = options.loaded !== false;
                ctx.fillStyle = p.handle;
                ctx.fillRect(-10, -3, 48, 6);
                ctx.fillStyle = p.dark;
                ctx.fillRect(4, 3, 9, 10);
                ctx.strokeStyle = p.metal;
                ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(22, -16); ctx.quadraticCurveTo(8, 0, 22, 16); ctx.stroke();
                ctx.strokeStyle = p.edge;
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(22, -15); ctx.lineTo(loaded ? 10 : 22, 0); ctx.lineTo(22, 15); ctx.stroke();
                if (loaded) {
                    ctx.fillStyle = p.edge;
                    ctx.fillRect(9, -1, 36, 2);
                }
            } else if (model === 'pistol') {
                ctx.fillStyle = p.dark;
                ctx.fillRect(2, 3, 10, 15);
                ctx.fillStyle = p.metal;
                ctx.fillRect(-3, -6, 29, 10);
                ctx.fillStyle = p.edge;
                ctx.fillRect(2, -5, 18, 2);
                ctx.fillStyle = p.accent;
                if (variant === 'revolver') {
                    ctx.beginPath(); ctx.arc(8, 3, 6, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = p.dark; ctx.beginPath(); ctx.arc(8, 3, 2, 0, Math.PI * 2); ctx.fill();
                } else {
                    ctx.fillRect(4, 4, 8, 4);
                }
                ctx.fillStyle = p.dark;
                ctx.fillRect(24, -3, 7, 4);
            } else if (model === 'shotgun') {
                ctx.fillStyle = p.handle;
                ctx.beginPath(); ctx.moveTo(-12, -4); ctx.lineTo(3, -6); ctx.lineTo(8, 3); ctx.lineTo(-8, 6); ctx.closePath(); ctx.fill();
                ctx.fillStyle = p.dark;
                ctx.fillRect(6, -6, 26, 12);
                ctx.fillStyle = p.metal;
                ctx.fillRect(26, -5, 25, 4);
                ctx.fillRect(26, 1, 25, 4);
                ctx.fillStyle = p.accent;
                ctx.fillRect(12, -4, 10, 8);
            } else if (model === 'staff') {
                ctx.fillStyle = p.handle;
                ctx.fillRect(-13, -3, 49, 6);
                ctx.strokeStyle = p.accent;
                ctx.lineWidth = 3;
                ctx.beginPath(); ctx.arc(39, 0, 9, 0, Math.PI * 2); ctx.stroke();
                ctx.fillStyle = weapon.particleColor;
                ctx.shadowColor = weapon.particleColor; ctx.shadowBlur = 12;
                ctx.beginPath(); ctx.arc(39, 0, 5, 0, Math.PI * 2); ctx.fill();
            } else if (model === 'launcher') {
                ctx.fillStyle = p.handle;
                ctx.fillRect(-10, 3, 18, 9);
                ctx.fillStyle = p.dark;
                ctx.fillRect(-6, -8, 50, 16);
                ctx.fillStyle = p.metal;
                ctx.fillRect(2, -6, 43, 12);
                ctx.fillStyle = p.accent;
                ctx.fillRect(8, -8, 9, 16);
                ctx.fillRect(35, -8, 7, 16);
                ctx.fillStyle = p.edge;
                ctx.fillRect(43, -4, 8, 8);
            } else {
                const compact = model === 'carbine' || variant === 'smg';
                const long = variant === 'sniper';
                const barrelEnd = long ? 57 : compact ? 40 : 49;
                ctx.fillStyle = p.handle;
                ctx.beginPath(); ctx.moveTo(-12, -4); ctx.lineTo(3, -7); ctx.lineTo(8, 3); ctx.lineTo(-8, 7); ctx.closePath(); ctx.fill();
                ctx.fillStyle = p.dark;
                ctx.fillRect(5, 3, 10, 12);
                ctx.fillStyle = p.metal;
                ctx.fillRect(1, -7, compact ? 31 : 39, 12);
                ctx.fillRect(compact ? 30 : 38, -3, barrelEnd - (compact ? 30 : 38), 5);
                ctx.fillStyle = p.accent;
                ctx.fillRect(10, -9, compact ? 12 : 22, 4);
                if (variant === 'railgun') {
                    ctx.strokeStyle = p.edge; ctx.lineWidth = 2;
                    [17, 24, 31].forEach(x => { ctx.beginPath(); ctx.arc(x, -1, 5, 0, Math.PI * 2); ctx.stroke(); });
                } else if (variant === 'minigun') {
                    ctx.fillStyle = p.dark;
                    ctx.fillRect(30, -6, 22, 3); ctx.fillRect(30, 0, 22, 3); ctx.fillRect(30, 6, 22, 3);
                } else if (variant === 'sniper') {
                    ctx.fillStyle = p.dark; ctx.fillRect(15, -14, 22, 4);
                    ctx.fillStyle = p.edge; ctx.fillRect(35, -2, 22, 2);
                }
            }
            if (detail) {
                ctx.shadowBlur = 0;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;
                // 统一的皮革缠柄与稀有符文，使模型保持写实像素武器语言。
                ctx.strokeStyle = p.edge;
                ctx.lineWidth = 1;
                for (let wrap = -9; wrap <= -1; wrap += 4) {
                    ctx.beginPath(); ctx.moveTo(wrap, -3); ctx.lineTo(wrap + 3, 3); ctx.stroke();
                }
                if (weapon.rarity === 'LEGENDARY') {
                    ctx.fillStyle = weapon.particleColor;
                    ctx.globalAlpha = 0.9;
                    ctx.beginPath(); ctx.moveTo(2, -4); ctx.lineTo(6, 0); ctx.lineTo(2, 4); ctx.lineTo(-2, 0); ctx.closePath(); ctx.fill();
                }
            }
            ctx.restore();
        }

        function drawWeaponIcon(ctx, x, y, weapon) {
            ctx.save();
            const longModel = ['spear', 'scythe', 'whip', 'rifle', 'shotgun', 'launcher', 'crossbow'].includes(weapon.model);
            const iconScale = ['scythe', 'whip'].includes(weapon.model) ? 0.92 : longModel ? 1.02 : 1.2;
            ctx.translate(x + 31, y + (['scythe', 'whip'].includes(weapon.model) ? 40 : 35));
            if (!weapon.isRanged) ctx.rotate(weapon.model === 'twinblade' ? -0.25 : -0.72);
            drawWeaponModel(ctx, weapon, { scale: iconScale, detail: true });
            ctx.restore();
        }

        // ============ 游戏初始化 ============
        generateMap();
        generateClouds();

        const player = new Player(100, 200);
        let enemies = [];

        const ENEMY_SPAWN_TABLE = [
            { type: 'zombie', minWave: 1, weight: 34 },
            { type: 'runner', minWave: 2, weight: 18 },
            { type: 'tank', minWave: 2, weight: 18 },
            { type: 'shooter', minWave: 3, weight: 16 },
            { type: 'leaper', minWave: 4, weight: 14 },
            { type: 'warden', minWave: 3, weight: 16 },
            { type: 'prism', minWave: 5, weight: 13 }
        ];

        function chooseEnemyType(wave, spawnedTypeCounts = {}) {
            const available = ENEMY_SPAWN_TABLE.filter(entry => {
                if (wave < entry.minWave) return false;
                const spawnCap = ENEMY_TYPES[entry.type]?.spawnCap;
                return spawnCap === undefined || (spawnedTypeCounts[entry.type] || 0) < spawnCap;
            });
            if (available.length === 0) return 'zombie';
            let roll = Math.random() * available.reduce((sum, entry) => sum + entry.weight, 0);
            for (const entry of available) {
                roll -= entry.weight;
                if (roll <= 0) return entry.type;
            }
            return 'zombie';
        }

        function findGroundYAt(x, entityHeight) {
            const tx = Math.max(0, Math.min(MAP_WIDTH - 1, Math.floor(x / CONFIG.TILE_SIZE)));
            // 从底部向上寻找与主地面连通的表面，忽略可能无法跳上的浮空平台。
            let ty = MAP_HEIGHT - 1;
            while (ty >= 0 && !(tiles[ty] && tiles[ty][tx] > 0)) ty--;
            if (ty < 0) return (MAP_HEIGHT - 2) * CONFIG.TILE_SIZE - entityHeight;
            while (ty > 0 && tiles[ty - 1] && tiles[ty - 1][tx] > 0) ty--;
            return ty * CONFIG.TILE_SIZE - entityHeight;
        }

        function getEnemyCountForWave(wave) {
            return Math.min(
                CONFIG.MAX_ENEMIES_PER_WAVE,
                CONFIG.BASE_ENEMIES_PER_WAVE + Math.floor((wave - 1) * 1.35)
            );
        }

        function positionPlayerAtWaveEntrance(random = Math.random) {
            const worldWidth = MAP_WIDTH * CONFIG.TILE_SIZE;
            player.x = worldWidth / 2 - player.width / 2;
            player.y = findGroundYAt(worldWidth / 2, player.height) - 2;
            player.facing = random() < 0.5 ? -1 : 1;
            mapTravelDirection = 0;
            player.vx = 0;
            player.vy = 0;
            player.resetMapPassives();
        }

        function getReachableChestSpots() {
            const spots = [];
            const marginTiles = 7;
            const centerX = MAP_WIDTH * CONFIG.TILE_SIZE / 2;
            for (let tx = marginTiles; tx < MAP_WIDTH - marginTiles; tx++) {
                const x = tx * CONFIG.TILE_SIZE + CONFIG.TILE_SIZE / 2;
                if (Math.abs(x - centerX) < 300) continue;
                const groundY = findGroundYAt(x, 0);
                const leftY = findGroundYAt((tx - 1) * CONFIG.TILE_SIZE + 16, 0);
                const rightY = findGroundYAt((tx + 1) * CONFIG.TILE_SIZE + 16, 0);
                if (groundY !== leftY || groundY !== rightY) continue;
                const groundTileY = Math.round(groundY / CONFIG.TILE_SIZE);
                const hasHeadroom = [-1, 0, 1].every(columnOffset =>
                    [1, 2].every(rowOffset => !tiles[groundTileY - rowOffset]?.[tx + columnOffset]));
                if (hasHeadroom) spots.push({ x: x - 17, y: groundY - 24 });
            }
            return spots;
        }

        function createTreasureChestForWave(wave, random = Math.random) {
            if (isBossWave(wave) || random() >= 0.82) return null;
            const isMimic = random() < 0.22;
            const spots = getReachableChestSpots();
            const fallbackX = 7 * CONFIG.TILE_SIZE;
            const spot = spots.length > 0
                ? spots[Math.min(spots.length - 1, Math.floor(random() * spots.length))]
                : { x: fallbackX, y: findGroundYAt(fallbackX, 24) };
            const chest = new TreasureChest(spot.x, spot.y, wave, isMimic, rollBirchCoinReward(random));
            return chest;
        }

        // 根据波次生成敌人
        function spawnEnemiesForWave() {
            enemies = [];
            activeBoss = null;
            projectiles.length = 0;
            waveCompletionHandled = false;
            waveObjective = 'combat';
            chestPromptShown = false;

            // 每波刷新主题与地图
            const biome = pickBiomeForWave(currentWave);
            generateMap(biome);
            generateClouds();
            spawnWeatherParticles(currentBiome.weather);
            runStats.highestWave = Math.max(runStats.highestWave, currentWave);
            positionPlayerAtWaveEntrance();
            treasureChest = null;

            // Boss 波
            if (isBossWave(currentWave)) {
                totalEnemiesInWave = 1;
                enemiesRemaining = 1;
                activeBoss = new BirchCorruptBoss(currentWave);
                startBossMusic();
                announce(`第 ${currentWave} 波，Boss 白桦腐竹来袭。`);
                return;
            }

            startMusic(currentBiome.musicKey);

            treasureChest = createTreasureChestForWave(currentWave);
            // 宝箱怪也计入 20 只硬上限；高波次为它预留一个隐藏名额。
            const enemyCount = Math.max(1, getEnemyCountForWave(currentWave) - (treasureChest?.isMimic ? 1 : 0));
            
            const margin = 4 * CONFIG.TILE_SIZE;
            const minX = margin;
            const maxX = MAP_WIDTH * CONFIG.TILE_SIZE - margin;
            const centerX = MAP_WIDTH * CONFIG.TILE_SIZE / 2;
            const spawnGap = 240;
            const spawnedTypeCounts = Object.create(null);

            for (let i = 0; i < enemyCount; i++) {
                const side = i % 2 === 0 ? -1 : 1;
                const zoneStart = side < 0 ? minX : centerX + spawnGap;
                const zoneEnd = side < 0 ? centerX - spawnGap : maxX;
                const x = zoneStart + Math.random() * Math.max(CONFIG.TILE_SIZE, zoneEnd - zoneStart);

                const type = chooseEnemyType(currentWave, spawnedTypeCounts);
                const enemy = new Enemy(x, 0, currentWave, type);
                enemy.y = findGroundYAt(x, enemy.height);
                enemies.push(enemy);
                spawnedTypeCounts[enemy.type] = (spawnedTypeCounts[enemy.type] || 0) + 1;
            }

            // 兜底：若意外未生成，强制生成 3 个僵尸在玩家附近
            if (enemies.length === 0) {
                for (let i = 0; i < 3; i++) {
                    const side = i % 2 === 0 ? -1 : 1;
                    const x = centerX + side * (spawnGap + i * 60);
                    const enemy = new Enemy(Math.min(maxX, Math.max(minX, x)), 0, currentWave, 'zombie');
                    enemy.y = findGroundYAt(enemy.x, enemy.height);
                    enemies.push(enemy);
                }
            }

            totalEnemiesInWave = enemies.length;
            enemiesRemaining = enemies.length;
            announce(`第 ${currentWave} 波开始，中央迎战、左右来敌，共 ${enemiesRemaining} 个敌人${treasureChest ? '，地图中有一个可攻击的宝箱' : ''}。`);
        }
        
        // 初始化为标题界面
        resetToTitle();

        // ============ 输入处理 ============
        window.addEventListener('keydown', e => {
            initAudio();

            if (gameState === 'title') {
                if (!e.repeat && (e.code === 'Enter' || e.code === 'Space')) {
                    e.preventDefault();
                    disableTouchMode();
                    restartGame();
                }
                return;
            }

            if (passiveDetailsOpen) {
                if (e.repeat) return;
                if (e.code === 'Escape' || e.code === 'KeyP') {
                    e.preventDefault();
                    closePassiveDetails();
                } else if (/^(Digit|Numpad)[1-4]$/.test(e.code)) {
                    e.preventDefault();
                    selectedPassiveSlot = Number(e.code.slice(-1)) - 1;
                }
                return;
            }

            if (gameState === 'playing' && e.code === 'KeyP' && !pagePaused) {
                if (e.repeat) return;
                e.preventDefault();
                openPassiveDetails(0);
                return;
            }

            if (gameState === 'playing' && e.code === 'Escape') {
                if (e.repeat) return;
                e.preventDefault();
                toggleManualPause();
                return;
            }

            if (pagePaused) return;

            if (gameState === 'reward') {
                if (e.repeat) return;
                if (currentRewardType === 'shop') {
                    if (handleShopKey(e.code)) {
                        e.preventDefault();
                        if (gameState === 'reward' && currentRewardType === 'shop') updateHoveredChoice();
                    }
                    return;
                }
                if (/^(Digit|Numpad)[1-3]$/.test(e.code)) {
                    e.preventDefault();
                    chooseReward(Number(e.code.slice(-1)) - 1);
                } else if (currentRewardType === 'weapon' && e.code === 'KeyF') {
                    e.preventDefault();
                    refreshWeaponReward();
                } else if (currentRewardType === 'weapon' && (e.code === 'KeyS' || e.code === 'Digit0' || e.code === 'Numpad0')) {
                    e.preventDefault();
                    skipWeaponReward();
                }
                return;
            }

            if (gameState === 'win') {
                if (e.repeat) return;
                if (e.code === 'KeyE' || e.code === 'Enter') startEndlessMode();
                if (e.code === 'Escape') resetToTitle();
                return;
            }

            if (gameState === 'gameover') {
                if (e.repeat) return;
                if (e.code === 'Enter') restartGame();
                if (e.code === 'Escape') resetToTitle();
                return;
            }

            keys[e.code] = true;
            if (['Space', 'ArrowUp', 'ArrowDown'].includes(e.code)) {
                e.preventDefault();
            }
        });

        window.addEventListener('keyup', e => {
            keys[e.code] = false;
        });

        touchButtons.forEach(btn => {
            const action = btn.dataset.action;
            const setActive = (state, event) => {
                if (state && pagePaused) return;
                if (action === 'attack') {
                    setAttackPointers(touchAttackPointerIds, event, state);
                    return;
                }
                touchActive[action] = state;
                if (action === 'left') keys['KeyA'] = state;
                if (action === 'right') keys['KeyD'] = state;
                if (action === 'jump') keys['Space'] = state;
                if (action === 'reload' && state && gameState === 'playing') player.startReload();
                if (action === 'heal') keys['KeyU'] = state;
            };
            const start = e => {
                e.preventDefault();
                e.stopPropagation();
                if (btn.setPointerCapture && e.pointerId !== undefined) btn.setPointerCapture(e.pointerId);
                setActive(true, e);
            };
            const end = e => {
                e.preventDefault();
                e.stopPropagation();
                setActive(false, e);
            };
            btn.addEventListener('pointerdown', start);
            btn.addEventListener('pointerup', end);
            btn.addEventListener('pointercancel', end);
            btn.addEventListener('lostpointercapture', end);
            if (!window.PointerEvent) {
                btn.addEventListener('touchstart', start, { passive: false });
                btn.addEventListener('touchend', end, { passive: false });
                btn.addEventListener('touchcancel', end, { passive: false });
            }
        });

        const preventTouchSelection = e => {
            e.preventDefault();
            e.stopPropagation();
        };
        ['contextmenu', 'selectstart', 'dragstart'].forEach(eventName => {
            touchControlsEl.addEventListener(eventName, preventTouchSelection);
        });
        fullscreenButtonEl.addEventListener('click', e => {
            e.preventDefault();
            e.stopPropagation();
            requestFullscreenIfPossible();
        });
        touchPauseButtonEl.addEventListener('click', e => {
            e.preventDefault();
            e.stopPropagation();
            toggleManualPause();
        });
        pauseContinueButtonEl.addEventListener('click', () => {
            setManualPaused(false);
        });
        pauseRestartButtonEl.addEventListener('click', () => {
            restartGame();
            announce('远征已重新开始。');
        });
        volumeSliderEl.addEventListener('input', () => {
            const value = Math.max(0, Math.min(100, Number(volumeSliderEl.value) || 0));
            masterVolume = value / 100;
            volumeValueEl.textContent = `${Math.round(value)}%`;
            applyMasterVolume();
        });
        touchSizeSliderEl.addEventListener('input', () => {
            const value = Math.max(75, Math.min(135, Number(touchSizeSliderEl.value) || 100));
            touchControlScale = value / 100;
            touchSizeValueEl.textContent = `${Math.round(value)}%`;
            updateTouchControlsLayout();
        });

        canvas.addEventListener('pointerdown', e => {
            if (e.button !== 0 && e.pointerType !== 'touch') return;
            e.preventDefault();
            if (canvas.setPointerCapture) canvas.setPointerCapture(e.pointerId);
            const pos = getCanvasCoords(e.clientX, e.clientY);
            mouseX = pos.x; mouseY = pos.y;
            if (gameState === 'title') {
                // 非鼠标指针要等到 pointerup 才获得可用于全屏的瞬时用户激活。
                if (e.pointerType === 'mouse') handleTitleClick(e);
                return;
            }
            initAudio();
            if (passiveDetailsOpen) {
                handlePassiveDetailsClick(mouseX, mouseY);
                return;
            }
            if (pagePaused) return;
            if (gameState === 'reward') {
                updateHoveredChoice();
                handleRewardClick();
                return;
            }
            if (gameState === 'gameover') {
                handleGameOverClick(e);
                return;
            }
            if (gameState === 'win') {
                handleWinClick(e);
                return;
            }
            if (gameState === 'playing') {
                const passiveSlot = hitTestPassiveHud(mouseX, mouseY);
                if (passiveSlot >= 0) {
                    openPassiveDetails(passiveSlot);
                    return;
                }
                setAttackPointers(canvasAttackPointerIds, e, true);
            }
        });

        const releasePointerAttack = event => {
            for (const pointerId of getInputPointerIds(event)) {
                canvasAttackPointerIds.delete(pointerId);
                touchAttackPointerIds.delete(pointerId);
            }
            syncPointerAttackState();
        };

        canvas.addEventListener('pointerup', e => {
            releasePointerAttack(e);
            if (gameState === 'title' && e.pointerType !== 'mouse') {
                handleTitleClick(e);
            }
        });
        canvas.addEventListener('pointercancel', releasePointerAttack);
        canvas.addEventListener('lostpointercapture', releasePointerAttack);
        window.addEventListener('pointerup', releasePointerAttack);

        if (!window.PointerEvent) {
            canvas.addEventListener('touchend', e => {
                const touch = e.changedTouches && e.changedTouches[0];
                if (!touch) return;
                e.preventDefault();
                const syntheticPointer = {
                    clientX: touch.clientX,
                    clientY: touch.clientY,
                    pointerType: 'touch'
                };
                const pos = getCanvasCoords(touch.clientX, touch.clientY);
                mouseX = pos.x;
                mouseY = pos.y;

                if (gameState === 'title') {
                    handleTitleClick(syntheticPointer);
                    return;
                }

                initAudio();
                if (passiveDetailsOpen) {
                    handlePassiveDetailsClick(mouseX, mouseY);
                    return;
                }
                if (pagePaused) return;
                if (gameState === 'reward') {
                    updateHoveredChoice();
                    handleRewardClick();
                } else if (gameState === 'gameover') {
                    handleGameOverClick(syntheticPointer);
                } else if (gameState === 'win') {
                    handleWinClick(syntheticPointer);
                } else if (gameState === 'playing') {
                    const passiveSlot = hitTestPassiveHud(mouseX, mouseY);
                    if (passiveSlot >= 0) openPassiveDetails(passiveSlot);
                }
            }, { passive: false });
            touchControlsEl.addEventListener('touchmove', e => {
                e.preventDefault();
            }, { passive: false });
        }

        canvas.addEventListener('pointermove', e => {
            if (e.pointerType === 'touch') e.preventDefault();
            const pos = getCanvasCoords(e.clientX, e.clientY);
            mouseX = pos.x;
            mouseY = pos.y;
            
            // 更新悬停状态
            if (gameState === 'reward') {
                updateHoveredChoice();
            }
            const interactivePassive = passiveDetailsOpen
                ? isInsideButton(mouseX, mouseY, PASSIVE_DETAIL_CLOSE) || PASSIVE_DETAIL_RECTS.some(rect => isInsideButton(mouseX, mouseY, rect))
                : gameState === 'playing' && hitTestPassiveHud(mouseX, mouseY) >= 0;
            canvas.style.cursor = interactivePassive ? 'pointer' : 'crosshair';
        });

        function returnToShopMenu(message = '已返回白桦商店。') {
            shopView = 'menu';
            shopChoices = [];
            shopPackTier = null;
            shopRefreshAvailable = false;
            shopPage = 0;
            pendingPassive = null;
            shopMessage = message;
        }

        function handleShopKey(code) {
            const numberMatch = code.match(/^(?:Digit|Numpad)([1-6])$/);
            const number = numberMatch ? Number(numberMatch[1]) : 0;
            if (shopView === 'menu') {
                if (number === 1) return openShopWeaponView();
                if (number === 2) return openShopFragmentView();
                if (number === 3) return openShopPassivePack('SILVER');
                if (number === 4) return openShopPassivePack('GOLD');
                if (number === 5) return openShopPassivePack('PRISMATIC');
                if (number === 6 || code === 'KeyS' || code === 'Escape') return leaveBirchShop();
                return false;
            }
            if (shopView === 'weapon') {
                if (number >= 1 && number <= 3) return buyShopLegendary(number - 1);
                if (code === 'ArrowLeft') {
                    shopPage = Math.max(0, shopPage - 1);
                    return true;
                }
                if (code === 'ArrowRight') {
                    shopPage = Math.min(Math.ceil(shopChoices.length / 3) - 1, shopPage + 1);
                    return true;
                }
                if (code === 'KeyS' || code === 'Escape') {
                    returnToShopMenu('未更换武器。');
                    return true;
                }
                return false;
            }
            if (shopView === 'fragment') {
                if (number >= 1 && number <= 3) return claimShopFragment(number - 1);
                if (code === 'KeyS' || code === 'Escape') {
                    returnToShopMenu('已放弃本次免费碎片。');
                    return true;
                }
                return false;
            }
            if (shopView === 'passive') {
                if (number >= 1 && number <= 3) return chooseShopPassive(number - 1);
                if (code === 'KeyF') return refreshShopPassivePack();
                if (code === 'KeyS' || code === 'Escape') {
                    returnToShopMenu('已放弃本次技能包，费用不退还。');
                    return true;
                }
                return false;
            }
            if (shopView === 'replace') {
                if (number >= 1 && number <= 4) return replaceShopPassive(number - 1);
                if (code === 'KeyS' || code === 'Escape') {
                    returnToShopMenu('已放弃新被动，原有四个槽位保持不变。');
                    return true;
                }
            }
            return false;
        }

        function handleShopClick() {
            if (shopView === 'menu') {
                if (isInsideButton(mouseX, mouseY, SHOP_MENU_BUTTONS.weapon)) return openShopWeaponView();
                if (isInsideButton(mouseX, mouseY, SHOP_MENU_BUTTONS.fragment)) return openShopFragmentView();
                if (isInsideButton(mouseX, mouseY, SHOP_MENU_BUTTONS.silver)) return openShopPassivePack('SILVER');
                if (isInsideButton(mouseX, mouseY, SHOP_MENU_BUTTONS.gold)) return openShopPassivePack('GOLD');
                if (isInsideButton(mouseX, mouseY, SHOP_MENU_BUTTONS.prismatic)) return openShopPassivePack('PRISMATIC');
                if (isInsideButton(mouseX, mouseY, SHOP_MENU_BUTTONS.leave)) return leaveBirchShop();
                return false;
            }

            if (shopView === 'weapon') {
                const rects = getShopChoiceRects(3);
                for (let index = 0; index < rects.length; index++) {
                    if (isInsideButton(mouseX, mouseY, rects[index])) return buyShopLegendary(index);
                }
                if (isInsideButton(mouseX, mouseY, SHOP_ACTION_BUTTONS.back)) {
                    returnToShopMenu('未更换武器。'); return true;
                }
                if (isInsideButton(mouseX, mouseY, SHOP_ACTION_BUTTONS.previous) && shopPage > 0) {
                    shopPage--; return true;
                }
                const pageCount = Math.ceil(shopChoices.length / 3);
                if (isInsideButton(mouseX, mouseY, SHOP_ACTION_BUTTONS.next) && shopPage < pageCount - 1) {
                    shopPage++; return true;
                }
                return false;
            }

            if (shopView === 'fragment') {
                const rects = getShopChoiceRects(shopChoices.length);
                for (let index = 0; index < rects.length; index++) {
                    if (isInsideButton(mouseX, mouseY, rects[index])) return claimShopFragment(index);
                }
                if (isInsideButton(mouseX, mouseY, SHOP_ACTION_BUTTONS.back)) {
                    returnToShopMenu('已放弃本次免费碎片。'); return true;
                }
                return false;
            }

            if (shopView === 'passive') {
                const rects = getShopChoiceRects(shopChoices.length);
                for (let index = 0; index < rects.length; index++) {
                    if (isInsideButton(mouseX, mouseY, rects[index])) return chooseShopPassive(index);
                }
                if (isInsideButton(mouseX, mouseY, SHOP_ACTION_BUTTONS.refresh)) return refreshShopPassivePack();
                if (isInsideButton(mouseX, mouseY, SHOP_ACTION_BUTTONS.skip)) {
                    returnToShopMenu('已放弃本次技能包，费用不退还。'); return true;
                }
                return false;
            }

            if (shopView === 'replace') {
                const width = 190;
                const gap = 28;
                const startX = (CONFIG.CANVAS_WIDTH - (width * 4 + gap * 3)) / 2;
                for (let index = 0; index < 4; index++) {
                    const rect = { x: startX + index * (width + gap), y: 158, w: width, h: 248 };
                    if (isInsideButton(mouseX, mouseY, rect)) return replaceShopPassive(index);
                }
                if (isInsideButton(mouseX, mouseY, SHOP_ACTION_BUTTONS.skip)) {
                    returnToShopMenu('已放弃新被动，原有槽位保持不变。'); return true;
                }
            }
            return false;
        }

        function isShopPointInteractive(mx, my) {
            if (shopView === 'menu') {
                const targets = [
                    [SHOP_MENU_BUTTONS.weapon, birchCoins >= 2],
                    [SHOP_MENU_BUTTONS.fragment, !shopFragmentClaimed],
                    [SHOP_MENU_BUTTONS.silver, birchCoins >= PASSIVE_TIERS.SILVER.cost],
                    [SHOP_MENU_BUTTONS.gold, birchCoins >= PASSIVE_TIERS.GOLD.cost],
                    [SHOP_MENU_BUTTONS.prismatic, birchCoins >= PASSIVE_TIERS.PRISMATIC.cost],
                    [SHOP_MENU_BUTTONS.leave, true]
                ];
                return targets.some(([rect, enabled]) => enabled && isInsideButton(mx, my, rect));
            }
            if (shopView === 'weapon') {
                const pageCount = Math.max(1, Math.ceil(shopChoices.length / 3));
                const visibleCount = shopChoices.slice(shopPage * 3, shopPage * 3 + 3).length;
                const overCard = getShopChoiceRects(3)
                    .slice(0, visibleCount)
                    .some(rect => isInsideButton(mx, my, rect));
                return overCard
                    || isInsideButton(mx, my, SHOP_ACTION_BUTTONS.back)
                    || (shopPage > 0 && isInsideButton(mx, my, SHOP_ACTION_BUTTONS.previous))
                    || (shopPage < pageCount - 1 && isInsideButton(mx, my, SHOP_ACTION_BUTTONS.next));
            }
            if (shopView === 'fragment') {
                return getShopChoiceRects(shopChoices.length).some(rect => isInsideButton(mx, my, rect))
                    || isInsideButton(mx, my, SHOP_ACTION_BUTTONS.back);
            }
            if (shopView === 'passive') {
                return getShopChoiceRects(shopChoices.length).some(rect => isInsideButton(mx, my, rect))
                    || (shopRefreshAvailable && isInsideButton(mx, my, SHOP_ACTION_BUTTONS.refresh))
                    || isInsideButton(mx, my, SHOP_ACTION_BUTTONS.skip);
            }
            if (shopView === 'replace') {
                const width = 190;
                const gap = 28;
                const startX = (CONFIG.CANVAS_WIDTH - (width * 4 + gap * 3)) / 2;
                const overSlot = player.passives.some((entry, index) => isInsideButton(mx, my, {
                    x: startX + index * (width + gap), y: 158, w: width, h: 248
                }));
                return overSlot || isInsideButton(mx, my, SHOP_ACTION_BUTTONS.skip);
            }
            return false;
        }

        function updateHoveredChoice() {
            if (currentRewardType === 'shop') {
                hoveredChoice = -1;
                hoveredRewardAction = null;
                canvas.style.cursor = isShopPointInteractive(mouseX, mouseY) ? 'pointer' : 'default';
                return;
            }
            const cardWidth = 250;
            const cardHeight = 280;
            const cardSpacing = 30;
            const startX = (CONFIG.CANVAS_WIDTH - (cardWidth * 3 + cardSpacing * 2)) / 2;
            const cardY = 155;

            hoveredChoice = -1;
            hoveredRewardAction = null;
            const pool = currentRewardType === 'weapon' ? weaponChoices : enchantChoices;
            pool.forEach((weapon, index) => {
                const cardX = startX + index * (cardWidth + cardSpacing);
                if (mouseX >= cardX && mouseX <= cardX + cardWidth &&
                    mouseY >= cardY && mouseY <= cardY + cardHeight) {
                    hoveredChoice = index;
                }
            });

            if (currentRewardType === 'weapon') {
                for (const [action, rect] of Object.entries(WEAPON_REWARD_BUTTONS)) {
                    if (action === 'refresh' && !weaponRewardRefreshAvailable) continue;
                    if (isInsideButton(mouseX, mouseY, rect)) {
                        hoveredRewardAction = action;
                        hoveredChoice = -1;
                        break;
                    }
                }
            }
            canvas.style.cursor = hoveredChoice >= 0 || hoveredRewardAction ? 'pointer' : 'default';
        }

        function handleRewardClick() {
            if (currentRewardType === 'shop') {
                handleShopClick();
                if (gameState === 'reward' && currentRewardType === 'shop') updateHoveredChoice();
                return;
            }
            if (hoveredRewardAction === 'refresh') {
                refreshWeaponReward();
                return;
            }
            if (hoveredRewardAction === 'skip') {
                skipWeaponReward();
                return;
            }
            chooseReward(hoveredChoice);
        }

        function refreshWeaponReward() {
            if (gameState !== 'reward' || currentRewardType !== 'weapon') return false;
            if (!weaponRewardRefreshAvailable) {
                announce('本次武器奖励的刷新机会已经使用。');
                return false;
            }
            weaponRewardRefreshAvailable = false;
            const minRarity = player.weapon ? player.weapon.rarity : 'COMMON';
            const previousNames = weaponChoices.map(weapon => weapon.name);
            const refreshedChoices = generateWeaponChoices(3, minRarity, previousNames);
            if (refreshedChoices.length !== 3) {
                weaponRewardRefreshAvailable = true;
                return false;
            }
            weaponChoices = refreshedChoices;
            hoveredChoice = -1;
            hoveredRewardAction = null;
            announce(`武器已全部刷新：${weaponChoices.map(weapon => weapon.name).join('、')}。`);
            return true;
        }

        function skipWeaponReward() {
            if (gameState !== 'reward' || currentRewardType !== 'weapon') return false;
            advanceRewardFlow();
            return true;
        }

        function advanceRewardFlow() {
            weaponRewardRefreshAvailable = false;
            hoveredChoice = -1;
            hoveredRewardAction = null;
            if (rewardQueue.length > 0) {
                openNextReward();
            } else {
                startNextWave();
            }
        }

        function chooseReward(index) {
            const pool = currentRewardType === 'weapon' ? weaponChoices : enchantChoices;
            if (index < 0 || index >= pool.length || gameState !== 'reward') return;
            if (currentRewardType === 'weapon') {
                player.setWeapon(pool[index]);
                runStats.weaponsClaimed++;
                if (gameMode === 'endless') runStats.endlessWeaponsClaimed++;
                if (player.weapon.rarity === 'LEGENDARY') {
                    openBirchShop();
                    return;
                }
            } else {
                applyEnchantment(pool[index]);
                runStats.fragmentsClaimed++;
                if (gameMode === 'endless') runStats.endlessFragmentsClaimed++;
            }

            advanceRewardFlow();
        }

        function handleTitleClick(e) {
            const pos = getCanvasCoords(e.clientX, e.clientY);
            const mx = pos.x;
            const my = pos.y;
            if (isInsideButton(mx, my, TITLE_BUTTONS.start)) {
                initAudio();
                disableTouchMode();
                restartGame();
                return;
            }
            if (isInsideButton(mx, my, TITLE_BUTTONS.touch)) {
                // 必须作为手势链中的第一个受限 API 调用，避免音频初始化抢先占用激活状态。
                requestFullscreenIfPossible();
                initAudio();
                enableTouchMode(false);
                restartGame();
                return;
            }
        }

        function handleWinClick(e) {
            const pos = getCanvasCoords(e.clientX, e.clientY);
            if (isInsideButton(pos.x, pos.y, WIN_BUTTONS.endless)) {
                startEndlessMode();
                return;
            }
            if (isInsideButton(pos.x, pos.y, WIN_BUTTONS.title)) {
                resetToTitle();
            }
        }

        function handleGameOverClick(e) {
            const pos = getCanvasCoords(e.clientX, e.clientY);
            if (isInsideButton(pos.x, pos.y, GAMEOVER_BUTTONS.restart)) {
                restartGame();
                return;
            }
            if (isInsideButton(pos.x, pos.y, GAMEOVER_BUTTONS.title)) resetToTitle();
        }

        function isInsideButton(mx, my, btn) {
            return mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h;
        }

        canvas.addEventListener('contextmenu', e => e.preventDefault());

        function isSolidAtWorld(x, y) {
            const tx = Math.floor(x / CONFIG.TILE_SIZE);
            const ty = Math.floor(y / CONFIG.TILE_SIZE);
            return Boolean(tiles[ty] && tiles[ty][tx] > 0);
        }

        // ============ 游戏循环 ============
        function update() {
            if (gameState !== 'playing') return;
            
            // 更新玩家
            player.update();
            if (gameState !== 'playing') return;
            treasureChest?.update();

            // 更新敌人
            for (const enemy of enemies) {
                enemy.update(player);
                if (gameState !== 'playing') return;

                // 检测攻击命中
                const attackBox = player.getAttackBox();
                const meleeToken = `melee-${player.attackSequence}`;
                if (attackBox && enemy.alive && enemy.lastHitToken !== meleeToken) {
                    if (player.attackIntersects(enemy)) {
                        const didHit = enemy.takeDamage(player.getAttackDamage(), player.facing, player.getAttackKnockback(), meleeToken, 9, { source: 'weapon' });
                        if (didHit) playSfx(`hit_${player.weapon.model || 'sword'}`);
                        
                        // 传说武器命中粒子
                        if (didHit && player.weapon.hasParticles) {
                            spawnAttackParticles(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, player.weapon.particleColor, 15);
                        }
                    }
                }
                if (gameState !== 'playing') return;
            }

            if (treasureChest?.alive) {
                const attackBox = player.getAttackBox();
                const meleeToken = `melee-${player.attackSequence}`;
                if (attackBox && treasureChest.lastHitToken !== meleeToken && player.attackIntersects(treasureChest)) {
                    treasureChest.takeDamage(meleeToken);
                }
            }

            // 敌人掉出地图视为死亡
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                if (e.alive && e.y > MAP_HEIGHT * CONFIG.TILE_SIZE + 200) {
                    e.alive = false;
                    enemiesRemaining = Math.max(0, enemiesRemaining - 1);
                    recordKill(e);
                    if (e.type === 'mimic') awardBirchCoins(e.coinDrop || rollBirchCoinReward(), e.x, player.y);
                }
            }

            // 更新 Boss；玩家死亡优先于本帧后续结算。
            if (activeBoss && activeBoss.alive) {
                activeBoss.update(player);
                if (gameState !== 'playing') return;
                const attackBox = player.getAttackBox();
                const meleeToken = `melee-${player.attackSequence}`;
                if (attackBox && activeBoss.lastHitToken !== meleeToken && player.attackIntersects(activeBoss)) {
                    const didHit = activeBoss.takeDamage(player.getAttackDamage(), player.facing, player.getAttackKnockback(), meleeToken, 8, { source: 'weapon' });
                    if (didHit) playSfx(`hit_${player.weapon.model || 'sword'}`);
                    if (gameState !== 'playing') return;
                }
            }

            // 更新投射物
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                if (!p.update() || isSolidAtWorld(p.x, p.y)) {
                    if (isSolidAtWorld(p.x, p.y)) spawnImpactParticles(p.x, p.y, p.color, 4, 0.35);
                    projectiles.splice(i, 1);
                    continue;
                }
                // 碰撞检测
                if (p.owner === 'enemy') {
                    if (player.intersects(p.x, p.y, p.size, p.size)) {
                        player.takeDamage(p.dmg, 'enemy-projectile');
                        projectiles.splice(i, 1);
                        if (gameState !== 'playing') return;
                    }
                    continue;
                }

                if (p.owner === 'player') {
                    let consumed = false;
                    for (const enemy of enemies) {
                        if (!enemy.alive || p.hitTargets.has(enemy)) continue;
                        if (enemy.intersects(p.x, p.y, p.size * 2, p.size * 2)) {
                            p.hitTargets.add(enemy);
                            const didHit = enemy.takeDamage(p.dmg, Math.sign(p.vx) || player.facing, p.knockback, p.token, p.knockbackFrames, {
                                source: p.damageSource, passiveDamage: p.passiveDamage, canCrit: p.canCrit, noTrigger: p.noTrigger
                            });
                            if (didHit) {
                                playSfx('hit_sword');
                                if (p.pierce > 0) p.pierce--;
                                else consumed = true;
                            }
                            if (gameState !== 'playing') return;
                            if (consumed) break;
                        }
                    }

                    if (!consumed && treasureChest?.alive && !p.hitTargets.has(treasureChest) &&
                        treasureChest.intersects(p.x, p.y, p.size * 2, p.size * 2)) {
                        p.hitTargets.add(treasureChest);
                        if (treasureChest.takeDamage(p.token)) consumed = true;
                    }

                    if (!consumed && activeBoss && activeBoss.alive && !p.hitTargets.has(activeBoss) &&
                        activeBoss.intersects(p.x, p.y, p.size * 2, p.size * 2)) {
                        p.hitTargets.add(activeBoss);
                        const didHit = activeBoss.takeDamage(p.dmg, Math.sign(p.vx) || player.facing, p.knockback, p.token, p.knockbackFrames, {
                            source: p.damageSource, passiveDamage: p.passiveDamage, canCrit: p.canCrit, noTrigger: p.noTrigger
                        });
                        if (didHit) {
                            playSfx('hit_sword');
                            if (p.pierce > 0) p.pierce--;
                            else consumed = true;
                        }
                        if (gameState !== 'playing') return;
                    }

                    if (consumed) {
                        spawnImpactParticles(p.x, p.y, p.color, 8, 0.6);
                        projectiles.splice(i, 1);
                    }
                }
            }

            // 波次完成统一延迟到本逻辑帧全部伤害结算后；同帧致命伤害优先于奖励/通关。
            if (gameState === 'playing' && enemiesRemaining <= 0) {
                // 清场后必须由玩家亲自找到并攻击宝箱，不能再自动代开。
                if (treasureChest?.alive && !treasureChest.opened) {
                    waveObjective = 'chest';
                    chestGuidePulse++;
                    if (!chestPromptShown) {
                        chestPromptShown = true;
                        announce('敌人已全部清除，跟随宝箱指引前进并攻击开启宝箱。');
                    }
                } else {
                    waveObjective = 'complete';
                    onWaveComplete();
                    return;
                }
            } else if (enemiesRemaining > 0) {
                waveObjective = 'combat';
            }
            
            // 更新粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                if (!particles[i].update()) {
                    particles.splice(i, 1);
                }
            }

            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                if (!floatingTexts[i].update()) floatingTexts.splice(i, 1);
            }

            // 天气粒子
            updateWeatherParticles(currentBiome.weather);
            updateClouds();

            // 更新相机
            camera.x = player.x - CONFIG.CANVAS_WIDTH / 2 + player.width / 2;
            camera.y = player.y - CONFIG.CANVAS_HEIGHT / 2 + player.height / 2;

            // 相机边界限制
            camera.x = Math.max(0, Math.min(camera.x, MAP_WIDTH * CONFIG.TILE_SIZE - CONFIG.CANVAS_WIDTH));
            camera.y = Math.max(0, Math.min(camera.y, MAP_HEIGHT * CONFIG.TILE_SIZE - CONFIG.CANVAS_HEIGHT));

            screenShake = Math.max(0, screenShake * 0.84 - 0.08);
            if (damageFlash > 0) damageFlash--;
        }

        function render() {
            // 清屏
            ctx.clearRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);

            if (gameState === 'title') {
                drawTitleScreen();
                return;
            }

            if (gameState === 'win') {
                drawWinScreen();
                return;
            }

            if (gameState === 'gameover') {
                drawGameOver();
                return;
            }

            // 绘制背景
            drawSky();
            drawBackdropDetails();
            drawClouds();

            const shakeX = reducedMotion || screenShake <= 0 ? 0 : (Math.random() - 0.5) * screenShake * 2;
            const shakeY = reducedMotion || screenShake <= 0 ? 0 : (Math.random() - 0.5) * screenShake * 1.4;
            ctx.save();
            ctx.translate(shakeX, shakeY);

            // 绘制地图
            drawMap();

            // 每张地图最多一个宝箱；可能在受击时显露为宝箱怪。
            treasureChest?.draw(ctx);
            drawChestObjectiveGuide();

            // 绘制敌人
            enemies.forEach(enemy => enemy.draw(ctx));

            // 绘制Boss
            if (activeBoss) activeBoss.draw(ctx);

            // 绘制玩家
            player.draw(ctx);
            
            // 投射物
            projectiles.forEach(p => p.draw(ctx));

            // 绘制粒子
            particles.forEach(p => p.draw(ctx));

            floatingTexts.forEach(text => text.draw(ctx));

            // 天气
            drawWeatherParticles(currentBiome.weather);
            ctx.restore();

            // 绘制UI
            drawPostEffects();
            drawUI();
            
            // 绘制奖励界面
            if (gameState === 'reward') {
                drawRewardScreen();
            }

            // 求饶字幕贴合玩家位置
            if (keys['KeyU'] && player) {
                const screenX = player.x - camera.x + player.width / 2;
                const screenY = player.y - camera.y - 16;
                const clampedX = Math.max(40, Math.min(CONFIG.CANVAS_WIDTH - 40, screenX));
                const clampedY = Math.max(30, screenY);
                ctx.save();
                ctx.fillStyle = '#FFD54F';
                ctx.font = 'bold 22px "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.fillText('腐竹饶命！', clampedX, clampedY);
                ctx.restore();
            }
        }

        const FIXED_STEP_MS = 1000 / 60;

        function setPagePaused(paused) {
            if (pagePaused === paused) return;
            pagePaused = paused;
            clearInputState();
            previousFrameTime = performance.now();
            logicAccumulator = 0;
            if (paused) {
                resumeMusicAfterPause = musicPlaying || bossMusicPlaying;
                if (resumeMusicAfterPause) stopAllMusic();
                return;
            }
            if (resumeMusicAfterPause && (gameState === 'playing' || gameState === 'reward')) {
                if (audioCtx?.state === 'suspended') audioCtx.resume().catch(() => {});
                if (gameState === 'playing' && activeBoss?.alive) startBossMusic();
                else startMusic(currentBiome.musicKey);
            }
            resumeMusicAfterPause = false;
        }

        function syncEffectivePause() {
            setPagePaused(manualPaused || passiveDetailsOpen || Boolean(document.hidden) || !windowHasFocus);
            syncTouchControlsVisibility();
            syncPauseInterface();
        }

        function setManualPaused(paused) {
            const next = Boolean(paused);
            if (next && gameState !== 'playing') return false;
            if (manualPaused === next) {
                syncEffectivePause();
                return false;
            }
            manualPaused = next;
            syncEffectivePause();
            announce(next ? '游戏已暂停。' : '继续游戏。');
            return true;
        }

        function toggleManualPause() {
            return setManualPaused(!manualPaused);
        }

        function resetPauseForStateTransition() {
            manualPaused = false;
            passiveDetailsOpen = false;
            resumeMusicAfterPause = false;
            setPagePaused(Boolean(document.hidden) || !windowHasFocus);
            clearInputState();
            previousFrameTime = performance.now();
            logicAccumulator = 0;
            syncTouchControlsVisibility();
        }

        function drawPauseOverlay() {
            if (passiveDetailsOpen) {
                drawPassiveDetailsOverlay(performance.now());
                return;
            }
            if (!pagePaused || manualPaused || gameState !== 'playing') return;
            ctx.save();
            ctx.fillStyle = 'rgba(2, 7, 14, 0.66)';
            ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);
            ctx.fillStyle = '#FFF';
            ctx.font = 'bold 34px "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.fillText('窗口失焦，游戏已暂停', CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT / 2);
            ctx.font = '15px "Courier New", monospace';
            ctx.fillStyle = '#B3E5FC';
            ctx.fillText('返回窗口后自动继续', CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT / 2 + 34);
            ctx.restore();
        }

        function gameLoop(now) {
            const elapsed = Math.min(100, Math.max(0, now - previousFrameTime));
            previousFrameTime = now;
            if (!pagePaused) {
                logicAccumulator += elapsed;
                let steps = 0;
                while (logicAccumulator >= FIXED_STEP_MS && steps < 6) {
                    recordActivePlayTime(FIXED_STEP_MS);
                    update();
                    logicAccumulator -= FIXED_STEP_MS;
                    steps++;
                }
            } else {
                logicAccumulator = 0;
            }
            render();
            drawPauseOverlay();
            requestAnimationFrame(gameLoop);
        }

        // 开始游戏
        requestAnimationFrame(gameLoop);

        // 窗口失焦时重置按键状态
        window.addEventListener('blur', () => {
            windowHasFocus = false;
            syncEffectivePause();
        });
        window.addEventListener('focus', () => {
            windowHasFocus = true;
            syncEffectivePause();
        });
        document.addEventListener('visibilitychange', () => {
            syncEffectivePause();
        });
    </script>
</body>
</html>
