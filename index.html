                let remainingDamage = amount;
                if (this.shield > 0) {
                    const wedge = getPassiveValue('shield_wedge', player.getPassiveLevel('shield_wedge'));
                    if (wedge > 0) {
                        const bonusShieldDamage = Math.min(this.shield, amount * wedge);
                        this.shield -= bonusShieldDamage;
                    }
                    const absorbed = Math.min(this.shield, remainingDamage);
                    this.shield -= absorbed;
                    remainingDamage -= absorbed;
                    spawnImpactParticles(this.x + this.width / 2, this.y + this.height / 2, '#67E8F9', 11, 0.7);
                    floatingTexts.push(new FloatingText(this.x + this.width / 2, this.y - 8, `盾-${Math.round(absorbed)}`, '#67E8F9', 13));
                    playSfx(this.shield <= 0 ? 'shield_break' : 'shield_hit');
                }

                if (remainingDamage > 0) {
                    this.hp -= remainingDamage;
                    floatingTexts.push(new FloatingText(
                        this.x + this.width / 2,
                        this.y - 8,
                        `${resolved.critical ? '暴击 ' : ''}-${Math.round(remainingDamage)}`,
                        resolved.critical ? '#FFEB3B' : '#FFF59D',
                        resolved.critical ? 17 : 14
                    ));
                    spawnImpactParticles(this.x + this.width / 2, this.y + this.height / 2, this.color, 8, 0.7);
                }
                const executeThreshold = options.source === 'weapon' ? player.getExecutionThreshold(this) : 0;
                if (this.hp > 0 && executeThreshold > 0 && this.hp / this.maxHp <= executeThreshold) this.hp = 0;
                const actualDamage = (shieldBefore - this.shield) + (hpBefore - Math.max(0, this.hp));
                const died = this.hp <= 0;
                if (died) this.alive = false;
                recordDamageDealt(actualDamage);
                player.onDamageDealt(actualDamage, this, {
                    source: options.source || 'weapon',
                    passiveDamage: Boolean(options.passiveDamage),
                    noTrigger: Boolean(options.noTrigger)
                });
                this.hitTimer = 10;
                this.knockbackVx = knockbackDir * (knockbackForce / this.knockResist);
                this.knockbackTimer = Math.max(1, knockbackFrames);
                this.vy = -5;
                screenShake = Math.max(screenShake, remainingDamage > 0 ? 3.5 : 1.5);

                if (died) {
                    enemiesRemaining = Math.max(0, enemiesRemaining - 1);
                    recordKill(this, false, { source: options.source || 'weapon' });
                    if (this.type === 'mimic') {
                        const locksmithBonus = player.resolveTreasureChest();
                        awardBirchCoins((this.coinDrop || rollBirchCoinReward()) + locksmithBonus, this.x, this.y);
                    }
                }
                return true;
            }

            draw(ctx) {
                if (!this.alive) return;

                const screenX = this.x - camera.x;
                const screenY = this.y - camera.y;

                ctx.save();

                // 受击闪红
                if (this.hitTimer > 0) {
                    ctx.globalAlpha = 0.7;
                }

                ctx.save();
                ctx.globalAlpha *= 0.3;
                ctx.fillStyle = '#02060b';
                ctx.beginPath();
                ctx.ellipse(screenX + this.width / 2, screenY + this.height + 2, this.width * 0.58, 4, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                // 绘制不同敌人形象
                this.drawBody(ctx, screenX, screenY);

                if (this.maxShield > 0 && this.shield > 0) {
                    const shieldPct = this.shield / this.maxShield;
                    ctx.save();
                    ctx.globalAlpha = 0.22 + shieldPct * 0.25;
                    ctx.strokeStyle = '#67E8F9';
                    ctx.lineWidth = 3;
                    ctx.shadowColor = '#22D3EE';
                    ctx.shadowBlur = 10;
                    ctx.beginPath();
                    ctx.ellipse(screenX + this.width / 2, screenY + this.height / 2, this.width * 0.72, this.height * 0.72, 0, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                }

                if (this.laser) this.drawLaser(ctx, screenX, screenY);

                if (!this.aggro || this.alertTimer > 0) {
                    ctx.fillStyle = this.aggro ? '#FF5252' : '#B0BEC5';
                    ctx.font = 'bold 15px "Courier New", monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText(this.aggro ? '!' : '?', screenX + this.width / 2, screenY - 13);
                }

                // 血条
                this.drawHealthBar(ctx, screenX, screenY);

                ctx.restore();
            }

            drawBody(ctx, x, y) {
                ctx.save();
                if (this.facing === -1) {
                    ctx.translate(x + this.width, y);
                    ctx.scale(-1, 1);
                    x = 0;
                    y = 0;
                }

                this.drawDetailedEnemyBody(ctx, x, y);
                ctx.restore();
            }

            drawDetailedEnemyBody(ctx, x, y) {
                const attacking = this.attackAnimTimer > 0;
                const step = this.walkFrame % 2;
                const bob = this.onGround && Math.abs(this.vx) > 0 ? step : 0;
                const outline = '#15131A';
                const skin = this.hitTimer > 0 ? '#FF8A80' : this.color;
                const accent = this.accent;
                ctx.save();
                ctx.translate(0, bob);
                ctx.strokeStyle = outline;
                ctx.lineWidth = 2;
                ctx.lineJoin = 'miter';

                if (this.type === 'zombie') {
                    const clawReach = attacking ? 8 : 1;
                    ctx.fillStyle = '#2A2430';
                    ctx.fillRect(x + 6, y + 20, 6, 13 + step);
                    ctx.fillRect(x + 17, y + 20, 6, 13 - step);
                    ctx.fillStyle = '#4B3444';
                    ctx.fillRect(x + 4, y + 12, 21, 15);
                    ctx.strokeRect(x + 4, y + 12, 21, 15);
                    ctx.fillStyle = skin;
                    ctx.fillRect(x + 7, y + 2, 17, 13);
                    ctx.strokeRect(x + 7, y + 2, 17, 13);
                    ctx.fillStyle = '#283021';
                    ctx.fillRect(x + 5, y, 14, 5);
                    ctx.fillRect(x + 20, y + 3, 5, 5);
                    ctx.fillStyle = '#F44336';
                    ctx.fillRect(x + 18, y + 7, 3, 3);
                    ctx.fillStyle = skin;
                    ctx.fillRect(x + 20, y + 15, 5 + clawReach, 5);
                    ctx.fillRect(x + 1, y + 14, 6, 12);
                    ctx.fillStyle = '#D9E6B8';
                    ctx.fillRect(x + 25 + clawReach, y + 15, 2, 2);
                    ctx.fillRect(x + 25 + clawReach, y + 19, 3, 2);
                } else if (this.type === 'runner') {
                    const thrust = attacking ? 10 : 2;
                    ctx.fillStyle = '#31283A';
                    ctx.fillRect(x + 6 - step, y + 20, 5, 9);
                    ctx.fillRect(x + 15 + step, y + 20, 5, 9);
                    ctx.fillStyle = '#513A29';
                    ctx.fillRect(x + 5, y + 12, 17, 11);
                    ctx.strokeRect(x + 5, y + 12, 17, 11);
                    ctx.fillStyle = skin;
                    ctx.fillRect(x + 6, y + 3, 16, 12);
                    ctx.strokeRect(x + 6, y + 3, 16, 12);
                    ctx.beginPath(); ctx.moveTo(x + 6, y + 5); ctx.lineTo(x, y + 1); ctx.lineTo(x + 5, y + 11); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = '#FFEB3B'; ctx.fillRect(x + 17, y + 7, 3, 3);
                    ctx.fillStyle = '#6C4B34'; ctx.fillRect(x + 2, y + 13, 5, 10);
                    ctx.fillRect(x + 19, y + 13, 5 + thrust, 4);
                    ctx.fillStyle = '#D6DCE5';
                    ctx.beginPath(); ctx.moveTo(x + 24 + thrust, y + 13); ctx.lineTo(x + 36 + thrust, y + 15); ctx.lineTo(x + 24 + thrust, y + 18); ctx.closePath(); ctx.fill(); ctx.stroke();
                } else if (this.type === 'tank') {
                    const slam = this.skillTimer > 14;
                    ctx.fillStyle = '#2F2831';
                    ctx.fillRect(x + 7, y + 31, 8, 11 + step);
                    ctx.fillRect(x + 21, y + 31, 8, 11 - step);
                    ctx.fillStyle = '#4A3A2E';
                    ctx.fillRect(x + 3, y + 14, 30, 21);
                    ctx.strokeRect(x + 3, y + 14, 30, 21);
                    ctx.fillStyle = skin;
                    ctx.fillRect(x + 7, y + 3, 22, 15);
                    ctx.strokeRect(x + 7, y + 3, 22, 15);
                    ctx.fillStyle = '#E8E0B6';
                    ctx.beginPath(); ctx.moveTo(x + 9, y + 5); ctx.lineTo(x + 4, y - 5); ctx.lineTo(x + 14, y + 3); ctx.fill(); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(x + 26, y + 5); ctx.lineTo(x + 31, y - 4); ctx.lineTo(x + 30, y + 8); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = '#FFB300'; ctx.fillRect(x + 21, y + 8, 4, 3);
                    ctx.fillStyle = skin; ctx.fillRect(x, y + 16, 7, 16); ctx.fillRect(x + 29, y + 14, 7, 17);
                    ctx.save();
                    ctx.translate(x + 33, y + 16);
                    ctx.rotate(slam ? -1.35 : attacking ? 0.7 : -0.25);
                    ctx.fillStyle = '#5D4037'; ctx.fillRect(0, -3, 28, 6);
                    ctx.fillStyle = '#30343B'; ctx.fillRect(22, -9, 13, 18); ctx.strokeRect(22, -9, 13, 18);
                    ctx.restore();
                } else if (this.type === 'shooter') {
                    const draw = attacking ? 7 : 0;
                    ctx.fillStyle = '#493C4F';
                    ctx.fillRect(x + 7, y + 20, 5, 12 + step);
                    ctx.fillRect(x + 16, y + 20, 5, 12 - step);
                    ctx.fillStyle = '#3B3344'; ctx.fillRect(x + 5, y + 13, 18, 10); ctx.strokeRect(x + 5, y + 13, 18, 10);
                    ctx.fillStyle = skin;
                    ctx.beginPath(); ctx.arc(x + 14, y + 8, 9, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = '#16141A'; ctx.fillRect(x + 9, y + 6, 3, 4); ctx.fillRect(x + 16, y + 6, 3, 4); ctx.fillRect(x + 12, y + 11, 5, 2);
                    ctx.strokeStyle = '#8D6E63'; ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.arc(x + 25, y + 16, 13, -1.3, 1.3); ctx.stroke();
                    ctx.strokeStyle = '#E0E0E0'; ctx.lineWidth = 1;
                    ctx.beginPath(); ctx.moveTo(x + 28, y + 4); ctx.lineTo(x + 18 - draw, y + 16); ctx.lineTo(x + 28, y + 28); ctx.stroke();
                    ctx.fillStyle = accent; ctx.fillRect(x + 17 - draw, y + 15, 22 + draw, 2);
                } else if (this.type === 'leaper') {
                    const lunge = attacking ? 5 : 0;
                    ctx.fillStyle = skin;
                    ctx.beginPath(); ctx.ellipse(x + 15, y + 12, 11 + lunge * 0.4, 9, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                    ctx.beginPath(); ctx.arc(x + 24 + lunge, y + 12, 7, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                    ctx.strokeStyle = outline; ctx.lineWidth = 3;
                    const legPairs = [[4, 0], [8, 5], [15, 8], [21, 5]];
                    legPairs.forEach(([ly, spread], index) => {
                        ctx.beginPath(); ctx.moveTo(x + 12, y + 9 + index * 2); ctx.lineTo(x + spread - 4, y + ly - step); ctx.lineTo(x + spread - 8, y + 18 + index); ctx.stroke();
                        ctx.beginPath(); ctx.moveTo(x + 18, y + 9 + index * 2); ctx.lineTo(x + 28 + spread, y + ly + step); ctx.lineTo(x + 33 + spread, y + 18 + index); ctx.stroke();
                    });
                    ctx.fillStyle = '#FF5252'; ctx.fillRect(x + 23 + lunge, y + 9, 3, 3); ctx.fillRect(x + 27 + lunge, y + 9, 3, 3);
                    ctx.fillStyle = '#F5F5F5';
                    ctx.beginPath(); ctx.moveTo(x + 26 + lunge, y + 15); ctx.lineTo(x + 28 + lunge, y + 22); ctx.lineTo(x + 30 + lunge, y + 15); ctx.fill();
                } else if (this.type === 'warden') {
                    const bash = this.abilityVxFrames > 0 || attacking;
                    ctx.fillStyle = '#202936'; ctx.fillRect(x + 8, y + 28, 7, 11 + step); ctx.fillRect(x + 20, y + 28, 7, 11 - step);
                    ctx.fillStyle = skin; ctx.fillRect(x + 6, y + 11, 23, 21); ctx.strokeRect(x + 6, y + 11, 23, 21);
                    ctx.fillStyle = '#18202B'; ctx.fillRect(x + 7, y + 2, 21, 13); ctx.strokeRect(x + 7, y + 2, 21, 13);
                    ctx.fillStyle = accent; ctx.fillRect(x + 19, y + 7, 6, 3);
                    ctx.fillStyle = '#273949'; ctx.fillRect(x + (bash ? 22 : 0), y + 12, 12, 23); ctx.strokeRect(x + (bash ? 22 : 0), y + 12, 12, 23);
                    ctx.fillStyle = accent; ctx.fillRect(x + (bash ? 24 : 2), y + 17, 8, 3); ctx.fillRect(x + (bash ? 27 : 5), y + 14, 3, 15);
                    ctx.fillStyle = '#AAB7C4'; ctx.fillRect(x + 28, y + 16, 3, 18);
                } else if (this.type === 'prism') {
                    const pulse = this.laserCharge > 0 || this.laserFire > 0;
                    ctx.globalAlpha *= 0.88;
                    ctx.fillStyle = skin;
                    ctx.beginPath();
                    ctx.moveTo(x + 15, y); ctx.quadraticCurveTo(x + 29, y + 7, x + 27, y + 22);
                    ctx.lineTo(x + 30, y + 34); ctx.lineTo(x + 22, y + 30); ctx.lineTo(x + 15, y + 36);
                    ctx.lineTo(x + 8, y + 30); ctx.lineTo(x, y + 34); ctx.lineTo(x + 4, y + 20);
                    ctx.quadraticCurveTo(x + 2, y + 6, x + 15, y); ctx.closePath(); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = '#111827'; ctx.fillRect(x + 8, y + 10, 4, 5); ctx.fillRect(x + 19, y + 10, 4, 5);
                    ctx.fillStyle = pulse ? '#FF4081' : accent;
                    ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = pulse ? 14 : 6;
                    ctx.beginPath(); ctx.arc(x + 16, y + 20, pulse ? 6 : 4, 0, Math.PI * 2); ctx.fill();
                    ctx.shadowBlur = 0;
                } else if (this.type === 'mimic') {
                    const open = attacking || this.abilityVxFrames > 0;
                    ctx.fillStyle = '#2A1B18'; ctx.fillRect(x + 3, y + 17, 31, 13); ctx.strokeRect(x + 3, y + 17, 31, 13);
                    ctx.fillStyle = skin;
                    ctx.save(); ctx.translate(x + 3, y + 17); ctx.rotate(open ? -0.42 : -0.06);
                    ctx.fillRect(0, -9, 31, 10); ctx.strokeRect(0, -9, 31, 10);
                    ctx.fillStyle = accent; ctx.fillRect(13, -8, 6, 8); ctx.restore();
                    ctx.fillStyle = '#F5F0D0';
                    for (let tooth = 0; tooth < 6; tooth++) {
                        const tx = x + 5 + tooth * 5;
                        ctx.beginPath(); ctx.moveTo(tx, y + 17); ctx.lineTo(tx + 2, y + (open ? 23 : 20)); ctx.lineTo(tx + 4, y + 17); ctx.fill();
                    }
                    ctx.fillStyle = '#FF1744'; ctx.fillRect(x + 8, y + 20, 4, 4); ctx.fillRect(x + 25, y + 20, 4, 4);
                    ctx.fillStyle = '#4E342E'; ctx.fillRect(x + 6 - step, y + 28, 7, 4); ctx.fillRect(x + 25 + step, y + 28, 7, 4);
                }

                if (this.elite) {
                    ctx.strokeStyle = '#FFD54F';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x + 1, y - 2, this.width - 2, this.height + 1);
                }
                if (this.pressureStacks > 0) {
                    ctx.strokeStyle = '#FF7043';
                    ctx.globalAlpha = 0.4 + Math.min(0.5, this.pressureStacks * 0.06);
                    ctx.beginPath(); ctx.arc(x + this.width / 2, y + this.height / 2, this.width * 0.7, 0, Math.PI * 2); ctx.stroke();
                }
                ctx.restore();
            }

            drawLaser(ctx, x, y) {
                if (this.laserCharge <= 0 && this.laserFire <= 0) return;
                const startX = x + this.width / 2;
                const screenLaserY = this.laserY - camera.y;
                const endX = this.laserDirection > 0 ? CONFIG.CANVAS_WIDTH + 80 : -80;
                ctx.save();
                if (this.laserCharge > 0) {
                    const progress = 1 - this.laserCharge / CONFIG.LASER_CHARGE_FRAMES;
                    ctx.globalAlpha = 0.28 + progress * 0.46;
                    ctx.strokeStyle = progress > 0.72 ? '#FF8A80' : '#F3E5F5';
                    ctx.setLineDash([8, 7]);
                    ctx.lineWidth = progress > 0.72 ? 3 : 1;
                    ctx.beginPath();
                    ctx.moveTo(startX, screenLaserY);
                    ctx.lineTo(endX, screenLaserY);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.strokeStyle = '#CE93D8';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(startX, screenLaserY, 7 + progress * 12, 0, Math.PI * 2);
                    ctx.stroke();
                } else {
                    ctx.globalAlpha = 0.92;
                    ctx.strokeStyle = '#FFF';
                    ctx.shadowColor = '#F50057';
                    ctx.shadowBlur = 18;
                    ctx.lineWidth = 10;
                    ctx.beginPath();
                    ctx.moveTo(startX, screenLaserY);
                    ctx.lineTo(endX, screenLaserY);
                    ctx.stroke();
                    ctx.strokeStyle = '#FF1744';
                    ctx.lineWidth = 4;
                    ctx.stroke();
                }
                ctx.restore();
            }

            drawHealthBar(ctx, x, y) {
                const barWidth = this.width;
                const barHeight = 4;
                const barY = y - 8;

                // 背景
                ctx.fillStyle = '#333';
                ctx.fillRect(x, barY, barWidth, barHeight);

                // 血量
                const hpPercent = this.hp / this.maxHp;
                ctx.fillStyle = hpPercent > 0.5 ? '#4CAF50' : hpPercent > 0.25 ? '#FF9800' : '#F44336';
                ctx.fillRect(x, barY, barWidth * hpPercent, barHeight);

                if (this.maxShield > 0) {
                    const shieldPct = Math.max(0, this.shield / this.maxShield);
                    ctx.fillStyle = 'rgba(4, 28, 40, 0.88)';
                    ctx.fillRect(x, barY - 5, barWidth, 3);
                    ctx.fillStyle = '#67E8F9';
                    ctx.fillRect(x, barY - 5, barWidth * shieldPct, 3);
                }

                if (this.isEliteType) {
                    ctx.fillStyle = '#FFD54F';
                    ctx.font = 'bold 8px "Courier New", monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText('精英', x + barWidth / 2, barY - (this.maxShield > 0 ? 9 : 4));
                }
            }
        }

        // ============ Boss: 白桦腐竹 ============
        class BirchCorruptBoss {
            constructor(wave) {
                this.name = '白桦腐竹';
                this.isBoss = true;
                this.x = 600;
                this.y = 100;
                this.width = 72;
                this.height = 96;
                this.vx = 0;
                this.vy = 0;
                this.facing = -1;
                this.alive = true;
                const endlessTier = Math.max(0, wave - CONFIG.BOSS_WAVE);
                const storyBossMultiplier = Math.pow(1.2, Math.min(9, Math.max(0, wave - 1)));
                const hpMultiplier = storyBossMultiplier * (1 + Math.pow(endlessTier, 0.78) * 0.055);
                this.maxHp = Math.floor(800 * hpMultiplier);
                this.hp = this.maxHp;
                this.damage = Math.floor(22 * (1 + Math.pow(endlessTier, 0.72) * 0.07));
                this.knockResist = 2.5;
                this.hitTimer = 0;
                this.lastHitToken = null;
                this.knockbackVx = 0;
                this.knockbackTimer = 0;
                this.attackTimer = 0;
                this.skillCooldown = 150;
                this.slamCooldown = 220;
                this.novaCooldown = 200;
                this.dashCooldown = 260;
                this.dashTimer = 0;
                this.auraPulse = 0;
                this.walkFrame = 0;
                this.walkTimer = 0;
                this.slowRatio = 0;
                this.slowTimer = 0;
            }

            update(player) {
                if (!this.alive || gameState !== 'playing') return;
                const dx = getWrappedDeltaX(this.x + this.width / 2, player.x + player.width / 2);
                this.facing = dx >= 0 ? 1 : -1;
                if (this.slowTimer > 0) this.slowTimer--;
                else this.slowRatio = 0;

                // 走向玩家（慢速）或冲刺；受击时保留短暂击退，避免 AI 立刻覆盖。
                if (this.dashTimer > 0) {
                    this.vx = this.facing * 6.5;
                    this.dashTimer--;
                    if (this.dashTimer % 3 === 0) {
                        spawnAttackParticles(this.x + this.width / 2, this.y + this.height / 2, '#8BC34A', 6);
                    }
                } else {
                    if (Math.abs(dx) > 40) {
                        this.vx = (dx > 0 ? 1.1 : -1.1) * Math.max(0.55, 1 - this.slowRatio);
                    } else {
                        this.vx = 0;
                    }
                }

                if (this.knockbackTimer > 0 && this.dashTimer <= 0) {
                    this.vx = this.knockbackVx;
                    this.knockbackVx *= 0.84;
                    this.knockbackTimer--;
                }

                // 技能计时
                this.skillCooldown--;
                this.slamCooldown--;
                this.novaCooldown--;
                this.dashCooldown--;
                this.auraPulse = (this.auraPulse + 0.05) % (Math.PI * 2);

                // 远程腐蚀弹幕
                if (this.skillCooldown <= 0) {
                    this.skillCooldown = 160;
                    const shots = 10;
                    for (let i = 0; i < shots; i++) {
                        const angle = -0.6 + (i / (shots - 1)) * 1.2;
                        const speed = 3.2;
                        projectiles.push(new Projectile(
                            this.x + this.width / 2,
                            this.y + this.height / 2,
                            Math.cos(angle + (this.facing === -1 ? Math.PI : 0)) * speed,
                            Math.sin(angle) * speed,
                            Math.max(8, Math.round(this.damage * 0.7)),
                            '#8BC34A'
                        ));
                    }
                }

                // 跳跃砸地
                if (this.slamCooldown <= 0) {
                    this.slamCooldown = 240;
                    this.vy = -12;
                }

                // 腐蚀新星（环形弹幕）
                if (this.novaCooldown <= 0) {
                    this.novaCooldown = 220;
                    const rings = 12;
                    for (let i = 0; i < rings; i++) {
                        const angle = (Math.PI * 2 / rings) * i;
                        const speed = 3.8;
                        projectiles.push(new Projectile(
                            this.x + this.width / 2,
                            this.y + this.height / 2,
                            Math.cos(angle) * speed,
                            Math.sin(angle) * speed,
                            Math.max(10, Math.round(this.damage * 0.82)),
                            '#A5D6A7'
                        ));
                    }
                    spawnAttackParticles(this.x + this.width / 2, this.y + this.height / 2, '#A5D6A7', 20);
                }

                // 冲刺横斩
                if (this.dashCooldown <= 0) {
                    this.dashCooldown = 260;
                    this.dashTimer = 26;
                    this.vy = -3;
                }

                // 重力
                this.vy += CONFIG.GRAVITY;
                if (this.vy > 14) this.vy = 14;

                // 应用速度
                this.x += this.vx;
                this.y += this.vy;

                // 地面碰撞
                this.handleCollision();

                const worldWidth = MAP_WIDTH * CONFIG.TILE_SIZE;
                if (this.x < 0) {
                    this.x = worldWidth - this.width;
                    this.y = Math.min(this.y, findGroundYAt(this.x + this.width / 2, this.height) - 2);
                } else if (this.x > worldWidth - this.width) {
                    this.x = 0;
                    this.y = Math.min(this.y, findGroundYAt(this.width / 2, this.height) - 2);
                }

                // 碰撞玩家
                if (this.intersects(player.x, player.y, player.width, player.height)) {
                    player.takeDamage(this.damage, 'boss-contact');
                }

                if (this.hitTimer > 0) this.hitTimer--;

                // 动画
                if (this.vx !== 0) {
                    this.walkTimer++;
                    if (this.walkTimer > 10) {
                        this.walkTimer = 0;
                        this.walkFrame = (this.walkFrame + 1) % 4;
                    }
                }
            }

            handleCollision() {
                const left = Math.floor(this.x / CONFIG.TILE_SIZE);
                const right = Math.floor((this.x + this.width) / CONFIG.TILE_SIZE);
                const top = Math.floor(this.y / CONFIG.TILE_SIZE);
                const bottom = Math.floor((this.y + this.height) / CONFIG.TILE_SIZE);

                for (let ty = top; ty <= bottom; ty++) {
                    for (let tx = left; tx <= right; tx++) {
                        if (tiles[ty] && tiles[ty][tx] > 0) {
                            const tileX = tx * CONFIG.TILE_SIZE;
                            const tileY = ty * CONFIG.TILE_SIZE;
                            if (this.intersects(tileX, tileY, CONFIG.TILE_SIZE, CONFIG.TILE_SIZE)) {
                                if (this.vy > 0 && this.y + this.height - this.vy <= tileY) {
                                    // 落地冲击波
                                    if (this.vy > 8) {
                                        spawnAttackParticles(this.x + this.width / 2, this.y + this.height, '#8BC34A', 18);
                                    }
                                    this.y = tileY - this.height;
                                    this.vy = 0;
                                } else if (this.vy < 0 && this.y - this.vy >= tileY + CONFIG.TILE_SIZE) {
                                    this.y = tileY + CONFIG.TILE_SIZE;
                                    this.vy = 0;
                                } else if (this.vx > 0) {
                                    this.x = tileX - this.width;
                                } else if (this.vx < 0) {
                                    this.x = tileX + CONFIG.TILE_SIZE;
                                }
                            }
                        }
                    }
                }
            }

            intersects(x, y, w, h) {
                return this.x < x + w && this.x + this.width > x &&
                    this.y < y + h && this.y + this.height > y;
            }

            takeDamage(amount, knockbackDir, knockbackForce, hitToken, knockbackFrames = 8, options = {}) {
                if (!this.alive) return false;
                if (hitToken && this.lastHitToken === hitToken) return false;
                if (hitToken) this.lastHitToken = hitToken;
                const resolved = player.resolveOutgoingDamage(amount, this, {
                    source: options.source || 'weapon',
                    passiveDamage: Boolean(options.passiveDamage),
                    canCrit: options.canCrit,
                    noTrigger: Boolean(options.noTrigger),
                    preResolved: Boolean(options.preResolved)
                });
                amount = resolved.damage;
                const hpBefore = this.hp;
                this.hp -= amount;
                const executeThreshold = options.source === 'weapon' ? player.getExecutionThreshold(this) : 0;
                if (this.hp > 0 && executeThreshold > 0 && this.hp / this.maxHp <= executeThreshold) this.hp = 0;
                const actualDamage = hpBefore - Math.max(0, this.hp);
                const died = this.hp <= 0;
                if (died) this.alive = false;
                recordDamageDealt(actualDamage);
                player.onDamageDealt(actualDamage, this, {
                    source: options.source || 'weapon',
                    passiveDamage: Boolean(options.passiveDamage),
                    noTrigger: Boolean(options.noTrigger)
                });
                this.hitTimer = 12;
                this.knockbackVx = Math.max(-5, Math.min(5, this.knockbackVx + knockbackDir * (knockbackForce / this.knockResist)));
                this.knockbackTimer = Math.max(1, knockbackFrames);
                this.vy = -3;
                spawnImpactParticles(this.x + this.width / 2, this.y + this.height / 2, '#A5D6A7', 12, 0.8);
                floatingTexts.push(new FloatingText(this.x + this.width / 2, this.y - 10, `${resolved.critical ? '暴击 ' : ''}-${Math.round(amount)}`, resolved.critical ? '#FFEB3B' : '#FFF59D', resolved.critical ? 19 : 16));
                screenShake = Math.max(screenShake, 4);
                if (died) {
                    enemiesRemaining = 0;
                    recordKill(this, true, { source: options.source || 'weapon' });
                }
                return true;
            }

            draw(ctx) {
                if (!this.alive) return;
                const screenX = this.x - camera.x;
                const screenY = this.y - camera.y;
                ctx.save();
                if (this.hitTimer > 0) ctx.globalAlpha = 0.85;

                // 腐化能量光环
                ctx.save();
                ctx.globalAlpha = 0.18;
                ctx.fillStyle = '#8BC34A';
                ctx.beginPath();
                ctx.ellipse(
                    screenX + this.width / 2,
                    screenY + this.height / 2,
                    64 + Math.sin(this.auraPulse) * 8,
                    52 + Math.cos(this.auraPulse) * 6,
                    0,
                    0,
                    Math.PI * 2
                );
                ctx.fill();
                ctx.restore();

                // 躯干分层装甲
                ctx.fillStyle = '#F5F5F5';
                ctx.fillRect(screenX + 6, screenY + 10, this.width - 12, this.height - 20);
                ctx.fillStyle = '#E0E0E0';
                ctx.fillRect(screenX + 10, screenY + 18, this.width - 20, this.height - 32);
                ctx.fillStyle = '#BDBDBD';
                ctx.fillRect(screenX + 14, screenY + 26, this.width - 28, this.height - 44);

                // 肩甲与护臂
                ctx.fillStyle = '#2E7D32';
                ctx.fillRect(screenX + 4, screenY + 12, this.width - 8, 14);
                ctx.fillRect(screenX + 2, screenY + 30, 12, 22);
                ctx.fillRect(screenX + this.width - 14, screenY + 30, 12, 22);

                // 树皮纹理
                ctx.fillStyle = '#8BC34A';
                for (let i = 0; i < 7; i++) {
                    ctx.fillRect(screenX + 10 + i * 8, screenY + 18 + (i * 5) % 28, 5, 10);
                }

                // 腐化核心
                ctx.fillStyle = '#A5D6A7';
                ctx.fillRect(screenX + this.width / 2 - 12, screenY + 44, 24, 18);
                ctx.fillStyle = '#C5E1A5';
                ctx.fillRect(screenX + this.width / 2 - 8, screenY + 48, 16, 10);

                // 面甲与角
                ctx.fillStyle = '#263238';
                ctx.fillRect(screenX + this.width / 2 - 14, screenY + 6, 28, 20);
                ctx.fillStyle = '#9CCC65';
                ctx.fillRect(screenX + this.width / 2 - 10, screenY + 12, 8, 6);
                ctx.fillRect(screenX + this.width / 2 + 4, screenY + 12, 8, 6);
                ctx.fillStyle = '#455A64';
                ctx.beginPath();
                ctx.moveTo(screenX + this.width / 2 - 18, screenY + 8);
                ctx.lineTo(screenX + this.width / 2 - 6, screenY - 6);
                ctx.lineTo(screenX + this.width / 2 - 2, screenY + 6);
                ctx.closePath();
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(screenX + this.width / 2 + 18, screenY + 8);
                ctx.lineTo(screenX + this.width / 2 + 6, screenY - 6);
                ctx.lineTo(screenX + this.width / 2 + 2, screenY + 6);
                ctx.closePath();
                ctx.fill();

                // 胸口符文
                ctx.strokeStyle = '#C5E1A5';
                ctx.lineWidth = 3;
                ctx.strokeRect(screenX + this.width / 2 - 16, screenY + 40, 32, 28);
                ctx.strokeRect(screenX + this.width / 2 - 8, screenY + 46, 16, 16);

                // 冲刺残影
                if (this.dashTimer > 0) {
                    ctx.globalAlpha = 0.3;
                    ctx.fillStyle = '#8BC34A';
                    for (let i = 0; i < 3; i++) {
                        ctx.fillRect(screenX - i * 12 * this.facing, screenY + 10, this.width, this.height - 12);
                    }
                }

                ctx.restore();

            }

            drawHealthBar(ctx, barY = 52) {
                const barWidth = 200;
                const barX = CONFIG.CANVAS_WIDTH / 2 - barWidth / 2;
                ctx.save();
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(barX, barY, barWidth, 16);
                const pct = this.hp / this.maxHp;
                ctx.fillStyle = '#8BC34A';
                ctx.fillRect(barX, barY, barWidth * pct, 16);
                ctx.strokeStyle = '#C5E1A5';
                ctx.lineWidth = 2;
                ctx.strokeRect(barX, barY, barWidth, 16);
                ctx.fillStyle = '#FFF';
                ctx.font = 'bold 14px "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.fillText(`${this.name} ${Math.max(0, Math.floor(this.hp))}/${this.maxHp}`, CONFIG.CANVAS_WIDTH / 2, barY + 13);
                ctx.restore();
            }
        }

        // ============ 绘制函数 ============
        function drawSky() {
            // 渐变天空
            const gradient = ctx.createLinearGradient(0, 0, 0, CONFIG.CANVAS_HEIGHT);
            gradient.addColorStop(0, currentBiome.sky[0]);
            gradient.addColorStop(0.7, currentBiome.sky[1]);
            gradient.addColorStop(1, currentBiome.sky[2]);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);

            if (currentBiome === BIOMES.night || currentBiome === BIOMES.end) {
                for (let i = 0; i < 54; i++) {
                    const sx = (i * 83 + 17) % CONFIG.CANVAS_WIDTH;
                    const sy = (i * 47 + 23) % 230;
                    const pulse = reducedMotion ? 0.75 : 0.52 + Math.sin(performance.now() * 0.002 + i) * 0.28;
                    ctx.globalAlpha = pulse;
                    ctx.fillStyle = i % 5 === 0 ? '#CE93D8' : '#E3F2FD';
                    ctx.fillRect(sx, sy, i % 4 === 0 ? 3 : 2, i % 4 === 0 ? 3 : 2);
                }
                ctx.globalAlpha = 1;
            }

            if (currentBiome.sun) {
                ctx.save();
                ctx.globalAlpha = 0.18;
                ctx.fillStyle = '#FFF59D';
                ctx.beginPath();
                ctx.arc(CONFIG.CANVAS_WIDTH - 100, 80, 58, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                ctx.fillStyle = '#FFE082';
                ctx.beginPath();
                ctx.arc(CONFIG.CANVAS_WIDTH - 100, 80, 40, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#FFEB3B';
                ctx.beginPath();
                ctx.arc(CONFIG.CANVAS_WIDTH - 100, 80, 32, 0, Math.PI * 2);
                ctx.fill();
            }

            if (currentBiome.moon) {
                ctx.fillStyle = '#CFD8DC';
                ctx.beginPath();
                ctx.arc(120, 90, 26, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#90A4AE';
                ctx.beginPath();
                ctx.arc(126, 86, 22, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawClouds() {
            ctx.fillStyle = currentBiome.cloud;
            clouds.forEach(cloud => {
                const screenX = cloud.x - camera.x * 0.3; // 视差滚动
                if (screenX > -cloud.width && screenX < CONFIG.CANVAS_WIDTH + cloud.width) {
                    // 像素风格云朵
                    const w = cloud.width;
                    ctx.fillRect(screenX, cloud.y, w * 0.6, 16);
                    ctx.fillRect(screenX - 10, cloud.y + 8, w * 0.8, 12);
                    ctx.fillRect(screenX + w * 0.3, cloud.y - 6, w * 0.4, 14);
                }
            });
        }

        function updateClouds() {
            clouds.forEach(cloud => {
                cloud.x += cloud.speed;
                if (cloud.x > MAP_WIDTH * CONFIG.TILE_SIZE + 100) cloud.x = -cloud.width;
            });
        }

        function drawTile(x, y, type) {
            const screenX = x * CONFIG.TILE_SIZE - camera.x;
            const screenY = y * CONFIG.TILE_SIZE - camera.y;

            // 屏幕外不绘制
            if (screenX < -CONFIG.TILE_SIZE || screenX > CONFIG.CANVAS_WIDTH ||
                screenY < -CONFIG.TILE_SIZE || screenY > CONFIG.CANVAS_HEIGHT) {
                return;
            }

            if (type === 1) {
                // 草方块
                // 泥土底部
                ctx.fillStyle = currentBiome.dirt;
                ctx.fillRect(screenX, screenY, CONFIG.TILE_SIZE, CONFIG.TILE_SIZE);

                // 泥土纹理
                ctx.fillStyle = currentBiome.dirtAccent;
                for (let i = 0; i < 4; i++) {
                    const dotX = screenX + (i * 8 + ((y * 3) % 8)) % 28;
                    const dotY = screenY + 14 + (i * 5) % 16;
                    ctx.fillRect(dotX, dotY, 4, 4);
                }

                // 草皮顶部
                ctx.fillStyle = currentBiome.top;
                ctx.fillRect(screenX, screenY, CONFIG.TILE_SIZE, 8);

                // 草皮纹理
                ctx.fillStyle = currentBiome.topAccent;
                ctx.fillRect(screenX + 2, screenY, 4, 6);
                ctx.fillRect(screenX + 12, screenY, 6, 5);
                ctx.fillRect(screenX + 24, screenY, 4, 7);

                // 草皮边缘
                ctx.fillStyle = currentBiome.topAccent;
                ctx.fillRect(screenX, screenY + 8, CONFIG.TILE_SIZE, 2);

                // 群系专属地表细节
                if (currentBiome === BIOMES.snow) {
                    ctx.fillStyle = '#F7FCFF';
                    ctx.fillRect(screenX, screenY, CONFIG.TILE_SIZE, 5);
                    ctx.fillStyle = '#B3E5FC';
                    ctx.fillRect(screenX + 5, screenY + 5, 8, 2);
                } else if (currentBiome === BIOMES.rain) {
                    ctx.fillStyle = 'rgba(144,202,249,0.72)';
                    ctx.fillRect(screenX + 7, screenY + 3, 14, 2);
                } else if (currentBiome === BIOMES.nether) {
                    ctx.fillStyle = '#FF6D00';
                    ctx.fillRect(screenX + 4 + ((x * 7) % 16), screenY + 5, 4, 2);
                } else if (currentBiome === BIOMES.end) {
                    ctx.fillStyle = '#B388FF';
                    ctx.fillRect(screenX + 14, screenY - 5, 3, 9);
                    ctx.fillRect(screenX + 11, screenY - 2, 9, 3);
                } else {
                    ctx.fillStyle = currentBiome.topAccent;
                    ctx.fillRect(screenX + 6, screenY - 4 - ((x * 3) % 3), 2, 6);
                    ctx.fillRect(screenX + 23, screenY - 3 - ((x * 5) % 2), 2, 5);
                }

            } else if (type === 2) {
                // 泥土方块
                ctx.fillStyle = currentBiome.dirt;
                ctx.fillRect(screenX, screenY, CONFIG.TILE_SIZE, CONFIG.TILE_SIZE);

                // 泥土纹理
                ctx.fillStyle = currentBiome.dirtAccent;
                for (let i = 0; i < 5; i++) {
                    const dotX = screenX + ((x * 7 + i * 9) % 24);
                    const dotY = screenY + ((y * 5 + i * 7) % 24);
                    ctx.fillRect(dotX, dotY, 5, 5);
                }

                // 石头点缀
                ctx.fillStyle = currentBiome.stone;
                ctx.fillRect(screenX + ((x * 3) % 20), screenY + ((y * 7) % 20), 6, 4);
            }

            // 方块边框
            ctx.strokeStyle = 'rgba(0,0,0,0.2)';
            ctx.strokeRect(screenX, screenY, CONFIG.TILE_SIZE, CONFIG.TILE_SIZE);
        }

        function drawMap() {
            const startX = Math.floor(camera.x / CONFIG.TILE_SIZE);
            const endX = startX + Math.ceil(CONFIG.CANVAS_WIDTH / CONFIG.TILE_SIZE) + 1;
            const startY = Math.floor(camera.y / CONFIG.TILE_SIZE);
            const endY = startY + Math.ceil(CONFIG.CANVAS_HEIGHT / CONFIG.TILE_SIZE) + 1;

            for (let y = Math.max(0, startY); y < Math.min(MAP_HEIGHT, endY); y++) {
                for (let x = Math.max(0, startX); x < Math.min(MAP_WIDTH, endX); x++) {
                    if (tiles[y][x] > 0) {
                        drawTile(x, y, tiles[y][x]);
                    }
                }
            }
        }

        function drawUI() {
            // 血条背景
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(10, 10, 204, 28);

            // 血条边框
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.strokeRect(10, 10, 204, 28);

            // 血量
            const hpPercent = player.hp / player.maxHp;
            const gradient = ctx.createLinearGradient(12, 0, 200, 0);
            gradient.addColorStop(0, '#E53935');
            gradient.addColorStop(1, '#FF5252');
            ctx.fillStyle = gradient;
            ctx.fillRect(12, 12, 200 * hpPercent, 24);
            if (player.tempShield > 0) {
                const shieldPercent = Math.min(1, player.tempShield / Math.max(1, player.maxHp));
                ctx.fillStyle = 'rgba(79, 211, 255, 0.9)';
                ctx.fillRect(12, 12, 200 * shieldPercent, 5);
            }

            // 血量文字
            ctx.fillStyle = '#FFF';
            ctx.font = 'bold 14px "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.fillText(`HP: ${Math.floor(player.hp)}/${player.maxHp}${player.tempShield > 0 ? ` +盾${Math.ceil(player.tempShield)}` : ''}`, 112, 29);

            // 心形图标
            ctx.fillStyle = '#E53935';
            ctx.font = '20px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('❤', 220, 30);

            // 左侧信息面板，保证亮色群系中的文字对比度
            ctx.fillStyle = 'rgba(2, 9, 18, 0.76)';
            ctx.fillRect(8, 44, 248, 128);
            ctx.strokeStyle = 'rgba(137, 190, 230, 0.38)';
            ctx.strokeRect(8, 44, 248, 128);

            // 波次信息
            ctx.fillStyle = '#FFF';
            ctx.font = 'bold 16px "Courier New", monospace';
            ctx.textAlign = 'left';
            const modeLabel = gameMode === 'endless' ? '无尽远征' : '主线远征';
            ctx.fillText(`${modeLabel} · Wave ${currentWave}`, 16, 64);
            
            // 敌人剩余
            ctx.font = 'bold 14px "Courier New", monospace';
            ctx.fillText(`敌人剩余: ${enemiesRemaining}/${totalEnemiesInWave}`, 16, 84);

            // 主题
            ctx.font = '12px "Courier New", monospace';
            ctx.fillStyle = '#B3E5FC';
            const musicName = bossMusicPlaying
                ? '白桦腐化战歌'
                : BIOME_MUSIC[currentBiome.musicKey]?.name || '原野晨风';
            ctx.fillText(`${currentBiome.name} · ♪ ${musicName}`, 16, 103);

            // 击杀数
            ctx.fillStyle = '#FFF';
            ctx.font = '12px "Courier New", monospace';
            const threat = getEnemyScalingForWave(currentWave).hp.toFixed(1);
            ctx.fillText(`击杀 ${killCount} · 威胁 x${threat}`, 16, 122);
            ctx.fillStyle = '#FFF176';
            ctx.font = 'bold 13px "Courier New", monospace';
            ctx.fillText(`◈ 白桦币 ${birchCoins}`, 16, 143);
            ctx.fillStyle = '#B3E5FC';
            ctx.font = '12px "Courier New", monospace';
            ctx.fillText(`中央迎战 · 环形地图 · 怪物上限 ${CONFIG.MAX_ENEMIES_PER_WAVE}`, 16, 162);
            
            // 当前武器信息
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(CONFIG.CANVAS_WIDTH - 224, 10, 214, 88);
            ctx.strokeStyle = player.weapon.color;
            ctx.lineWidth = 2;
            ctx.strokeRect(CONFIG.CANVAS_WIDTH - 224, 10, 214, 88);
            
            ctx.fillStyle = player.weapon.color;
            ctx.font = 'bold 14px "Courier New", monospace';
            ctx.textAlign = 'left';
            ctx.fillText(`[${player.weapon.rarityName}]`, CONFIG.CANVAS_WIDTH - 214, 28);
            
            ctx.fillStyle = '#FFF';
            ctx.fillText(player.weapon.name, CONFIG.CANVAS_WIDTH - 214, 46);
            
            ctx.fillStyle = '#FFD54F';
            ctx.font = '12px "Courier New", monospace';
            ctx.fillText(`攻击力: ${formatStat(player.getAttackDamage())}`, CONFIG.CANVAS_WIDTH - 214, 63);

            if (player.weapon.isRanged) {
                const ammoText = player.reloadTimer > 0
                    ? `装填 ${Math.ceil(player.reloadTimer / 60 * 10) / 10}s`
                    : `弹药 ${player.ammo}/${player.getMagazineSize()}`;
                ctx.fillStyle = player.reloadTimer > 0 ? '#80CBC4' : player.ammo === 0 ? '#FF8A80' : '#FFF59D';
                ctx.fillText(ammoText, CONFIG.CANVAS_WIDTH - 214, 81);
                if (player.reloadTimer > 0) {
                    const reloadPct = 1 - player.reloadTimer / Math.max(1, player.reloadMax);
                    ctx.fillStyle = 'rgba(255,255,255,0.14)';
                    ctx.fillRect(CONFIG.CANVAS_WIDTH - 120, 72, 96, 7);
                    ctx.fillStyle = '#80CBC4';
                    ctx.fillRect(CONFIG.CANVAS_WIDTH - 120, 72, 96 * reloadPct, 7);
                }
            } else {
                ctx.fillStyle = '#B3E5FC';
                ctx.fillText(`招式: ${player.weapon.attackProfile.name} · 间隔 ${(player.weapon.attackProfile.cooldown / 60).toFixed(2)}s`, CONFIG.CANVAS_WIDTH - 214, 81);
            }

            drawPassiveHud();
            if (activeBoss && activeBoss.alive) {
                const bossBarY = touchMode ? 114 : 52;
                activeBoss.drawHealthBar(ctx, bossBarY);
                ctx.fillStyle = '#FFB300';
                ctx.font = 'bold 14px "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.strokeStyle = '#241200';
                ctx.lineWidth = 4;
                ctx.strokeText('BOSS 来袭: 白桦腐竹', CONFIG.CANVAS_WIDTH / 2, bossBarY + 38);
                ctx.fillText('BOSS 来袭: 白桦腐竹', CONFIG.CANVAS_WIDTH / 2, bossBarY + 38);
            }
        }

        function getPassiveHudRects() {
            return Array.from({ length: 4 }, (_, index) => ({
                x: PASSIVE_HUD_LAYOUT.x + index * (PASSIVE_HUD_LAYOUT.w + PASSIVE_HUD_LAYOUT.gap),
                y: PASSIVE_HUD_LAYOUT.y,
                w: PASSIVE_HUD_LAYOUT.w,
                h: PASSIVE_HUD_LAYOUT.h
            }));
        }

        function hitTestPassiveHud(mx, my) {
            return getPassiveHudRects().findIndex(rect => isInsideButton(mx, my, rect));
        }

        function getPassiveQuestProgress(def, entry) {
            if (!def || !entry || def.mode !== 'quest') return 0;
            const thresholds = def.relativeToMaxHp
                ? def.questThresholds.map(value => value * player.maxHp)
                : def.questThresholds;
            if (entry.stage >= thresholds.length) return 1;
            const target = thresholds[entry.stage] || 1;
            const previous = entry.stage > 0 ? thresholds[entry.stage - 1] : 0;
            return Math.max(0, Math.min(1, (entry.progress - previous) / Math.max(1, target - previous)));
        }

        function drawPassiveHud() {
            const now = performance.now();
            const rects = getPassiveHudRects();
            for (let index = 0; index < 4; index++) {
                const rect = rects[index];
                const { x, y, w: width, h: height } = rect;
                const entry = player.passives[index];
                ctx.fillStyle = 'rgba(3, 9, 18, 0.78)';
                ctx.fillRect(x, y, width, height);
                const def = entry ? PASSIVE_BY_ID[entry.id] : null;
                drawTierFrame(rect, def?.tier, now, entry ? 2 : 1);
                ctx.textAlign = 'center';
                if (!entry) {
                    ctx.fillStyle = '#607D8B';
                    ctx.font = 'bold 16px "Courier New", monospace';
                    ctx.fillText(`${index + 1}`, x + width / 2, y + 31);
                    ctx.font = '9px "Courier New", monospace';
                    ctx.fillText('空被动槽', x + width / 2, y + 52);
                    continue;
                }
                drawPassiveLogo(ctx, def, x + width / 2, y + 24, 36, now);
                ctx.fillStyle = getPassiveTierPaint(def, rect, now);
                ctx.font = 'bold 9px "Courier New", monospace';
                ctx.fillText(def.name, x + width / 2, y + 52, width - 5);
                const suffix = def.mode === 'stack' ? `Lv.${entry.level}` : def.mode === 'quest' ? `${entry.stage}/3` : '唯一';
                ctx.fillStyle = '#E3F2FD';
                ctx.font = 'bold 8px "Courier New", monospace';
                ctx.fillText(suffix, x + width - 13, y + 13);
                if (def.mode === 'quest') {
                    ctx.fillStyle = 'rgba(255,255,255,0.14)';
                    ctx.fillRect(x + 7, y + 61, width - 14, 4);
                    ctx.fillStyle = getPassiveTierPaint(def, rect, now);
                    ctx.fillRect(x + 7, y + 61, (width - 14) * getPassiveQuestProgress(def, entry), 4);
                }
            }
        }

        function openPassiveDetails(slot = 0) {
            if (gameState !== 'playing') return false;
            selectedPassiveSlot = Math.max(0, Math.min(3, slot));
            passiveDetailsOpen = true;
            syncEffectivePause();
            announce('被动详情已打开，游戏暂停。按 Escape 或点击关闭继续。');
            return true;
        }

        function closePassiveDetails() {
            if (!passiveDetailsOpen) return false;
            passiveDetailsOpen = false;
            syncEffectivePause();
            announce('被动详情已关闭，继续游戏。');
            return true;
        }

        function handlePassiveDetailsClick(mx, my) {
            if (!passiveDetailsOpen) return false;
            if (isInsideButton(mx, my, PASSIVE_DETAIL_CLOSE)) return closePassiveDetails();
            const index = PASSIVE_DETAIL_RECTS.findIndex(rect => isInsideButton(mx, my, rect));
            if (index >= 0) {
                selectedPassiveSlot = index;
                return true;
            }
            return false;
        }

        function drawPassiveDetailsOverlay(now = performance.now()) {
            if (!passiveDetailsOpen) return;
            ctx.save();
            ctx.fillStyle = 'rgba(1, 5, 12, 0.94)';
            ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);
            ctx.textAlign = 'center';
            ctx.fillStyle = '#E3F2FD';
            ctx.font = 'bold 26px "Courier New", monospace';
            ctx.fillText('被动构筑详情 · 游戏已暂停', CONFIG.CANVAS_WIDTH / 2, 45);
            PASSIVE_DETAIL_RECTS.forEach((rect, index) => {
                const entry = player.passives[index];
                const def = entry ? PASSIVE_BY_ID[entry.id] : null;
                ctx.fillStyle = index === selectedPassiveSlot ? 'rgba(31,54,78,0.96)' : 'rgba(8,15,25,0.94)';
                ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
                drawTierFrame(rect, def?.tier, now, index === selectedPassiveSlot ? 4 : 2);
                if (!def) {
                    ctx.fillStyle = '#607D8B';
                    ctx.font = 'bold 17px "Courier New", monospace';
                    ctx.fillText(`被动槽 ${index + 1} · 空`, rect.x + rect.w / 2, rect.y + 92);
                    return;
                }
                drawPassiveLogo(ctx, def, rect.x + 52, rect.y + 50, 58, now);
                ctx.textAlign = 'left';
                ctx.fillStyle = getPassiveTierPaint(def, rect, now);
                ctx.font = 'bold 13px "Courier New", monospace';
                ctx.fillText(`${PASSIVE_TIERS[def.tier].name} · ${def.mode === 'stack' ? `可升级 Lv.${entry.level}/${def.maxLevel}` : def.mode === 'quest' ? `任务 ${entry.stage}/3` : '唯一'}`, rect.x + 94, rect.y + 31);
                ctx.fillStyle = '#FFF';
                ctx.font = 'bold 22px "Courier New", monospace';
                ctx.fillText(def.name, rect.x + 94, rect.y + 61, rect.w - 110);
                ctx.fillStyle = '#CFD8DC';
                ctx.font = '13px "Courier New", monospace';
                const description = def.mode === 'stack'
                    ? def.descriptions[Math.min(entry.level, def.descriptions.length) - 1]
                    : def.descriptions[0];
                drawWrappedCanvasText(description, rect.x + 18, rect.y + 103, 28, 18, 3, 'left');
                if (def.mode === 'quest') {
                    const thresholds = def.relativeToMaxHp ? def.questThresholds.map(value => value * player.maxHp) : def.questThresholds;
                    const next = entry.stage < thresholds.length ? Math.ceil(thresholds[entry.stage]) : '完成';
                    ctx.fillStyle = 'rgba(255,255,255,0.14)';
                    ctx.fillRect(rect.x + 18, rect.y + 150, rect.w - 36, 8);
                    ctx.fillStyle = getPassiveTierPaint(def, rect, now);
                    ctx.fillRect(rect.x + 18, rect.y + 150, (rect.w - 36) * getPassiveQuestProgress(def, entry), 8);
                    ctx.fillStyle = '#B0BEC5';
                    ctx.font = '10px "Courier New", monospace';
                    ctx.fillText(`进度 ${Math.floor(entry.progress)} / ${next}`, rect.x + 18, rect.y + 145);
                }
                ctx.textAlign = 'center';
            });
            ctx.fillStyle = isInsideButton(mouseX, mouseY, PASSIVE_DETAIL_CLOSE) ? '#294A63' : '#13283A';
            ctx.fillRect(PASSIVE_DETAIL_CLOSE.x, PASSIVE_DETAIL_CLOSE.y, PASSIVE_DETAIL_CLOSE.w, PASSIVE_DETAIL_CLOSE.h);
            ctx.strokeStyle = '#90CAF9'; ctx.lineWidth = 2; ctx.strokeRect(PASSIVE_DETAIL_CLOSE.x, PASSIVE_DETAIL_CLOSE.y, PASSIVE_DETAIL_CLOSE.w, PASSIVE_DETAIL_CLOSE.h);
            ctx.fillStyle = '#E3F2FD'; ctx.font = 'bold 15px "Courier New", monospace'; ctx.textAlign = 'center';
            ctx.fillText('关闭并继续 [Esc]', PASSIVE_DETAIL_CLOSE.x + PASSIVE_DETAIL_CLOSE.w / 2, PASSIVE_DETAIL_CLOSE.y + 29);
            ctx.restore();
        }

        // ============ 波次完成处理 ============
        function onWaveComplete() {
            if (waveCompletionHandled || gameState !== 'playing') return;
            waveCompletionHandled = true;
            stopBossMusic();
            runStats.wavesCleared++;
            if (gameMode === 'endless') runStats.endlessWavesCleared++;
            player.completeMapPassives();
            player.hp = player.maxHp;
            player.tempShield = 0;
            projectiles.length = 0;
            if (gameMode === 'story' && currentWave === CONFIG.BOSS_WAVE) {
                // 通关
                gameState = 'win';
                gameEndTime = Date.now();
                winCode = generateWinCode();
                syncTouchControlsVisibility();
                announce('主线通关。按回车进入无尽模式，或按 Escape 返回标题。');
                return;
            }
            startMusic(currentBiome.musicKey);
            prepareWaveRewards();
        }

        function prepareWaveRewards() {
            if (player.weapon?.rarity === 'LEGENDARY') {
                openBirchShop();
                return;
            }
            gameState = 'reward';
            syncTouchControlsVisibility();
            rewardQueue = ['enchant'];
            const grantsWeaponChoice = gameMode === 'story'
                ? currentWave % 2 === 1
                : currentWave % 3 === 0;
            if (grantsWeaponChoice) rewardQueue.unshift('weapon');
            openNextReward();
        }

        function resetShopState() {
            shopView = 'menu';
            shopChoices = [];
            shopPackTier = null;
            shopRefreshAvailable = false;
            shopFragmentClaimed = false;
            shopPage = 0;
            pendingPassive = null;
            shopMessage = '';
        }

        function openBirchShop() {
            gameState = 'reward';
            currentRewardType = 'shop';
            rewardQueue = [];
            weaponChoices = [];
            enchantChoices = [];
            weaponRewardRefreshAvailable = false;
            resetShopState();
            syncTouchControlsVisibility();
            announce(`已持有传说武器，固定开启白桦商店。当前有 ${birchCoins} 枚白桦币。`);
        }

        function getAllLegendaryWeapons() {
            return WEAPON_DATABASE.LEGENDARY.map(data => new Weapon(data, 'LEGENDARY'));
        }

        function setShopMessage(message) {
            shopMessage = message;
            if (message) announce(message);
        }

        function openShopWeaponView() {
            if (birchCoins < 2) {
                setShopMessage('白桦币不足：更换任意传说武器需要 2 枚。');
                return false;
            }
            shopView = 'weapon';
            shopChoices = getAllLegendaryWeapons();
            shopPage = 0;
            shopMessage = '全部传说武器均可选择，每次更换消耗 2 枚。';
            return true;
        }

        function openShopFragmentView() {
            if (shopFragmentClaimed) {
                setShopMessage('本次白桦商店的免费碎片已经抽取。');
                return false;
            }
            shopFragmentClaimed = true;
            shopView = 'fragment';
            shopChoices = generateEnchantChoices(3, player.weapon);
            shopMessage = '免费碎片 3 选 1；返回视为放弃，本次不再重抽。';
            return true;
        }

        function openShopPassivePack(tier) {
            const tierInfo = PASSIVE_TIERS[tier];
            if (!tierInfo) return false;
            const choices = generatePassiveChoices(tier, 3);
            if (choices.length === 0) {
                setShopMessage(`${tierInfo.name}被动均已拥有或升满。`);
                return false;
            }
            if (birchCoins < tierInfo.cost) {
                setShopMessage(`白桦币不足：${tierInfo.name}技能包需要 ${tierInfo.cost} 枚。`);
                return false;
            }
            birchCoins -= tierInfo.cost;
            recordBirchCoinSpend(tierInfo.cost);
            shopView = 'passive';
            shopPackTier = tier;
            shopChoices = choices;
            shopRefreshAvailable = true;
            pendingPassive = null;
            shopMessage = `${tierInfo.name}技能包：3 选 1，可全部刷新一次，也可放弃（不退款）。`;
            return true;
        }

        function refreshShopPassivePack() {
            if (shopView !== 'passive' || !shopPackTier || !shopRefreshAvailable) {
                setShopMessage('本技能包的刷新机会已经使用。');
                return false;
            }
            const previousIds = shopChoices.map(choice => choice.id);
            const refreshed = generatePassiveChoices(shopPackTier, 3, previousIds);
            if (refreshed.length === 0) {
                setShopMessage('没有可替换的新被动，保留当前选项。');
                return false;
            }
            shopChoices = refreshed;
            shopRefreshAvailable = false;
            shopMessage = '技能包已全部刷新，本包不再提供第二次刷新。';
            return true;
        }

        function buyShopLegendary(pageIndex) {
            const absoluteIndex = shopPage * 3 + pageIndex;
            const weapon = shopChoices[absoluteIndex];
            if (!weapon || birchCoins < 2) return false;
            birchCoins -= 2;
            if (runStats) {
                recordBirchCoinSpend(2);
                runStats.weaponsClaimed++;
                if (gameMode === 'endless') runStats.endlessWeaponsClaimed++;
            }
            player.setWeapon(weapon);
            shopView = 'menu';
            shopChoices = [];
            shopMessage = `已花费 2 枚白桦币，更换为 ${weapon.name}。`;
            announce(shopMessage);
            return true;
        }

        function claimShopFragment(index) {
            const fragment = shopChoices[index];
            if (shopView !== 'fragment' || !fragment) return false;
            applyEnchantment(fragment);
            runStats.fragmentsClaimed++;
            if (gameMode === 'endless') runStats.endlessFragmentsClaimed++;
            shopView = 'menu';
            shopChoices = [];
            shopMessage = `获得 ${fragment.name}。`;
            announce(shopMessage);
            return true;
        }

        function chooseShopPassive(index) {
            const def = shopChoices[index];
            if (shopView !== 'passive' || !def) return false;
            const result = player.addOrUpgradePassive(def);
            if (result.needsReplacement) {
                pendingPassive = def;
                shopView = 'replace';
                shopMessage = '四个被动槽已满：选择一个旧被动替换，或放弃新被动。';
                return true;
            }
            if (!result.applied) return false;
            recordPassiveClaim();
            shopView = 'menu';
            shopChoices = [];
            shopMessage = result.upgraded ? `${def.name} 已升级。` : `获得${PASSIVE_TIERS[def.tier].name}被动：${def.name}。`;
            announce(shopMessage);
            return true;
        }

        function replaceShopPassive(index) {
            if (shopView !== 'replace' || !pendingPassive) return false;
            const old = player.passives[index];
            if (!old || !player.replacePassive(index, pendingPassive)) return false;
            const oldName = PASSIVE_BY_ID[old.id]?.name || '旧被动';
            const newName = pendingPassive.name;
            recordPassiveClaim();
            pendingPassive = null;
            shopView = 'menu';
            shopChoices = [];
            shopMessage = `已用 ${newName} 替换 ${oldName}。`;
            announce(shopMessage);
            return true;
        }

        function leaveBirchShop() {
            if (currentRewardType !== 'shop') return false;
            resetShopState();
            startNextWave();
            return true;
        }

        function openNextReward() {
            currentRewardType = rewardQueue.shift() || 'enchant';
            weaponRewardRefreshAvailable = currentRewardType === 'weapon';
            hoveredChoice = -1;
            hoveredRewardAction = null;
            if (currentRewardType === 'weapon') {
                const minRarity = player.weapon ? player.weapon.rarity : 'COMMON';
                weaponChoices = generateWeaponChoices(3, minRarity);
                enchantChoices = [];
            } else {
                enchantChoices = generateEnchantChoices(3, player.weapon);
                weaponChoices = [];
            }
            announce(currentRewardType === 'weapon'
                ? '武器奖励。按 1、2、3 选择，F 可全部刷新一次，S 不选择新武器。'
                : '属性碎片奖励。按数字 1、2、3 选择。');
        }

        function drawBackdropDetails() {
            ctx.save();
            // 远景雾带
            const haze = ctx.createLinearGradient(0, 180, 0, 400);
            haze.addColorStop(0, 'rgba(255,255,255,0)');
            haze.addColorStop(1, 'rgba(5,12,24,0.25)');
            ctx.fillStyle = haze;
            ctx.fillRect(0, 160, CONFIG.CANVAS_WIDTH, 260);

            // 两层视差山脉，以稳定坐标绘制，避免纹理闪烁。
            const farOffset = -((camera.x * 0.08) % 240);
            ctx.fillStyle = 'rgba(25, 45, 68, 0.28)';
            for (let x = farOffset - 240; x < CONFIG.CANVAS_WIDTH + 240; x += 240) {
                ctx.beginPath();
                ctx.moveTo(x, 365);
                ctx.lineTo(x + 72, 235);
                ctx.lineTo(x + 132, 320);
                ctx.lineTo(x + 190, 260);
                ctx.lineTo(x + 260, 365);
                ctx.closePath();
                ctx.fill();
            }

            const nearOffset = -((camera.x * 0.16) % 150);
            ctx.fillStyle = 'rgba(6, 24, 35, 0.3)';
            for (let x = nearOffset - 150; x < CONFIG.CANVAS_WIDTH + 150; x += 150) {
                ctx.beginPath();
                ctx.moveTo(x, 410);
                ctx.lineTo(x + 52, 298);
                ctx.lineTo(x + 104, 410);
                ctx.closePath();
                ctx.fill();
            }
            ctx.restore();
        }

        function drawPostEffects() {
            ctx.save();
            const vignette = ctx.createRadialGradient(
                CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT / 2, 150,
                CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT / 2, 560
            );
            vignette.addColorStop(0, 'rgba(0,0,0,0)');
            vignette.addColorStop(1, 'rgba(0,0,0,0.48)');
            ctx.fillStyle = vignette;
            ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);

            if (damageFlash > 0 && !reducedMotion) {
                ctx.globalAlpha = Math.min(0.24, damageFlash / 45);
                ctx.fillStyle = '#FF1744';
                ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);
            }
            ctx.restore();
        }

        // ============ 开始下一波 ============
        function startNextWave() {
            currentWave++;
            gameState = 'playing';
            canvas.style.cursor = 'crosshair';
            syncTouchControlsVisibility();
            clearCombatTransients(true);
            spawnEnemiesForWave();
        }

        function restartCurrentWave() {
            stopBossMusic();
            player.hp = player.maxHp;
            clearCombatTransients(true);
            gameState = 'playing';
            syncTouchControlsVisibility();
            spawnEnemiesForWave();
        }

        function restartGame() {
            stopBossMusic();
            stopMusic();
            clearCombatTransients(true);
            gameMode = 'story';
            currentWave = 1;
            killCount = 0;
            birchCoins = 0;
            gameStartTime = Date.now();
            gameEndTime = null;
            winCode = '';
            runStats = createRunStats('story', gameStartTime);
            lastRunSummary = null;
            player.resetProgression();
            player.hp = player.maxHp;
            gameState = 'playing';
            resetPauseForStateTransition();
            currentRewardType = 'weapon';
            weaponRewardRefreshAvailable = false;
            weaponChoices = [];
            enchantChoices = [];
            rewardQueue = [];
            resetShopState();
            syncTouchControlsVisibility();
            spawnEnemiesForWave();
        }

        function startEndlessMode() {
            gameMode = 'endless';
            currentWave = CONFIG.BOSS_WAVE;
            gameEndTime = null;
            beginEndlessStats(Date.now());
            clearCombatTransients(true);
            player.hp = player.maxHp;
            if (player.weapon?.rarity === 'LEGENDARY') {
                openBirchShop();
            } else {
                gameState = 'reward';
                syncTouchControlsVisibility();
                rewardQueue = ['enchant'];
                openNextReward();
            }
            startMusic(currentBiome.musicKey);
        }

        function clearInputState() {
            Object.keys(keys).forEach(key => { keys[key] = false; });
            touchAttackPointerIds.clear();
            canvasAttackPointerIds.clear();
            Object.keys(touchActive).forEach(key => { touchActive[key] = false; });
            syncPointerAttackState();
        }

        function clearCombatTransients(resetInvincibility = true) {
            projectiles.length = 0;
            particles.length = 0;
            floatingTexts.length = 0;
            activeBoss = null;
            treasureChest = null;
            enemies = [];
            waveCompletionHandled = false;
            waveObjective = 'combat';
            chestPromptShown = false;
            chestGuidePulse = 0;
            screenShake = 0;
            damageFlash = 0;
            player.x = 100;
            player.y = 100;
            player.vx = 0;
            player.vy = 0;
            player.attacking = false;
            player.attackTimer = 0;
            player.attackCooldown = 0;
            player.attackEffectTriggered = false;
            player.healAccumulator = 0;
            player.reloadTimer = 0;
            player.reloadMax = 0;
            player.ammo = player.getMagazineSize();
            if (resetInvincibility) player.invincible = 0;
            clearInputState();
        }

        function resetToTitle() {
            stopBossMusic();
            stopMusic();
            clearCombatTransients(true);
            currentWave = 0;
            gameMode = 'story';
            killCount = 0;
            birchCoins = 0;
            runStats = createRunStats('story');
            lastRunSummary = null;
            gameState = 'title';
            hoveredChoice = -1;
            hoveredRewardAction = null;
            weaponChoices = [];
            enchantChoices = [];
            rewardQueue = [];
            currentRewardType = 'weapon';
            weaponRewardRefreshAvailable = false;
            resetShopState();
            player.hp = player.maxHp;
            resetPauseForStateTransition();
            disableTouchMode();
            announce('标题界面。按 Enter 开始游戏。');
        }

        // ============ 绘制奖励界面 ============
        function drawRewardScreen() {
            if (currentRewardType === 'shop') {
                drawBirchShop();
                return;
            }
            // 半透明背景
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);

            // 标题
            ctx.fillStyle = '#FFD54F';
            ctx.font = 'bold 32px "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.fillText(`🎉 Wave ${currentWave} 完成！`, CONFIG.CANVAS_WIDTH / 2, 80);

            ctx.fillStyle = '#FFF';
            ctx.font = '18px "Courier New", monospace';
            const rewardTitle = currentRewardType === 'weapon' ? '选择一件武器' : '选择一枚永久属性碎片';
            ctx.fillText(rewardTitle, CONFIG.CANVAS_WIDTH / 2, 115);
            if (rewardQueue.length > 0) {
                ctx.fillStyle = '#90A4AE';

        function getShopChoiceRects(count = 3) {

        function drawWrappedCanvasText(text, x, y, maxChars = 16, lineHeight = 18, maxLines = 3) {
            const chars = [...String(text || '')];
            const lines = [];
            while (chars.length && lines.length < maxLines) lines.push(chars.splice(0, maxChars).join(''));
            if (chars.length && lines.length) lines[lines.length - 1] = `${lines[lines.length - 1].slice(0, Math.max(1, maxChars - 1))}…`;
            lines.forEach((line, index) => ctx.fillText(line, x, y + index * lineHeight));
        }

        function formatDuration(durationMs) {
            const totalSeconds = Math.max(0, Math.floor(durationMs / 1000 + 1e-9));

            return `${minutes}:${String(seconds).padStart(2, '0')}`;
        }

        function formatStat(value) {
            return Number.isInteger(value) ? value : Number(value.toFixed(2));

            const labels = {

            };
            return labels[cause] || '战斗中阵亡';

        function generateWinCode() {
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            let part = '';
            for (let i = 0; i < 4; i++) part += letters[Math.floor(Math.random() * letters.length)];
            const ts = Date.now().toString();
            const tail = ts.slice(-4);
            return `MC2D-WIN-${part}-${tail}`;
        }
