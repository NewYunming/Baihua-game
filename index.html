        // ============ 绘制武器图标 ============
        function drawWeaponIcon(ctx, x, y, weapon) {
            ctx.save();
            
            // 发光效果
            if (weapon.rarity !== 'COMMON') {
                ctx.shadowColor = weapon.glowColor;
                ctx.shadowBlur = weapon.rarity === 'LEGENDARY' ? 15 : 8;
            }

            const bladeColor = weapon.rarity === 'COMMON' ? '#9E9E9E' : weapon.color;
            const model = weapon.model || 'sword';

            // 柄
            ctx.fillStyle = '#6D4C41';
            ctx.fillRect(x + 28, y + 60, 10, 20);
            ctx.fillRect(x + 30, y + 46, 6, 16);
            ctx.fillStyle = weapon.color;
            ctx.fillRect(x + 22, y + 48, 20, 6);

            if (model === 'dagger') {
                ctx.fillStyle = bladeColor;
                ctx.fillRect(x + 32, y + 20, 6, 30);
                ctx.fillRect(x + 33, y + 12, 4, 8);
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.fillRect(x + 34, y + 22, 2, 20);
            } else if (model === 'axe') {
                ctx.fillStyle = '#5D4037';
                ctx.fillRect(x + 32, y + 16, 4, 50);
                ctx.fillStyle = bladeColor;
                ctx.fillRect(x + 36, y + 18, 16, 18);
                ctx.fillRect(x + 22, y + 28, 12, 16);
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.fillRect(x + 46, y + 20, 2, 14);
            } else if (model === 'hammer') {
                ctx.fillStyle = '#4E342E';
                ctx.fillRect(x + 32, y + 18, 4, 52);
                ctx.fillStyle = bladeColor;
                ctx.fillRect(x + 22, y + 18, 24, 16);
                ctx.fillRect(x + 24, y + 34, 20, 12);
                ctx.fillStyle = '#CFD8DC';
                ctx.fillRect(x + 28, y + 20, 6, 10);
            } else if (model === 'greatsword') {
                ctx.fillStyle = bladeColor;
                ctx.fillRect(x + 32, y + 6, 8, 52);
                ctx.fillRect(x + 33, y - 6, 6, 12);
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.fillRect(x + 36, y + 8, 2, 46);
            } else if (model === 'scythe') {
                ctx.fillStyle = '#4E342E';
                ctx.fillRect(x + 32, y + 10, 4, 58);
                ctx.fillStyle = bladeColor;
                ctx.fillRect(x + 36, y + 10, 18, 8);
                ctx.fillRect(x + 50, y + 12, 4, 24);
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.fillRect(x + 40, y + 12, 2, 12);
            } else {
                ctx.fillStyle = bladeColor;
                ctx.fillRect(x + 32, y, 6, 52);
                ctx.beginPath();
                ctx.moveTo(x + 32, y);
                ctx.lineTo(x + 35, y - 12);
                ctx.lineTo(x + 38, y);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.fillRect(x + 34, y + 6, 2, 42);
            }

            ctx.restore();
        }

        // ============ 游戏初始化 ============
        generateMap();
        generateClouds();

        const player = new Player(100, 200);
        let enemies = [];

        // 根据波次生成敌人
        function spawnEnemiesForWave() {
            enemies = [];
            activeBoss = null;

            // 每波刷新主题与地图
            const biome = pickBiomeForWave(currentWave);
            generateMap(biome);
            generateClouds();
            spawnWeatherParticles(currentBiome.weather);

            // Boss 波
            if (currentWave === CONFIG.BOSS_WAVE) {
                totalEnemiesInWave = 1;
                enemiesRemaining = 1;
                activeBoss = new BirchCorruptBoss(currentWave);
                startBossMusic();
                return;
            }

            const enemyCount = CONFIG.BASE_ENEMIES_PER_WAVE + Math.floor((currentWave - 1) * 1.5);
            
            const margin = 4 * CONFIG.TILE_SIZE;
            const minX = margin;
            const maxX = MAP_WIDTH * CONFIG.TILE_SIZE - margin;

            for (let i = 0; i < enemyCount; i++) {
                let tries = 0;
                let x = minX + Math.random() * (maxX - minX);
                // 让生成位置与玩家保持一定距离，避免刷到脚边
                while (Math.abs(x - player.x) < 180 && tries < 8) {
                    x = minX + Math.random() * (maxX - minX);
                    tries++;
                }

                // 找到该位置的地面高度
                let groundY = 0;
                for (let ty = 0; ty < MAP_HEIGHT; ty++) {
                    const tx = Math.floor(x / CONFIG.TILE_SIZE);
                    if (tiles[ty] && tiles[ty][tx] > 0) {
                        groundY = ty * CONFIG.TILE_SIZE - 32;
                        break;
                    }
                }
                if (groundY === 0) {
                    groundY = (MAP_HEIGHT - 2) * CONFIG.TILE_SIZE - 32;
                }
                
                // 按权重选择敌人类型
                const roll = Math.random();
                let type = 'zombie';
                if (roll < 0.2) type = 'runner';
                else if (roll < 0.4) type = 'tank';
                else if (roll < 0.6) type = 'shooter';
                enemies.push(new Enemy(x, groundY, currentWave, type));
            }

            // 兜底：若意外未生成，强制生成 3 个僵尸在玩家附近
            if (enemies.length === 0) {
                for (let i = 0; i < 3; i++) {
                    const x = player.x + 150 + i * 60;
                    const groundY = (MAP_HEIGHT - 2) * CONFIG.TILE_SIZE - 32;
                    enemies.push(new Enemy(Math.min(maxX, Math.max(minX, x)), groundY, currentWave, 'zombie'));
                }
            }

            totalEnemiesInWave = enemies.length;
            enemiesRemaining = enemies.length;
        }
        
        // 初始化为标题界面
        resetToTitle();

        // ============ 输入处理 ============
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (['Space', 'ArrowUp', 'ArrowDown'].includes(e.code)) {
                e.preventDefault();
            }
            initAudio();
        });

        window.addEventListener('keyup', e => {
            keys[e.code] = false;
        });

        touchButtons.forEach(btn => {
            const action = btn.dataset.action;
            const setActive = (state) => {
                touchActive[action] = state;
                if (action === 'left') keys['KeyA'] = state;
                if (action === 'right') keys['KeyD'] = state;
                if (action === 'jump') keys['Space'] = state;
                if (action === 'attack') mousePressed = state;
                if (action === 'heal') keys['KeyU'] = state;
            };
            const start = e => { e.preventDefault(); e.stopPropagation(); setActive(true); };
            const end = e => { e.preventDefault(); e.stopPropagation(); setActive(false); };
            btn.addEventListener('touchstart', start, { passive: false });
            btn.addEventListener('touchend', end, { passive: false });
            btn.addEventListener('touchcancel', end, { passive: false });
            btn.addEventListener('pointerdown', start);
            btn.addEventListener('pointerup', end);
            btn.addEventListener('pointercancel', end);
            btn.addEventListener('click', e => { e.preventDefault(); e.stopPropagation(); setActive(true); setTimeout(() => setActive(false), 60); });
        });

        canvas.addEventListener('mousedown', e => {
            if (e.button === 0) {
                initAudio();
                const pos = getCanvasCoords(e.clientX, e.clientY);
                mouseX = pos.x; mouseY = pos.y;

                if (gameState === 'title') {
                    handleTitleClick(e);
                    return;
                }

                if (gameState === 'reward') {
                    updateHoveredChoice();
                    handleRewardClick(e);
                    return;
                }

                if (gameState === 'gameover') {
                    resetToTitle();
                    return;
                }

                if (gameState === 'win') {
                    restartGame();
                    return;
                }

                if (gameState === 'playing') {
                    mousePressed = true;
                }
            }
        });

        canvas.addEventListener('touchstart', e => {
            initAudio();
            const touch = e.touches[0];
            if (!touch) return;
            const pos = getCanvasCoords(touch.clientX, touch.clientY);
            mouseX = pos.x; mouseY = pos.y;
            if (gameState === 'title') {
                handleTitleClick({ clientX: touch.clientX, clientY: touch.clientY, preventDefault: () => {} });
                return;
            }
            if (gameState === 'reward') {
                updateHoveredChoice(); handleRewardClick({});
                return;
            }
            if (gameState === 'gameover') {
                resetToTitle();
                return;
            }
            if (gameState === 'win') {
                restartGame();
                return;
            }
            if (gameState === 'playing') {
                mousePressed = true;
            }
        }, { passive: false });

        canvas.addEventListener('mouseup', e => {
            if (e.button === 0) mousePressed = false;
        });

        canvas.addEventListener('touchend', () => {
            mousePressed = false;
        });

        canvas.addEventListener('mousemove', e => {
            const pos = getCanvasCoords(e.clientX, e.clientY);
            mouseX = pos.x;
            mouseY = pos.y;
            
            // 更新悬停状态
            if (gameState === 'reward') {
                updateHoveredChoice();
            }
        });

        canvas.addEventListener('touchmove', e => {
            if (e.touches[0]) {
                const pos = getCanvasCoords(e.touches[0].clientX, e.touches[0].clientY);
                mouseX = pos.x;
                mouseY = pos.y;
                if (gameState === 'reward') {
                    updateHoveredChoice();
                }
            }
        }, { passive: false });

        function updateHoveredChoice() {
            const cardWidth = 250;
            const cardHeight = 280;
            const cardSpacing = 30;
            const startX = (CONFIG.CANVAS_WIDTH - (cardWidth * 3 + cardSpacing * 2)) / 2;
            const cardY = 140;

            hoveredChoice = -1;
            const pool = currentRewardType === 'weapon' ? weaponChoices : enchantChoices;
            pool.forEach((weapon, index) => {
                const cardX = startX + index * (cardWidth + cardSpacing);
                if (mouseX >= cardX && mouseX <= cardX + cardWidth &&
                    mouseY >= cardY && mouseY <= cardY + cardHeight) {
                    hoveredChoice = index;
                }
            });
        }

        function handleRewardClick(e) {
            const pool = currentRewardType === 'weapon' ? weaponChoices : enchantChoices;
            if (hoveredChoice >= 0 && hoveredChoice < pool.length) {
                if (currentRewardType === 'weapon') {
                    player.setWeapon(pool[hoveredChoice]);
                } else if (currentRewardType === 'enchant') {
                    applyEnchantment(pool[hoveredChoice]);
                }
                startNextWave();
            }
        }

        function handleTitleClick(e) {
            const pos = getCanvasCoords(e.clientX, e.clientY);
            const mx = pos.x;
            const my = pos.y;
            if (isInsideButton(mx, my, TITLE_BUTTONS.start)) {
                initAudio();
                disableTouchMode();
                restartGame();
                return;
            }
            if (isInsideButton(mx, my, TITLE_BUTTONS.touch)) {
                initAudio();
                enableTouchMode();
                restartGame();
                return;
            }
        }

        function isInsideButton(mx, my, btn) {
            return mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h;
        }

        function hitRetryButton(e) {
            const pos = getCanvasCoords(e.clientX, e.clientY);
            const mx = pos.x;
            const my = pos.y;
            const btn = getRetryButtonRect();
            return mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h;
        }

        canvas.addEventListener('contextmenu', e => e.preventDefault());

        // ============ 游戏循环 ============
        function update() {
            if (gameState !== 'playing') return;
            
            // 更新玩家
            player.update();

            // 更新敌人
            enemies.forEach(enemy => {
                enemy.update(player);

                // 检测攻击命中
                const attackBox = player.getAttackBox();
                if (attackBox && enemy.alive && !enemy.hitThisAttack) {
                    if (enemy.intersects(attackBox.x, attackBox.y, attackBox.width, attackBox.height)) {
                        enemy.takeDamage(player.weapon.damage, player.facing, player.weapon.getKnockback());
                        playSfx(`hit_${player.weapon.model || 'sword'}`);
                        
                        // 传说武器命中粒子
                        if (player.weapon.hasParticles) {
                            spawnAttackParticles(enemy.x + enemy.width / 2, enemy.y + enemy.height / 2, player.weapon.particleColor, 15);
                        }
                    }
                }
                
                // 重置攻击命中状态（当玩家不在攻击时）
                if (!player.attacking) {
                    enemy.hitThisAttack = false;
                }
            });

            // 敌人掉出地图视为死亡
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                if (e.alive && e.y > MAP_HEIGHT * CONFIG.TILE_SIZE + 200) {
                    e.alive = false;
                    enemiesRemaining--;
                    killCount++;
                    if (enemiesRemaining <= 0) onWaveComplete();
                }
            }

            // 玩家攻击 Boss 命中
            if (activeBoss && activeBoss.alive) {
                const attackBox = player.getAttackBox();
                if (attackBox && activeBoss.intersects(attackBox.x, attackBox.y, attackBox.width, attackBox.height)) {
                    activeBoss.takeDamage(player.weapon.damage, player.facing, player.weapon.getKnockback());
                    playSfx(`hit_${player.weapon.model || 'sword'}`);
                }
                if (!player.attacking) {
                    activeBoss.hitThisAttack = false;
                }
            }

            // 更新Boss
            if (activeBoss) {
                activeBoss.update(player);
            }

            // 更新投射物
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                if (!p.update()) {
                    projectiles.splice(i, 1);
                    continue;
                }
                // 碰撞检测
                if (p.owner === 'enemy') {
                    if (player.intersects(p.x, p.y, p.size, p.size)) {
                        player.takeDamage(p.dmg);
                        projectiles.splice(i, 1);
                    }
                }
            }
            
            // 更新粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                if (!particles[i].update()) {
                    particles.splice(i, 1);
                }
            }

            // 天气粒子
            updateWeatherParticles(currentBiome.weather);

            // 更新相机
            camera.x = player.x - CONFIG.CANVAS_WIDTH / 2 + player.width / 2;
            camera.y = player.y - CONFIG.CANVAS_HEIGHT / 2 + player.height / 2;

            // 相机边界限制
            camera.x = Math.max(0, Math.min(camera.x, MAP_WIDTH * CONFIG.TILE_SIZE - CONFIG.CANVAS_WIDTH));
            camera.y = Math.max(0, Math.min(camera.y, MAP_HEIGHT * CONFIG.TILE_SIZE - CONFIG.CANVAS_HEIGHT));
        }

        function render() {
            // 清屏
            ctx.clearRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);

            if (gameState === 'title') {
                drawTitleScreen();
                return;
            }

            // 绘制背景
            drawSky();
            drawClouds();

            // 绘制地图
            drawMap();

            // 绘制敌人
            enemies.forEach(enemy => enemy.draw(ctx));

            // 绘制Boss
            if (activeBoss) activeBoss.draw(ctx);

            // 绘制玩家
            player.draw(ctx);
            
            // 投射物
            projectiles.forEach(p => p.draw(ctx));

            // 绘制粒子
            particles.forEach(p => p.draw(ctx));

            // 天气
            drawWeatherParticles(currentBiome.weather);

            // 绘制UI
            drawUI();
            
            // 绘制奖励界面
            if (gameState === 'reward') {
                drawRewardScreen();
            }

            if (gameState === 'gameover') {
                drawGameOver();
            }

            if (gameState === 'win') {
                drawWinScreen();
            }

            // 求饶字幕贴合玩家位置
            if (keys['KeyU'] && player) {
                const screenX = player.x - camera.x + player.width / 2;
                const screenY = player.y - camera.y - 16;
                const clampedX = Math.max(40, Math.min(CONFIG.CANVAS_WIDTH - 40, screenX));
                const clampedY = Math.max(30, screenY);
                ctx.save();
                ctx.fillStyle = '#FFD54F';
                ctx.font = 'bold 22px "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.fillText('腐竹饶命！', clampedX, clampedY);
                ctx.restore();
            }
        }

        function gameLoop() {
            update();
            render();
            requestAnimationFrame(gameLoop);
        }

        // 开始游戏
        gameLoop();

        // 窗口失焦时重置按键状态
        window.addEventListener('blur', () => {
            for (let key in keys) {
                keys[key] = false;
            }
            mousePressed = false;
            for (let k in touchActive) touchActive[k] = false;
        });
    </script>
</body>
</html>
