                if (critical) damage *= this.hasPassive('jeweled_arms') ? 1.7 : 1.5;
                return { damage, critical };
            }

            getIncomingDamageMultiplier() {
                let multiplier = this.lastStandActive && this.hasPassive('last_stand') ? 0.8 : 1;
                const titanStage = this.getPassiveStage('titan_resolve');
                multiplier *= 1 - (PASSIVE_BY_ID.titan_resolve.questBonuses[titanStage - 1] || 0);
                if (this.hasPassive('rooted_guard') && this.onGround && Math.abs(this.vx) < 0.25) multiplier *= 0.85;
                if (this.hasPassive('glass_crown')) multiplier *= 1.2;
                return Math.max(0.55, multiplier);
            }

            getExecutionThreshold(target) {
                const stage = this.getPassiveStage('arsenal_codex');
                const threshold = PASSIVE_BY_ID.arsenal_codex.questBonuses[stage - 1] || 0;
                return target instanceof BirchCorruptBoss ? threshold * 0.5 : threshold;
            }

            advancePassiveQuest(id, amount) {
                const entry = this.getPassiveEntry(id);
                const def = PASSIVE_BY_ID[id];
                if (!entry || def?.mode !== 'quest' || !Number.isFinite(amount) || amount <= 0) return false;
                entry.progress += amount;
                const thresholds = def.relativeToMaxHp
                    ? def.questThresholds.map(value => value * this.maxHp)
                    : def.questThresholds;
                let nextStage = entry.stage;
                while (nextStage < thresholds.length && entry.progress >= thresholds[nextStage]) nextStage++;
                if (nextStage === entry.stage) return false;
                entry.stage = nextStage;
                if (['birch_skin', 'raid_boss'].includes(id)) this.setWeapon(this.weapon);
                announce(`${def.name}任务进化至 ${entry.stage} 阶。`);
                floatingTexts.push(new FloatingText(this.x + this.width / 2, this.y - 22, `${def.name} III`.replace('III', `Lv.${entry.stage}`), def.tier === 'PRISMATIC' ? 'prismatic' : PASSIVE_TIERS[def.tier].color, 14));
                return true;
            }

            addOrUpgradePassive(def) {
                if (!def) return { applied: false, needsReplacement: false };
                const existing = this.getPassiveEntry(def.id);
                if (existing) {
                    if (def.mode !== 'stack' || existing.level >= def.maxLevel) return { applied: false, needsReplacement: false };
                    existing.level++;
                    this.setWeapon(this.weapon);
                    return { applied: true, upgraded: true, needsReplacement: false };
                }
                if (this.passives.length >= 4) return { applied: false, needsReplacement: true };
                this.passives.push({ id: def.id, level: 1, progress: 0, stage: 0 });
                if (def.id === 'phoenix_protocol') this.phoenixAvailable = true;
                this.setWeapon(this.weapon);
                return { applied: true, upgraded: false, needsReplacement: false };
            }

            replacePassive(index, def) {
                if (!def || index < 0 || index >= this.passives.length) return false;
                this.passives[index] = { id: def.id, level: 1, progress: 0, stage: 0 };
                this.phoenixAvailable = this.hasPassive('phoenix_protocol');
                if (!this.hasPassive('patient_strike')) this.patientStrikeArmed = false;
                this.setWeapon(this.weapon);
                return true;
            }

            resetMapPassives() {
                this.phoenixAvailable = this.hasPassive('phoenix_protocol');
                if (!this.hasPassive('patient_strike')) this.patientStrikeArmed = false;
                this.tempShield = 0;
                this.flawlessActive = this.hasPassive('flawless_route');
                this.mapHpDamageTaken = 0;
                this.gravityTimer = 270;
                this.worldWalkerCooldown = 0;
            }

            updatePassiveEffects() {
                if (this.missileCooldown > 0) this.missileCooldown--;
                if (this.rhythmTimer > 0) this.rhythmTimer--;
                if (this.counterWindow > 0) this.counterWindow--;
                if (this.counterCooldown > 0) this.counterCooldown--;
                if (this.colossusCooldown > 0) this.colossusCooldown--;
                if (this.worldWalkerCooldown > 0) this.worldWalkerCooldown--;
                if (!this.attacking && this.attackCooldown <= 0) this.patientIdleFrames++;
                this.safeFrames++;
                const hpRatio = this.maxHp > 0 ? this.hp / this.maxHp : 1;
                if (!this.hasPassive('last_stand')) this.lastStandActive = false;
                else if (!this.lastStandActive && hpRatio < 0.35) this.lastStandActive = true;
                else if (this.lastStandActive && hpRatio > 0.45) this.lastStandActive = false;

                if (this.hasPassive('field_bandage') && this.safeFrames >= 300 && this.hp < this.maxHp) {
                    this.passiveHealAccumulator += this.maxHp * 0.01 / 60;
                    const heal = Math.floor(this.passiveHealAccumulator);
                    if (heal > 0) {
                        this.heal(heal);
                        this.passiveHealAccumulator -= heal;
                    }
                }

                if (this.hasPassive('pressure_cooker')) {
                    this.pressureTimer--;
                    const stage = this.getPassiveStage('pressure_cooker');
                    const interval = stage >= 2 ? 42 : 60;
                    if (this.pressureTimer <= 0) {
                        this.pressureTimer = interval;
                        this.triggerPressureCooker(stage);
                    }
                }

                if (this.hasPassive('gravity_heart')) {
                    this.gravityTimer--;
                    if (this.gravityTimer <= 0) {
                        this.gravityTimer = 270;
                        this.triggerGravityHeart();
                    }
                }

                const syndicateStage = this.getPassiveStage('birch_syndicate');
                if (syndicateStage > 0) {
                    this.syndicateTimer--;
                    if (this.syndicateTimer <= 0) {
                        this.syndicateTimer = 90;
                        this.launchSyndicateBlades(syndicateStage);
                    }
                }
            }

            heal(amount) {
                if (!Number.isFinite(amount) || amount <= 0 || this.hp <= 0) return 0;
                const missing = Math.max(0, this.maxHp - this.hp);
                const restored = Math.min(missing, amount);
                this.hp += restored;
                const overflow = Math.max(0, amount - restored);
                const shieldRatio = getPassiveValue('overheal_aegis', this.getPassiveLevel('overheal_aegis'));
                if (overflow > 0 && shieldRatio > 0) {
                    const cap = this.maxHp * shieldRatio;
                    this.tempShield = Math.min(cap, this.tempShield + overflow * 0.5);
                }
                return restored;
            }

            resolveTreasureChest() {
                if (!this.hasPassive('locksmith')) return 0;
                this.advancePassiveQuest('locksmith', 1);
                const stage = this.getPassiveStage('locksmith');
                this.heal(this.maxHp * [0, 0.05, 0.10, 0.15][stage]);
                return PASSIVE_BY_ID.locksmith.questBonuses[stage - 1] || 0;
            }

            completeMapPassives() {
                if (this.hasPassive('flawless_route') && this.mapHpDamageTaken <= 0) {
                    this.advancePassiveQuest('flawless_route', 1);
                }
            }

            triggerGravityHeart() {
                const centerX = this.x + this.width / 2;
                const centerY = this.y + this.height / 2;
                for (const enemy of enemies) {
                    if (!enemy.alive) continue;
                    const dx = getWrappedDeltaX(enemy.x + enemy.width / 2, centerX);
                    const dy = centerY - (enemy.y + enemy.height / 2);
                    if (dx * dx + dy * dy > 280 * 280) continue;
                    const factor = enemy.elite ? 0.5 : 1;
                    enemy.knockbackVx = Math.sign(dx) * 4.8 * factor;
                    enemy.knockbackTimer = Math.max(enemy.knockbackTimer, Math.round(18 * factor));
                    enemy.skillCooldown += Math.round(30 * factor);
                }
                spawnAttackParticles(centerX, centerY, '#9FA8DA', 24);
            }

            launchSyndicateBlades(count) {
                const availableTargets = activeBoss?.alive ? [...enemies.filter(enemy => enemy.alive), activeBoss] : enemies.filter(enemy => enemy.alive);
                const targets = availableTargets.slice(0, count);
                targets.forEach((target, index) => {
                    const originX = this.x + this.width / 2;
                    const originY = this.y + 10;
                    const angle = Math.atan2(target.y + target.height / 2 - originY,
                        getWrappedDeltaX(originX, target.x + target.width / 2));
                    projectiles.push(new Projectile(originX, originY, Math.cos(angle) * 9, Math.sin(angle) * 9,
                        this.getAttackDamage() * 0.3, '#FFF176', 'player', {
                            size: 4, life: 150, model: 'coin', knockback: 0, knockbackFrames: 0,
                            damageSource: 'syndicate', passiveDamage: true, canCrit: false, noTrigger: true
                        }));
                });
            }

            triggerWorldWalker() {
                if (!this.hasPassive('world_walker') || this.worldWalkerCooldown > 0) return false;
                this.worldWalkerCooldown = 180;
                this.advancePassiveQuest('world_walker', 1);
                const stage = this.getPassiveStage('world_walker');
                const multiplier = [0.6, 0.9, 1.3, 1.8][stage];
                this.invincible = Math.max(this.invincible, 24);
                const token = `world-walker-${currentWave}-${Date.now()}`;
                const targets = activeBoss?.alive ? [...enemies, activeBoss] : enemies;
                for (const enemy of targets) {
                    if (!enemy.alive) continue;
                    const dx = getWrappedDeltaX(this.x + this.width / 2, enemy.x + enemy.width / 2);
                    if (Math.abs(dx) > 190) continue;
                    enemy.takeDamage(this.getAttackDamage() * multiplier, Math.sign(dx) || 1, 8, `${token}-${enemy.x}`, 8, {
                        source: 'worldWalker', passiveDamage: true, canCrit: false, noTrigger: true
                    });
                }
                spawnAttackParticles(this.x + this.width / 2, this.y + this.height / 2, '#80DEEA', 28);
                return true;
            }

            triggerPressureCooker(stage = 0) {
                this.pressureSequence++;
                const radius = 110 + (stage >= 1 ? 20 : 0) + (stage >= 3 ? 20 : 0);
                const maxStacks = stage >= 3 ? 9 : 6;
                const centerX = this.x + this.width / 2;
                const centerY = this.y + this.height / 2;
                const pressureTargets = activeBoss?.alive ? [...enemies, activeBoss] : enemies;
                for (const enemy of pressureTargets) {
                    if (!enemy.alive) continue;
                    const dx = getWrappedDeltaX(centerX, enemy.x + enemy.width / 2);
                    const dy = enemy.y + enemy.height / 2 - centerY;
                    if (dx * dx + dy * dy > radius * radius) continue;
                    enemy.pressureStacks = Math.min(maxStacks, (enemy.pressureStacks || 0) + 1);
                    enemy.pressureStackTimer = 150;
                    const base = this.getAttackDamage() * 0.04 + this.maxHp * 0.0025;
                    const cap = enemy.maxHp * 0.03;
                    enemy.takeDamage(Math.min(cap, base * enemy.pressureStacks), 0, 0, `pressure-${currentWave}-${this.pressureSequence}-${enemy.x}`, 0, {
                        source: 'pressureCooker', passiveDamage: true, canCrit: false, noTrigger: true
                    });
                }
            }

            getEffectiveDamageBonus(pelletCount = this.weapon?.pellets || 1) {
                if (!this.weapon) return 0;
                const effective = this.upgrades.damage * this.weapon.getFragmentEfficiency();
                return this.weapon.isRanged ? effective / Math.max(1, pelletCount) : effective;
            }

            getAttackDamage(pelletCount = this.weapon?.pellets || 1) {
                return this.weapon.damage + this.getEffectiveDamageBonus(pelletCount);
            }

            getAttackKnockback() {
                return this.weapon.getKnockback() * (this.hasPassive('dual_wield') ? 0.6 : 1);
            }

            getMagazineSize() {
                if (!this.weapon?.isRanged) return 0;
                // 弓始终一箭一装，严格保持 1 秒装填节奏。
                if (this.weapon.model === 'bow') return 1;
                return this.weapon.getMagazineSize(this.upgrades.ammo);
            }

            startReload() {
                if (!this.weapon?.isRanged || this.reloadTimer > 0 || this.ammo >= this.getMagazineSize()) return;
                const mastery = getPassiveValue('weapon_mastery', this.getPassiveLevel('weapon_mastery'));
                this.reloadMax = this.weapon.model === 'bow'
                    ? Math.max(18, Math.round(CONFIG.BOW_RELOAD_FRAMES * (1 - mastery)))
                    : this.weapon.getReloadFrames(Math.min(0.55, this.upgrades.reloadSpeed + mastery));
                this.reloadTimer = this.reloadMax;
                playSfx('reload');
            }

            tryAttack() {
                if (!this.weapon) return;
                if (keys['KeyU']) return;

                if (this.weapon.isRanged) {
                    if (this.reloadTimer > 0) return;
                    if (this.ammo <= 0) {
                        this.startReload();
                        return;
                    }
                    this.fireRangedWeapon();
                    return;
                }

                this.attacking = true;
                const mastery = getPassiveValue('weapon_mastery', this.getPassiveLevel('weapon_mastery'));
                const dualWield = this.hasPassive('dual_wield') ? 0.65 : 1;
                const rhythm = this.rhythmTimer > 0 && this.hasPassive('combat_rhythm') ? 0.8 : 1;
                this.attackDuration = Math.max(8, Math.round(this.weapon.attackProfile.duration * (1 - mastery)));
                this.attackTimer = this.attackDuration;
                this.attackCooldown = Math.max(8, Math.round(this.weapon.attackProfile.cooldown * (1 - mastery) * dualWield * rhythm));
                this.attackSequence++;
                this.attackEffectTriggered = false;
                runStats.meleeAttacks++;
                if (gameMode === 'endless') runStats.endlessMeleeAttacks++;
                playSfx(`swing_${this.weapon.model || 'sword'}`);
                this.triggerAttackPassives();
            }

            fireRangedWeapon() {
                const weapon = this.weapon;
                this.attacking = true;
                this.attackDuration = Math.min(10, weapon.fireCooldown);
                this.attackTimer = this.attackDuration;
                const dualWield = this.hasPassive('dual_wield') ? 0.65 : 1;
                const rhythm = this.rhythmTimer > 0 && this.hasPassive('combat_rhythm') ? 0.8 : 1;
                this.attackCooldown = Math.max(3, Math.round(weapon.fireCooldown * dualWield * rhythm));
                this.attackSequence++;
                this.ammo--;

                const pellets = weapon.pellets || 1;
                const gripX = this.x + this.width / 2 + this.facing * 6;
                const muzzleX = gripX + this.facing * weapon.muzzleOffset;
                const muzzleY = this.y + 16;
                runStats.rangedAttacks++;
                runStats.projectilesFired += pellets;
                if (gameMode === 'endless') {
                    runStats.endlessRangedAttacks++;
                    runStats.endlessProjectilesFired += pellets;
                }
                for (let i = 0; i < pellets; i++) {
                    const centered = pellets === 1 ? 0 : i / (pellets - 1) - 0.5;
                    const randomSpread = (Math.random() - 0.5) * weapon.spread;
                    const angle = (this.facing === 1 ? 0 : Math.PI) + centered * weapon.spread * 2 + randomSpread;
                    projectiles.push(new Projectile(
                        muzzleX,
                        muzzleY,
                        Math.cos(angle) * weapon.projectileSpeed,
                        Math.sin(angle) * weapon.projectileSpeed,
                        this.getAttackDamage(pellets),
                        weapon.particleColor,
                        'player',
                        {
                            gravity: weapon.projectileGravity,
                            pierce: weapon.pierce,
                            knockback: weapon.getProjectileKnockback() * (this.hasPassive('dual_wield') ? 0.6 : 1),
                            knockbackFrames: weapon.getProjectileKnockbackFrames(),
                            model: weapon.model,
                            size: weapon.projectileSize,
                            life: 190,
                            damageSource: 'weapon'
                        }
                    ));
                }

                const shotSound = weapon.model === 'bow' || weapon.model === 'crossbow'
                    ? 'shoot_bow'
                    : weapon.model === 'shotgun' || weapon.model === 'launcher'
                        ? 'shoot_shotgun'
                        : 'shoot_gun';
                playSfx(shotSound);
                spawnImpactParticles(muzzleX, muzzleY, weapon.particleColor, ['shotgun', 'launcher'].includes(weapon.model) ? 12 : 6, 0.55);
                screenShake = Math.max(screenShake, weapon.model === 'launcher' ? 8 : weapon.model === 'shotgun' ? 6 : 2.5);
                this.triggerAttackPassives();
                if (this.ammo <= 0) this.startReload();
            }

            triggerAttackPassives() {
                this.passiveAttackCount++;
                if (this.hasPassive('patient_strike') && this.patientIdleFrames >= 120) this.patientStrikeArmed = true;
                this.patientIdleFrames = 0;
                if (this.hasPassive('counter_window') && this.counterCooldown <= 0) this.counterWindow = 30;
                if (this.hasPassive('combat_rhythm') && !this.weapon.isRanged) {
                    this.meleeRhythmCount++;
                    if (this.meleeRhythmCount % 5 === 0) this.rhythmTimer = 240;
                }
                if (this.hasPassive('echo_strike') && this.passiveAttackCount % 4 === 0) this.echoReady = true;
                const missileCount = Math.round(getPassiveValue('missile_barrage', this.getPassiveLevel('missile_barrage')));
                if (missileCount <= 0 || this.missileCooldown > 0) return;
                const targets = enemies
                    .filter(enemy => enemy.alive)
                    .sort((a, b) => Math.abs(getWrappedDeltaX(this.x, a.x)) - Math.abs(getWrappedDeltaX(this.x, b.x)));
                const target = targets[0] || (activeBoss?.alive ? activeBoss : null);
                if (!target) return;
                this.missileCooldown = 72;
                const originX = this.x + this.width / 2;
                const originY = this.y + 10;
                const targetX = target.x + target.width / 2;
                const targetY = target.y + target.height / 2;
                const baseAngle = Math.atan2(targetY - originY, getWrappedDeltaX(originX, targetX));
                for (let index = 0; index < missileCount; index++) {
                    const spread = (index - (missileCount - 1) / 2) * 0.09;
                    const angle = baseAngle + spread;
                    projectiles.push(new Projectile(originX, originY, Math.cos(angle) * 9, Math.sin(angle) * 9,
                        this.getAttackDamage() * 0.18, '#FFD54F', 'player', {
                            size: 4, life: 150, model: 'staff', knockback: 0, knockbackFrames: 0,
                            damageSource: 'missile', passiveDamage: true, canCrit: false, noTrigger: true
                        }));
                }
                spawnAttackParticles(originX, originY, '#FFD54F', 5 + missileCount);
            }

            onDamageDealt(actualDamage, target, options = {}) {
                if (!Number.isFinite(actualDamage) || actualDamage <= 0) return;
                if (options.source === 'pressureCooker') this.advancePassiveQuest('pressure_cooker', actualDamage);
                if (options.source !== 'weapon') return;

                const distance = target
                    ? Math.abs(getWrappedDeltaX(this.x + this.width / 2, target.x + target.width / 2))
                    : 0;
                if (distance >= 220) this.advancePassiveQuest('longshot_calibration', 1);
                const frost = getPassiveValue('frost_brand', this.getPassiveLevel('frost_brand'));
                if (target && frost > 0) {
                    target.slowRatio = Math.max(target.slowRatio || 0, target instanceof BirchCorruptBoss ? frost * 0.5 : frost);
                    target.slowTimer = Math.max(target.slowTimer || 0, target instanceof BirchCorruptBoss ? 45 : 90);
                }
                if (target && !target.alive && !this.arsenalModels.has(this.weapon.model)) {
                    this.arsenalModels.add(this.weapon.model);
                    this.advancePassiveQuest('arsenal_codex', 1);
                }

                const lifesteal = getPassiveValue('blood_pact', this.getPassiveLevel('blood_pact'));
                if (lifesteal > 0 && this.hp > 0) {
                    const restored = this.heal(actualDamage * lifesteal);
                    if (restored > 0) {
                        floatingTexts.push(new FloatingText(this.x + this.width / 2, this.y - 12, `+${Math.max(1, Math.round(restored))}`, '#EF9A9A', 11));
                    }
                }
                if (options.noTrigger) return;

                this.passiveHitCount++;
                if (this.hasPassive('chain_arc') && this.passiveHitCount % 3 === 0) {
                    const originX = target.x + target.width / 2;
                    const candidates = enemies
                        .filter(enemy => enemy.alive && enemy !== target)
                        .sort((a, b) => Math.abs(getWrappedDeltaX(originX, a.x + a.width / 2)) - Math.abs(getWrappedDeltaX(originX, b.x + b.width / 2)))
                        .slice(0, 2);
                    for (const chained of candidates) {
                        chained.takeDamage(actualDamage * 0.4, 0, 0, `chain-${nextProjectileId++}`, 0, {
                            source: 'chainArc', passiveDamage: true, canCrit: false, noTrigger: true, preResolved: true
                        });
                        spawnImpactParticles(chained.x + chained.width / 2, chained.y + chained.height / 2, '#80DEEA', 7, 0.65);
                    }
                }

                if (this.echoReady) {
                    this.echoReady = false;
                    if (target?.alive) {
                        target.takeDamage(actualDamage * 0.6, 0, 0, `echo-${nextProjectileId++}`, 0, {
                            source: 'echoStrike', passiveDamage: true, canCrit: false, noTrigger: true, preResolved: true
                        });
                        floatingTexts.push(new FloatingText(target.x + target.width / 2, target.y - 18, '回声', '#CE93D8', 12));
                    }
                }
            }

            onKill(target, options = {}) {
                this.advancePassiveQuest('hunter_ledger', 1);
                if (target?.elite && !(target instanceof BirchCorruptBoss)) {
                    this.advancePassiveQuest('elite_contract', 1);
                }
                if (target instanceof BirchCorruptBoss) {
                    this.advancePassiveQuest('raid_boss', 1);
                }
                const harvestLevel = this.getPassiveLevel('harvest_burst');
                if (harvestLevel > 0 && options.source !== 'harvestBurst' && target) {
                    const def = PASSIVE_BY_ID.harvest_burst;
                    const radius = def.radii[harvestLevel - 1];
                    const percent = def.values[harvestLevel - 1];
                    const cap = this.getAttackDamage() * def.caps[harvestLevel - 1];
                    const originX = target.x + target.width / 2;
                    const originY = target.y + target.height / 2;
                    for (const enemy of enemies) {
                        if (!enemy.alive || enemy === target) continue;
                        const dx = getWrappedDeltaX(originX, enemy.x + enemy.width / 2);
                        const dy = enemy.y + enemy.height / 2 - originY;
                        if (dx * dx + dy * dy > radius * radius) continue;
                        enemy.takeDamage(Math.min(enemy.maxHp * percent, cap), Math.sign(dx) || 1, 4,
                            `harvest-${nextProjectileId++}`, 4, {
                                source: 'harvestBurst', passiveDamage: true, canCrit: false, noTrigger: true
                            });
                    }
                    spawnAttackParticles(originX, originY, '#FF7043', 18);
                }
            }

            handleCollision() {
                this.onGround = false;

                // 获取玩家周围的方块
                const left = Math.floor(this.x / CONFIG.TILE_SIZE);
                const right = Math.floor((this.x + this.width) / CONFIG.TILE_SIZE);
                const top = Math.floor(this.y / CONFIG.TILE_SIZE);
                const bottom = Math.floor((this.y + this.height) / CONFIG.TILE_SIZE);

                // 垂直碰撞
                for (let ty = top; ty <= bottom; ty++) {
                    for (let tx = left; tx <= right; tx++) {
                        if (tiles[ty] && tiles[ty][tx] > 0) {
                            const tileX = tx * CONFIG.TILE_SIZE;
                            const tileY = ty * CONFIG.TILE_SIZE;

                            if (this.intersects(tileX, tileY, CONFIG.TILE_SIZE, CONFIG.TILE_SIZE)) {
                                // 从上方落下
                                if (this.vy > 0 && this.y + this.height - this.vy <= tileY) {
                                    this.y = tileY - this.height;
                                    this.vy = 0;
                                    this.onGround = true;
                                }
                                // 从下方撞上
                                else if (this.vy < 0 && this.y - this.vy >= tileY + CONFIG.TILE_SIZE) {
                                    this.y = tileY + CONFIG.TILE_SIZE;
                                    this.vy = 0;
                                }
                                // 水平碰撞
                                else if (this.vx > 0) {
                                    this.x = tileX - this.width;
                                } else if (this.vx < 0) {
                                    this.x = tileX + CONFIG.TILE_SIZE;
                                }
                            }
                        }
                    }
                }
            }

            intersects(x, y, w, h) {
                return this.x < x + w && this.x + this.width > x &&
                       this.y < y + h && this.y + this.height > y;
            }

            getAttackProgress() {
                if (!this.attacking || this.attackDuration <= 0) return 0;
                return Math.max(0, Math.min(1, 1 - this.attackTimer / this.attackDuration));
            }

            isAttackActive() {
                if (!this.attacking || this.weapon.isRanged) return false;
                const progress = this.getAttackProgress();
                const profile = this.weapon.attackProfile;
                return progress >= profile.activeStart && progress <= profile.activeEnd;
            }

            getWeaponPose(progress = this.getAttackProgress()) {
                if (this.weapon.isRanged) return { angle: 0, offsetX: 0, offsetY: 0, layer: 'front' };
                if (!this.attacking) {
                    if (this.weapon.model === 'twinblade') return { angle: -Math.PI / 2, offsetX: -2, offsetY: 4, layer: 'back' };
                    return { angle: -0.78, offsetX: 0, offsetY: 0, layer: 'front' };
                }
                const p = Math.max(0, Math.min(1, progress));
                const ease = p * p * (3 - 2 * p);
                let angle = -0.9;
                let offsetX = 0;
                let offsetY = 0;
                switch (this.weapon.attackStyle) {
                    case 'thrust': {
                        const thrust = p < 0.48 ? p / 0.48 : Math.max(0, (1 - p) / 0.52);
                        angle = -0.08;
                        offsetX = thrust * 18;
                        break;
                    }
                    case 'chop':
                        angle = -1.72 + ease * 2.92;
                        offsetY = -4 + ease * 5;
                        break;
                    case 'slam':
                        angle = -1.92 + ease * 3.25;
                        offsetY = -6 + ease * 9;
                        break;
                    case 'heavySlash':
                        angle = -1.48 + ease * 2.65;
                        offsetX = -4 + ease * 7;
                        break;
                    case 'reap':
                        angle = 1.16 - ease * 2.86;
                        offsetY = 5 - ease * 8;
                        break;
                    case 'spin':
                        angle = -0.7 + p * Math.PI * 2.5;
                        break;
                    case 'whip':
                        angle = -1.02 + ease * 2.08;
                        offsetX = ease * 5;
                        break;
                    default:
                        angle = -1.14 + ease * 2.28;
                        break;
                }
                const layer = this.weapon.attackStyle === 'spin' && Math.sin(angle) < 0 ? 'back' : 'front';
                return { angle, offsetX, offsetY, layer };
            }

            getAttackReach() {
                const range = this.weapon.getAttackRange(this.upgrades.range);
                const shape = this.weapon.attackProfile.hitShape;
                return range + (shape === 'whip' ? 20 : shape === 'wide' ? 10 : 0);
            }

            getAttackBox() {
                if (!this.isAttackActive()) return null;
                const range = this.weapon.getAttackRange(this.upgrades.range);
                const shape = this.weapon.attackProfile.hitShape;
                if (shape === 'radial') {
                    return {
                        x: this.x + this.width / 2 - range,
                        y: this.y + this.height / 2 - range * 0.58,
                        width: range * 2,
                        height: range * 1.16
                    };
                }
                const extraReach = shape === 'thrust' ? 16 : shape === 'whip' ? 20 : shape === 'wide' ? 10 : 0;
                const attackWidth = range + extraReach;
                const attackHeight = shape === 'thrust' ? 18 : shape === 'whip' ? 24 : shape === 'heavy' ? 48 : shape === 'wide' ? 42 : 34;
                return {
                    x: this.facing === 1 ? this.x + this.width - 8 : this.x - attackWidth + 8,
                    y: this.y + this.height / 2 - attackHeight / 2,
                    width: attackWidth,
                    height: attackHeight
                };
            }

            attackIntersects(target) {
                const attackBox = this.getAttackBox();
                if (!attackBox || !target) return false;
                if (this.weapon.attackProfile.hitShape !== 'radial') {
                    return target.intersects(attackBox.x, attackBox.y, attackBox.width, attackBox.height);
                }
                const centerX = this.x + this.width / 2;
                const centerY = this.y + this.height / 2;
                const nearestX = Math.max(target.x, Math.min(centerX, target.x + target.width));
                const nearestY = Math.max(target.y, Math.min(centerY, target.y + target.height));
                const dx = nearestX - centerX;
                const dy = nearestY - centerY;
                const radius = this.getAttackReach();
                return dx * dx + dy * dy <= radius * radius;
            }

            setWeapon(weapon) {
                const prevMax = this.maxHp || this.baseMaxHp;
                const prevHp = this.hp;
                const bonus = (weapon.hpBonus || 0) + this.upgrades.hp;
                const birchSkin = getPassiveValue('birch_skin', this.getPassiveLevel('birch_skin'));
                const raidHp = [0, 0.10, 0.20, 0.30][this.getPassiveStage('raid_boss')] || 0;
                const colossusHp = getPassiveValue('colossus_core', this.getPassiveLevel('colossus_core'));
                const glassFactor = this.hasPassive('glass_crown') ? 0.65 : 1;
                const newMax = Math.max(1, Math.round((this.baseMaxHp + bonus) * (1 + birchSkin + raidHp + colossusHp) * glassFactor));
                const ratio = prevMax > 0 ? Math.max(0, Math.min(1, prevHp / prevMax)) : 1;
                this.weapon = weapon;
                this.maxHp = newMax;
                this.hp = Math.min(newMax, Math.max(0, Math.round(newMax * ratio)));
                const shieldCap = this.maxHp * getPassiveValue('overheal_aegis', this.getPassiveLevel('overheal_aegis'));
                this.tempShield = Math.min(this.tempShield || 0, shieldCap);
                this.ammo = this.getMagazineSize();
                this.reloadTimer = 0;
                this.reloadMax = 0;
                syncTouchWeaponControls(this.weapon);
            }

            applyEnchant(enchant) {
                if (!this.weapon) return;
                this.upgrades.damage += enchant.damageBonus || 0;
                this.upgrades.range += enchant.rangeBonus || 0;
                this.upgrades.hp += enchant.hpBonus || 0;
                this.upgrades.ammo += enchant.ammoBonus || 0;
                this.upgrades.reloadSpeed = Math.min(0.55, this.upgrades.reloadSpeed + (enchant.reloadSpeedBonus || 0));
                this.setWeapon(this.weapon);
                if (this.weapon.isRanged) {
                    this.ammo = Math.max(this.ammo, this.getMagazineSize());
                }
            }

            resetProgression() {
                this.upgrades = { damage: 0, hp: 0, range: 0, ammo: 0, reloadSpeed: 0 };
                this.passives = [];
                this.distanceTravelled = 0;
                this.safeFrames = 0;
                this.passiveHealAccumulator = 0;
                this.passiveHitCount = 0;
                this.passiveAttackCount = 0;
                this.echoReady = false;
                this.missileCooldown = 0;
                this.pressureTimer = 0;
                this.pressureSequence = 0;
                this.lastStandActive = false;
                this.phoenixAvailable = false;
                this.patientIdleFrames = 120;
                this.patientStrikeArmed = false;
                this.rhythmTimer = 0;
                this.meleeRhythmCount = 0;
                this.counterWindow = 0;
                this.counterCooldown = 0;
                this.flawlessActive = false;
                this.mapHpDamageTaken = 0;
                this.arsenalModels = new Set();
                this.gravityTimer = 270;
                this.tempShield = 0;
                this.colossusCooldown = 0;
                this.syndicateTimer = 90;
                this.worldWalkerCooldown = 0;
                this.setWeapon(new Weapon(WEAPON_DATABASE.COMMON[0], 'COMMON'));
            }

            takeDamage(amount, cause = 'unknown') {
                if (gameState !== 'playing' || this.invincible > 0) return;
                const counterTriggered = this.hasPassive('counter_window') && this.counterWindow > 0 && this.counterCooldown <= 0;
                const adjustedDamage = Math.max(0, amount * this.getIncomingDamageMultiplier() * (counterTriggered ? 0.65 : 1));
                const shieldAbsorbed = Math.min(this.tempShield, adjustedDamage);
                this.tempShield -= shieldAbsorbed;
                const hpDamage = Math.max(0, adjustedDamage - shieldAbsorbed);
                const actualDamage = Math.min(this.hp, hpDamage);
                this.hp -= hpDamage;
                this.safeFrames = 0;
                this.passiveHealAccumulator = 0;
                recordDamageTaken(actualDamage);
                this.advancePassiveQuest('titan_resolve', actualDamage);
                if (actualDamage > 0) {
                    this.mapHpDamageTaken += actualDamage;
                    this.flawlessActive = false;
                }
                if (counterTriggered) {
                    this.counterWindow = 0;
                    this.counterCooldown = 180;
                    this.triggerCounterStrike();
                }
                if (actualDamage > 0 && this.hasPassive('colossus_core') && this.colossusCooldown <= 0) {
                    this.colossusCooldown = 60;
                    this.triggerColossusPulse();
                }
                this.invincible = 60;
                screenShake = Math.max(screenShake, 8);
                damageFlash = Math.max(damageFlash, 10);
                spawnImpactParticles(this.x + this.width / 2, this.y + this.height / 2, '#FF5252', 12, 0.85);
                if (shieldAbsorbed > 0) {
                    floatingTexts.push(new FloatingText(this.x + this.width / 2, this.y - 24, `临时盾-${Math.round(shieldAbsorbed)}`, '#80DEEA', 12));
                }
                if (actualDamage > 0) {
                    floatingTexts.push(new FloatingText(this.x + this.width / 2, this.y - 8, `-${Math.round(actualDamage)}`, '#FF8A80', 16));
                }
                if (this.hp <= 0) {
                    if (this.phoenixAvailable) {
                        this.phoenixAvailable = false;
                        this.hp = Math.max(1, Math.round(this.maxHp * 0.35));
                        this.invincible = 150;
                        const blastDamage = this.getAttackDamage() * 2;
                        const phoenixTargets = activeBoss?.alive ? [...enemies, activeBoss] : enemies;
                        for (const enemy of phoenixTargets) {
                            if (!enemy.alive) continue;
                            const dx = getWrappedDeltaX(this.x + this.width / 2, enemy.x + enemy.width / 2);
                            const dy = enemy.y + enemy.height / 2 - (this.y + this.height / 2);
                            if (dx * dx + dy * dy <= 190 * 190) {
                                enemy.takeDamage(blastDamage, Math.sign(dx) || 1, 14, `phoenix-${currentWave}`, 16, {
                                    source: 'phoenix', passiveDamage: true, canCrit: false, noTrigger: true
                                });
                            }
                        }
                        spawnAttackParticles(this.x + this.width / 2, this.y + this.height / 2, '#FF7043', 36);
                        floatingTexts.push(new FloatingText(this.x + this.width / 2, this.y - 26, '凤凰重生', '#FFD54F', 18));
                        announce('凤凰协议触发：本地图的致死伤害已被抵消。');
                        return;
                    }
                    this.hp = 0;
                    enterGameOver(cause);
                }
            }

            triggerCounterStrike() {
                const target = enemies.filter(enemy => enemy.alive)
                    .sort((a, b) => Math.abs(getWrappedDeltaX(this.x, a.x)) - Math.abs(getWrappedDeltaX(this.x, b.x)))[0]
                    || (activeBoss?.alive ? activeBoss : null);
                if (!target) return;
                const dx = getWrappedDeltaX(this.x + this.width / 2, target.x + target.width / 2);
                target.takeDamage(this.getAttackDamage() * 0.8, Math.sign(dx) || 1, 7,
                    `counter-${nextProjectileId++}`, 8, { source: 'counter', passiveDamage: true, canCrit: false, noTrigger: true });
                floatingTexts.push(new FloatingText(this.x + this.width / 2, this.y - 34, '反击', '#FFD54F', 14));
            }

            triggerColossusPulse() {
                const level = this.getPassiveLevel('colossus_core');
                const multiplier = [0, 0.35, 0.50, 0.65, 0.80, 0.95][level];
                const centerX = this.x + this.width / 2;
                const centerY = this.y + this.height / 2;
                const targets = activeBoss?.alive ? [...enemies, activeBoss] : enemies;
                for (const enemy of targets) {
                    if (!enemy.alive) continue;
                    const dx = getWrappedDeltaX(centerX, enemy.x + enemy.width / 2);
                    const dy = enemy.y + enemy.height / 2 - centerY;
                    if (dx * dx + dy * dy > 90 * 90) continue;
                    enemy.takeDamage(this.getAttackDamage() * multiplier, Math.sign(dx) || 1, 8,
                        `colossus-${nextProjectileId++}`, 8, { source: 'colossus', passiveDamage: true, canCrit: false, noTrigger: true });
                }
                spawnAttackParticles(centerX, centerY, '#90A4AE', 18);
            }

            draw(ctx) {
                ctx.save();
                const screenX = this.x - camera.x;
                const screenY = this.y - camera.y;

                // 无敌闪烁效果
                if (this.invincible > 0 && (reducedMotion || Math.floor(this.invincible / 6) % 2 === 0)) {
                    ctx.globalAlpha = reducedMotion ? 0.72 : 0.56;
                }

                // 接地阴影让角色与地面关系更清晰
                ctx.save();
                ctx.globalAlpha *= 0.28;
                ctx.fillStyle = '#02060b';
                ctx.beginPath();
                ctx.ellipse(screenX + this.width / 2, screenY + this.height + 2, 15, 4, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                const weaponPose = this.getWeaponPose();
                const weaponBehind = !this.weapon.isRanged && weaponPose.layer === 'back';
                if (weaponBehind) this.drawWeapon(ctx, screenX, screenY, weaponPose);

                // 绘制像素小人
                this.drawPixelPlayer(ctx, screenX, screenY, weaponPose);

                // 旋转武器可根据姿势切换到角色前后层。
                if (!weaponBehind) this.drawWeapon(ctx, screenX, screenY, weaponPose);

                // 绘制攻击效果
                if (this.attacking && !this.weapon.isRanged) {
                    this.drawAttackEffect(ctx);
                }

                if (this.weapon.isRanged && this.reloadTimer > 0) {
                    const progress = 1 - this.reloadTimer / Math.max(1, this.reloadMax);
                    ctx.fillStyle = 'rgba(1,8,16,0.8)';
                    ctx.fillRect(screenX - 4, screenY - 12, this.width + 8, 5);
                    ctx.fillStyle = '#80CBC4';
                    ctx.fillRect(screenX - 3, screenY - 11, (this.width + 6) * progress, 3);
                }

                const syndicateStage = this.getPassiveStage('birch_syndicate');
                if (syndicateStage > 0) {
                    const now = performance.now();
                    for (let index = 0; index < syndicateStage; index++) {
                        const angle = (now / 650) + index * Math.PI * 2 / syndicateStage;
                        const coinX = screenX + this.width / 2 + Math.cos(angle) * 28;
                        const coinY = screenY + this.height / 2 + Math.sin(angle) * 15;
                        ctx.fillStyle = '#FFF176';
                        ctx.strokeStyle = '#8D6E20';
                        ctx.beginPath(); ctx.arc(coinX, coinY, 5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                        ctx.fillStyle = '#8D6E20'; ctx.fillRect(coinX - 1, coinY - 3, 2, 6);
                    }
                }

                ctx.restore();
            }

            drawPixelPlayer(ctx, x, y, weaponPose = this.getWeaponPose()) {
                const f = this.facing;
                ctx.save();
                if (f === -1) {
                    ctx.translate(x + this.width, y);
                    ctx.scale(-1, 1);
                    x = 0;
                    y = 0;
                }

                this.drawHeroBody(ctx, x, y, weaponPose);
                ctx.restore();
            }

            drawWeapon(ctx, x, y, pose = this.getWeaponPose()) {
                ctx.save();
                const gripX = x + this.width / 2 + this.facing * 6;
                const gripY = y + 16;
                ctx.translate(gripX, gripY);
                ctx.scale(this.facing, 1);

                if (this.weapon.isRanged) {
                    const recoil = this.attacking ? Math.min(4, 4 * this.attackTimer / Math.max(1, this.attackDuration)) : 0;
                    ctx.translate(-recoil, 0);
                    drawWeaponModel(ctx, this.weapon, {
                        scale: 1,
                        detail: true,
                        loaded: this.ammo > 0 && this.reloadTimer <= 0
                    });
                    if (this.attacking && !['bow', 'crossbow'].includes(this.weapon.model) && this.attackTimer >= Math.max(1, this.attackDuration - 4)) {
                        drawMuzzleFlash(ctx, this.weapon.muzzleOffset, this.weapon);
                    }
                    if (this.attacking && ['bow', 'crossbow'].includes(this.weapon.model)) {
                        ctx.globalAlpha = 0.72;
                        ctx.fillStyle = '#FFF59D';
                        ctx.fillRect(Math.max(17, this.weapon.muzzleOffset - 12), -1, 10, 2);
                    }
                } else {
                    ctx.translate(pose.offsetX, pose.offsetY);
                    ctx.rotate(pose.angle);
                    drawWeaponModel(ctx, this.weapon, {
                        scale: 1,
                        detail: true,
                        hideFlexible: this.weapon.model === 'whip' && this.attacking
                    });
                }
                ctx.restore();
            }

            drawHeroBody(ctx, x, y, weaponPose) {
                const step = this.walkFrame % 2;
                const attacking = this.attacking && !this.weapon.isRanged;
                const outline = '#10131B';
                const skin = '#D9A27A';
                const skinLight = '#F2C39F';
                ctx.save();
                ctx.lineWidth = 2;
                ctx.strokeStyle = outline;
                ctx.lineJoin = 'miter';

                // 深红披风与行走摆幅，让人物轮廓比旧方块人更像人类冒险者。
                ctx.fillStyle = '#4A1F2B';
                ctx.beginPath();
                ctx.moveTo(x + 3, y + 13);
                ctx.lineTo(x + 9, y + 12);
                ctx.lineTo(x + 10 - step, y + 29);
                ctx.lineTo(x + 2, y + 27 + step);
                ctx.closePath();
                ctx.fill(); ctx.stroke();

                // 长靴与腿甲。
                ctx.fillStyle = '#202938';
                ctx.fillRect(x + 7 - step, y + 23, 5, 8 + step);
                ctx.fillRect(x + 14 + step, y + 23, 5, 8 - step);
                ctx.fillStyle = '#0C111A';
                ctx.fillRect(x + 5 - step, y + 29, 7, 3);
                ctx.fillRect(x + 14 + step, y + 29, 7, 3);
                ctx.fillStyle = '#68788E';
                ctx.fillRect(x + 8 - step, y + 24, 3, 4);
                ctx.fillRect(x + 15 + step, y + 24, 3, 4);

                // 合身胸甲、皮带与肩甲。
                ctx.fillStyle = '#253B55';
                ctx.fillRect(x + 5, y + 12, 15, 13);
                ctx.strokeRect(x + 5, y + 12, 15, 13);
                ctx.fillStyle = '#446985';
                ctx.beginPath(); ctx.moveTo(x + 7, y + 13); ctx.lineTo(x + 13, y + 17); ctx.lineTo(x + 18, y + 13); ctx.lineTo(x + 18, y + 21); ctx.lineTo(x + 7, y + 21); ctx.closePath(); ctx.fill();
                ctx.fillStyle = '#B28A45';
                ctx.fillRect(x + 5, y + 21, 15, 3);
                ctx.fillStyle = '#D9B85F'; ctx.fillRect(x + 12, y + 21, 3, 3);
                ctx.fillStyle = '#6D7F91';
                ctx.fillRect(x + 2, y + 12, 6, 5);
                ctx.fillRect(x + 18, y + 12, 5, 5);

                // 更自然的持武器手臂；近战时跟随每种武器的动作轨迹。
                ctx.strokeStyle = '#293A4D';
                ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(x + 6, y + 16); ctx.lineTo(x + 3, y + 22 + (step ? -1 : 1)); ctx.stroke();
                ctx.fillStyle = skin; ctx.fillRect(x + 1, y + 20 + (step ? -1 : 1), 4, 5);
                const handX = attacking ? x + 18 + weaponPose.offsetX : x + 21;
                const handY = attacking ? y + 16 + weaponPose.offsetY : y + 19 - step;
                ctx.strokeStyle = '#293A4D'; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.moveTo(x + 19, y + 15); ctx.lineTo(handX, handY); ctx.stroke();
                ctx.fillStyle = skinLight; ctx.fillRect(handX - 2, handY - 2, 4, 5);

                // 颈部、下颌、鼻梁和明确眼神。
                ctx.fillStyle = skin; ctx.fillRect(x + 10, y + 9, 7, 5);
                ctx.fillStyle = skinLight;
                ctx.fillRect(x + 7, y + 2, 13, 10);
                ctx.strokeRect(x + 7, y + 2, 13, 10);
                ctx.fillStyle = '#A86D52';
                ctx.fillRect(x + 17, y + 7, 4, 2);
                ctx.fillRect(x + 10, y + 11, 8, 2);
                ctx.fillStyle = '#DCEBFF'; ctx.fillRect(x + 15, y + 5, 3, 2);
                ctx.fillStyle = '#17202D'; ctx.fillRect(x + 17, y + 5, 2, 2);

                // 深色碎发与侧鬓，不再使用一整块棕色帽子形状。
                ctx.fillStyle = '#25202A';
                ctx.fillRect(x + 6, y, 13, 4);
                ctx.fillRect(x + 5, y + 2, 5, 7);
                ctx.fillRect(x + 9, y, 4, 3);
                ctx.fillRect(x + 18, y + 1, 4, 6);
                ctx.fillStyle = '#4A3B47'; ctx.fillRect(x + 9, y + 1, 7, 2);

                if (this.lastStandActive) {
                    ctx.strokeStyle = '#FF5252'; ctx.globalAlpha = 0.7;
                    ctx.strokeRect(x + 1, y - 2, this.width + 1, this.height + 3);
                }
                ctx.restore();
            }

            drawAttackEffect(ctx) {
                if (this.weapon.isRanged) return;
                ctx.save();
                const progress = this.getAttackProgress();
                const active = this.isAttackActive();
                const centerX = this.x + this.width / 2 + this.facing * 6 - camera.x;
                const centerY = this.y + this.height / 2 - camera.y;
                const baseRadius = this.weapon.getAttackRange(this.upgrades.range);
                const radius = this.getAttackReach();
                ctx.translate(centerX, centerY);
                ctx.scale(this.facing, 1);
                ctx.globalAlpha = active ? 0.78 : 0.28;
                ctx.strokeStyle = this.weapon.color;
                ctx.shadowColor = this.weapon.particleColor;
                ctx.shadowBlur = active ? 10 : 4;
                ctx.lineWidth = active ? 4 : 2;

                if (this.weapon.attackStyle === 'thrust') {
                    const reach = 16 + baseRadius * Math.sin(Math.min(1, progress) * Math.PI);
                    for (let offset = -5; offset <= 5; offset += 5) {
                        ctx.beginPath();
                        ctx.moveTo(10, offset);
                        ctx.lineTo(reach, offset * 0.35);
                        ctx.stroke();
                    }
                } else if (this.weapon.attackStyle === 'spin') {
                    ctx.setLineDash([10, 6]);
                    ctx.beginPath();
                    ctx.arc(0, 0, radius, -0.4 + progress * Math.PI * 2, 4.9 + progress * Math.PI * 2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                } else if (this.weapon.attackStyle === 'whip') {
                    const whipTipY = 8 - progress * 18;
                    ctx.beginPath();
                    ctx.moveTo(8, -6);
                    ctx.quadraticCurveTo(radius * 0.55, -radius * (0.9 - progress), radius, whipTipY);
                    ctx.stroke();
                    ctx.fillStyle = this.weapon.color;
                    ctx.beginPath();
                    ctx.arc(radius, whipTipY, 4, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    const currentAngle = this.getWeaponPose(progress).angle;
                    const previousAngle = this.getWeaponPose(Math.max(0, progress - 0.13)).angle;
                    const startAngle = Math.min(currentAngle, previousAngle);
                    const endAngle = Math.max(currentAngle, previousAngle);
                    ctx.beginPath();
                    ctx.arc(0, 0, radius, startAngle, endAngle);
                    ctx.stroke();
                    ctx.globalAlpha *= 0.45;
                    ctx.lineWidth = 9;
                    ctx.stroke();
                }
                ctx.restore();
            }
        }

        function rollBirchCoinReward(random = Math.random) {
            return 1 + Math.floor(Math.max(0, Math.min(0.999999, random())) * 5);
        }

        function awardBirchCoins(amount, x = player.x, y = player.y) {
            // 宝箱基础掉落仍由 rollBirchCoinReward 保证为 1–5；开锁匠的额外奖励可叠加在基础值之上。
            const gained = Math.max(0, Math.floor(amount));
            if (gained <= 0) return 0;
            birchCoins += gained;
            if (runStats) {
                runStats.birchCoinsEarned = (runStats.birchCoinsEarned || 0) + gained;
                if (gameMode === 'endless') runStats.endlessBirchCoinsEarned = (runStats.endlessBirchCoinsEarned || 0) + gained;
            }
            floatingTexts.push(new FloatingText(x + 16, y - 16, `白桦币 +${gained}`, '#FFF176', 15));
            spawnImpactParticles(x + 16, y + 8, '#FFF176', 14, 0.75);
            playSfx('reward');
            announce(`获得 ${gained} 枚白桦币，当前共有 ${birchCoins} 枚。`);
            return gained;
        }

        function recordBirchCoinSpend(amount) {
            if (!runStats || !Number.isFinite(amount) || amount <= 0) return;
            runStats.birchCoinsSpent = (runStats.birchCoinsSpent || 0) + amount;
            if (gameMode === 'endless') runStats.endlessBirchCoinsSpent = (runStats.endlessBirchCoinsSpent || 0) + amount;
            player?.advancePassiveQuest?.('birch_syndicate', amount);
        }

        function recordPassiveClaim() {
            if (!runStats) return;
            runStats.passivesClaimed = (runStats.passivesClaimed || 0) + 1;
            if (gameMode === 'endless') runStats.endlessPassivesClaimed = (runStats.endlessPassivesClaimed || 0) + 1;
        }

        class TreasureChest {
            constructor(x, y, wave, isMimic = false, coinReward = rollBirchCoinReward()) {
                this.x = x;
                this.y = y;
                this.width = 34;
                this.height = 24;
                this.wave = wave;
                this.isMimic = Boolean(isMimic);
                this.coinReward = coinReward;
                this.opened = false;
                this.alive = true;
                this.openTimer = 0;
                this.lastHitToken = null;
            }

            intersects(x, y, w, h) {
                return this.alive && this.x < x + w && this.x + this.width > x &&
                    this.y < y + h && this.y + this.height > y;
            }

            update() {
                if (this.opened && !this.isMimic && this.openTimer > 0) {
                    this.openTimer--;
                    if (this.openTimer <= 0) this.alive = false;
                }
            }

            takeDamage(hitToken = null) {
                if (!this.alive || this.opened) return false;
                if (hitToken && this.lastHitToken === hitToken) return false;
                this.lastHitToken = hitToken;
                this.opened = true;
                if (this.isMimic) {
                    this.alive = false;
                    const mimic = new Enemy(this.x - 1, this.y + this.height - ENEMY_TYPES.mimic.height, this.wave, 'mimic');
                    mimic.aggro = true;
                    mimic.alertTimer = 45;
                    mimic.coinDrop = this.coinReward;
                    enemies.push(mimic);
                    enemiesRemaining++;
                    totalEnemiesInWave++;
                    spawnImpactParticles(this.x + this.width / 2, this.y + this.height / 2, '#FF5252', 22, 0.9);
                    floatingTexts.push(new FloatingText(this.x + this.width / 2, this.y - 16, '宝箱怪！', '#FF8A80', 18));
                    screenShake = Math.max(screenShake, 7);
                    announce('宝箱突然长出利齿——它是伪装的宝箱怪。');
                } else {
                    this.openTimer = 90;
                    const locksmithBonus = player.resolveTreasureChest();
                    awardBirchCoins(this.coinReward + locksmithBonus, this.x, this.y);
                }
                return true;
            }

            draw(ctx) {
                if (!this.alive) return;
                const x = this.x - camera.x;
                const y = this.y - camera.y;
                ctx.save();
                ctx.globalAlpha = 0.26;
                ctx.fillStyle = '#03070D';
                ctx.beginPath(); ctx.ellipse(x + 17, y + 25, 20, 4, 0, 0, Math.PI * 2); ctx.fill();
                ctx.globalAlpha = 1;
                ctx.strokeStyle = '#20130F';
                ctx.lineWidth = 2;
                ctx.fillStyle = '#62391F';
                ctx.fillRect(x + 1, y + 10, 32, 14);
                ctx.strokeRect(x + 1, y + 10, 32, 14);
                ctx.save();
                ctx.translate(x + 1, y + 10);
                if (this.opened) ctx.rotate(-0.72);
                ctx.fillStyle = '#85502B';
                ctx.fillRect(0, -9, 32, 10);
                ctx.strokeRect(0, -9, 32, 10);
                ctx.fillStyle = '#B77B35'; ctx.fillRect(2, -7, 28, 3);
                ctx.restore();
                ctx.fillStyle = '#E6B94D';
                ctx.fillRect(x + 14, y + 8, 7, 10);
                ctx.fillStyle = '#FFF3A3'; ctx.fillRect(x + 16, y + 10, 3, 3);
                if (!this.opened) {
                    ctx.fillStyle = 'rgba(5,12,20,0.78)';
                    ctx.fillRect(x - 12, y - 25, 58, 16);
                    ctx.fillStyle = '#FFE082';
                    ctx.font = 'bold 10px "Courier New", monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText('攻击开启', x + 17, y - 13);
                }
                ctx.restore();
            }
        }

        function drawChestObjectiveGuide() {
            if (waveObjective !== 'chest' || !treasureChest?.alive || treasureChest.opened) return;
            const now = performance.now();
            const pulse = reducedMotion ? 1 : 0.72 + Math.sin(now / 180) * 0.18;
            const playerCenterX = player.x + player.width / 2;
            const chestCenterX = treasureChest.x + treasureChest.width / 2;
            const deltaX = getWrappedDeltaX(playerCenterX, chestCenterX);
            const direction = Math.sign(deltaX) || 1;
            const virtualScreenX = playerCenterX - camera.x + deltaX;
            const chestScreenY = treasureChest.y - camera.y;
            const onScreen = virtualScreenX >= 36 && virtualScreenX <= CONFIG.CANVAS_WIDTH - 36 &&
                chestScreenY >= 55 && chestScreenY <= CONFIG.CANVAS_HEIGHT - 45;

            ctx.save();
            ctx.shadowColor = '#FFE082';
            ctx.shadowBlur = 12 * pulse;
            ctx.strokeStyle = '#FFE082';
            ctx.fillStyle = '#FFE082';
            ctx.lineWidth = 3;
            if (onScreen) {
                const radius = 28 + pulse * 5;
                ctx.beginPath();
                ctx.arc(virtualScreenX, chestScreenY + treasureChest.height / 2, radius, 0, Math.PI * 2);
                ctx.stroke();
                ctx.font = 'bold 13px "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.fillText('目标宝箱', virtualScreenX, chestScreenY - 35);
            } else {
                const x = direction > 0 ? CONFIG.CANVAS_WIDTH - 38 : 38;
                const y = Math.max(96, Math.min(CONFIG.CANVAS_HEIGHT - 96, chestScreenY + treasureChest.height / 2));
                ctx.beginPath();
                ctx.moveTo(x + direction * 14, y);
                ctx.lineTo(x - direction * 9, y - 13);
                ctx.lineTo(x - direction * 9, y + 13);
                ctx.closePath();
                ctx.fill();
                ctx.font = 'bold 11px "Courier New", monospace';
                ctx.textAlign = direction > 0 ? 'right' : 'left';
                ctx.fillText(`${Math.max(1, Math.round(Math.abs(deltaX) / CONFIG.TILE_SIZE))} 格`, x - direction * 16, y + 4);
            }
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(3, 9, 18, 0.88)';
            ctx.fillRect(CONFIG.CANVAS_WIDTH / 2 - 195, 174, 390, 28);
            ctx.strokeStyle = '#FFE082';
            ctx.strokeRect(CONFIG.CANVAS_WIDTH / 2 - 195, 174, 390, 28);
            ctx.fillStyle = '#FFF3B0';
            ctx.font = 'bold 13px "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.fillText('敌人已清空 · 跟随箭头找到并攻击宝箱', CONFIG.CANVAS_WIDTH / 2, 193);
            ctx.restore();
        }

        // ============ 敌人类 ============
        class Enemy {
            constructor(x, y, wave = 1, typeKey = 'zombie') {
                const t = ENEMY_TYPES[typeKey] || ENEMY_TYPES.zombie;
                this.type = typeKey;
                this.name = t.name || ENEMY_TYPES.zombie.name;
                this.x = x;
                this.y = y;
                this.width = t.width;
                this.height = t.height;
                this.vx = 0;
                this.vy = 0;
                this.onGround = false;
                const scaling = getEnemyScalingForWave(wave);
                this.hp = Math.max(1, Math.floor(t.baseHp * scaling.hp));
                this.maxHp = this.hp;
                this.damage = Math.max(1, Math.floor(t.baseDmg * scaling.damage));
                this.speed = t.speed;
                this.color = t.color;
                this.accent = t.accent || '#DCE775';
                this.skill = t.skill || 'claw';
                this.knockResist = t.knockResist;
                this.ranged = t.ranged || false;
                this.laser = t.laser || false;
                this.leaper = t.leaper || false;
                this.isEliteType = t.elite || false;
                this.alive = true;
                this.facing = -1;
                this.hitTimer = 0;
                this.walkFrame = 0;
                this.walkTimer = 0;
                this.lastHitToken = null;
                this.shootInterval = t.shootInterval || 120;
                this.shootCooldown = Math.min(90, this.shootInterval);
                this.knockbackVx = 0;
                this.knockbackTimer = 0;
                // 护盾比生命成长更慢，破盾时间不会随无尽波次指数膨胀。
                const shieldMultiplier = Math.min(4, 1 + (scaling.hp - 1) * 0.48);
                this.maxShield = Math.floor((t.shield || 0) * shieldMultiplier);
                this.shield = this.maxShield;
                this.aggro = false;
                this.noticeRange = this.isEliteType ? 500 : (this.ranged ? 430 : 340);
                this.alertTimer = 0;
                this.laserCooldown = 115 + Math.floor(Math.random() * 75);
                this.laserCharge = 0;
                this.laserFire = 0;
                this.laserDirection = -1;
                this.laserY = 0;
                this.laserHitPlayer = false;
                this.leapCooldown = 55 + Math.floor(Math.random() * 45);
                this.leapBoostFrames = 0;
                this.leapVx = 0;
                this.skillCooldown = 45 + Math.floor(Math.random() * 75);
                this.skillTimer = 0;
                this.skillTriggered = false;
                this.attackAnimTimer = 0;
                this.contactCooldown = 0;
                this.abilityVx = 0;
                this.abilityVxFrames = 0;
                this.pressureStacks = 0;
                this.pressureStackTimer = 0;
                this.slowRatio = 0;
                this.slowTimer = 0;
                this.coinDrop = 0;
                // 无尽模式不再生成随机数值变体；所有成长只由波次确定。
                this.elite = this.isEliteType;
            }

            update(player) {
                if (!this.alive) return;
                if (gameState !== 'playing') return;
                const wasOnGround = this.onGround;

                if (this.contactCooldown > 0) this.contactCooldown--;
                if (this.attackAnimTimer > 0) this.attackAnimTimer--;
                if (this.skillCooldown > 0) this.skillCooldown--;
                if (this.pressureStackTimer > 0) this.pressureStackTimer--;
                else this.pressureStacks = 0;
                if (this.slowTimer > 0) this.slowTimer--;
                else this.slowRatio = 0;

                // 坑中自救跳跃
                if (this.onGround && Math.random() < 0.01) {
                    this.vy = -10;
                }

                // 敌人只有在发现玩家或受到攻击后才进入追击状态；跨边界也使用最短距离判断。
                const enemyCenterX = this.x + this.width / 2;
                const playerCenterX = player.x + player.width / 2;
                const dx = getWrappedDeltaX(enemyCenterX, playerCenterX);
                const dy = (player.y + player.height / 2) - (this.y + this.height / 2);
                const isNearViewport = this.x + this.width >= camera.x - 80 &&
                    this.x <= camera.x + CONFIG.CANVAS_WIDTH + 80;
                if (!this.aggro && Math.abs(dx) <= this.noticeRange && Math.abs(dy) <= 230) {
                    this.aggro = true;
                    this.alertTimer = 45;
                }
                if (this.alertTimer > 0) this.alertTimer--;
                if (this.aggro && this.onGround && Math.abs(dx) > 24) {
                    const direction = Math.sign(dx) || this.facing;
                    const frontTx = Math.floor((this.x + (direction > 0 ? this.width + 4 : -4)) / CONFIG.TILE_SIZE);
                    const footTy = Math.floor((this.y + this.height - 3) / CONFIG.TILE_SIZE);
                    const blocked = tiles[footTy]?.[frontTx] > 0;
                    const headClear = !(tiles[footTy - 1]?.[frontTx] > 0);
                    if (blocked && headClear) this.vy = -8.5;
                }
                if (this.leapCooldown > 0) this.leapCooldown--;
                const laserLocked = this.aggro && this.laser ? this.updateLaser(player, dx) : false;
                let desiredVx = 0;
                if (laserLocked) {
                    desiredVx = 0;
                } else if (this.aggro && (this.ranged || this.laser)) {
                    if (!isNearViewport) {
                        desiredVx = dx > 0 ? this.speed : -this.speed;
                        this.facing = dx > 0 ? 1 : -1;
                    } else if (Math.abs(dx) > 220) {
                        desiredVx = dx > 0 ? this.speed : -this.speed;
                        this.facing = dx > 0 ? 1 : -1;
                    } else if (Math.abs(dx) < 140) {
                        desiredVx = dx > 0 ? -this.speed : this.speed;
                    }
                } else if (this.aggro) {
                    if (Math.abs(dx) > 12) {
                        desiredVx = dx > 0 ? this.speed : -this.speed;
                        this.facing = dx > 0 ? 1 : -1;
                    }
                }
                if (this.slowTimer > 0) desiredVx *= Math.max(0.35, 1 - this.slowRatio);

                // 每一种敌人都拥有可读的独立动作与技能节奏。
                if (this.aggro && this.skill === 'dash' && this.onGround && this.skillCooldown <= 0 && Math.abs(dx) >= 70 && Math.abs(dx) <= 280) {
                    this.facing = Math.sign(dx) || this.facing;
                    this.abilityVx = this.facing * this.speed * 3.35;
                    this.abilityVxFrames = 18;
                    this.skillCooldown = 145;
                    this.attackAnimTimer = 24;
                } else if (this.aggro && this.skill === 'shieldBash' && this.onGround && this.skillCooldown <= 0 && Math.abs(dx) <= 190) {
                    this.facing = Math.sign(dx) || this.facing;
                    this.abilityVx = this.facing * this.speed * 3.1;
                    this.abilityVxFrames = 20;
                    this.skillCooldown = 175;
                    this.attackAnimTimer = 28;
                } else if (this.aggro && this.skill === 'mimicBite' && this.onGround && this.skillCooldown <= 0 && Math.abs(dx) <= 230) {
                    this.facing = Math.sign(dx) || this.facing;
                    this.vy = -5.5;
                    this.abilityVx = this.facing * this.speed * 2.65;
                    this.abilityVxFrames = 22;
                    this.skillCooldown = 125;
                    this.attackAnimTimer = 30;
                } else if (this.aggro && this.skill === 'slam' && this.onGround && this.skillCooldown <= 0 && Math.abs(dx) <= 125) {
                    this.skillTimer = 34;
                    this.skillTriggered = false;
                    this.skillCooldown = 205;
                    this.attackAnimTimer = 34;
                }

                if (this.skillTimer > 0) {
                    this.skillTimer--;
                    desiredVx = 0;
                    if (!this.skillTriggered && this.skillTimer <= 14) {
                        this.skillTriggered = true;
                        screenShake = Math.max(screenShake, 7);
                        spawnImpactParticles(this.x + this.width / 2, this.y + this.height, '#C0CA33', 18, 0.9);
                        const closeX = Math.abs((player.x + player.width / 2) - (this.x + this.width / 2)) <= 125;
                        const closeY = Math.abs((player.y + player.height) - (this.y + this.height)) <= 70;
                        if (closeX && closeY) player.takeDamage(Math.round(this.damage * 1.3), 'orc-slam');
                    }
                }

                // 跃袭尸会周期性扑向玩家，是普通怪而非精英怪。
                if (this.aggro && this.leaper) {
                    if (this.leapBoostFrames > 0) {
                        desiredVx = this.leapVx;
                        this.leapBoostFrames--;
                    } else if (this.onGround && this.leapCooldown <= 0 && Math.abs(dx) >= 70 && Math.abs(dx) <= 300) {
                        this.facing = dx > 0 ? 1 : -1;
                        this.vy = -9.5;
                        this.leapVx = this.facing * this.speed * 2.35;
                        desiredVx = this.leapVx;
                        this.leapBoostFrames = 22;
                        this.leapCooldown = 100 + Math.floor(Math.random() * 55);
                        this.attackAnimTimer = 28;
                    }
                }

                if (this.knockbackTimer > 0) {
                    this.vx = this.knockbackVx;
                    this.knockbackVx *= 0.84;
                    this.knockbackTimer--;
                } else if (this.abilityVxFrames > 0) {
                    this.vx = this.abilityVx;
                    this.abilityVxFrames--;
                } else {
                    this.vx = desiredVx;
                }

                // 远程攻击
                if (this.aggro && this.ranged) {
                    this.shootCooldown--;
                    if (this.shootCooldown <= 0 && isNearViewport) {
                        this.shootCooldown = this.shootInterval;
                        const projSpeed = 3 + Math.random();
                        const dir = Math.sign(dx) || 1;
                        this.facing = dir;
                        this.attackAnimTimer = 22;
                        projectiles.push(new Projectile(this.x + this.width / 2, this.y + this.height * 0.45, dir * projSpeed, -0.45, this.damage, this.accent, 'enemy', {
                            model: 'bow', size: 3, gravity: 0.035
                        }));
                    }
                }

                // 重力
                this.vy += CONFIG.GRAVITY;
                if (this.vy > 15) this.vy = 15;

                // 应用速度
                this.x += this.vx;
                this.y += this.vy;

                // 碰撞检测
                this.handleCollision();

                // 敌人与玩家共用环形地图，可从任意一侧跨到另一侧继续追击。
                const worldWidth = MAP_WIDTH * CONFIG.TILE_SIZE;
                let wrappedAtEdge = false;
                if (this.x < 0) {
                    this.x = worldWidth - this.width;
                    wrappedAtEdge = true;
                } else if (this.x > worldWidth - this.width) {
                    this.x = 0;
                    wrappedAtEdge = true;
                }
                if (wrappedAtEdge) {
                    const destinationGroundY = findGroundYAt(this.x + this.width / 2, this.height) - 2;
                    if (this.y > destinationGroundY || (wasOnGround && this.vy >= 0)) {
                        this.y = destinationGroundY;
                        this.vy = 0;
                        this.onGround = true;
                    }
                }

                // 更新受击状态
                if (this.hitTimer > 0) this.hitTimer--;

                // 走路动画
                if (this.vx !== 0) {
                    this.walkTimer++;
                    if (this.walkTimer > 10) {
                        this.walkTimer = 0;
                        this.walkFrame = (this.walkFrame + 1) % 4;
                    }
                }

                // 与玩家碰撞检测
                if (this.contactCooldown <= 0 && this.intersects(player.x, player.y, player.width, player.height)) {
                    this.aggro = true;
                    this.contactCooldown = this.skill === 'mimicBite' ? 42 : 54;
                    this.attackAnimTimer = Math.max(this.attackAnimTimer, 20);
                    const multiplier = this.skill === 'mimicBite' ? 1.3
                        : this.skill === 'shieldBash' ? 1.2
                            : this.leaper ? 1.15
                                : this.ranged ? 0.7 : 1;
                    player.takeDamage(Math.round(this.damage * multiplier), this.elite ? 'elite-contact' : `${this.skill}-contact`);
                }
            }

            updateLaser(player, dx) {
                if (this.laserFire > 0) {
                    this.laserFire--;
                    if (!this.laserHitPlayer) {
                        const playerCenterY = player.y + player.height / 2;
                        const inBeamY = Math.abs(playerCenterY - this.laserY) <= 11 + player.height / 2;
                        const playerDelta = getWrappedDeltaX(this.x + this.width / 2, player.x + player.width / 2);
                        const inFront = Math.sign(playerDelta) === this.laserDirection || playerDelta === 0;
                        if (inBeamY && inFront) {
                            player.takeDamage(Math.round(this.damage * 1.35), 'laser');
                            this.laserHitPlayer = true;
                        }
                    }
                    return true;
                }

                if (this.laserCharge > 0) {
                    this.laserCharge--;
                    if (this.laserCharge <= 0) {
                        this.laserFire = CONFIG.LASER_FIRE_FRAMES;
                        this.laserHitPlayer = false;
                        playSfx('laser_fire');
                        screenShake = Math.max(screenShake, 5);
                    }
                    return true;
                }

                this.laserCooldown--;
                const isNearViewport = this.x + this.width >= camera.x - 80 &&
                    this.x <= camera.x + CONFIG.CANVAS_WIDTH + 80;
                if (this.laserCooldown <= 0 && Math.abs(dx) <= 520 && isNearViewport) {
                    this.laserCooldown = Math.max(105, 205 - currentWave * 2);
                    this.laserCharge = CONFIG.LASER_CHARGE_FRAMES;
                    this.laserDirection = Math.sign(dx) || this.facing;
                    this.facing = this.laserDirection;
                    this.laserY = this.y + this.height * 0.42;
                    playSfx('laser_charge');
                    return true;
                }
                return false;
            }

            handleCollision() {
                this.onGround = false;
                const left = Math.floor(this.x / CONFIG.TILE_SIZE);
                const right = Math.floor((this.x + this.width) / CONFIG.TILE_SIZE);
                const top = Math.floor(this.y / CONFIG.TILE_SIZE);
                const bottom = Math.floor((this.y + this.height) / CONFIG.TILE_SIZE);

                for (let ty = top; ty <= bottom; ty++) {
                    for (let tx = left; tx <= right; tx++) {
                        if (tiles[ty] && tiles[ty][tx] > 0) {
                            const tileX = tx * CONFIG.TILE_SIZE;
                            const tileY = ty * CONFIG.TILE_SIZE;

                            if (this.intersects(tileX, tileY, CONFIG.TILE_SIZE, CONFIG.TILE_SIZE)) {
                                if (this.vy > 0 && this.y + this.height - this.vy <= tileY) {
                                    this.y = tileY - this.height;
                                    this.vy = 0;
                                    this.onGround = true;
                                } else if (this.vy < 0 && this.y - this.vy >= tileY + CONFIG.TILE_SIZE) {
                                    this.y = tileY + CONFIG.TILE_SIZE;
                                    this.vy = 0;
                                } else if (this.vx > 0) {
                                    this.x = tileX - this.width;
                                } else if (this.vx < 0) {
                                    this.x = tileX + CONFIG.TILE_SIZE;
                                }
                            }
                        }
                    }
                }
            }

            intersects(x, y, w, h) {
                return this.x < x + w && this.x + this.width > x &&
                       this.y < y + h && this.y + this.height > y;
            }

            takeDamage(amount, knockbackDir, knockbackForce, hitToken, knockbackFrames = 9, options = {}) {
                if (!this.alive) return false;
                if (hitToken && this.lastHitToken === hitToken) return false;
                if (hitToken) this.lastHitToken = hitToken;
                this.aggro = true;
                this.alertTimer = Math.max(this.alertTimer, 45);

                const resolved = player.resolveOutgoingDamage(amount, this, {
                    source: options.source || 'weapon',
                    passiveDamage: Boolean(options.passiveDamage),
                    canCrit: options.canCrit,
                    noTrigger: Boolean(options.noTrigger),
                    preResolved: Boolean(options.preResolved)
                });
                amount = resolved.damage;

                const hpBefore = this.hp;
                const shieldBefore = this.shield;
