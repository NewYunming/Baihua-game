                    ctx.arc(0, 0, radius, -0.4 + progress * Math.PI * 2, 4.9 + progress * Math.PI * 2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                } else if (this.weapon.attackStyle === 'whip') {
                    const whipTipY = 8 - progress * 18;
                    ctx.beginPath();
                    ctx.moveTo(8, -6);
                    ctx.quadraticCurveTo(radius * 0.55, -radius * (0.9 - progress), radius, whipTipY);
                    ctx.stroke();
                    ctx.fillStyle = this.weapon.color;
                    ctx.beginPath();
                    ctx.arc(radius, whipTipY, 4, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    const currentAngle = this.getWeaponPose(progress).angle;
                    const previousAngle = this.getWeaponPose(Math.max(0, progress - 0.13)).angle;
                    const startAngle = Math.min(currentAngle, previousAngle);
                    const endAngle = Math.max(currentAngle, previousAngle);
                    ctx.beginPath();
                    ctx.arc(0, 0, radius, startAngle, endAngle);
                    ctx.stroke();
                    ctx.globalAlpha *= 0.45;
                    ctx.lineWidth = 9;
                    ctx.stroke();
                }
                ctx.restore();
            }
        }

        // ============ 敌人类 ============
        class Enemy {
            constructor(x, y, wave = 1, typeKey = 'zombie', variantProfile = null) {
                const isChaos = typeKey === 'chaos';
                const t = isChaos
                    ? (variantProfile || createChaosProfile(wave))
                    : (ENEMY_TYPES[typeKey] || ENEMY_TYPES.zombie);
                this.type = typeKey;
                this.name = t.name || ENEMY_TYPES.zombie.name;
                this.isChaos = isChaos;
                this.chaosProfile = isChaos ? t : null;
                this.x = x;
                this.y = y;
                this.width = t.width;
                this.height = t.height;
                this.vx = 0;
                this.vy = 0;
                this.onGround = false;
                const hpMultiplier = Math.pow(CONFIG.ENEMY_HP_SCALING, wave - 1);
                this.hp = Math.floor(t.baseHp * hpMultiplier);
                this.maxHp = this.hp;
                this.damage = Math.floor(t.baseDmg * Math.pow(CONFIG.ENEMY_DAMAGE_SCALING, wave - 1));
                this.speed = t.speed;
                this.color = t.color;
                this.knockResist = t.knockResist;
                this.ranged = t.ranged || false;
                this.laser = t.laser || false;
                this.leaper = t.leaper || false;
                this.isEliteType = t.elite || false;
                this.alive = true;
                this.facing = -1;
                this.hitTimer = 0;
                this.walkFrame = 0;
                this.walkTimer = 0;
                this.lastHitToken = null;
                this.shootInterval = t.shootInterval || 120;
                this.shootCooldown = Math.min(90, this.shootInterval);
                this.knockbackVx = 0;
                this.knockbackTimer = 0;
                this.maxShield = Math.floor((t.shield || 0) * hpMultiplier);
                this.shield = this.maxShield;
                this.shieldRegenDelay = 0;
                this.laserCooldown = 115 + Math.floor(Math.random() * 75);
                this.laserCharge = 0;
                this.laserFire = 0;
                this.laserDirection = -1;
                this.laserY = 0;
                this.laserHitPlayer = false;
                this.leapCooldown = 55 + Math.floor(Math.random() * 45);
                this.leapBoostFrames = 0;
                this.leapVx = 0;
                const endlessTier = Math.max(0, wave - CONFIG.BOSS_WAVE);
                this.empowered = !this.isEliteType && !this.isChaos && endlessTier > 0 && Math.random() < Math.min(0.42, 0.08 + endlessTier * 0.012);
                this.elite = this.isEliteType || this.empowered;
                if (this.empowered) {
                    this.maxHp = Math.floor(this.maxHp * 1.32);
                    this.hp = this.maxHp;
                    this.damage = Math.floor(this.damage * 1.2);
                    this.maxShield = Math.floor(this.maxShield * 1.35);
                    this.shield = this.maxShield;
                    this.speed = Math.min(this.speed * 1.12, 3.1);
                }
            }

            update(player) {
                if (!this.alive) return;
                if (gameState !== 'playing') return;

                // 坑中自救跳跃
                if (this.onGround && Math.random() < 0.01) {
                    this.vy = -10;
                }

                if (this.shieldRegenDelay > 0) this.shieldRegenDelay--;
                if (this.maxShield > 0 && this.shield < this.maxShield && this.shieldRegenDelay <= 0) {
                    this.shield = Math.min(this.maxShield, this.shield + Math.max(0.08, this.maxShield * 0.0015));
                }

                // AI: 向玩家移动 / 射手与棱镜保持距离
                const dx = player.x - this.x;
                if (this.leapCooldown > 0) this.leapCooldown--;
                const laserLocked = this.laser ? this.updateLaser(player, dx) : false;
                let desiredVx = 0;
                if (laserLocked) {
                    desiredVx = 0;
                } else if (this.ranged || this.laser) {
                    if (Math.abs(dx) > 220) {
                        desiredVx = dx > 0 ? this.speed : -this.speed;
                        this.facing = dx > 0 ? 1 : -1;
                    } else if (Math.abs(dx) < 140) {
                        desiredVx = dx > 0 ? -this.speed : this.speed;
                    }
                } else {
                    if (Math.abs(dx) > 12) {
                        desiredVx = dx > 0 ? this.speed : -this.speed;
                        this.facing = dx > 0 ? 1 : -1;
                    }
                }

                // 跃袭尸会周期性扑向玩家，是普通怪而非精英怪。
                if (this.leaper) {
                    if (this.leapBoostFrames > 0) {
                        desiredVx = this.leapVx;
                        this.leapBoostFrames--;
                    } else if (this.onGround && this.leapCooldown <= 0 && Math.abs(dx) >= 70 && Math.abs(dx) <= 300) {
                        this.facing = dx > 0 ? 1 : -1;
                        this.vy = -9.5;
                        this.leapVx = this.facing * this.speed * 2.35;
                        desiredVx = this.leapVx;
                        this.leapBoostFrames = 22;
                        this.leapCooldown = 100 + Math.floor(Math.random() * 55);
                    }
                }

                if (this.knockbackTimer > 0) {
                    this.vx = this.knockbackVx;
                    this.knockbackVx *= 0.84;
                    this.knockbackTimer--;
                } else {
                    this.vx = desiredVx;
                }

                // 远程攻击
                if (this.ranged) {
                    this.shootCooldown--;
                    if (this.shootCooldown <= 0) {
                        this.shootCooldown = this.shootInterval;
                        const projSpeed = 3 + Math.random();
                        const dir = Math.sign(dx) || 1;
                        const projectileColor = this.isChaos ? this.chaosProfile.accent : '#90CAF9';
                        projectiles.push(new Projectile(this.x + this.width / 2, this.y + this.height / 2, dir * projSpeed, -0.5, this.damage, projectileColor));
                    }
                }

                // 重力
                this.vy += CONFIG.GRAVITY;
                if (this.vy > 15) this.vy = 15;

                // 应用速度
                this.x += this.vx;
                this.y += this.vy;

                // 碰撞检测
                this.handleCollision();

                // 更新受击状态
                if (this.hitTimer > 0) this.hitTimer--;

                // 走路动画
                if (this.vx !== 0) {
                    this.walkTimer++;
                    if (this.walkTimer > 10) {
                        this.walkTimer = 0;
                        this.walkFrame = (this.walkFrame + 1) % 4;
                    }
                }

                // 与玩家碰撞检测
                if (this.intersects(player.x, player.y, player.width, player.height)) {
                    player.takeDamage(this.damage, this.elite ? 'elite-contact' : 'enemy-contact');
                }
            }

            updateLaser(player, dx) {
                if (this.laserFire > 0) {
                    this.laserFire--;
                    if (!this.laserHitPlayer) {
                        const playerCenterY = player.y + player.height / 2;
                        const inBeamY = Math.abs(playerCenterY - this.laserY) <= 11 + player.height / 2;
                        const inFront = this.laserDirection > 0
                            ? player.x + player.width >= this.x + this.width / 2
                            : player.x <= this.x + this.width / 2;
                        if (inBeamY && inFront) {
                            player.takeDamage(Math.round(this.damage * 1.35), 'laser');
                            this.laserHitPlayer = true;
                        }
                    }
                    return true;
                }

                if (this.laserCharge > 0) {
                    this.laserCharge--;
                    if (this.laserCharge <= 0) {
                        this.laserFire = CONFIG.LASER_FIRE_FRAMES;
                        this.laserHitPlayer = false;
                        playSfx('laser_fire');
                        screenShake = Math.max(screenShake, 5);
                    }
                    return true;
                }

                this.laserCooldown--;
                const isNearViewport = this.x + this.width >= camera.x - 80 &&
                    this.x <= camera.x + CONFIG.CANVAS_WIDTH + 80;
                if (this.laserCooldown <= 0 && Math.abs(dx) <= 520 && isNearViewport) {
                    this.laserCooldown = Math.max(105, 205 - currentWave * 2);
                    this.laserCharge = CONFIG.LASER_CHARGE_FRAMES;
                    this.laserDirection = Math.sign(dx) || this.facing;
                    this.facing = this.laserDirection;
                    this.laserY = this.y + this.height * 0.42;
                    playSfx('laser_charge');
                    return true;
                }
                return false;
            }

            handleCollision() {
                this.onGround = false;
                const left = Math.floor(this.x / CONFIG.TILE_SIZE);
                const right = Math.floor((this.x + this.width) / CONFIG.TILE_SIZE);
                const top = Math.floor(this.y / CONFIG.TILE_SIZE);
                const bottom = Math.floor((this.y + this.height) / CONFIG.TILE_SIZE);

                for (let ty = top; ty <= bottom; ty++) {
                    for (let tx = left; tx <= right; tx++) {
                        if (tiles[ty] && tiles[ty][tx] > 0) {
                            const tileX = tx * CONFIG.TILE_SIZE;
                            const tileY = ty * CONFIG.TILE_SIZE;

                            if (this.intersects(tileX, tileY, CONFIG.TILE_SIZE, CONFIG.TILE_SIZE)) {
                                if (this.vy > 0 && this.y + this.height - this.vy <= tileY) {
                                    this.y = tileY - this.height;
                                    this.vy = 0;
                                    this.onGround = true;
                                } else if (this.vy < 0 && this.y - this.vy >= tileY + CONFIG.TILE_SIZE) {
                                    this.y = tileY + CONFIG.TILE_SIZE;
                                    this.vy = 0;
                                } else if (this.vx > 0) {
                                    this.x = tileX - this.width;
                                } else if (this.vx < 0) {
                                    this.x = tileX + CONFIG.TILE_SIZE;
                                }
                            }
                        }
                    }
                }
            }

            intersects(x, y, w, h) {
                return this.x < x + w && this.x + this.width > x &&
                       this.y < y + h && this.y + this.height > y;
            }

            takeDamage(amount, knockbackDir, knockbackForce, hitToken, knockbackFrames = 9) {
                if (!this.alive) return false;
                if (hitToken && this.lastHitToken === hitToken) return false;
                if (hitToken) this.lastHitToken = hitToken;

                const hpBefore = this.hp;
                const shieldBefore = this.shield;
                let remainingDamage = amount;
                if (this.shield > 0) {
                    const absorbed = Math.min(this.shield, remainingDamage);
                    this.shield -= absorbed;
                    remainingDamage -= absorbed;
                    this.shieldRegenDelay = 210;
                    spawnImpactParticles(this.x + this.width / 2, this.y + this.height / 2, '#67E8F9', 11, 0.7);
                    floatingTexts.push(new FloatingText(this.x + this.width / 2, this.y - 8, `盾-${Math.round(absorbed)}`, '#67E8F9', 13));
                    playSfx(this.shield <= 0 ? 'shield_break' : 'shield_hit');
                }

                if (remainingDamage > 0) {
                    this.hp -= remainingDamage;
                    floatingTexts.push(new FloatingText(this.x + this.width / 2, this.y - 8, `-${Math.round(remainingDamage)}`, '#FFF59D', 14));
                    spawnImpactParticles(this.x + this.width / 2, this.y + this.height / 2, this.color, 8, 0.7);
                }
                recordDamageDealt((shieldBefore - this.shield) + (hpBefore - Math.max(0, this.hp)));
                this.hitTimer = 10;
                this.knockbackVx = knockbackDir * (knockbackForce / this.knockResist);
                this.knockbackTimer = Math.max(1, knockbackFrames);
                this.vy = -5;
                screenShake = Math.max(screenShake, remainingDamage > 0 ? 3.5 : 1.5);

                if (this.hp <= 0) {
                    this.alive = false;
                    enemiesRemaining--;
                    recordKill(this);
                }
                return true;
            }

            draw(ctx) {
                if (!this.alive) return;

                const screenX = this.x - camera.x;
                const screenY = this.y - camera.y;

                ctx.save();

                // 受击闪红
                if (this.hitTimer > 0) {
                    ctx.globalAlpha = 0.7;
                }

                ctx.save();
                ctx.globalAlpha *= 0.3;
                ctx.fillStyle = '#02060b';
                ctx.beginPath();
                ctx.ellipse(screenX + this.width / 2, screenY + this.height + 2, this.width * 0.58, 4, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();

                // 绘制不同敌人形象
                this.drawBody(ctx, screenX, screenY);

                if (this.maxShield > 0 && this.shield > 0) {
                    const shieldPct = this.shield / this.maxShield;
                    ctx.save();
                    ctx.globalAlpha = 0.22 + shieldPct * 0.25;
                    ctx.strokeStyle = '#67E8F9';
                    ctx.lineWidth = 3;
                    ctx.shadowColor = '#22D3EE';
                    ctx.shadowBlur = 10;
                    ctx.beginPath();
                    ctx.ellipse(screenX + this.width / 2, screenY + this.height / 2, this.width * 0.72, this.height * 0.72, 0, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.restore();
                }

                if (this.laser) this.drawLaser(ctx, screenX, screenY);

                // 血条
                this.drawHealthBar(ctx, screenX, screenY);

                ctx.restore();
            }

            drawBody(ctx, x, y) {
                ctx.save();
                if (this.facing === -1) {
                    ctx.translate(x + this.width, y);
                    ctx.scale(-1, 1);
                    x = 0;
                    y = 0;
                }

                if (this.isChaos) {
                    this.drawChaosBody(ctx, x, y);
                    if (this.elite) {
                        ctx.strokeStyle = '#FFD54F';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(x + 1, y - 1, this.width - 2, this.height - 7);
                    }
                    ctx.restore();
                    return;
                }

                // 身体主体
                ctx.fillStyle = this.hitTimer > 0 ? '#FF7777' : this.color;
                ctx.fillRect(x + 4, y, this.width - 8, this.height - 8);

                // 眼睛
                ctx.fillStyle = '#000';
                ctx.fillRect(x + this.width / 2 - 6, y + 6, 4, 4);
                ctx.fillRect(x + this.width / 2 + 2, y + 6, 4, 4);

                // 特征
                if (this.type === 'runner') {
                    ctx.fillStyle = '#C5E1A5';
                    ctx.fillRect(x + 6, y + this.height - 16, this.width - 12, 4);
                } else if (this.type === 'tank') {
                    ctx.fillStyle = '#3E2723';
                    ctx.fillRect(x + 2, y + 6, this.width - 4, 6);
                } else if (this.type === 'shooter') {
                    ctx.fillStyle = '#B3E5FC';
                    ctx.fillRect(x + this.width - 10, y + 10, 8, 10);
                } else if (this.type === 'leaper') {
                    ctx.fillStyle = '#FFE082';
                    ctx.fillRect(x + 3, y + this.height - 10, this.width - 6, 4);
                    ctx.fillRect(x + this.width / 2 - 2, y + 4, 4, 8);
                } else if (this.type === 'warden') {
                    ctx.fillStyle = '#80DEEA';
                    ctx.fillRect(x + 2, y + 7, 7, this.height - 14);
                    ctx.fillStyle = '#263238';
                    ctx.fillRect(x + 9, y + 11, this.width - 14, 5);
                } else if (this.type === 'prism') {
                    ctx.fillStyle = '#E1BEE7';
                    ctx.beginPath();
                    ctx.moveTo(x + this.width / 2, y + 2);
                    ctx.lineTo(x + this.width - 4, y + this.height / 2);
                    ctx.lineTo(x + this.width / 2, y + this.height - 6);
                    ctx.lineTo(x + 4, y + this.height / 2);
                    ctx.closePath();
                    ctx.fill();
                    ctx.fillStyle = '#FF5252';
                    ctx.fillRect(x + this.width / 2 - 3, y + 9, 6, 6);
                }

                if (this.elite) {
                    ctx.strokeStyle = '#FFD54F';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x + 1, y - 1, this.width - 2, this.height - 7);
                }

                ctx.restore();
            }

            drawChaosBody(ctx, x, y) {
                const profile = this.chaosProfile;
                const bodyTop = y + 3;
                const bodyHeight = this.height - 10;
                const pulse = this.walkFrame % 2;

                ctx.save();
                ctx.globalAlpha = 0.22;
                ctx.fillStyle = profile.accent;
                const glitchOffset = 2 + profile.pattern;
                ctx.fillRect(x - glitchOffset, bodyTop + 5, 4, Math.max(5, bodyHeight - 9));
                ctx.fillRect(x + this.width + glitchOffset - 3, bodyTop + 9, 3, Math.max(4, bodyHeight - 16));
                ctx.restore();

                ctx.fillStyle = this.hitTimer > 0 ? '#FF7777' : this.color;
                ctx.strokeStyle = profile.accent;
                ctx.lineWidth = 2;
                if (profile.shape === 0) {
                    ctx.fillRect(x + 3, bodyTop, this.width - 6, bodyHeight);
                    ctx.strokeRect(x + 4, bodyTop + 1, this.width - 8, bodyHeight - 2);
                } else if (profile.shape === 1) {
                    ctx.beginPath();
                    ctx.moveTo(x + this.width / 2, bodyTop - 2);
                    ctx.lineTo(x + this.width - 2, bodyTop + bodyHeight * 0.42);
                    ctx.lineTo(x + this.width * 0.72, bodyTop + bodyHeight);
                    ctx.lineTo(x + this.width * 0.28, bodyTop + bodyHeight);
                    ctx.lineTo(x + 2, bodyTop + bodyHeight * 0.42);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                } else if (profile.shape === 2) {
                    ctx.beginPath();
                    ctx.ellipse(x + this.width / 2, bodyTop + bodyHeight / 2, this.width * 0.44, bodyHeight * 0.52, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                } else {
                    const gap = 2 + pulse;
                    ctx.fillRect(x + 2, bodyTop + 2, this.width * 0.45 - gap, bodyHeight - 3);
                    ctx.fillRect(x + this.width * 0.55 + gap, bodyTop - 1, this.width * 0.43 - gap, bodyHeight - 2);
                    ctx.fillStyle = profile.accent;
                    ctx.fillRect(x + this.width / 2 - 2, bodyTop + 4, 4, bodyHeight - 8);
                }

                ctx.fillStyle = profile.accent;
                if (profile.pattern === 0) {
                    ctx.fillRect(x + 5, bodyTop + bodyHeight * 0.58, this.width - 10, 3);
                } else if (profile.pattern === 1) {
                    for (let stripe = 0; stripe < 3; stripe++) {
                        ctx.fillRect(x + 5 + stripe * 5, bodyTop + 4, 2, Math.max(4, bodyHeight - 8));
                    }
                } else if (profile.pattern === 2) {
                    ctx.beginPath();
                    ctx.arc(x + this.width / 2, bodyTop + bodyHeight * 0.62, Math.max(3, this.width * 0.13), 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.fillRect(x + 4, bodyTop + 5, 5, 5);
                    ctx.fillRect(x + this.width - 9, bodyTop + bodyHeight - 10, 5, 5);
                }

                for (let horn = 0; horn < profile.hornCount; horn++) {
                    const hornX = profile.hornCount === 1
                        ? x + this.width / 2
                        : x + this.width * (0.3 + horn * 0.4);
                    ctx.beginPath();
                    ctx.moveTo(hornX - 4, bodyTop + 1);
                    ctx.lineTo(hornX, bodyTop - 8 - horn * 2);
                    ctx.lineTo(hornX + 4, bodyTop + 1);
                    ctx.closePath();
                    ctx.fill();
                }

                ctx.fillStyle = profile.eyeColor;
                ctx.shadowColor = profile.eyeColor;
                ctx.shadowBlur = 6;
                const eyeGap = this.width / (profile.eyeCount + 1);
                for (let eye = 0; eye < profile.eyeCount; eye++) {
                    const eyeX = x + eyeGap * (eye + 1);
                    ctx.fillRect(eyeX - 2, bodyTop + 7 + (eye % 2) * 2, 4, 4);
                }
                ctx.shadowBlur = 0;

                ctx.fillStyle = profile.accent;
                const footY = y + this.height - 7;
                ctx.fillRect(x + 3 + pulse, footY, Math.max(5, this.width * 0.28), 7);
                ctx.fillRect(x + this.width * 0.64 - pulse, footY, Math.max(5, this.width * 0.28), 7);
            }

            drawLaser(ctx, x, y) {
                if (this.laserCharge <= 0 && this.laserFire <= 0) return;
                const startX = x + this.width / 2;
                const screenLaserY = this.laserY - camera.y;
                const endX = this.laserDirection > 0 ? CONFIG.CANVAS_WIDTH + 80 : -80;
                ctx.save();
                if (this.laserCharge > 0) {
                    const progress = 1 - this.laserCharge / CONFIG.LASER_CHARGE_FRAMES;
                    ctx.globalAlpha = 0.28 + progress * 0.46;
                    ctx.strokeStyle = progress > 0.72 ? '#FF8A80' : '#F3E5F5';
                    ctx.setLineDash([8, 7]);
                    ctx.lineWidth = progress > 0.72 ? 3 : 1;
                    ctx.beginPath();
                    ctx.moveTo(startX, screenLaserY);
                    ctx.lineTo(endX, screenLaserY);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.strokeStyle = '#CE93D8';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(startX, screenLaserY, 7 + progress * 12, 0, Math.PI * 2);
                    ctx.stroke();
                } else {
                    ctx.globalAlpha = 0.92;
                    ctx.strokeStyle = '#FFF';
                    ctx.shadowColor = '#F50057';
                    ctx.shadowBlur = 18;
                    ctx.lineWidth = 10;
                    ctx.beginPath();
                    ctx.moveTo(startX, screenLaserY);
                    ctx.lineTo(endX, screenLaserY);
                    ctx.stroke();
                    ctx.strokeStyle = '#FF1744';
                    ctx.lineWidth = 4;
                    ctx.stroke();
                }
                ctx.restore();
            }

            drawHealthBar(ctx, x, y) {
                const barWidth = this.width;
                const barHeight = 4;
                const barY = y - 8;

                // 背景
                ctx.fillStyle = '#333';
                ctx.fillRect(x, barY, barWidth, barHeight);

                // 血量
                const hpPercent = this.hp / this.maxHp;
                ctx.fillStyle = hpPercent > 0.5 ? '#4CAF50' : hpPercent > 0.25 ? '#FF9800' : '#F44336';
                ctx.fillRect(x, barY, barWidth * hpPercent, barHeight);

                if (this.maxShield > 0) {
                    const shieldPct = Math.max(0, this.shield / this.maxShield);
                    ctx.fillStyle = 'rgba(4, 28, 40, 0.88)';
                    ctx.fillRect(x, barY - 5, barWidth, 3);
                    ctx.fillStyle = '#67E8F9';
                    ctx.fillRect(x, barY - 5, barWidth * shieldPct, 3);
                }

                if (this.isChaos) {
                    ctx.fillStyle = this.chaosProfile.accent;
                    ctx.font = 'bold 8px "Courier New", monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText(this.name, x + barWidth / 2, barY - (this.maxShield > 0 ? 9 : 4));
                } else if (this.isEliteType) {
                    ctx.fillStyle = '#FFD54F';
                    ctx.font = 'bold 8px "Courier New", monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText('精英', x + barWidth / 2, barY - (this.maxShield > 0 ? 9 : 4));
                }
            }
        }

        // ============ Boss: 白桦腐竹 ============
        class BirchCorruptBoss {
            constructor(wave) {
                this.name = '白桦腐竹';
                this.isBoss = true;
                this.x = 600;
                this.y = 100;
                this.width = 72;
                this.height = 96;
                this.vx = 0;
                this.vy = 0;
                this.facing = -1;
                this.alive = true;
                const hpMultiplier = Math.pow(1.2, wave - 1);
                this.maxHp = Math.floor(800 * hpMultiplier);
                this.hp = this.maxHp;
                this.damage = Math.floor(22 * Math.pow(1.075, Math.max(0, wave - CONFIG.BOSS_WAVE)));
                this.knockResist = 2.5;
                this.hitTimer = 0;
                this.lastHitToken = null;
                this.knockbackVx = 0;
                this.knockbackTimer = 0;
                this.attackTimer = 0;
                this.skillCooldown = 150;
                this.slamCooldown = 220;
                this.novaCooldown = 200;
                this.dashCooldown = 260;
                this.dashTimer = 0;
                this.auraPulse = 0;
                this.walkFrame = 0;
                this.walkTimer = 0;
            }

            update(player) {
                if (!this.alive || gameState !== 'playing') return;
                const dx = player.x - this.x;
                this.facing = dx >= 0 ? 1 : -1;

                // 走向玩家（慢速）或冲刺；受击时保留短暂击退，避免 AI 立刻覆盖。
                if (this.dashTimer > 0) {
                    this.vx = this.facing * 6.5;
                    this.dashTimer--;
                    if (this.dashTimer % 3 === 0) {
                        spawnAttackParticles(this.x + this.width / 2, this.y + this.height / 2, '#8BC34A', 6);
                    }
                } else {
                    if (Math.abs(dx) > 40) {
                        this.vx = dx > 0 ? 1.1 : -1.1;
                    } else {
                        this.vx = 0;
                    }
                }

                if (this.knockbackTimer > 0 && this.dashTimer <= 0) {
                    this.vx = this.knockbackVx;
                    this.knockbackVx *= 0.84;
                    this.knockbackTimer--;
                }

                // 技能计时
                this.skillCooldown--;
                this.slamCooldown--;
                this.novaCooldown--;
                this.dashCooldown--;
                this.auraPulse = (this.auraPulse + 0.05) % (Math.PI * 2);

                // 远程腐蚀弹幕
                if (this.skillCooldown <= 0) {
                    this.skillCooldown = 160;
                    const shots = 10;
                    for (let i = 0; i < shots; i++) {
                        const angle = -0.6 + (i / (shots - 1)) * 1.2;
                        const speed = 3.2;
                        projectiles.push(new Projectile(
                            this.x + this.width / 2,
                            this.y + this.height / 2,
                            Math.cos(angle + (this.facing === -1 ? Math.PI : 0)) * speed,
                            Math.sin(angle) * speed,
                            14,
                            '#8BC34A'
                        ));
                    }
                }

                // 跳跃砸地
                if (this.slamCooldown <= 0) {
                    this.slamCooldown = 240;
                    this.vy = -12;
                }

                // 腐蚀新星（环形弹幕）
                if (this.novaCooldown <= 0) {
                    this.novaCooldown = 220;
                    const rings = 12;
                    for (let i = 0; i < rings; i++) {
                        const angle = (Math.PI * 2 / rings) * i;
                        const speed = 3.8;
                        projectiles.push(new Projectile(
                            this.x + this.width / 2,
                            this.y + this.height / 2,
                            Math.cos(angle) * speed,
                            Math.sin(angle) * speed,
                            16,
                            '#A5D6A7'
                        ));
                    }
                    spawnAttackParticles(this.x + this.width / 2, this.y + this.height / 2, '#A5D6A7', 20);
                }

                // 冲刺横斩
                if (this.dashCooldown <= 0) {
                    this.dashCooldown = 260;
                    this.dashTimer = 26;
                    this.vy = -3;
                }

                // 重力
                this.vy += CONFIG.GRAVITY;
                if (this.vy > 14) this.vy = 14;

                // 应用速度
                this.x += this.vx;
                this.y += this.vy;

                // 地面碰撞
                this.handleCollision();

                // 碰撞玩家
                if (this.intersects(player.x, player.y, player.width, player.height)) {
                    player.takeDamage(this.damage, 'boss-contact');
                }

                if (this.hitTimer > 0) this.hitTimer--;

                // 动画
                if (this.vx !== 0) {
                    this.walkTimer++;
                    if (this.walkTimer > 10) {
                        this.walkTimer = 0;
                        this.walkFrame = (this.walkFrame + 1) % 4;
                    }
                }
            }

            handleCollision() {
                const left = Math.floor(this.x / CONFIG.TILE_SIZE);
                const right = Math.floor((this.x + this.width) / CONFIG.TILE_SIZE);
                const top = Math.floor(this.y / CONFIG.TILE_SIZE);
                const bottom = Math.floor((this.y + this.height) / CONFIG.TILE_SIZE);

                for (let ty = top; ty <= bottom; ty++) {
                    for (let tx = left; tx <= right; tx++) {
                        if (tiles[ty] && tiles[ty][tx] > 0) {
                            const tileX = tx * CONFIG.TILE_SIZE;
                            const tileY = ty * CONFIG.TILE_SIZE;
                            if (this.intersects(tileX, tileY, CONFIG.TILE_SIZE, CONFIG.TILE_SIZE)) {
                                if (this.vy > 0 && this.y + this.height - this.vy <= tileY) {
                                    // 落地冲击波
                                    if (this.vy > 8) {
                                        spawnAttackParticles(this.x + this.width / 2, this.y + this.height, '#8BC34A', 18);
                                    }
                                    this.y = tileY - this.height;
                                    this.vy = 0;
                                } else if (this.vy < 0 && this.y - this.vy >= tileY + CONFIG.TILE_SIZE) {
                                    this.y = tileY + CONFIG.TILE_SIZE;
                                    this.vy = 0;
                                } else if (this.vx > 0) {
                                    this.x = tileX - this.width;
                                } else if (this.vx < 0) {
                                    this.x = tileX + CONFIG.TILE_SIZE;
                                }
                            }
                        }
                    }
                }
            }

            intersects(x, y, w, h) {
                return this.x < x + w && this.x + this.width > x &&
                    this.y < y + h && this.y + this.height > y;
            }

            takeDamage(amount, knockbackDir, knockbackForce, hitToken, knockbackFrames = 8) {
                if (!this.alive) return false;
                if (hitToken && this.lastHitToken === hitToken) return false;
                if (hitToken) this.lastHitToken = hitToken;
                const hpBefore = this.hp;
                this.hp -= amount;
                recordDamageDealt(hpBefore - Math.max(0, this.hp));
                this.hitTimer = 12;
                this.knockbackVx = Math.max(-5, Math.min(5, this.knockbackVx + knockbackDir * (knockbackForce / this.knockResist)));
                this.knockbackTimer = Math.max(1, knockbackFrames);
                this.vy = -3;
                spawnImpactParticles(this.x + this.width / 2, this.y + this.height / 2, '#A5D6A7', 12, 0.8);
                floatingTexts.push(new FloatingText(this.x + this.width / 2, this.y - 10, `-${Math.round(amount)}`, '#FFF59D', 16));
                screenShake = Math.max(screenShake, 4);
                if (this.hp <= 0) {
                    this.alive = false;
                    enemiesRemaining = 0;
                    recordKill(this, true);
                }
                return true;
            }

            draw(ctx) {
                if (!this.alive) return;
                const screenX = this.x - camera.x;
                const screenY = this.y - camera.y;
                ctx.save();
                if (this.hitTimer > 0) ctx.globalAlpha = 0.85;

                // 腐化能量光环
                ctx.save();
                ctx.globalAlpha = 0.18;
                ctx.fillStyle = '#8BC34A';
                ctx.beginPath();
                ctx.ellipse(
                    screenX + this.width / 2,
                    screenY + this.height / 2,
                    64 + Math.sin(this.auraPulse) * 8,
                    52 + Math.cos(this.auraPulse) * 6,
                    0,
                    0,
                    Math.PI * 2
                );
                ctx.fill();
                ctx.restore();

                // 躯干分层装甲
                ctx.fillStyle = '#F5F5F5';
                ctx.fillRect(screenX + 6, screenY + 10, this.width - 12, this.height - 20);
                ctx.fillStyle = '#E0E0E0';
                ctx.fillRect(screenX + 10, screenY + 18, this.width - 20, this.height - 32);
                ctx.fillStyle = '#BDBDBD';
                ctx.fillRect(screenX + 14, screenY + 26, this.width - 28, this.height - 44);

                // 肩甲与护臂
                ctx.fillStyle = '#2E7D32';
                ctx.fillRect(screenX + 4, screenY + 12, this.width - 8, 14);
                ctx.fillRect(screenX + 2, screenY + 30, 12, 22);
                ctx.fillRect(screenX + this.width - 14, screenY + 30, 12, 22);

                // 树皮纹理
                ctx.fillStyle = '#8BC34A';
                for (let i = 0; i < 7; i++) {
                    ctx.fillRect(screenX + 10 + i * 8, screenY + 18 + (i * 5) % 28, 5, 10);
                }

                // 腐化核心
                ctx.fillStyle = '#A5D6A7';
                ctx.fillRect(screenX + this.width / 2 - 12, screenY + 44, 24, 18);
                ctx.fillStyle = '#C5E1A5';
                ctx.fillRect(screenX + this.width / 2 - 8, screenY + 48, 16, 10);

                // 面甲与角
                ctx.fillStyle = '#263238';
                ctx.fillRect(screenX + this.width / 2 - 14, screenY + 6, 28, 20);
                ctx.fillStyle = '#9CCC65';
                ctx.fillRect(screenX + this.width / 2 - 10, screenY + 12, 8, 6);
                ctx.fillRect(screenX + this.width / 2 + 4, screenY + 12, 8, 6);
                ctx.fillStyle = '#455A64';
                ctx.beginPath();
                ctx.moveTo(screenX + this.width / 2 - 18, screenY + 8);
                ctx.lineTo(screenX + this.width / 2 - 6, screenY - 6);
                ctx.lineTo(screenX + this.width / 2 - 2, screenY + 6);
                ctx.closePath();
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(screenX + this.width / 2 + 18, screenY + 8);
                ctx.lineTo(screenX + this.width / 2 + 6, screenY - 6);
                ctx.lineTo(screenX + this.width / 2 + 2, screenY + 6);
                ctx.closePath();
                ctx.fill();

                // 胸口符文
                ctx.strokeStyle = '#C5E1A5';
                ctx.lineWidth = 3;
                ctx.strokeRect(screenX + this.width / 2 - 16, screenY + 40, 32, 28);
                ctx.strokeRect(screenX + this.width / 2 - 8, screenY + 46, 16, 16);

                // 冲刺残影
                if (this.dashTimer > 0) {
                    ctx.globalAlpha = 0.3;
                    ctx.fillStyle = '#8BC34A';
                    for (let i = 0; i < 3; i++) {
                        ctx.fillRect(screenX - i * 12 * this.facing, screenY + 10, this.width, this.height - 12);
                    }
                }

                ctx.restore();

                // 血条
                this.drawHealthBar(ctx, screenX, screenY);
            }

            drawHealthBar(ctx, x, y) {
                const barWidth = 200;
                const barX = CONFIG.CANVAS_WIDTH / 2 - barWidth / 2;
                const barY = 20;
                ctx.save();
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(barX, barY, barWidth, 16);
                const pct = this.hp / this.maxHp;
                ctx.fillStyle = '#8BC34A';
                ctx.fillRect(barX, barY, barWidth * pct, 16);
                ctx.strokeStyle = '#C5E1A5';
                ctx.lineWidth = 2;
                ctx.strokeRect(barX, barY, barWidth, 16);
                ctx.fillStyle = '#FFF';
                ctx.font = 'bold 14px "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.fillText(`${this.name} ${Math.max(0, Math.floor(this.hp))}/${this.maxHp}`, CONFIG.CANVAS_WIDTH / 2, barY + 13);
                ctx.restore();
            }
        }

        // ============ 绘制函数 ============
        function drawSky() {
            // 渐变天空
            const gradient = ctx.createLinearGradient(0, 0, 0, CONFIG.CANVAS_HEIGHT);
            gradient.addColorStop(0, currentBiome.sky[0]);
            gradient.addColorStop(0.7, currentBiome.sky[1]);
            gradient.addColorStop(1, currentBiome.sky[2]);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);

            if (currentBiome === BIOMES.night || currentBiome === BIOMES.end) {
                for (let i = 0; i < 54; i++) {
                    const sx = (i * 83 + 17) % CONFIG.CANVAS_WIDTH;
                    const sy = (i * 47 + 23) % 230;
                    const pulse = reducedMotion ? 0.75 : 0.52 + Math.sin(performance.now() * 0.002 + i) * 0.28;
                    ctx.globalAlpha = pulse;
                    ctx.fillStyle = i % 5 === 0 ? '#CE93D8' : '#E3F2FD';
                    ctx.fillRect(sx, sy, i % 4 === 0 ? 3 : 2, i % 4 === 0 ? 3 : 2);
                }
                ctx.globalAlpha = 1;
            }

            if (currentBiome.sun) {
                ctx.save();
                ctx.globalAlpha = 0.18;
                ctx.fillStyle = '#FFF59D';
                ctx.beginPath();
                ctx.arc(CONFIG.CANVAS_WIDTH - 100, 80, 58, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
                ctx.fillStyle = '#FFE082';
                ctx.beginPath();
                ctx.arc(CONFIG.CANVAS_WIDTH - 100, 80, 40, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#FFEB3B';
                ctx.beginPath();
                ctx.arc(CONFIG.CANVAS_WIDTH - 100, 80, 32, 0, Math.PI * 2);
                ctx.fill();
            }

            if (currentBiome.moon) {
                ctx.fillStyle = '#CFD8DC';
                ctx.beginPath();
                ctx.arc(120, 90, 26, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#90A4AE';
                ctx.beginPath();
                ctx.arc(126, 86, 22, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawClouds() {
            ctx.fillStyle = currentBiome.cloud;
            clouds.forEach(cloud => {
                const screenX = cloud.x - camera.x * 0.3; // 视差滚动
                if (screenX > -cloud.width && screenX < CONFIG.CANVAS_WIDTH + cloud.width) {
                    // 像素风格云朵
                    const w = cloud.width;
                    ctx.fillRect(screenX, cloud.y, w * 0.6, 16);
                    ctx.fillRect(screenX - 10, cloud.y + 8, w * 0.8, 12);
                    ctx.fillRect(screenX + w * 0.3, cloud.y - 6, w * 0.4, 14);
                }
            });
        }

        function updateClouds() {
            clouds.forEach(cloud => {
                cloud.x += cloud.speed;
                if (cloud.x > MAP_WIDTH * CONFIG.TILE_SIZE + 100) cloud.x = -cloud.width;
            });
        }

        function drawTile(x, y, type) {
            const screenX = x * CONFIG.TILE_SIZE - camera.x;
            const screenY = y * CONFIG.TILE_SIZE - camera.y;

            // 屏幕外不绘制
            if (screenX < -CONFIG.TILE_SIZE || screenX > CONFIG.CANVAS_WIDTH ||
                screenY < -CONFIG.TILE_SIZE || screenY > CONFIG.CANVAS_HEIGHT) {
                return;
            }

            if (type === 1) {
                // 草方块
                // 泥土底部
                ctx.fillStyle = currentBiome.dirt;
                ctx.fillRect(screenX, screenY, CONFIG.TILE_SIZE, CONFIG.TILE_SIZE);

                // 泥土纹理
                ctx.fillStyle = currentBiome.dirtAccent;
                for (let i = 0; i < 4; i++) {
                    const dotX = screenX + (i * 8 + ((y * 3) % 8)) % 28;
                    const dotY = screenY + 14 + (i * 5) % 16;
                    ctx.fillRect(dotX, dotY, 4, 4);
                }

                // 草皮顶部
                ctx.fillStyle = currentBiome.top;
                ctx.fillRect(screenX, screenY, CONFIG.TILE_SIZE, 8);

                // 草皮纹理
                ctx.fillStyle = currentBiome.topAccent;
                ctx.fillRect(screenX + 2, screenY, 4, 6);
                ctx.fillRect(screenX + 12, screenY, 6, 5);
                ctx.fillRect(screenX + 24, screenY, 4, 7);

                // 草皮边缘
                ctx.fillStyle = currentBiome.topAccent;
                ctx.fillRect(screenX, screenY + 8, CONFIG.TILE_SIZE, 2);

                // 群系专属地表细节
                if (currentBiome === BIOMES.snow) {
                    ctx.fillStyle = '#F7FCFF';
                    ctx.fillRect(screenX, screenY, CONFIG.TILE_SIZE, 5);
                    ctx.fillStyle = '#B3E5FC';
                    ctx.fillRect(screenX + 5, screenY + 5, 8, 2);
                } else if (currentBiome === BIOMES.rain) {
                    ctx.fillStyle = 'rgba(144,202,249,0.72)';
                    ctx.fillRect(screenX + 7, screenY + 3, 14, 2);
                } else if (currentBiome === BIOMES.nether) {
                    ctx.fillStyle = '#FF6D00';
                    ctx.fillRect(screenX + 4 + ((x * 7) % 16), screenY + 5, 4, 2);
                } else if (currentBiome === BIOMES.end) {
                    ctx.fillStyle = '#B388FF';
                    ctx.fillRect(screenX + 14, screenY - 5, 3, 9);
                    ctx.fillRect(screenX + 11, screenY - 2, 9, 3);
                } else {
                    ctx.fillStyle = currentBiome.topAccent;
                    ctx.fillRect(screenX + 6, screenY - 4 - ((x * 3) % 3), 2, 6);
                    ctx.fillRect(screenX + 23, screenY - 3 - ((x * 5) % 2), 2, 5);
                }

            } else if (type === 2) {
                // 泥土方块
                ctx.fillStyle = currentBiome.dirt;
                ctx.fillRect(screenX, screenY, CONFIG.TILE_SIZE, CONFIG.TILE_SIZE);

                // 泥土纹理
                ctx.fillStyle = currentBiome.dirtAccent;
                for (let i = 0; i < 5; i++) {
                    const dotX = screenX + ((x * 7 + i * 9) % 24);
                    const dotY = screenY + ((y * 5 + i * 7) % 24);
                    ctx.fillRect(dotX, dotY, 5, 5);
                }

                // 石头点缀
                ctx.fillStyle = currentBiome.stone;
                ctx.fillRect(screenX + ((x * 3) % 20), screenY + ((y * 7) % 20), 6, 4);
            }

            // 方块边框
            ctx.strokeStyle = 'rgba(0,0,0,0.2)';
            ctx.strokeRect(screenX, screenY, CONFIG.TILE_SIZE, CONFIG.TILE_SIZE);
        }

        function drawMap() {
            const startX = Math.floor(camera.x / CONFIG.TILE_SIZE);
            const endX = startX + Math.ceil(CONFIG.CANVAS_WIDTH / CONFIG.TILE_SIZE) + 1;
            const startY = Math.floor(camera.y / CONFIG.TILE_SIZE);
            const endY = startY + Math.ceil(CONFIG.CANVAS_HEIGHT / CONFIG.TILE_SIZE) + 1;

            for (let y = Math.max(0, startY); y < Math.min(MAP_HEIGHT, endY); y++) {
                for (let x = Math.max(0, startX); x < Math.min(MAP_WIDTH, endX); x++) {
                    if (tiles[y][x] > 0) {
                        drawTile(x, y, tiles[y][x]);
                    }
                }
            }
        }

        function drawUI() {
            // 血条背景
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(10, 10, 204, 28);

            // 血条边框
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.strokeRect(10, 10, 204, 28);

            // 血量
            const hpPercent = player.hp / player.maxHp;
            const gradient = ctx.createLinearGradient(12, 0, 200, 0);
            gradient.addColorStop(0, '#E53935');
            gradient.addColorStop(1, '#FF5252');
            ctx.fillStyle = gradient;
            ctx.fillRect(12, 12, 200 * hpPercent, 24);

            // 血量文字
            ctx.fillStyle = '#FFF';
            ctx.font = 'bold 14px "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.fillText(`HP: ${Math.floor(player.hp)}/${player.maxHp}`, 112, 29);

            // 心形图标
            ctx.fillStyle = '#E53935';
            ctx.font = '20px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('❤', 220, 30);

            // 左侧信息面板，保证亮色群系中的文字对比度
            ctx.fillStyle = 'rgba(2, 9, 18, 0.76)';
            ctx.fillRect(8, 44, 224, 88);
            ctx.strokeStyle = 'rgba(137, 190, 230, 0.38)';
            ctx.strokeRect(8, 44, 224, 88);

            // 波次信息
            ctx.fillStyle = '#FFF';
            ctx.font = 'bold 16px "Courier New", monospace';
            ctx.textAlign = 'left';
            const modeLabel = gameMode === 'endless' ? '无尽远征' : '主线远征';
            ctx.fillText(`${modeLabel} · Wave ${currentWave}`, 16, 64);
            
            // 敌人剩余
            ctx.font = 'bold 14px "Courier New", monospace';
            ctx.fillText(`敌人剩余: ${enemiesRemaining}/${totalEnemiesInWave}`, 16, 84);

            // 主题
            ctx.font = '12px "Courier New", monospace';
            ctx.fillStyle = '#B3E5FC';
            const musicName = bossMusicPlaying
                ? '白桦腐化战歌'
                : BIOME_MUSIC[currentBiome.musicKey]?.name || '原野晨风';
            ctx.fillText(`${currentBiome.name} · ♪ ${musicName}`, 16, 103);

            // 击杀数
            ctx.fillStyle = '#FFF';
            ctx.font = '12px "Courier New", monospace';
            const threat = Math.pow(CONFIG.ENEMY_HP_SCALING, Math.max(0, currentWave - 1)).toFixed(1);
            ctx.fillText(`击杀 ${killCount} · 威胁 x${threat}`, 16, 122);
            
            // 当前武器信息
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(CONFIG.CANVAS_WIDTH - 224, 10, 214, 88);
            ctx.strokeStyle = player.weapon.color;
            ctx.lineWidth = 2;
            ctx.strokeRect(CONFIG.CANVAS_WIDTH - 224, 10, 214, 88);
            
            ctx.fillStyle = player.weapon.color;
            ctx.font = 'bold 14px "Courier New", monospace';
            ctx.textAlign = 'left';
            ctx.fillText(`[${player.weapon.rarityName}]`, CONFIG.CANVAS_WIDTH - 214, 28);
            
            ctx.fillStyle = '#FFF';
            ctx.fillText(player.weapon.name, CONFIG.CANVAS_WIDTH - 214, 46);
            
            ctx.fillStyle = '#FFD54F';
            ctx.font = '12px "Courier New", monospace';
            ctx.fillText(`攻击力: ${formatStat(player.getAttackDamage())}`, CONFIG.CANVAS_WIDTH - 214, 63);

            if (player.weapon.isRanged) {
                const ammoText = player.reloadTimer > 0
                    ? `装填 ${Math.ceil(player.reloadTimer / 60 * 10) / 10}s`
                    : `弹药 ${player.ammo}/${player.getMagazineSize()}`;
                ctx.fillStyle = player.reloadTimer > 0 ? '#80CBC4' : player.ammo === 0 ? '#FF8A80' : '#FFF59D';
                ctx.fillText(ammoText, CONFIG.CANVAS_WIDTH - 214, 81);
                if (player.reloadTimer > 0) {
                    const reloadPct = 1 - player.reloadTimer / Math.max(1, player.reloadMax);
                    ctx.fillStyle = 'rgba(255,255,255,0.14)';
                    ctx.fillRect(CONFIG.CANVAS_WIDTH - 120, 72, 96, 7);
                    ctx.fillStyle = '#80CBC4';
                    ctx.fillRect(CONFIG.CANVAS_WIDTH - 120, 72, 96 * reloadPct, 7);
                }
            } else {
                ctx.fillStyle = '#B3E5FC';
                ctx.fillText(`招式: ${player.weapon.attackProfile.name} · 间隔 ${(player.weapon.attackProfile.cooldown / 60).toFixed(2)}s`, CONFIG.CANVAS_WIDTH - 214, 81);
            }

            // Boss提示
            if (activeBoss && activeBoss.alive) {
                ctx.fillStyle = '#FFB300';
                ctx.font = 'bold 14px "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.strokeStyle = '#241200';
                ctx.lineWidth = 4;
                ctx.strokeText('BOSS 来袭: 白桦腐竹', CONFIG.CANVAS_WIDTH / 2, 52);
                ctx.fillText('BOSS 来袭: 白桦腐竹', CONFIG.CANVAS_WIDTH / 2, 52);
            }
        }

        // ============ 波次完成处理 ============
        function onWaveComplete() {
            if (waveCompletionHandled || gameState !== 'playing') return;
            waveCompletionHandled = true;
            stopBossMusic();
            runStats.wavesCleared++;
            if (gameMode === 'endless') runStats.endlessWavesCleared++;
            player.hp = player.maxHp;
            projectiles.length = 0;
            if (gameMode === 'story' && currentWave === CONFIG.BOSS_WAVE) {
                // 通关
                gameState = 'win';
                gameEndTime = Date.now();
                winCode = generateWinCode();
                syncTouchControlsVisibility();
                announce('主线通关。按回车进入无尽模式，或按 Escape 返回标题。');
                return;
            }
            startMusic(currentBiome.musicKey);
            prepareWaveRewards();
        }

        function prepareWaveRewards() {
            gameState = 'reward';
            syncTouchControlsVisibility();
            rewardQueue = ['enchant'];
            const grantsWeaponChoice = gameMode === 'story'
                ? currentWave % 2 === 1
                : currentWave % 3 === 0;
            if (grantsWeaponChoice) rewardQueue.unshift('weapon');
            openNextReward();
        }

        function openNextReward() {
            currentRewardType = rewardQueue.shift() || 'enchant';
            weaponRewardRefreshAvailable = currentRewardType === 'weapon';
            hoveredChoice = -1;
            hoveredRewardAction = null;
            if (currentRewardType === 'weapon') {
                const minRarity = player.weapon ? player.weapon.rarity : 'COMMON';
                weaponChoices = generateWeaponChoices(3, minRarity);
                enchantChoices = [];
            } else {
                enchantChoices = generateEnchantChoices(3, player.weapon);
                weaponChoices = [];
            }
            announce(currentRewardType === 'weapon'
                ? '武器奖励。按 1、2、3 选择，F 可全部刷新一次，S 不选择新武器。'
                : '属性碎片奖励。按数字 1、2、3 选择。');
        }

        function drawBackdropDetails() {
            ctx.save();
            // 远景雾带
            const haze = ctx.createLinearGradient(0, 180, 0, 400);
            haze.addColorStop(0, 'rgba(255,255,255,0)');
            haze.addColorStop(1, 'rgba(5,12,24,0.25)');
            ctx.fillStyle = haze;
            ctx.fillRect(0, 160, CONFIG.CANVAS_WIDTH, 260);

            // 两层视差山脉，以稳定坐标绘制，避免纹理闪烁。
            const farOffset = -((camera.x * 0.08) % 240);
            ctx.fillStyle = 'rgba(25, 45, 68, 0.28)';
            for (let x = farOffset - 240; x < CONFIG.CANVAS_WIDTH + 240; x += 240) {
                ctx.beginPath();
                ctx.moveTo(x, 365);
                ctx.lineTo(x + 72, 235);
                ctx.lineTo(x + 132, 320);
                ctx.lineTo(x + 190, 260);
                ctx.lineTo(x + 260, 365);
                ctx.closePath();
                ctx.fill();
            }

            const nearOffset = -((camera.x * 0.16) % 150);
            ctx.fillStyle = 'rgba(6, 24, 35, 0.3)';
            for (let x = nearOffset - 150; x < CONFIG.CANVAS_WIDTH + 150; x += 150) {
                ctx.beginPath();
                ctx.moveTo(x, 410);
                ctx.lineTo(x + 52, 298);
                ctx.lineTo(x + 104, 410);
                ctx.closePath();
                ctx.fill();
            }
            ctx.restore();
        }

        function drawPostEffects() {
            ctx.save();
            const vignette = ctx.createRadialGradient(
                CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT / 2, 150,
                CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT / 2, 560
            );
            vignette.addColorStop(0, 'rgba(0,0,0,0)');
            vignette.addColorStop(1, 'rgba(0,0,0,0.48)');
            ctx.fillStyle = vignette;
            ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);

            if (damageFlash > 0 && !reducedMotion) {
                ctx.globalAlpha = Math.min(0.24, damageFlash / 45);
                ctx.fillStyle = '#FF1744';
                ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);
            }
            ctx.restore();
        }

        // ============ 开始下一波 ============
        function startNextWave() {
            currentWave++;
            gameState = 'playing';
            syncTouchControlsVisibility();
            clearCombatTransients(true);
            spawnEnemiesForWave();
        }

        function restartCurrentWave() {
            stopBossMusic();
            player.hp = player.maxHp;
            clearCombatTransients(true);
            gameState = 'playing';
            syncTouchControlsVisibility();
            spawnEnemiesForWave();
        }

        function restartGame() {
            stopBossMusic();
            stopMusic();
            clearCombatTransients(true);
            gameMode = 'story';
            currentWave = 1;
            killCount = 0;
            gameStartTime = Date.now();
            gameEndTime = null;
            winCode = '';
            runStats = createRunStats('story', gameStartTime);
            lastRunSummary = null;
            player.resetProgression();
            player.hp = player.maxHp;
            gameState = 'playing';
            resetPauseForStateTransition();
            currentRewardType = 'weapon';
            weaponRewardRefreshAvailable = false;
            weaponChoices = [];
            enchantChoices = [];
            rewardQueue = [];
            syncTouchControlsVisibility();
            spawnEnemiesForWave();
        }

        function startEndlessMode() {
            gameMode = 'endless';
            currentWave = CONFIG.BOSS_WAVE;
            gameEndTime = null;
            beginEndlessStats(Date.now());
            clearCombatTransients(true);
            player.hp = player.maxHp;
            gameState = 'reward';
            syncTouchControlsVisibility();
            rewardQueue = ['enchant'];
            openNextReward();
            startMusic(currentBiome.musicKey);
        }

        function clearInputState() {
            Object.keys(keys).forEach(key => { keys[key] = false; });
            mousePressed = false;
            Object.keys(touchActive).forEach(key => { touchActive[key] = false; });
        }

        function clearCombatTransients(resetInvincibility = true) {
            projectiles.length = 0;
            particles.length = 0;
            floatingTexts.length = 0;
            activeBoss = null;
            enemies = [];
            waveCompletionHandled = false;
            screenShake = 0;
            damageFlash = 0;
            player.x = 100;
            player.y = 100;
            player.vx = 0;
            player.vy = 0;
            player.attacking = false;
            player.attackTimer = 0;
            player.attackCooldown = 0;
            player.attackEffectTriggered = false;
            player.healAccumulator = 0;
            player.reloadTimer = 0;
            player.reloadMax = 0;
            player.ammo = player.getMagazineSize();
            if (resetInvincibility) player.invincible = 0;
            clearInputState();
        }

        function resetToTitle() {
            stopBossMusic();
            stopMusic();
            clearCombatTransients(true);
            currentWave = 0;
            gameMode = 'story';
            killCount = 0;
            runStats = createRunStats('story');
            lastRunSummary = null;
            gameState = 'title';
            hoveredChoice = -1;
            hoveredRewardAction = null;
            weaponChoices = [];
            enchantChoices = [];
            rewardQueue = [];
            currentRewardType = 'weapon';
            weaponRewardRefreshAvailable = false;
            player.hp = player.maxHp;
            resetPauseForStateTransition();
            disableTouchMode();
            announce('标题界面。按 Enter 开始游戏。');
        }

        // ============ 绘制奖励界面 ============
        function drawRewardScreen() {
            // 半透明背景
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);

            // 标题
            ctx.fillStyle = '#FFD54F';
            ctx.font = 'bold 32px "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.fillText(`🎉 Wave ${currentWave} 完成！`, CONFIG.CANVAS_WIDTH / 2, 80);

            ctx.fillStyle = '#FFF';
            ctx.font = '18px "Courier New", monospace';
            const rewardTitle = currentRewardType === 'weapon' ? '选择一件武器' : '选择一枚永久属性碎片';
            ctx.fillText(rewardTitle, CONFIG.CANVAS_WIDTH / 2, 115);
            if (rewardQueue.length > 0) {
                ctx.fillStyle = '#90A4AE';
                ctx.font = '12px "Courier New", monospace';
                ctx.fillText(`本关选择后还有 ${rewardQueue.length} 项奖励`, CONFIG.CANVAS_WIDTH / 2, 134);
            }

            // 绘制三个奖励选项
            const cardWidth = 250;
            const cardHeight = 280;
            const cardSpacing = 30;
            const startX = (CONFIG.CANVAS_WIDTH - (cardWidth * 3 + cardSpacing * 2)) / 2;
            const cardY = 155;

            const pool = currentRewardType === 'weapon' ? weaponChoices : enchantChoices;

            pool.forEach((weapon, index) => {
                const cardX = startX + index * (cardWidth + cardSpacing);
                const isHovered = hoveredChoice === index;

                // 卡片背景
                ctx.fillStyle = isHovered ? 'rgba(255, 255, 255, 0.15)' : 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(cardX, cardY, cardWidth, cardHeight);

                // 卡片边框 (根据稀有度)
                ctx.strokeStyle = weapon.color;
                ctx.lineWidth = isHovered ? 4 : 2;
                ctx.strokeRect(cardX, cardY, cardWidth, cardHeight);

                // 发光效果 (高稀有度)
                if (weapon.rarity === 'LEGENDARY' || weapon.rarity === 'EPIC') {
                    ctx.shadowColor = weapon.glowColor;
                    ctx.shadowBlur = isHovered ? 10 : 6;
                    ctx.strokeRect(cardX, cardY, cardWidth, cardHeight);
                    ctx.shadowBlur = 0;
                }

                if (currentRewardType === 'weapon') {
                    // 稀有度标签
                    ctx.fillStyle = weapon.color;
                    ctx.font = 'bold 14px "Courier New", monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText(`[ ${weapon.rarityName} ]`, cardX + cardWidth / 2, cardY + 30);

                    // 武器名称
                    ctx.fillStyle = '#FFF';
                    ctx.font = 'bold 20px "Courier New", monospace';
                    ctx.fillText(weapon.name, cardX + cardWidth / 2, cardY + 65, cardWidth - 22);

                    // 绘制像素武器图标
                    drawWeaponIcon(ctx, cardX + cardWidth / 2 - 30, cardY + 85, weapon);

                    // 攻击力
                    ctx.fillStyle = '#FF5252';
                    ctx.font = 'bold 16px "Courier New", monospace';
                    ctx.fillText(`⚔ 攻击力: ${formatStat(weapon.damage)}`, cardX + cardWidth / 2, cardY + 180, cardWidth - 22);

                    ctx.fillStyle = '#4FC3F7';
                    ctx.font = '14px "Courier New", monospace';
                    if (weapon.isRanged) {
                        ctx.fillText(`弹匣: ${weapon.baseMagazine} · 装填: ${(weapon.reloadFrames / 60).toFixed(1)}s`, cardX + cardWidth / 2, cardY + 205, cardWidth - 22);
                    } else {
                        ctx.fillText(`${weapon.attackProfile.name} · 范围 +${weapon.rangeBonus} · ${(weapon.attackProfile.cooldown / 60).toFixed(2)}s`, cardX + cardWidth / 2, cardY + 205, cardWidth - 22);
                    }

                    ctx.fillStyle = '#8BC34A';
                    ctx.font = '14px "Courier New", monospace';
                    ctx.fillText(`💚 生命上限: +${weapon.hpBonus}`, cardX + cardWidth / 2, cardY + 225);

                    // 特效描述
                    ctx.fillStyle = '#81C784';
                    ctx.font = '13px "Courier New", monospace';
                    const effectText = weapon.effect;
                    ctx.fillText(`✨ ${effectText}`, cardX + cardWidth / 2, cardY + 245, cardWidth - 22);
                } else {
                    ctx.fillStyle = '#FFD54F';
                    ctx.font = 'bold 16px "Courier New", monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText(`[ 永久碎片 ]`, cardX + cardWidth / 2, cardY + 30);

                    ctx.fillStyle = '#FFF';
                    ctx.font = 'bold 20px "Courier New", monospace';
                    ctx.fillText(weapon.name, cardX + cardWidth / 2, cardY + 65, cardWidth - 22);

                    ctx.fillStyle = '#FF5252';
                    ctx.font = '14px "Courier New", monospace';
                    const effectiveDamageBonus = (weapon.damageBonus || 0) * player.weapon.getFragmentEfficiency();
                    const effectiveDamageText = Number.isInteger(effectiveDamageBonus)
                        ? effectiveDamageBonus
                        : effectiveDamageBonus.toFixed(2).replace(/0+$/, '').replace(/\.$/, '');
                    ctx.fillText(`⚔ 当前武器增伤: +${effectiveDamageText}`, cardX + cardWidth / 2, cardY + 150);

                    ctx.fillStyle = '#8BC34A';
                    ctx.fillText(`💚 HP上限: +${weapon.hpBonus || 0}`, cardX + cardWidth / 2, cardY + 175);

                    ctx.fillStyle = '#4FC3F7';
                    if (weapon.rangeBonus) {
                        ctx.fillText(`近战范围: +${weapon.rangeBonus}`, cardX + cardWidth / 2, cardY + 200);
                    } else if (weapon.ammoBonus) {
                        ctx.fillText(`远程弹容: +${weapon.ammoBonus}`, cardX + cardWidth / 2, cardY + 200);
                    } else if (weapon.reloadSpeedBonus) {
                        ctx.fillText(`装填加速: +${Math.round(weapon.reloadSpeedBonus * 100)}%`, cardX + cardWidth / 2, cardY + 200);
                    } else {
                        ctx.fillText('适用于所有武器', cardX + cardWidth / 2, cardY + 200);
                    }

                    ctx.fillStyle = '#FFD54F';
                    ctx.font = '13px "Courier New", monospace';
                    const detailText = weapon.damageBonus && player.weapon.isRanged
                        ? `基础 +${weapon.damageBonus} · 远程按 33% 生效`
                        : weapon.desc;
                    ctx.fillText(`✨ ${detailText}`, cardX + cardWidth / 2, cardY + 230, cardWidth - 22);
                }

                // 点击提示
                if (isHovered) {
                    ctx.fillStyle = '#FFD54F';
                    ctx.font = 'bold 14px "Courier New", monospace';
                    ctx.fillText('[ 点击选择 ]', cardX + cardWidth / 2, cardY + 265);
                }
            });

            if (currentRewardType === 'weapon') {
                drawWeaponRewardButton(
                    WEAPON_REWARD_BUTTONS.refresh,
                    weaponRewardRefreshAvailable ? '全部刷新 [F]' : '本次已刷新',
                    weaponRewardRefreshAvailable ? '重新生成全部 3 项' : '下一次武器奖励恢复',
                    'refresh',
                    '#22D3EE',
                    !weaponRewardRefreshAvailable
                );
                drawWeaponRewardButton(
                    WEAPON_REWARD_BUTTONS.skip,
                    '不选择新武器 [S]',
                    `保留 ${player.weapon?.name || '当前武器'}`,
                    'skip',
                    '#FFD54F'
                );
            }
        }

        function drawWeaponRewardButton(rect, label, detail, action, color, disabled = false) {
            const isHovered = !disabled && hoveredRewardAction === action;

            ctx.fillStyle = endless ? '#7C4DFF' : '#FF5252';

        function drawSummaryStatCard(x, y, width, height, label, value, color) {
            ctx.fillStyle = 'rgba(1, 7, 15, 0.82)';
            ctx.fillRect(x, y, width, height);
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.strokeRect(x, y, width, height);
            ctx.fillStyle = '#90A4AE';
            ctx.font = '12px "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.fillText(label, x + width / 2, y + 21);
            ctx.fillStyle = color;
            ctx.font = 'bold 24px "Courier New", monospace';
            ctx.fillText(String(value), x + width / 2, y + 50);
        }

        function formatDuration(durationMs) {
            const totalSeconds = Math.max(0, Math.floor(durationMs / 1000 + 1e-9));
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            return `${minutes}:${String(seconds).padStart(2, '0')}`;
        }

        function formatStat(value) {
            return Number.isInteger(value) ? value : Number(value.toFixed(2));
        }

        function getDeathCauseLabel(cause) {
            const labels = {
                fall: '坠落重创', laser: '激光命中', 'boss-contact': 'Boss 撞击',
                'enemy-projectile': '敌方投射物', 'elite-contact': '精英近身', 'enemy-contact': '敌人近身'
            };
            return labels[cause] || '战斗中阵亡';
        }

        function generateWinCode() {
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            let part = '';
            for (let i = 0; i < 4; i++) part += letters[Math.floor(Math.random() * letters.length)];
            const ts = Date.now().toString();
            const tail = ts.slice(-4);
            return `MC2D-WIN-${part}-${tail}`;
        }

        // ============ 绘制武器图标 ============
        function inferWeaponVisualVariant(name, model) {
            if (name.includes('左轮')) return 'revolver';
            if (name.includes('冲锋')) return 'smg';
            if (name.includes('磁轨')) return 'railgun';
            if (name.includes('机炮')) return 'minigun';
            if (name.includes('狙击')) return 'sniper';
            return model;
        }

        function getWeaponMuzzleOffset(model, variant) {
            if (model === 'bow') return 32;
            if (model === 'crossbow') return 44;
            if (model === 'pistol') return 30;
            if (model === 'shotgun') return 50;
            if (model === 'carbine') return 40;
            if (model === 'staff') return 46;
            if (model === 'launcher') return 50;
            if (variant === 'smg') return 40;
            if (variant === 'sniper') return 56;
            if (variant === 'minigun') return 52;
            return 48;
        }

        function getWeaponPalette(weapon) {
            const name = weapon.name;
            let metal = '#B0BEC5';
            let edge = '#ECEFF1';
            let handle = '#6D4C41';
            if (name.includes('木') || name.includes('朽木')) {
                metal = '#9A6A3A'; edge = '#C49A6C'; handle = '#5D3A1A';
            } else if (name.includes('石')) {
                metal = '#78909C'; edge = '#B0BEC5';
            } else if (name.includes('生锈') || name.includes('铁管')) {
                metal = '#8D6E63'; edge = '#BCAAA4';
            } else if (name.includes('寒冰') || name.includes('蓝晶')) {
                metal = '#81D4FA'; edge = '#E1F5FE';
            } else if (name.includes('暗影') || name.includes('虚空') || name.includes('深渊') || name.includes('日蚀')) {
                metal = '#5E35B1'; edge = '#D1C4E9';
            } else if (name.includes('炎') || name.includes('龙') || name.includes('星火')) {
                metal = '#E64A19'; edge = '#FFCC80';
            } else if (name.includes('雷神')) {
                metal = '#FBC02D'; edge = '#FFF9C4';
            } else if (name.includes('圣光') || name.includes('天穹')) {
                metal = '#ECEFF1'; edge = '#80DEEA';
            }
            return { metal, edge, handle, accent: weapon.color, dark: '#263238' };
        }

        function drawMuzzleFlash(ctx, muzzleX, weapon) {
            ctx.save();
            ctx.translate(muzzleX, 0);
            ctx.fillStyle = weapon.model === 'staff' ? weapon.particleColor : '#FFF59D';
            ctx.shadowColor = weapon.particleColor || '#FFB300';
            ctx.shadowBlur = 12;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(9, -5);
            ctx.lineTo(6, 0);
            ctx.lineTo(11, 4);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
        }

        function drawWeaponModel(ctx, weapon, options = {}) {
            const scale = options.scale || 1;
            const detail = options.detail !== false;
            const p = getWeaponPalette(weapon);
            const model = weapon.model;
            const variant = weapon.visualVariant;
            ctx.save();
            ctx.scale(scale, scale);
            if (weapon.rarity !== 'COMMON') {
                ctx.shadowColor = weapon.glowColor;
                ctx.shadowBlur = weapon.rarity === 'LEGENDARY' ? 10 : 5;
            }

            if (model === 'sword' || model === 'dagger' || model === 'greatsword') {
                const length = model === 'dagger' ? 22 : model === 'greatsword' ? 46 : 34;
                const half = model === 'greatsword' ? 6 : model === 'dagger' ? 3 : 4;
                ctx.fillStyle = p.handle;
                ctx.fillRect(-13, -3, 13, 6);
                ctx.fillStyle = p.accent;

                ctx.fillStyle = p.metal;
                ctx.beginPath();
                ctx.moveTo(1, -half);
                ctx.lineTo(length - 8, -half + 1);
                ctx.lineTo(length, 0);
                ctx.lineTo(length - 8, half - 1);
                ctx.lineTo(1, half);
                ctx.closePath();
                ctx.fill();
                if (detail) {
                    ctx.strokeStyle = p.edge;
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(4, -1);

            } else if (model === 'axe') {

                ctx.fillStyle = p.metal;
                ctx.fillRect(28, -13, 18, 9);

                ctx.fillStyle = p.edge;
