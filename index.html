<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>像素冒险 - 2D 横版动作游戏</title>
    <style>
        :root {
            --touch-btn-size: 116px;
            --touch-attack-size: 134px;
            --touch-gap: 26px;
            --touch-offset: 40px;
            --touch-bottom: 36px;
            --touch-font-size: 28px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
        }
        #gameContainer {
            position: relative;
            border: 4px solid #4a4a6a;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        #instructions {
            position: absolute;
            bottom: -40px;
            left: 0;
            right: 0;
            text-align: center;
            color: #888;
            font-size: 14px;
        }

        #gameContainer.touch-mode {
            border: none;
            box-shadow: none;
            width: 100vw;
            height: 100vh;
        }

        #touchControls {
            position: absolute;
            inset: 0;
            pointer-events: none;
            display: none;
            z-index: 5;
        }

        #touchControls .touch-left,
        #touchControls .touch-right {
            position: absolute;
            bottom: var(--touch-bottom);
            display: flex;
            gap: var(--touch-gap);
            pointer-events: auto;
            z-index: 6;
        }

        #touchControls .touch-left {
            left: var(--touch-offset);
        }

        #touchControls .touch-right {
            right: var(--touch-offset);
            flex-direction: row;
            gap: calc(var(--touch-gap) + 4px);
        }

        .touch-btn {
            width: var(--touch-btn-size);
            height: var(--touch-btn-size);
            border-radius: 16px;
            border: 2px solid #fff;
            background: rgba(255,255,255,0.14);
            color: #fff;
            font-size: var(--touch-font-size);
            font-family: 'Courier New', monospace;
            box-shadow: 0 0 16px rgba(0,0,0,0.5);
            backdrop-filter: blur(6px);
            touch-action: none;
        }

        .touch-btn.attack-btn {
            width: var(--touch-attack-size);
            height: var(--touch-attack-size);
            font-size: calc(var(--touch-font-size) * 1.18);
        }

        .touch-btn:active {
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="instructions">操作: A/D 移动 | 空格 跳跃 | J/鼠标左键 攻击 | U 求饶回血</div>
        <div id="touchControls" aria-hidden="true">
            <div class="touch-left">
                <button class="touch-btn" data-action="left">◀</button>
                <button class="touch-btn" data-action="right">▶</button>
            </div>
            <div class="touch-right">
                <button class="touch-btn" data-action="jump">跳</button>
                <button class="touch-btn attack-btn" data-action="attack">攻</button>
                <button class="touch-btn" data-action="heal">U</button>
            </div>
        </div>
    </div>

    <script>
        // ============ 游戏配置 ============
        const CONFIG = {
            CANVAS_WIDTH: 960,
            CANVAS_HEIGHT: 540,
            TILE_SIZE: 32,
            GRAVITY: 0.6,
            PLAYER_SPEED: 5,
            JUMP_FORCE: 12,
            ATTACK_DURATION: 15,
            ATTACK_COOLDOWN: 25,
            ENEMY_SPEED: 1.2,
            KNOCKBACK_FORCE: 8,
            PLAYER_MAX_HP: 100,
            ENEMY_DAMAGE: 10,
            SWORD_DAMAGE: 25,
            BASE_ENEMIES_PER_WAVE: 5,
            ENEMY_HP_SCALING: 1.15,
            ENEMY_DAMAGE_SCALING: 1.1,
            BIOME_LIST: ['plains', 'snow', 'rain', 'nether', 'end', 'night'],
            BOSS_WAVE: 10
        };

        // ============ 生物群系定义（每波随机主题） ============
        const BIOMES = {
            plains: {
                name: '草地白天',
                sky: ['#87CEEB', '#B0E0E6', '#E0F7FA'],
                sun: true,
                moon: false,
                top: '#4CAF50',
                topAccent: '#66BB6A',
                dirt: '#8B5A2B',
                dirtAccent: '#7A4A1B',
                stone: '#6D4C41',
                cloud: '#FFF',
                weather: null
            },
            snow: {
                name: '积雪',
                sky: ['#B3E5FC', '#E1F5FE', '#FFFFFF'],
                sun: true,
                moon: false,
                top: '#E0F2F1',
                topAccent: '#B2DFDB',
                dirt: '#8D6E63',
                dirtAccent: '#6D4C41',
                stone: '#5D4037',
                cloud: '#F5F5F5',
                weather: 'snow'
            },
            rain: {
                name: '雨天',
                sky: ['#7EA5C9', '#90A4AE', '#B0BEC5'],
                sun: false,
                moon: false,
                top: '#558B2F',
                topAccent: '#7CB342',
                dirt: '#6D4C41',
                dirtAccent: '#5D4037',
                stone: '#4E342E',
                cloud: '#CFD8DC',
                weather: 'rain'
            },
            nether: {
                name: '地狱',
                sky: ['#3E2723', '#4A1F1F', '#2C0F0F'],
                sun: false,
                moon: false,
                top: '#7B1B1B',
                topAccent: '#A63A3A',
                dirt: '#5A0F0F',
                dirtAccent: '#3A0606',
                stone: '#2E0A0A',
                cloud: '#FF7043',
                weather: 'ash'
            },
            end: {
                name: '末地',
                sky: ['#2C2A3A', '#3B3750', '#1F1B2D'],
                sun: false,
                moon: false,
                top: '#C7C79A',
                topAccent: '#B5B576',
                dirt: '#7D7D62',
                dirtAccent: '#6B6B52',
                stone: '#4C4C3B',
                cloud: '#B39DDB',
                weather: 'void'
            },
            night: {
                name: '星夜',
                sky: ['#0D1B2A', '#1B263B', '#0B132B'],
                sun: false,
                moon: true,
                top: '#1B5E20',
                topAccent: '#2E7D32',
                dirt: '#4E342E',
                dirtAccent: '#3E2723',
                stone: '#2C1B18',
                cloud: '#90A4AE',
                weather: null
            }
        };

        // ============ 稀有度定义 ============
        const RARITY = {
            COMMON: { name: '普通', color: '#9E9E9E', glowColor: '#757575', probability: 0.60 },
            RARE: { name: '稀有', color: '#2196F3', glowColor: '#1565C0', probability: 0.30 },
            EPIC: { name: '史诗', color: '#9C27B0', glowColor: '#6A1B9A', probability: 0.09 },
            LEGENDARY: { name: '传说', color: '#FF9800', glowColor: '#E65100', probability: 0.01 }
        };

        const RARITY_HP_BONUS = {
            COMMON: 0,
            RARE: 10,
            EPIC: 25,
            LEGENDARY: 50
        };

        // ============ 武器数据库 ============
        const WEAPON_DATABASE = {
            COMMON: [
                { name: '木剑', model: 'sword', baseDamage: 20, effect: '无特效', rangeBonus: 0, knockbackBonus: 0 },
                { name: '石剑', model: 'sword', baseDamage: 25, effect: '无特效', rangeBonus: 0, knockbackBonus: 0 },
                { name: '生锈匕首', model: 'dagger', baseDamage: 22, effect: '无特效', rangeBonus: -5, knockbackBonus: 0 },
                { name: '铁棍', model: 'hammer', baseDamage: 28, effect: '无特效', rangeBonus: 5, knockbackBonus: 0 }
            ],
            RARE: [
                { name: '精铁长剑', model: 'sword', baseDamage: 35, effect: '攻击范围+20%', rangeBonus: 8, knockbackBonus: 0 },
                { name: '蓝晶匕首', model: 'dagger', baseDamage: 32, effect: '攻击范围+15%', rangeBonus: 6, knockbackBonus: 0 },
                { name: '寒冰之刃', model: 'sword', baseDamage: 38, effect: '攻击范围+25%', rangeBonus: 10, knockbackBonus: 0 },
                { name: '风暴战斧', model: 'axe', baseDamage: 40, effect: '攻击范围+30%', rangeBonus: 12, knockbackBonus: 2 }
            ],
            EPIC: [
                { name: '暗影裂刃', model: 'sword', baseDamage: 50, effect: '击退增强+50%', rangeBonus: 10, knockbackBonus: 4 },
                { name: '紫晶巨剑', model: 'greatsword', baseDamage: 55, effect: '击退增强+60%', rangeBonus: 15, knockbackBonus: 5 },
                { name: '虚空之刃', model: 'sword', baseDamage: 52, effect: '击退增强+55%', rangeBonus: 12, knockbackBonus: 4 },
                { name: '灵魂收割者', model: 'scythe', baseDamage: 58, effect: '击退增强+70%', rangeBonus: 8, knockbackBonus: 6 }
            ],
            LEGENDARY: [
                { name: '炎龙之怒', model: 'axe', baseDamage: 75, effect: '火焰粒子特效', rangeBonus: 15, knockbackBonus: 6, hasParticles: true, particleColor: '#FF5722' },
                { name: '雷神之锤', model: 'hammer', baseDamage: 80, effect: '闪电粒子特效', rangeBonus: 20, knockbackBonus: 8, hasParticles: true, particleColor: '#FFEB3B' },
                { name: '圣光裁决', model: 'sword', baseDamage: 70, effect: '圣光粒子特效', rangeBonus: 18, knockbackBonus: 5, hasParticles: true, particleColor: '#FFFFFF' },
                { name: '深渊屠戮者', model: 'greatsword', baseDamage: 85, effect: '暗影粒子特效', rangeBonus: 12, knockbackBonus: 10, hasParticles: true, particleColor: '#7B1FA2' }
            ]
        };

        // ============ 武器类 ============
        class Weapon {
            constructor(data, rarity) {
                this.name = data.name;
                this.damage = data.baseDamage;
                this.rarity = rarity;
                this.color = RARITY[rarity].color;
                this.glowColor = RARITY[rarity].glowColor;
                this.effect = data.effect;
                this.rangeBonus = data.rangeBonus;
                this.knockbackBonus = data.knockbackBonus;
                this.model = data.model || 'sword';
                this.hasParticles = data.hasParticles ?? (rarity === 'LEGENDARY');
                this.particleColor = data.particleColor || this.color;
                this.rarityName = RARITY[rarity].name;
                this.hpBonus = Math.min(RARITY_HP_BONUS[rarity] || 0, 100);
            }

            getAttackRange() {
                return 40 + this.rangeBonus;
            }

            getKnockback() {
                return CONFIG.KNOCKBACK_FORCE + this.knockbackBonus;
            }
        }

        // ============ 武器生成器 ============
        const RARITY_ORDER = ['COMMON', 'RARE', 'EPIC', 'LEGENDARY'];

        function generateRandomWeapon(minRarity = 'COMMON') {
            const minIndex = RARITY_ORDER.indexOf(minRarity);
            const available = RARITY_ORDER.filter((r, idx) => idx >= minIndex);
            const totalProb = available.reduce((sum, r) => sum + (RARITY[r].probability || 0), 0);
            let roll = Math.random() * totalProb;
            let rarity = available[0];

            for (const r of available) {
                roll -= RARITY[r].probability;
                if (roll <= 0) {
                    rarity = r;
                    break;
                }
            }

            const weaponList = WEAPON_DATABASE[rarity];
            const weaponData = weaponList[Math.floor(Math.random() * weaponList.length)];
            return new Weapon(weaponData, rarity);
        }

        function generateWeaponChoices(count = 3, minRarity = 'COMMON') {
            const choices = [];
            for (let i = 0; i < count; i++) {
                choices.push(generateRandomWeapon(minRarity));
            }
            return choices;
        }

        const ENCHANT_POOL = [
            { name: '锋利 I', damageBonus: 8, hpBonus: 0, rangeBonus: 0, desc: '攻击力+8', color: '#FF8A65' },
            { name: '锋利 II', damageBonus: 14, hpBonus: 0, rangeBonus: 0, desc: '攻击力+14', color: '#FF7043' },
            { name: '锋利 III', damageBonus: 20, hpBonus: 0, rangeBonus: 0, desc: '攻击力+20', color: '#FF5722' },
            { name: '保护 I', damageBonus: 0, hpBonus: 10, rangeBonus: 0, desc: '生命上限+10', color: '#81C784' },
            { name: '保护 II', damageBonus: 0, hpBonus: 18, rangeBonus: 0, desc: '生命上限+18', color: '#66BB6A' },
            { name: '保护 III', damageBonus: 0, hpBonus: 28, rangeBonus: 0, desc: '生命上限+28', color: '#43A047' },
            { name: '无限 I', damageBonus: 0, hpBonus: 0, rangeBonus: 6, desc: '攻击距离+6', color: '#64B5F6' },
            { name: '无限 II', damageBonus: 0, hpBonus: 0, rangeBonus: 10, desc: '攻击距离+10', color: '#42A5F5' },
            { name: '无限 III', damageBonus: 0, hpBonus: 0, rangeBonus: 16, desc: '攻击距离+16', color: '#1E88E5' }
        ];

        function generateEnchantChoices(count = 3) {
            const choices = [];
            for (let i = 0; i < count; i++) {
                const pick = ENCHANT_POOL[Math.floor(Math.random() * ENCHANT_POOL.length)];
                choices.push({ ...pick });
            }
            return choices;
        }

        function applyEnchantment(enchant) {
            if (!enchant || !player) return;
            player.applyEnchant(enchant);
        }

        // ============ 粒子系统 ============
        const particles = [];

        class Particle {
            constructor(x, y, color, vx, vy, life) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = vx;
                this.vy = vy;
                this.life = life;
                this.maxLife = life;
                this.size = 3 + Math.random() * 3;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.1; // 微重力
                this.life--;
                return this.life > 0;
            }

            draw(ctx) {
                const alpha = this.life / this.maxLife;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x - camera.x, this.y - camera.y, this.size, this.size);
                ctx.restore();
            }
        }

        function spawnAttackParticles(x, y, color, count = 8) {
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
                const speed = 2 + Math.random() * 3;
                particles.push(new Particle(
                    x, y, color,
                    Math.cos(angle) * speed,
                    Math.sin(angle) * speed - 2,
                    20 + Math.random() * 15
                ));
            }
        }

        // ============ 敌人类型定义 ============
        const ENEMY_TYPES = {
            zombie: { name: '僵尸', baseHp: 50, baseDmg: 10, speed: 1.2, color: '#4CAF50', width: 28, height: 32, knockResist: 1 },
            runner: { name: '疾跑者', baseHp: 35, baseDmg: 8, speed: 2.2, color: '#8BC34A', width: 24, height: 28, knockResist: 0.8 },
            tank: { name: '重装尸', baseHp: 90, baseDmg: 14, speed: 0.8, color: '#6D4C41', width: 32, height: 40, knockResist: 1.5 },
            shooter: { name: '腐弓手', baseHp: 45, baseDmg: 12, speed: 1.0, color: '#3F51B5', width: 26, height: 30, knockResist: 1, ranged: true }
        };

        // ============ 投射物 ============
        const projectiles = [];
        class Projectile {
            constructor(x, y, vx, vy, dmg, color, owner = 'enemy') {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.dmg = dmg;
                this.color = color;
                this.owner = owner;
                this.size = 6;
                this.life = 240;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
                // 简单重力
                this.vy += 0.05;
                return this.life > 0;
            }

            draw(ctx) {
                ctx.save();
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x - camera.x, this.y - camera.y, this.size, this.size);
                ctx.restore();
            }
        }

        // ============ 波次系统 ============
        let currentWave = 1;
        let enemiesRemaining = 0;
        let totalEnemiesInWave = 0;
        let gameState = 'title'; // 'title', 'playing', 'reward', 'gameover', 'win'
        let weaponChoices = [];
        let enchantChoices = [];
        let currentRewardType = 'weapon';
        let hoveredChoice = -1;
        let mouseX = 0;
        let mouseY = 0;
        let activeBoss = null;
        let killCount = 0;
        let gameStartTime = Date.now();
        let gameEndTime = null;
        let winCode = '';
        let touchMode = false;

        const TITLE_BUTTONS = {
            start: { x: CONFIG.CANVAS_WIDTH / 2 - 120, y: CONFIG.CANVAS_HEIGHT / 2 - 10, w: 240, h: 60 },
            touch: { x: CONFIG.CANVAS_WIDTH / 2 - 120, y: CONFIG.CANVAS_HEIGHT / 2 + 70, w: 240, h: 60 }
        };

        // ============ 音频 ============
        let audioCtx;
        let musicGain;
        let sfxGain;
        let musicPlaying = false;
        let musicLoopTimer = null;
        let bossMusicPlaying = false;
        let bossMusicTimer = null;

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            musicGain = audioCtx.createGain();
            sfxGain = audioCtx.createGain();
            musicGain.gain.value = 0.12;
            sfxGain.gain.value = 0.3;
            musicGain.connect(audioCtx.destination);
            sfxGain.connect(audioCtx.destination);
            startMusic();
        }

        function startMusic() {
            if (!audioCtx || musicPlaying || bossMusicPlaying) return;
            musicPlaying = true;
            const bpm = 110;
            const beat = 60 / bpm;
            const pattern = [220, 0, 220, 0, 262, 0, 220, 0, 330, 0, 262, 0, 196, 0, 196, 0];
            const now = audioCtx.currentTime + 0.05;
            pattern.forEach((freq, i) => {
                if (freq === 0) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.001, now + i * beat * 0.5);
                gain.gain.linearRampToValueAtTime(0.25, now + i * beat * 0.5 + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, now + i * beat * 0.5 + 0.4);
                osc.connect(gain).connect(musicGain);
                osc.start(now + i * beat * 0.5);
                osc.stop(now + i * beat * 0.5 + 0.45);
            });
            // 递归循环
            musicLoopTimer = setTimeout(() => { musicPlaying = false; startMusic(); }, pattern.length * beat * 500);
        }

        function stopMusic() {
            if (musicLoopTimer) {
                clearTimeout(musicLoopTimer);
                musicLoopTimer = null;
            }
            musicPlaying = false;
        }

        function startBossMusic() {
            if (!audioCtx || bossMusicPlaying) return;
            bossMusicPlaying = true;
            stopMusic();
            const bpm = 138;
            const beat = 60 / bpm;
            const pattern = [110, 0, 220, 0, 330, 0, 196, 0, 392, 0, 220, 0, 440, 0, 262, 0, 523, 0, 330, 0, 392, 0, 0, 0];
            const now = audioCtx.currentTime + 0.04;
            pattern.forEach((freq, i) => {
                if (freq === 0) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = i % 4 === 0 ? 'sawtooth' : 'square';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.0001, now + i * beat * 0.4);
                gain.gain.linearRampToValueAtTime(0.35, now + i * beat * 0.4 + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, now + i * beat * 0.4 + 0.5);
                osc.connect(gain).connect(musicGain);
                osc.start(now + i * beat * 0.4);
                osc.stop(now + i * beat * 0.4 + 0.55);
            });
            bossMusicTimer = setTimeout(() => { bossMusicPlaying = false; startBossMusic(); }, pattern.length * beat * 400);
        }

        function stopBossMusic() {
            if (bossMusicTimer) {
                clearTimeout(bossMusicTimer);
                bossMusicTimer = null;
            }
            bossMusicPlaying = false;
        }

        function playSfx(type) {
            if (!audioCtx) return;
            const presets = {
                swing_sword: { wave: 'square', start: 420, end: 180, gain: 0.35, duration: 0.22 },
                swing_dagger: { wave: 'triangle', start: 620, end: 260, gain: 0.32, duration: 0.16 },
                swing_axe: { wave: 'square', start: 360, end: 140, gain: 0.38, duration: 0.24 },
                swing_hammer: { wave: 'sawtooth', start: 260, end: 120, gain: 0.42, duration: 0.26 },
                swing_greatsword: { wave: 'square', start: 340, end: 140, gain: 0.4, duration: 0.25 },
                swing_scythe: { wave: 'sawtooth', start: 380, end: 150, gain: 0.36, duration: 0.24 },
                hit_sword: { wave: 'square', start: 200, end: 120, gain: 0.42, duration: 0.18 },
                hit_dagger: { wave: 'triangle', start: 260, end: 140, gain: 0.35, duration: 0.16 },
                hit_axe: { wave: 'square', start: 180, end: 90, gain: 0.45, duration: 0.2 },
                hit_hammer: { wave: 'sawtooth', start: 140, end: 80, gain: 0.48, duration: 0.24 },
                hit_greatsword: { wave: 'square', start: 170, end: 90, gain: 0.46, duration: 0.22 },
                hit_scythe: { wave: 'triangle', start: 190, end: 100, gain: 0.38, duration: 0.2 }
            };

            const preset = presets[type] || presets.hit_sword;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain).connect(sfxGain);
            const now = audioCtx.currentTime;
            osc.type = preset.wave;
            osc.frequency.setValueAtTime(preset.start, now);
            osc.frequency.exponentialRampToValueAtTime(preset.end, now + preset.duration * 0.8);
            gain.gain.setValueAtTime(0.0001, now);
            gain.gain.linearRampToValueAtTime(preset.gain, now + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + preset.duration);
            osc.start(now);
            osc.stop(now + preset.duration + 0.05);
        }

        // ============ 初始化画布 ============
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = CONFIG.CANVAS_WIDTH;
        canvas.height = CONFIG.CANVAS_HEIGHT;

        const gameContainer = document.getElementById('gameContainer');
        const instructionsEl = document.getElementById('instructions');
        const touchControlsEl = document.getElementById('touchControls');
        const touchButtons = touchControlsEl.querySelectorAll('.touch-btn');

        function getCanvasCoords(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        const BASE_CANVAS_WIDTH = CONFIG.CANVAS_WIDTH;
        const BASE_CANVAS_HEIGHT = CONFIG.CANVAS_HEIGHT;

        function updateTouchControlsLayout() {
            const vw = window.innerWidth || BASE_CANVAS_WIDTH;
            const vh = window.innerHeight || BASE_CANVAS_HEIGHT;
            const shortSide = Math.min(vw, vh);
            const baseSize = Math.max(76, Math.min(132, shortSide * 0.12));
            const attackSize = Math.max(baseSize * 1.12, baseSize + 12);
            const gap = Math.max(18, baseSize * 0.25);
            const offset = Math.max(22, baseSize * 0.34);
            const bottom = Math.max(20, baseSize * 0.28);
            const fontSize = Math.max(22, baseSize * 0.24);

            const root = document.documentElement.style;
            root.setProperty('--touch-btn-size', `${baseSize}px`);
            root.setProperty('--touch-attack-size', `${attackSize}px`);
            root.setProperty('--touch-gap', `${gap}px`);
            root.setProperty('--touch-offset', `${offset}px`);
            root.setProperty('--touch-bottom', `${bottom}px`);
            root.setProperty('--touch-font-size', `${fontSize}px`);
        }

        function updateCanvasScale() {
            const viewportWidth = window.innerWidth || BASE_CANVAS_WIDTH;
            const viewportHeight = window.innerHeight || BASE_CANVAS_HEIGHT;
            const aspect = BASE_CANVAS_WIDTH / BASE_CANVAS_HEIGHT;

            let displayWidth = viewportWidth;
            let displayHeight = Math.round(displayWidth / aspect);
            if (displayHeight > viewportHeight) {
                displayHeight = viewportHeight;
                displayWidth = Math.round(displayHeight * aspect);
            }

            canvas.style.width = `${displayWidth}px`;
            canvas.style.height = `${displayHeight}px`;
            gameContainer.style.width = `${displayWidth}px`;
            gameContainer.style.height = `${displayHeight}px`;

            updateTouchControlsLayout();
        }

        function isFullscreen() {
            return document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement;
        }

        function requestFullscreenIfPossible() {
            const el = gameContainer;
            if (!el || isFullscreen()) return;
            const req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
            if (req) {
                const ret = req.call(el);
                if (ret && typeof ret.catch === 'function') {
                    ret.catch(() => {});
                }
            }
        }

        function enableTouchMode() {
            touchMode = true;
            gameContainer.classList.add('touch-mode');
            touchControlsEl.style.display = 'block';
            instructionsEl.style.display = 'none';
            requestFullscreenIfPossible();
            updateCanvasScale();
        }

        function disableTouchMode() {
            touchMode = false;
            gameContainer.classList.remove('touch-mode');
            touchControlsEl.style.display = 'none';
            instructionsEl.style.display = 'block';
            updateCanvasScale();
        }

        window.addEventListener('resize', updateCanvasScale);
        updateCanvasScale();

        // ============ 游戏状态 ============
        const keys = {};
        let mousePressed = false;
        let camera = { x: 0, y: 0 };
        let touchActive = { left: false, right: false, jump: false, attack: false, heal: false };

        // ============ 地图生成 ============
        const MAP_WIDTH = 100; // 地图宽度（方块数）
        const MAP_HEIGHT = 17; // 地图高度（方块数）
        const tiles = [];
        let currentBiome = BIOMES.plains;

        function pickBiomeForWave(wave) {
            if (wave === CONFIG.BOSS_WAVE) return BIOMES.end;
            const list = CONFIG.BIOME_LIST;
            const key = list[Math.floor(Math.random() * list.length)];
            return BIOMES[key] || BIOMES.plains;
        }

        function generateMap(biome = currentBiome) {
            currentBiome = biome;
            // 初始化空地图
            for (let y = 0; y < MAP_HEIGHT; y++) {
                tiles[y] = [];
                for (let x = 0; x < MAP_WIDTH; x++) {
                    tiles[y][x] = 0; // 0 = 空气
                }
            }

            // 生成地形
            let groundLevel = 12;
            for (let x = 0; x < MAP_WIDTH; x++) {
                // 随机地形起伏
                if (Math.random() < 0.1) {
                    groundLevel += Math.random() < 0.5 ? 1 : -1;
                    groundLevel = Math.max(10, Math.min(14, groundLevel));
                }

                // 填充地面
                for (let y = groundLevel; y < MAP_HEIGHT; y++) {
                    if (y === groundLevel) {
                        tiles[y][x] = 1; // 1 = 草方块
                    } else {
                        tiles[y][x] = 2; // 2 = 泥土
                    }
                }

                // 随机生成平台
                if (x > 5 && x < MAP_WIDTH - 5 && Math.random() < 0.05) {
                    const platformY = groundLevel - 4 - Math.floor(Math.random() * 3);
                    const platformLength = 3 + Math.floor(Math.random() * 4);
                    for (let px = 0; px < platformLength && x + px < MAP_WIDTH; px++) {
                        if (tiles[platformY]) {
                            tiles[platformY][x + px] = 1;
                        }
                    }
                }
            }
        }

        // ============ 云朵系统 ============
        const clouds = [];
        function generateClouds() {
            clouds.length = 0;
            for (let i = 0; i < 15; i++) {
                clouds.push({
                    x: Math.random() * MAP_WIDTH * CONFIG.TILE_SIZE,
                    y: 30 + Math.random() * 100,
                    width: 60 + Math.random() * 80,
                    speed: 0.2 + Math.random() * 0.3
                });
            }
        }

        // ============ 天气粒子 ============
        const weatherParticles = [];
        function spawnWeatherParticles(type) {
            weatherParticles.length = 0;
            const count = 80;
            for (let i = 0; i < count; i++) {
                const px = Math.random() * CONFIG.CANVAS_WIDTH;
                const py = Math.random() * CONFIG.CANVAS_HEIGHT;
                weatherParticles.push(createWeatherParticle(type, px, py));
            }
        }

        function createWeatherParticle(type, x, y) {
            if (type === 'snow') {
                return { x, y, vx: -0.5 + Math.random(), vy: 1 + Math.random(), size: 3 + Math.random() * 2, color: '#FFF' };
            }
            if (type === 'rain') {
                return { x, y, vx: -1 + Math.random() * 0.5, vy: 6 + Math.random() * 2, size: 2, color: '#90CAF9' };
            }
            if (type === 'ash') {
                return { x, y, vx: -0.3 + Math.random() * 0.6, vy: 1.5 + Math.random(), size: 3, color: '#FF7043' };
            }
            if (type === 'void') {
                return { x, y, vx: -0.2 + Math.random() * 0.4, vy: 1 + Math.random(), size: 2 + Math.random() * 2, color: '#B39DDB' };
            }
            return { x, y, vx: 0, vy: 0, size: 0, color: '#FFF' };
        }

        function updateWeatherParticles(type) {
            if (!type) return;
            for (let p of weatherParticles) {
                p.x += p.vx;
                p.y += p.vy;
                if (p.y > CONFIG.CANVAS_HEIGHT) {
                    p.y = -10;
                    p.x = Math.random() * CONFIG.CANVAS_WIDTH;
                }
                if (p.x < -20) p.x = CONFIG.CANVAS_WIDTH + 10;
                if (p.x > CONFIG.CANVAS_WIDTH + 20) p.x = -10;
            }
        }

        function drawWeatherParticles(type) {
            if (!type) return;
            ctx.save();
            for (let p of weatherParticles) {
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size * (type === 'rain' ? 4 : 1));
            }
            ctx.restore();
        }

        // ============ 玩家类 ============
        class Player {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 24;
                this.height = 32;
                this.vx = 0;
                this.vy = 0;
                this.onGround = false;
                this.facing = 1; // 1 = 右, -1 = 左
                this.baseMaxHp = CONFIG.PLAYER_MAX_HP;
                this.maxHp = this.baseMaxHp;
                this.hp = this.maxHp;
                this.attacking = false;
                this.attackTimer = 0;
                this.attackCooldown = 0;
                this.invincible = 0;
                this.walkFrame = 0;
                this.walkTimer = 0;
                this.attackHit = false; // 防止一次攻击多次命中同一敌人
                this.healAccumulator = 0;
                this.enchantStats = { damage: 0, hp: 0, range: 0 };
                
                // 初始武器 - 木剑
                this.weapon = null;
                this.setWeapon(new Weapon(WEAPON_DATABASE.COMMON[0], 'COMMON'));
            }

            update() {
                if (gameState !== 'playing') return;
                
                // 移动输入
                if (keys['KeyA'] || keys['ArrowLeft']) {
                    this.vx = -CONFIG.PLAYER_SPEED;
                    this.facing = -1;
                } else if (keys['KeyD'] || keys['ArrowRight']) {
                    this.vx = CONFIG.PLAYER_SPEED;
                    this.facing = 1;
                } else {
                    this.vx = 0;
                }

                // 跳跃
                if ((keys['Space'] || keys['KeyW'] || keys['ArrowUp']) && this.onGround) {
                    this.vy = -CONFIG.JUMP_FORCE;
                    this.onGround = false;
                }

                // 求饶回血（随时可用）
                if (keys['KeyU']) {
                    this.vx *= 0.4; // 移动减速
                    this.attackCooldown = Math.max(this.attackCooldown, 12); // 暂停攻击
                    const healPerFrame = 7 / 60;
                    this.healAccumulator += healPerFrame;
                    const healInt = Math.floor(this.healAccumulator);
                    if (healInt > 0) {
                        this.hp = Math.min(this.maxHp, this.hp + healInt);
                        this.healAccumulator -= healInt;
                    }
                } else {
                    this.healAccumulator = 0;
                }

                // 攻击
                if ((keys['KeyJ'] || mousePressed) && this.attackCooldown <= 0) {
                    this.attacking = true;
                    this.attackTimer = CONFIG.ATTACK_DURATION;
                    this.attackCooldown = CONFIG.ATTACK_COOLDOWN;
                    this.attackHit = false; // 重置攻击命中状态
                    playSfx(`swing_${this.weapon.model || 'sword'}`);
                    
                    // 武器粒子特效
                    if (this.weapon.hasParticles) {
                        const attackX = this.facing === 1 ? this.x + this.width + 20 : this.x - 20;
                        spawnAttackParticles(attackX, this.y + this.height / 2, this.weapon.particleColor, 12);
                    }
                }

                // 重力
                this.vy += CONFIG.GRAVITY;
                if (this.vy > 15) this.vy = 15;

                // 应用速度
                this.x += this.vx;
                this.y += this.vy;

                // 掉出地图则从上方回落
                if (this.y > MAP_HEIGHT * CONFIG.TILE_SIZE + 200) {
                    this.y = -80;
                    this.vy = 6;
                }

                // 掉出地图则从上方回落
                if (this.y > MAP_HEIGHT * CONFIG.TILE_SIZE + 200) {
                    this.y = -80;
                    this.vy = 6;
                }

                // 碰撞检测
                this.handleCollision();

                // 更新攻击状态
                if (this.attackTimer > 0) this.attackTimer--;
                if (this.attackTimer <= 0) this.attacking = false;
                if (this.attackCooldown > 0) this.attackCooldown--;
                if (this.invincible > 0) this.invincible--;

                // 走路动画
                if (this.vx !== 0) {
                    this.walkTimer++;
                    if (this.walkTimer > 8) {
                        this.walkTimer = 0;
                        this.walkFrame = (this.walkFrame + 1) % 4;
                    }
                } else {
                    this.walkFrame = 0;
                }

                // 边界限制
                if (this.x < 0) this.x = 0;
                if (this.x > MAP_WIDTH * CONFIG.TILE_SIZE - this.width) {
                    this.x = MAP_WIDTH * CONFIG.TILE_SIZE - this.width;
                }
            }

            handleCollision() {
                this.onGround = false;

                // 获取玩家周围的方块
                const left = Math.floor(this.x / CONFIG.TILE_SIZE);
                const right = Math.floor((this.x + this.width) / CONFIG.TILE_SIZE);
                const top = Math.floor(this.y / CONFIG.TILE_SIZE);
                const bottom = Math.floor((this.y + this.height) / CONFIG.TILE_SIZE);

                // 垂直碰撞
                for (let ty = top; ty <= bottom; ty++) {
                    for (let tx = left; tx <= right; tx++) {
                        if (tiles[ty] && tiles[ty][tx] > 0) {
                            const tileX = tx * CONFIG.TILE_SIZE;
                            const tileY = ty * CONFIG.TILE_SIZE;

                            if (this.intersects(tileX, tileY, CONFIG.TILE_SIZE, CONFIG.TILE_SIZE)) {
                                // 从上方落下
                                if (this.vy > 0 && this.y + this.height - this.vy <= tileY) {
                                    this.y = tileY - this.height;
                                    this.vy = 0;
                                    this.onGround = true;
                                }
                                // 从下方撞上
                                else if (this.vy < 0 && this.y - this.vy >= tileY + CONFIG.TILE_SIZE) {
                                    this.y = tileY + CONFIG.TILE_SIZE;
                                    this.vy = 0;
                                }
                                // 水平碰撞
                                else if (this.vx > 0) {
                                    this.x = tileX - this.width;
                                } else if (this.vx < 0) {
                                    this.x = tileX + CONFIG.TILE_SIZE;
                                }
                            }
                        }
                    }
                }
            }

            intersects(x, y, w, h) {
                return this.x < x + w && this.x + this.width > x &&
                       this.y < y + h && this.y + this.height > y;
            }

            getAttackBox() {
                if (!this.attacking) return null;
                const attackWidth = this.weapon.getAttackRange();
                const attackHeight = 32;
                return {
                    // 让贴脸也能命中：向玩家身位内收缩8像素
                    x: this.facing === 1 ? this.x + this.width - 8 : this.x - attackWidth + 8,
                    y: this.y + 4,
                    width: attackWidth,
                    height: attackHeight
                };
            }

            setWeapon(weapon) {
                const prevMax = this.maxHp || this.baseMaxHp;
                const prevHp = this.hp;
                const bonus = Math.min(weapon.hpBonus || 0, 100);
                const newMax = Math.min(this.baseMaxHp + bonus, this.baseMaxHp + 100);
                const ratio = prevMax > 0 ? prevHp / prevMax : 1;
                this.weapon = weapon;
                this.maxHp = newMax;
                this.hp = Math.min(newMax, Math.max(prevHp, Math.round(newMax * ratio)));
            }

            applyEnchant(enchant) {
                if (!this.weapon) return;
                this.weapon.damage += enchant.damageBonus || 0;
                this.weapon.rangeBonus += enchant.rangeBonus || 0;
                this.weapon.hpBonus = Math.min(100, (this.weapon.hpBonus || 0) + (enchant.hpBonus || 0));
                this.setWeapon(this.weapon);
            }

            takeDamage(amount) {
                if (this.invincible > 0) return;
                this.hp -= amount;
                this.invincible = 60;
                if (this.hp <= 0) {
                    this.hp = 0;
                    gameState = 'gameover';
                    this.vx = 0;
                    this.vy = 0;
                    stopBossMusic();
                }
            }

            draw(ctx) {
                ctx.save();
                const screenX = this.x - camera.x;
                const screenY = this.y - camera.y;

                // 无敌闪烁效果
                if (this.invincible > 0 && Math.floor(this.invincible / 4) % 2 === 0) {
                    ctx.globalAlpha = 0.5;
                }

                // 绘制像素小人
                this.drawPixelPlayer(ctx, screenX, screenY);

                // 绘制武器
                this.drawWeapon(ctx, screenX, screenY);

                // 绘制攻击效果
                if (this.attacking) {
                    this.drawAttackEffect(ctx);
                }

                ctx.restore();
            }

            drawPixelPlayer(ctx, x, y) {
                const f = this.facing;
                const offsetX = f === -1 ? this.width : 0;
                ctx.save();
                if (f === -1) {
                    ctx.translate(x + this.width, y);
                    ctx.scale(-1, 1);
                    x = 0;
                    y = 0;
                }

                // 头发 (棕色)
                ctx.fillStyle = '#5D4037';
                ctx.fillRect(x + 6, y, 12, 4);
                ctx.fillRect(x + 4, y + 2, 4, 6);

                // 头部/脸 (肤色)
                ctx.fillStyle = '#FFCC99';
                ctx.fillRect(x + 6, y + 4, 12, 10);

                // 眼睛
                ctx.fillStyle = '#333';
                ctx.fillRect(x + 14, y + 6, 2, 3);

                // 身体 (蓝色衬衫)
                ctx.fillStyle = '#4FC3F7';
                ctx.fillRect(x + 6, y + 14, 12, 10);

                // 手臂 (肤色)
                ctx.fillStyle = '#FFCC99';
                const armOffset = this.attacking ? -4 : (this.walkFrame % 2 === 0 ? 0 : 2);
                ctx.fillRect(x + 2, y + 14 + armOffset, 4, 8);
                ctx.fillRect(x + 18, y + 14 - armOffset, 4, 8);

                // 腿 (深蓝色裤子)
                ctx.fillStyle = '#1565C0';
                const legOffset = this.walkFrame % 2 === 0 ? 0 : 2;
                ctx.fillRect(x + 6, y + 24, 5, 8 + legOffset);
                ctx.fillRect(x + 13, y + 24, 5, 8 - legOffset);

                ctx.restore();
            }

            drawWeapon(ctx, x, y) {
                ctx.save();
                
                const swordX = this.facing === 1 ? x + this.width - 2 : x - 14;
                let swordY = y + 12;
                let rotation = 0;

                if (this.attacking) {
                    // 挥武器动画
                    const progress = 1 - (this.attackTimer / CONFIG.ATTACK_DURATION);
                    rotation = this.facing * (-0.5 + progress * 2.5);
                }

                ctx.translate(swordX + 6, swordY + 4);
                ctx.rotate(rotation);

                // 发光
                if (this.weapon.rarity !== 'COMMON') {
                    ctx.shadowColor = this.weapon.glowColor;
                    ctx.shadowBlur = this.weapon.rarity === 'LEGENDARY' ? 15 : 8;
                }

                const bladeColor = this.weapon.rarity === 'COMMON' ? '#9E9E9E' : this.weapon.color;
                const model = this.weapon.model || 'sword';

                // 通用握柄
                ctx.fillStyle = '#6D4C41';
                ctx.fillRect(-2, 8, 6, 10);
                ctx.fillRect(-1, 2, 4, 8);
                ctx.fillStyle = this.weapon.color;
                ctx.fillRect(-4, 6, 10, 3);

                if (model === 'dagger') {
                    ctx.fillStyle = bladeColor;
                    ctx.fillRect(1, -6, 3, 12);
                    ctx.fillRect(2, -10, 2, 4);
                    ctx.fillStyle = '#E0E0E0';
                    ctx.fillRect(2, -2, 1, 6);
                } else if (model === 'axe') {
                    ctx.fillStyle = '#5D4037';
                    ctx.fillRect(-1, -10, 3, 24);
                    ctx.fillStyle = bladeColor;
                    ctx.fillRect(2, -8, 12, 14);
                    ctx.fillRect(-6, -4, 8, 8);
                    ctx.fillStyle = '#E0E0E0';
                    ctx.fillRect(10, -6, 2, 10);
                } else if (model === 'hammer') {
                    ctx.fillStyle = '#5D4037';
                    ctx.fillRect(-1, -12, 3, 28);
                    ctx.fillStyle = bladeColor;
                    ctx.fillRect(-8, -12, 18, 12);
                    ctx.fillRect(-6, 0, 14, 8);
                    ctx.fillStyle = '#CFD8DC';
                    ctx.fillRect(-4, -10, 4, 8);
                } else if (model === 'greatsword') {
                    ctx.fillStyle = bladeColor;
                    ctx.fillRect(0, -18, 5, 26);
                    ctx.fillRect(1, -24, 3, 8);
                    ctx.fillStyle = '#E0E0E0';
                    ctx.fillRect(2, -12, 1, 18);
                } else if (model === 'scythe') {
                    ctx.fillStyle = '#4E342E';
                    ctx.fillRect(-1, -18, 3, 30);
                    ctx.fillStyle = bladeColor;
                    ctx.fillRect(2, -18, 12, 5);
                    ctx.fillRect(10, -16, 4, 14);
                    ctx.fillStyle = '#E0E0E0';
                    ctx.fillRect(4, -16, 2, 10);
                } else {
                    ctx.fillStyle = bladeColor;
                    ctx.fillRect(0, -12, 4, 20);
                    ctx.fillStyle = this.weapon.rarity === 'COMMON' ? '#BDBDBD' : this.weapon.color;
                    ctx.fillRect(1, -16, 2, 4);
                    ctx.fillStyle = '#E0E0E0';
                    ctx.fillRect(1, -8, 1, 14);
                }

                ctx.restore();
            }

            drawAttackEffect(ctx) {
                const box = this.getAttackBox();
                if (!box) return;

                ctx.save();
                ctx.globalAlpha = 0.3;
                ctx.fillStyle = this.weapon.color;
                ctx.fillRect(box.x - camera.x, box.y - camera.y, box.width, box.height);

                // 挥砍弧线
                ctx.globalAlpha = 0.6;
                ctx.strokeStyle = this.weapon.color;
                ctx.lineWidth = 3;
                ctx.beginPath();
                const centerX = this.x + this.width / 2 - camera.x;
                const centerY = this.y + this.height / 2 - camera.y;
                const radius = 35 + this.weapon.rangeBonus / 2;
                const startAngle = this.facing === 1 ? -0.8 : Math.PI - 0.8;
                const endAngle = this.facing === 1 ? 0.8 : Math.PI + 0.8;
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.stroke();
                ctx.restore();
            }
        }

        // ============ 敌人类 ============
        class Enemy {
            constructor(x, y, wave = 1, typeKey = 'zombie') {
                const t = ENEMY_TYPES[typeKey] || ENEMY_TYPES.zombie;
                this.type = typeKey;
                this.x = x;
                this.y = y;
                this.width = t.width;
                this.height = t.height;
                this.vx = 0;
                this.vy = 0;
                this.onGround = false;
                const hpMultiplier = Math.pow(CONFIG.ENEMY_HP_SCALING, wave - 1);
                this.hp = Math.floor(t.baseHp * hpMultiplier);
                this.maxHp = this.hp;
                this.damage = Math.floor(t.baseDmg * Math.pow(CONFIG.ENEMY_DAMAGE_SCALING, wave - 1));
                this.speed = t.speed;
                this.color = t.color;
                this.knockResist = t.knockResist;
                this.ranged = t.ranged || false;
                this.alive = true;
                this.facing = -1;
                this.hitTimer = 0;
                this.walkFrame = 0;
                this.walkTimer = 0;
                this.hitThisAttack = false; // 防止同一次攻击多次命中
                this.shootCooldown = 90;
            }

            update(player) {
                if (!this.alive) return;
                if (gameState !== 'playing') return;

                // 坑中自救跳跃
                if (this.onGround && Math.random() < 0.01) {
                    this.vy = -10;
                }

                // AI: 向玩家移动 / 射手保持距离
                const dx = player.x - this.x;
                if (this.ranged) {
                    if (Math.abs(dx) > 220) {
                        this.vx = dx > 0 ? this.speed : -this.speed;
                        this.facing = dx > 0 ? 1 : -1;
                    } else if (Math.abs(dx) < 140) {
                        this.vx = dx > 0 ? -this.speed : this.speed;
                    } else {
                        this.vx = 0;
                    }
                } else {
                    if (Math.abs(dx) > 12) {
                        this.vx = dx > 0 ? this.speed : -this.speed;
                        this.facing = dx > 0 ? 1 : -1;
                    } else {
                        this.vx = 0;
                    }
                }

                // 远程攻击
                if (this.ranged) {
                    this.shootCooldown--;
                    if (this.shootCooldown <= 0) {
                        this.shootCooldown = 120;
                        const projSpeed = 3 + Math.random();
                        const dir = Math.sign(dx) || 1;
                        projectiles.push(new Projectile(this.x + this.width / 2, this.y + this.height / 2, dir * projSpeed, -0.5, this.damage, '#90CAF9'));
                    }
                }

                // 重力
                this.vy += CONFIG.GRAVITY;
                if (this.vy > 15) this.vy = 15;

                // 应用速度
                this.x += this.vx;
                this.y += this.vy;

                // 碰撞检测
                this.handleCollision();

                // 更新受击状态
                if (this.hitTimer > 0) this.hitTimer--;

                // 走路动画
                if (this.vx !== 0) {
                    this.walkTimer++;
                    if (this.walkTimer > 10) {
                        this.walkTimer = 0;
                        this.walkFrame = (this.walkFrame + 1) % 4;
                    }
                }

                // 与玩家碰撞检测
                if (this.intersects(player.x, player.y, player.width, player.height)) {
                    player.takeDamage(this.damage);
                }
            }

            handleCollision() {
                this.onGround = false;
                const left = Math.floor(this.x / CONFIG.TILE_SIZE);
                const right = Math.floor((this.x + this.width) / CONFIG.TILE_SIZE);
                const top = Math.floor(this.y / CONFIG.TILE_SIZE);
                const bottom = Math.floor((this.y + this.height) / CONFIG.TILE_SIZE);

                for (let ty = top; ty <= bottom; ty++) {
                    for (let tx = left; tx <= right; tx++) {
                        if (tiles[ty] && tiles[ty][tx] > 0) {
                            const tileX = tx * CONFIG.TILE_SIZE;
                            const tileY = ty * CONFIG.TILE_SIZE;

                            if (this.intersects(tileX, tileY, CONFIG.TILE_SIZE, CONFIG.TILE_SIZE)) {
                                if (this.vy > 0 && this.y + this.height - this.vy <= tileY) {
                                    this.y = tileY - this.height;
                                    this.vy = 0;
                                    this.onGround = true;
                                } else if (this.vy < 0 && this.y - this.vy >= tileY + CONFIG.TILE_SIZE) {
                                    this.y = tileY + CONFIG.TILE_SIZE;
                                    this.vy = 0;
                                } else if (this.vx > 0) {
                                    this.x = tileX - this.width;
                                } else if (this.vx < 0) {
                                    this.x = tileX + CONFIG.TILE_SIZE;
                                }
                            }
                        }
                    }
                }
            }

            intersects(x, y, w, h) {
                return this.x < x + w && this.x + this.width > x &&
                       this.y < y + h && this.y + this.height > y;
            }

            takeDamage(amount, knockbackDir, knockbackForce) {
                if (this.hitThisAttack) return; // 防止同一次攻击多次命中
                this.hitThisAttack = true;
                
                this.hp -= amount;
                this.hitTimer = 10;
                this.vx = knockbackDir * (knockbackForce / this.knockResist);
                this.vy = -5;

                if (this.hp <= 0) {
                    this.alive = false;
                    enemiesRemaining--;
                    killCount++;
                    
                    // 检查波次是否完成
                    if (enemiesRemaining <= 0) {
                        onWaveComplete();
                    }
                }
            }

            draw(ctx) {
                if (!this.alive) return;

                const screenX = this.x - camera.x;
                const screenY = this.y - camera.y;

                ctx.save();

                // 受击闪红
                if (this.hitTimer > 0) {
                    ctx.globalAlpha = 0.7;
                }

                // 绘制不同敌人形象
                this.drawBody(ctx, screenX, screenY);

                // 血条
                this.drawHealthBar(ctx, screenX, screenY);

                ctx.restore();
            }

            drawBody(ctx, x, y) {
                ctx.save();
                if (this.facing === -1) {
                    ctx.translate(x + this.width, y);
                    ctx.scale(-1, 1);
                    x = 0;
                    y = 0;
                }

                // 身体主体
                ctx.fillStyle = this.hitTimer > 0 ? '#FF7777' : this.color;
                ctx.fillRect(x + 4, y, this.width - 8, this.height - 8);

                // 眼睛
                ctx.fillStyle = '#000';
                ctx.fillRect(x + this.width / 2 - 6, y + 6, 4, 4);
                ctx.fillRect(x + this.width / 2 + 2, y + 6, 4, 4);

                // 特征
                if (this.type === 'runner') {
                    ctx.fillStyle = '#C5E1A5';
                    ctx.fillRect(x + 6, y + this.height - 16, this.width - 12, 4);
                } else if (this.type === 'tank') {
                    ctx.fillStyle = '#3E2723';
                    ctx.fillRect(x + 2, y + 6, this.width - 4, 6);
                } else if (this.type === 'shooter') {
                    ctx.fillStyle = '#B3E5FC';
                    ctx.fillRect(x + this.width - 10, y + 10, 8, 10);
                }

                ctx.restore();
            }

            drawHealthBar(ctx, x, y) {
                const barWidth = this.width;
                const barHeight = 4;
                const barY = y - 8;

                // 背景
                ctx.fillStyle = '#333';
                ctx.fillRect(x, barY, barWidth, barHeight);

                // 血量
                const hpPercent = this.hp / this.maxHp;
                ctx.fillStyle = hpPercent > 0.5 ? '#4CAF50' : hpPercent > 0.25 ? '#FF9800' : '#F44336';
                ctx.fillRect(x, barY, barWidth * hpPercent, barHeight);
            }
        }

        // ============ Boss: 白桦腐竹 ============
        class BirchCorruptBoss {
            constructor(wave) {
                this.name = '白桦腐竹';
                this.x = 600;
                this.y = 100;
                this.width = 72;
                this.height = 96;
                this.vx = 0;
                this.vy = 0;
                this.facing = -1;
                this.alive = true;
                const hpMultiplier = Math.pow(1.2, wave - 1);
                this.maxHp = Math.floor(800 * hpMultiplier);
                this.hp = this.maxHp;
                this.damage = 22;
                this.knockResist = 2.5;
                this.hitTimer = 0;
                this.hitThisAttack = false;
                this.attackTimer = 0;
                this.skillCooldown = 150;
                this.slamCooldown = 220;
                this.novaCooldown = 200;
                this.dashCooldown = 260;
                this.dashTimer = 0;
                this.auraPulse = 0;
                this.walkFrame = 0;
                this.walkTimer = 0;
            }

            update(player) {
                if (!this.alive || gameState !== 'playing') return;
                const dx = player.x - this.x;
                this.facing = dx >= 0 ? 1 : -1;

                // 走向玩家（慢速）或冲刺
                if (this.dashTimer > 0) {
                    this.vx = this.facing * 6.5;
                    this.dashTimer--;
                    if (this.dashTimer % 3 === 0) {
                        spawnAttackParticles(this.x + this.width / 2, this.y + this.height / 2, '#8BC34A', 6);
                    }
                } else {
                    if (Math.abs(dx) > 40) {
                        this.vx = dx > 0 ? 1.1 : -1.1;
                    } else {
                        this.vx = 0;
                    }
                }

                // 技能计时
                this.skillCooldown--;
                this.slamCooldown--;
                this.novaCooldown--;
                this.dashCooldown--;
                this.auraPulse = (this.auraPulse + 0.05) % (Math.PI * 2);

                // 远程腐蚀弹幕
                if (this.skillCooldown <= 0) {
                    this.skillCooldown = 160;
                    const shots = 10;
                    for (let i = 0; i < shots; i++) {
                        const angle = -0.6 + (i / (shots - 1)) * 1.2;
                        const speed = 3.2;
                        projectiles.push(new Projectile(
                            this.x + this.width / 2,
                            this.y + this.height / 2,
                            Math.cos(angle + (this.facing === -1 ? Math.PI : 0)) * speed,
                            Math.sin(angle) * speed,
                            14,
                            '#8BC34A'
                        ));
                    }
                }

                // 跳跃砸地
                if (this.slamCooldown <= 0) {
                    this.slamCooldown = 240;
                    this.vy = -12;
                }

                // 腐蚀新星（环形弹幕）
                if (this.novaCooldown <= 0) {
                    this.novaCooldown = 220;
                    const rings = 12;
                    for (let i = 0; i < rings; i++) {
                        const angle = (Math.PI * 2 / rings) * i;
                        const speed = 3.8;
                        projectiles.push(new Projectile(
                            this.x + this.width / 2,
                            this.y + this.height / 2,
                            Math.cos(angle) * speed,
                            Math.sin(angle) * speed,
                            16,
                            '#A5D6A7'
                        ));
                    }
                    spawnAttackParticles(this.x + this.width / 2, this.y + this.height / 2, '#A5D6A7', 20);
                }

                // 冲刺横斩
                if (this.dashCooldown <= 0) {
                    this.dashCooldown = 260;
                    this.dashTimer = 26;
                    this.vy = -3;
                }

                // 重力
                this.vy += CONFIG.GRAVITY;
                if (this.vy > 14) this.vy = 14;

                // 应用速度
                this.x += this.vx;
                this.y += this.vy;

                // 地面碰撞
                this.handleCollision();

                // 碰撞玩家
                if (this.intersects(player.x, player.y, player.width, player.height)) {
                    player.takeDamage(this.damage);
                }

                if (this.hitTimer > 0) this.hitTimer--;

                // 动画
                if (this.vx !== 0) {
                    this.walkTimer++;
                    if (this.walkTimer > 10) {
                        this.walkTimer = 0;
                        this.walkFrame = (this.walkFrame + 1) % 4;
                    }
                }
            }

            handleCollision() {
                const left = Math.floor(this.x / CONFIG.TILE_SIZE);
                const right = Math.floor((this.x + this.width) / CONFIG.TILE_SIZE);
                const top = Math.floor(this.y / CONFIG.TILE_SIZE);
                const bottom = Math.floor((this.y + this.height) / CONFIG.TILE_SIZE);

                for (let ty = top; ty <= bottom; ty++) {
                    for (let tx = left; tx <= right; tx++) {
                        if (tiles[ty] && tiles[ty][tx] > 0) {
                            const tileX = tx * CONFIG.TILE_SIZE;
                            const tileY = ty * CONFIG.TILE_SIZE;
                            if (this.intersects(tileX, tileY, CONFIG.TILE_SIZE, CONFIG.TILE_SIZE)) {
                                if (this.vy > 0 && this.y + this.height - this.vy <= tileY) {
                                    // 落地冲击波
                                    if (this.vy > 8) {
                                        spawnAttackParticles(this.x + this.width / 2, this.y + this.height, '#8BC34A', 18);
                                    }
                                    this.y = tileY - this.height;
                                    this.vy = 0;
                                } else if (this.vy < 0 && this.y - this.vy >= tileY + CONFIG.TILE_SIZE) {
                                    this.y = tileY + CONFIG.TILE_SIZE;
                                    this.vy = 0;
                                } else if (this.vx > 0) {
                                    this.x = tileX - this.width;
                                } else if (this.vx < 0) {
                                    this.x = tileX + CONFIG.TILE_SIZE;
                                }
                            }
                        }
                    }
                }
            }

            intersects(x, y, w, h) {
                return this.x < x + w && this.x + this.width > x &&
                    this.y < y + h && this.y + this.height > y;
            }

            takeDamage(amount, knockbackDir, knockbackForce) {
                if (this.hitThisAttack) return;
                this.hitThisAttack = true;
                this.hp -= amount;
                this.hitTimer = 12;
                this.vx += knockbackDir * (knockbackForce / this.knockResist);
                this.vy = -3;
                if (this.hp <= 0) {
                    this.alive = false;
                    enemiesRemaining = 0;
                    killCount++;
                    onWaveComplete();
                }
            }

            draw(ctx) {
                if (!this.alive) return;
                const screenX = this.x - camera.x;
                const screenY = this.y - camera.y;
                ctx.save();
                if (this.hitTimer > 0) ctx.globalAlpha = 0.85;

                // 腐化能量光环
                ctx.save();
                ctx.globalAlpha = 0.18;
                ctx.fillStyle = '#8BC34A';
                ctx.beginPath();
                ctx.ellipse(
                    screenX + this.width / 2,
                    screenY + this.height / 2,
                    64 + Math.sin(this.auraPulse) * 8,
                    52 + Math.cos(this.auraPulse) * 6,
                    0,
                    0,
                    Math.PI * 2
                );
                ctx.fill();
                ctx.restore();

                // 躯干分层装甲
                ctx.fillStyle = '#F5F5F5';
                ctx.fillRect(screenX + 6, screenY + 10, this.width - 12, this.height - 20);
                ctx.fillStyle = '#E0E0E0';
                ctx.fillRect(screenX + 10, screenY + 18, this.width - 20, this.height - 32);
                ctx.fillStyle = '#BDBDBD';
                ctx.fillRect(screenX + 14, screenY + 26, this.width - 28, this.height - 44);

                // 肩甲与护臂
                ctx.fillStyle = '#2E7D32';
                ctx.fillRect(screenX + 4, screenY + 12, this.width - 8, 14);
                ctx.fillRect(screenX + 2, screenY + 30, 12, 22);
                ctx.fillRect(screenX + this.width - 14, screenY + 30, 12, 22);

                // 树皮纹理
                ctx.fillStyle = '#8BC34A';
                for (let i = 0; i < 7; i++) {
                    ctx.fillRect(screenX + 10 + i * 8, screenY + 18 + (i * 5) % 28, 5, 10);
                }

                // 腐化核心
                ctx.fillStyle = '#A5D6A7';
                ctx.fillRect(screenX + this.width / 2 - 12, screenY + 44, 24, 18);
                ctx.fillStyle = '#C5E1A5';
                ctx.fillRect(screenX + this.width / 2 - 8, screenY + 48, 16, 10);

                // 面甲与角
                ctx.fillStyle = '#263238';
                ctx.fillRect(screenX + this.width / 2 - 14, screenY + 6, 28, 20);
                ctx.fillStyle = '#9CCC65';
                ctx.fillRect(screenX + this.width / 2 - 10, screenY + 12, 8, 6);
                ctx.fillRect(screenX + this.width / 2 + 4, screenY + 12, 8, 6);
                ctx.fillStyle = '#455A64';
                ctx.beginPath();
                ctx.moveTo(screenX + this.width / 2 - 18, screenY + 8);
                ctx.lineTo(screenX + this.width / 2 - 6, screenY - 6);
                ctx.lineTo(screenX + this.width / 2 - 2, screenY + 6);
                ctx.closePath();
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(screenX + this.width / 2 + 18, screenY + 8);
                ctx.lineTo(screenX + this.width / 2 + 6, screenY - 6);
                ctx.lineTo(screenX + this.width / 2 + 2, screenY + 6);
                ctx.closePath();
                ctx.fill();

                // 胸口符文
                ctx.strokeStyle = '#C5E1A5';
                ctx.lineWidth = 3;
                ctx.strokeRect(screenX + this.width / 2 - 16, screenY + 40, 32, 28);
                ctx.strokeRect(screenX + this.width / 2 - 8, screenY + 46, 16, 16);

                // 冲刺残影
                if (this.dashTimer > 0) {
                    ctx.globalAlpha = 0.3;
                    ctx.fillStyle = '#8BC34A';
                    for (let i = 0; i < 3; i++) {
                        ctx.fillRect(screenX - i * 12 * this.facing, screenY + 10, this.width, this.height - 12);
                    }
                }

                ctx.restore();

                // 血条
                this.drawHealthBar(ctx, screenX, screenY);
            }

            drawHealthBar(ctx, x, y) {
                const barWidth = 200;
                const barX = CONFIG.CANVAS_WIDTH / 2 - barWidth / 2;
                const barY = 20;
                ctx.save();
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(barX, barY, barWidth, 16);
                const pct = this.hp / this.maxHp;
                ctx.fillStyle = '#8BC34A';
                ctx.fillRect(barX, barY, barWidth * pct, 16);
                ctx.strokeStyle = '#C5E1A5';
                ctx.lineWidth = 2;
                ctx.strokeRect(barX, barY, barWidth, 16);
                ctx.fillStyle = '#FFF';
                ctx.font = 'bold 14px "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.fillText(`${this.name} ${Math.max(0, Math.floor(this.hp))}/${this.maxHp}`, CONFIG.CANVAS_WIDTH / 2, barY + 13);
                ctx.restore();
            }
        }

        // ============ 绘制函数 ============
        function drawSky() {
            // 渐变天空
            const gradient = ctx.createLinearGradient(0, 0, 0, CONFIG.CANVAS_HEIGHT);
            gradient.addColorStop(0, currentBiome.sky[0]);
            gradient.addColorStop(0.7, currentBiome.sky[1]);
            gradient.addColorStop(1, currentBiome.sky[2]);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);

            if (currentBiome.sun) {
                ctx.fillStyle = '#FFE082';
                ctx.beginPath();
                ctx.arc(CONFIG.CANVAS_WIDTH - 100, 80, 40, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#FFEB3B';
                ctx.beginPath();
                ctx.arc(CONFIG.CANVAS_WIDTH - 100, 80, 32, 0, Math.PI * 2);
                ctx.fill();
            }

            if (currentBiome.moon) {
                ctx.fillStyle = '#CFD8DC';
                ctx.beginPath();
                ctx.arc(120, 90, 26, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#90A4AE';
                ctx.beginPath();
                ctx.arc(126, 86, 22, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawClouds() {
            ctx.fillStyle = currentBiome.cloud;
            clouds.forEach(cloud => {
                // 云朵移动
                cloud.x += cloud.speed;
                if (cloud.x > MAP_WIDTH * CONFIG.TILE_SIZE + 100) {
                    cloud.x = -cloud.width;
                }

                const screenX = cloud.x - camera.x * 0.3; // 视差滚动
                if (screenX > -cloud.width && screenX < CONFIG.CANVAS_WIDTH + cloud.width) {
                    // 像素风格云朵
                    const w = cloud.width;
                    ctx.fillRect(screenX, cloud.y, w * 0.6, 16);
                    ctx.fillRect(screenX - 10, cloud.y + 8, w * 0.8, 12);
                    ctx.fillRect(screenX + w * 0.3, cloud.y - 6, w * 0.4, 14);
                }
            });
        }

        function drawTile(x, y, type) {
            const screenX = x * CONFIG.TILE_SIZE - camera.x;
            const screenY = y * CONFIG.TILE_SIZE - camera.y;

            // 屏幕外不绘制
            if (screenX < -CONFIG.TILE_SIZE || screenX > CONFIG.CANVAS_WIDTH ||
                screenY < -CONFIG.TILE_SIZE || screenY > CONFIG.CANVAS_HEIGHT) {
                return;
            }

            if (type === 1) {
                // 草方块
                // 泥土底部
                ctx.fillStyle = currentBiome.dirt;
                ctx.fillRect(screenX, screenY, CONFIG.TILE_SIZE, CONFIG.TILE_SIZE);

                // 泥土纹理
                ctx.fillStyle = currentBiome.dirtAccent;
                for (let i = 0; i < 4; i++) {
                    const dotX = screenX + (i * 8 + ((y * 3) % 8)) % 28;
                    const dotY = screenY + 14 + (i * 5) % 16;
                    ctx.fillRect(dotX, dotY, 4, 4);
                }

                // 草皮顶部
                ctx.fillStyle = currentBiome.top;
                ctx.fillRect(screenX, screenY, CONFIG.TILE_SIZE, 8);

                // 草皮纹理
                ctx.fillStyle = currentBiome.topAccent;
                ctx.fillRect(screenX + 2, screenY, 4, 6);
                ctx.fillRect(screenX + 12, screenY, 6, 5);
                ctx.fillRect(screenX + 24, screenY, 4, 7);

                // 草皮边缘
                ctx.fillStyle = currentBiome.topAccent;
                ctx.fillRect(screenX, screenY + 8, CONFIG.TILE_SIZE, 2);

            } else if (type === 2) {
                // 泥土方块
                ctx.fillStyle = currentBiome.dirt;
                ctx.fillRect(screenX, screenY, CONFIG.TILE_SIZE, CONFIG.TILE_SIZE);

                // 泥土纹理
                ctx.fillStyle = currentBiome.dirtAccent;
                for (let i = 0; i < 5; i++) {
                    const dotX = screenX + ((x * 7 + i * 9) % 24);
                    const dotY = screenY + ((y * 5 + i * 7) % 24);
                    ctx.fillRect(dotX, dotY, 5, 5);
                }

                // 石头点缀
                ctx.fillStyle = currentBiome.stone;
                ctx.fillRect(screenX + ((x * 3) % 20), screenY + ((y * 7) % 20), 6, 4);
            }

            // 方块边框
            ctx.strokeStyle = 'rgba(0,0,0,0.2)';
            ctx.strokeRect(screenX, screenY, CONFIG.TILE_SIZE, CONFIG.TILE_SIZE);
        }

        function drawMap() {
            const startX = Math.floor(camera.x / CONFIG.TILE_SIZE);
            const endX = startX + Math.ceil(CONFIG.CANVAS_WIDTH / CONFIG.TILE_SIZE) + 1;
            const startY = Math.floor(camera.y / CONFIG.TILE_SIZE);
            const endY = startY + Math.ceil(CONFIG.CANVAS_HEIGHT / CONFIG.TILE_SIZE) + 1;

            for (let y = Math.max(0, startY); y < Math.min(MAP_HEIGHT, endY); y++) {
                for (let x = Math.max(0, startX); x < Math.min(MAP_WIDTH, endX); x++) {
                    if (tiles[y][x] > 0) {
                        drawTile(x, y, tiles[y][x]);
                    }
                }
            }
        }

        function drawUI() {
            // 血条背景
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(10, 10, 204, 28);

            // 血条边框
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2;
            ctx.strokeRect(10, 10, 204, 28);

            // 血量
            const hpPercent = player.hp / player.maxHp;
            const gradient = ctx.createLinearGradient(12, 0, 200, 0);
            gradient.addColorStop(0, '#E53935');
            gradient.addColorStop(1, '#FF5252');
            ctx.fillStyle = gradient;
            ctx.fillRect(12, 12, 200 * hpPercent, 24);

            // 血量文字
            ctx.fillStyle = '#FFF';
            ctx.font = 'bold 14px "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.fillText(`HP: ${Math.floor(player.hp)}/${player.maxHp}`, 112, 29);

            // 心形图标
            ctx.fillStyle = '#E53935';
            ctx.font = '20px Arial';
            ctx.textAlign = 'left';
            ctx.fillText('❤', 220, 30);

            ctx.fillStyle = '#FFF';
            ctx.font = 'bold 16px "Courier New", monospace';
            ctx.textAlign = 'left';
            ctx.fillText(`Wave ${currentWave}`, 10, 60);
            
            // 敌人剩余
            ctx.font = 'bold 14px "Courier New", monospace';
            ctx.fillText(`敌人剩余: ${enemiesRemaining}/${totalEnemiesInWave}`, 10, 80);

            // 主题
            ctx.font = '12px "Courier New", monospace';
            ctx.fillStyle = '#B3E5FC';
            ctx.fillText(`Biome: ${currentBiome.name}`, 10, 100);

            // 击杀数
            ctx.fillStyle = '#FFF';
            ctx.font = '12px "Courier New", monospace';
            ctx.fillText(`击杀: ${killCount}`, 10, 118);
            
            // 当前武器信息
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(CONFIG.CANVAS_WIDTH - 200, 10, 190, 60);
            ctx.strokeStyle = player.weapon.color;
            ctx.lineWidth = 2;
            ctx.strokeRect(CONFIG.CANVAS_WIDTH - 200, 10, 190, 60);
            
            ctx.fillStyle = player.weapon.color;
            ctx.font = 'bold 14px "Courier New", monospace';
            ctx.textAlign = 'left';

        function onWaveComplete() {
            stopBossMusic();
            player.hp = player.maxHp;
            if (currentWave >= CONFIG.BOSS_WAVE) {
                // 通关
                gameState = 'win';
                gameEndTime = Date.now();
                winCode = generateWinCode();
                return;
            }
            gameState = 'reward';
            const minRarity = player.weapon ? player.weapon.rarity : 'COMMON';
            if (player.weapon && player.weapon.rarity === 'LEGENDARY') {
                currentRewardType = 'enchant';
                enchantChoices = generateEnchantChoices(3);

                currentRewardType = 'weapon';
                weaponChoices = generateWeaponChoices(3, minRarity);

            spawnEnemiesForWave();

            stopBossMusic();

            player.x = 100;
            player.y = 200;
            player.vx = 0;
            player.vy = 0;
            gameState = 'playing';

        function generateWinCode() {
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            let part = '';
            for (let i = 0; i < 4; i++) part += letters[Math.floor(Math.random() * letters.length)];
            const ts = Date.now().toString();
            const tail = ts.slice(-4);
            return `MC2D-WIN-${part}-${tail}`;
        }
